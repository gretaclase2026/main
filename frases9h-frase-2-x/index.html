<html lang="ca">
<head>
<meta charset="UTF-8">

<title>Vocabulari Neural B1 - Unitat 9</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:4px}
.unit-number{font-size:22px;font-weight:800;color:#2563eb;margin:0 8px;min-width:20px;text-align:center}

.mode-es{background:#fde68a}

main{display:flex;justify-content:center;padding:24px}

.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}

.block.active{background:#2563eb !important;color:#fff !important}

.audio-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; align-items: center; }

.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;} 
.audio-btn.rec{background:#fbcfe8; color: #9d174d;}
.audio-btn.stt{background:#dbeafe;}
.audio-btn.rec.active {background:#f87171; color:white; animation:pulse 1.5s infinite}
.listening { animation: pulse 1.5s infinite !important; background: #3b82f6 !important; color: white !important; }

@keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.es{font-size:19px;color:#2563eb;margin-top:14px;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700}
.hidden{display:none}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

#listSection { margin-top: 25px; display: none; text-align: left; background: #f8fafc; border-radius: 20px; padding: 15px; border: 1px solid #e2e8f0; }

.list-toggle-btns { display: flex; gap: 10px; margin-top: 15px; }
.list-toggle-btns button { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 12px; }
</style>
</head>

let currentBlockData = [], pos = 0, mode = "EN", mediaRecorder, audioChunks = [], isRecording = false;
let starredIds = JSON.parse(localStorage.getItem('starred_b1_v2') || '[]');

/* --- LÓGICA DE RECONOCIMIENTO DE VOZ (MICRO AZUL) --- */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;

const contractions = {
    "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would", 
    "it'd": "it would", "we'd": "we would", "they'd": "they would", "i'm": "i am"
};
const expanded = {};
for (let k in contractions) expanded[contractions[k]] = k;

function normalize(w) { return w ? w.toLowerCase().replace(/[.,?!"]/g, "").trim() : ""; }

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; recognition.interimResults = false; recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (e) => {
        let transcript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript + " ";
        compareSentences(currentBlockData[pos].en, transcript.trim());
    };
}

function compareSentences(originalText, spokenText) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const origWords = originalText.split(/\s+/);
    const spokenWords = spokenText.split(/\s+/);
    let resultHTML = ""; let sIdx = 0; 
    for (let i = 0; i < origWords.length; i++) {
        let matched = false; const oNorm = normalize(origWords[i]);
        if (sIdx < spokenWords.length) {
            const sNorm = normalize(spokenWords[sIdx]);
            if (oNorm === sNorm || contractions[oNorm] === sNorm || expanded[oNorm] === sNorm) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx++; matched = true;
            }
        }
        if (!matched) {
            let foundAhead = false;
            for (let look = sIdx; look < sIdx + 3 && look < spokenWords.length; look++) {
                if (normalize(spokenWords[look]) === oNorm) {
                    for (let skip = sIdx; skip < look; skip++) resultHTML += `<span class="word-error">${spokenWords[skip]}</span> `;
                    resultHTML += `<span class="word-correct">${spokenWords[look]}</span> `;
                    sIdx = look + 1; foundAhead = true; matched = true; break;
                }
            }
            if (!foundAhead) resultHTML += `<span class="word-missing">${origWords[i]}</span> `;
        }
    }
    while (sIdx < spokenWords.length) { resultHTML += `<span class="word-error">${spokenWords[sIdx]}</span> `; sIdx++; }
    feedbackDiv.innerHTML = resultHTML;
}

async function toggleMic() {
    if (!recognition) return;
    if (isListening) { recognition.stop(); } 
    else { 
        if (isRecording) stopRecordingManual(); 
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start(); 
    }
}

/* --- GRABADORA MANUAL (MICRO ROSA) --- */
async function toggleRecord(btnId) {
  const btn = document.getElementById(btnId);
  if (isRecording) { stopRecordingManual(); return; }
  if (isListening) recognition.stop();
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onstop = () => {
    const blob = new Blob(audioChunks, { type: 'audio/wav' });
    new Audio(URL.createObjectURL(blob)).play();
  };
  mediaRecorder.start(); 
  isRecording = true;
  btn.classList.add("active");
}

function stopRecordingManual() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    isRecording = false;
    document.getElementById("recBtn").classList.remove("active");
}

/* --- LÓGICA BASE --- */
function initBlocks() {
  const container = document.getElementById("blockContainer");

  container.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "block all-btn"; allBtn.textContent = "T";
  allBtn.onclick = () => loadAll(); container.appendChild(allBtn);
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i); container.appendChild(btn);
  }
  loadBlock(0);
}

function loadBlock(b) {
  let start = b * 10;
  currentBlockData = data.slice(start, start + 10).map((item, i) => ({...item, realIdx: start + i}));
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === (b + 1)));
  pos = 0; update();
}

function loadAll() {
  currentBlockData = data.map((item, i) => ({...item, realIdx: i}));
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === 0));
  pos = 0; update();
}

function update() {
  const item = currentBlockData[pos];
  const esDiv = document.getElementById("es"), enDiv = document.getElementById("en");
  document.getElementById("mainStar").classList.toggle("active", starredIds.includes(item.realIdx));
  document.getElementById("speechFeedback").innerHTML = "";
  
  esDiv.innerHTML = item.es; enDiv.innerHTML = item.en;
  esDiv.classList.toggle("hidden", mode === "EN");
  enDiv.classList.toggle("hidden", mode === "ES");
  
  document.getElementById("counter").textContent = `${pos + 1} / ${currentBlockData.length}`;
}

function setMode(m) { mode = m; update(); }
function reveal() { document.getElementById("es").classList.remove("hidden"); document.getElementById("en").classList.remove("hidden"); }
function nextOne() { pos = (pos + 1) % currentBlockData.length; update(); }

function toggleStarCurrent() {
  const id = currentBlockData[pos].realIdx;
  starredIds = starredIds.includes(id) ? starredIds.filter(i => i !== id) : [...starredIds, id];
  localStorage.setItem('starred_b1_v2', JSON.stringify(starredIds));
  update();
}

function playAudio(speed, text) {
  const utterance = new SpeechSynthesisUtterance(text || currentBlockData[pos].en);
  utterance.lang = 'en-US'; utterance.rate = speed;
  window.speechSynthesis.speak(utterance);
}
function pauseAudio() { window.speechSynthesis.cancel(); }

function toggleList(type) {
    const listSec = document.getElementById("listSection");
    if (listSec.style.display === "block") { listSec.style.display = "none"; return; }
    listSec.style.display = "block";
    listSec.innerHTML = "";
    let listItems = (type === 'stars') ? data.map((it, i) => ({...it, realIdx: i})).filter(it => starredIds.includes(it.realIdx)) : currentBlockData;
    listItems.forEach((item, idx) => {
        const isStarred = starredIds.includes(item.realIdx);
        const row = document.createElement("div");
        row.className = "list-item";
        const recId = `rec-list-${idx}`;
        row.innerHTML = `
            <div class="list-controls-row">
                <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStarList(${item.realIdx}, '${type}')">★</button>
                <button class="mini-btn btn-audio" onclick="playAudio(1.0, '${item.en.replace(/'/g, "\\'")}')">🔊</button>
                <button class="mini-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button>
            </div>
            <div class="list-texts">
                <div class="list-txt-es">${item.es}</div>
                <div class="list-txt-en">${item.en}</div>
            </div>
        `;
        listSec.appendChild(row);
    });
}

function toggleStarList(id, type) {
    starredIds = starredIds.includes(id) ? starredIds.filter(i => i !== id) : [...starredIds, id];
    localStorage.setItem('starred_b1_v2', JSON.stringify(starredIds));
    update(); toggleList(type); toggleList(type);
}

function markAsDone(el) {
    el.style.color = el.innerHTML === "✓" ? "transparent" : "white";
    el.innerHTML = el.innerHTML === "✓" ? "" : "✓";
    el.classList.toggle('marked');
}

initBlocks();
</script>
</body>
<style>
    #puntos-header { 
        position: fixed; top: 15px; right: 15px; 
        background: #fef3c7; color: #92400e; padding: 6px 16px; 
        border-radius: 25px; font-weight: 900; border: 2px solid #f59e0b; 
        z-index: 9999; display: flex; align-items: center; gap: 6px; 
        font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    #estrella-animada { 
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); 
        font-size: 100px; z-index: 10000; pointer-events: none; opacity: 0; 
    }
    #btn-rescat { 
        display: none; margin: 15px auto; padding: 6px 20px; 
        background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 20px; 
        font-size: 12px; color: #64748b; cursor: pointer; font-weight: 600;
        text-transform: uppercase;
    }
</style>

<div id="puntos-header">⭐ <span id="val-puntos">0</span></div>
<div id="estrella-animada">⭐</div>

<script>
(function() {
    let xp = parseInt(localStorage.getItem('global_xp')) || 0;
    let fallos = 0;
    
    const actualizarMarcador = () => {
        const el = document.getElementById('val-puntos');
        if(el) el.textContent = xp;
    };

    window.executarAciertoFinal = function() {
        xp += 10;
        localStorage.setItem('global_xp', xp);
        actualizarMarcador();

        const est = document.getElementById('estrella-animada');
        est.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        est.style.opacity = "1";
        est.style.transform = "translate(-50%, -50%) scale(1.4)";
        
        setTimeout(() => {
            est.style.opacity = "0";
            est.style.transform = "translate(-50%, -50%) scale(0)";
        }, 1000);

        fallos = 0;
        document.getElementById('btn-rescat').style.display = 'none';
    };

    setInterval(() => {
        const contenedor = document.querySelector('.audio-container');
        if (contenedor && !document.getElementById('btn-rescat')) {
            const b = document.createElement('button');
            b.id = 'btn-rescat';
            b.textContent = 'IT IS OK';
            b.onclick = window.executarAciertoFinal;
            contenedor.after(b);
            actualizarMarcador();
        }
        
        if (typeof recognition !== 'undefined' && !recognition._puntosVinculados) {
            recognition._puntosVinculados = true;
            const originalResult = recognition.onresult;
            
            recognition.onresult = (event) => {
                if(originalResult) originalResult(event);
                
                const transcripcio = event.results[0][0].transcript.toLowerCase().trim();
                const fraseCorrecta = currentBlockData[pos].en.toLowerCase().trim();

                const n1 = transcripcio.replace(/[^\w\s]/gi, '');
                const n2 = fraseCorrecta.replace(/[^\w\s]/gi, '');

                if (n1 === n2) {
                    window.executarAciertoFinal();
                } else {
                    fallos++;
                    // Ahora aparece exactamente al tercer fallo
                    if (fallos >= 3) document.getElementById('btn-rescat').style.display = 'block';
                }
            };
        }
    }, 800);
})();
</script>
</html>
