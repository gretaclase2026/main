 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulari Neural B1 - Vibrant</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}
.modes{display:flex;gap:10px;margin-bottom:10px;width:100%}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}

/* CORRECCIÓN: Ahora el bloque activo es azul */
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:20px 0}
.audio-controls{display:flex;align-items:center;gap:15px;margin-bottom:15px}
.audio-btn{font-size:50px;background:#dcfce7;border:none;cursor:pointer;width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.slow{background:#fef08a;width:80px;height:80px;font-size:35px}
.audio-btn.vibrate{animation:vibrate 0.25s linear 2}
@keyframes vibrate{0%{transform:translate(0)}25%{transform:translate(2px,-2px)}50%{transform:translate(-2px,2px)}75%{transform:translate(2px,2px)}100%{transform:translate(0)}}

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:0;font-weight:bold;color:#2563eb;font-size:22px}
#word{font-size:24px;font-weight:800;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
#answer{font-size:20px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}
.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}
#list{margin-top:20px;background:#f9f9f9;padding:15px;border-radius:15px;display:none;border:1px solid #ddd}

.check-box-manual {
    position: absolute; top: 85px; right: 22px;
    width: 24px; height: 24px;
    background: #fff !important; border: 1.5px solid #22c55e !important;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: all 0.2s; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white; }
</style>
</head>
<body>

<div class="card">
  <div class="modes">
    <div id="modeEN" class="mode en active" onclick="setMode('EN')">ENG → ESP</div>
    <div id="modeES" class="mode es" onclick="setMode('ES')">ESP → ENG</div>
  </div>

  <div class="blocks" id="blocksContainer"></div>

  <div class="main-box-container">
    <div class="audio-controls">
      <button class="audio-btn" onclick="playAudio(1.0)">🔊</button>
      <button class="audio-btn slow" onclick="playAudio(0.75)">🐢</button>
    </div>
    
    <div class="progress-wrapper">
      <input type="range" id="progressBar" value="0" step="0.1">
    </div>

    <div class="counter-side">
      <span id="pos">0</span> / <span id="total">0</span>
    </div>
  </div>

  <div id="word"></div>
  <div id="answer"></div>

  <div class="actions">
    <button class="btn btn-reveal" onclick="reveal()">veure</button>
    <button class="btn btn-know" onclick="know()">ja la se</button>
    <button class="btn btn-next" onclick="next()">següent</button>
  </div>
  
  <button id="listBtn" onclick="toggleList()" style="width:100%;margin-top:20px;padding:12px;border-radius:12px;border:none;background:#e9d5ff;font-weight:bold;cursor:pointer">mostrar llista del bloc</button>
  <div id="list"></div>
</div>

<audio id="audio"></audio>

<script>

  {en: "Check the expiration date on the milk before you buy it, since sometimes the bottles at the front of the shelf are about to expire.", es: "Revisa la fecha de caducidad de la leche antes de comprarla, ya que a veces las botellas de la parte delantera del estante están a punto de caducar"},
  {en: "We should leave at least twenty minutes earlier than usual to avoid the heavy traffic that builds up near the city center during rush hour.", es: "Deberíamos salir al menos veinte minutos antes de lo habitual para evitar el tráfico intenso que se forma cerca del centro de la ciudad en hora punta"},

  {en: "I always keep a spare set of keys at my neighbor's house in case I accidentally lock myself out while I'm taking out the trash.", es: "Siempre guardo un juego de llaves de repuesto en casa de mi vecino por si accidentalmente me quedo fuera mientras saco la basura"},
  {en: "Make sure you heat up the leftovers until they're steaming hot, as eating cold chicken that's been in the fridge for three days might be dangerous.", es: "Asegúrate de calentar las sobras hasta que estén humeantes, ya que comer pollo frío que ha estado en la nevera tres días podría ser peligroso"},
  {en: "You'd better wear your waterproof boots if you're going for a walk in the forest, because it rained last night and the ground will be very muddy.", es: "Será mejor que llaves tus botas impermeables si vas a dar un paseo por el bosque, porque llovió anoche y el suelo estará muy embarrado"},
  {en: "We should tell the neighbors that we're having a small party on Saturday, so they don't get annoyed if there's a bit of noise until midnight.", es: "Deberíamos decirles a los vecinos que vamos a dar una pequeña fiesta el sábado, para que no se molesten si hay un poco de ruido hasta medianoche"},
  {en: "Don't push yourself too hard during your first workout after the holidays, or you'll end up with sore muscles that will last for a week.", es: "No te esfuerces demasiado en tu primer entrenamiento después de las vacaciones, o acabarás con agujetas que te durarán una semana"},
  {en: "Watch your step while you're going down the stairs because the light bulb on the second floor has burnt out and it's completely dark.", es: "Ten cuidado por dónde pisas mientras bajas las escaleras porque la bombilla del segundo piso se ha fundido y está completamente a oscuras"},
  {en: "You can borrow my car to go to the supermarket as long as you promise to drive carefully and refill the tank before you bring it back tonight.", es: "Puedes tomar prestado mi coche para ir al supermercado siempre y cuando prometas conducir con cuidado y rellenar el depósito antes de traerlo esta noche"},
  {en: "We had to call off the outdoor barbecue because the weather forecast predicted a heavy storm, so we decided to order some pizzas instead.", es: "Tuvimos que suspender la barbacoa al aire libre porque el pronóstico del tiempo predecía una fuerte tormenta, así que decidimos pedir unas pizzas en su lugar"},
  {en: "It was a really tough decision to sell the old house where I grew up, but I knew it was the right thing to do to start a new life in the city.", es: "Fue una decisión realmente difícil vender la vieja casa donde crecí, pero sabía que era lo correcto para empezar una nueva vida en la ciudad"},
  {en: "Assembling this new bookshelf is quite tricky because the instructions are not very clear, so we should take our time to avoid making any mistakes.", es: "Montar esta nueva estantería es bastante complicado porque las instrucciones no son muy claras, así que deberíamos tomarnos nuestro tiempo para evitar cometer errores"},
  {en: "There was an awkward silence during dinner when nobody knew what to say after John mentioned the problem with the neighbors.", es: "Hubo un silencio incómodo durante la cena cuando nadie sabía qué decir después de que John mencionara el problema con los vecinos"},
  {en: "It's definitely worth paying a little bit more for a high-quality mattress, since you'll be spending a third of your life sleeping on it.", es: "Definitivamente vale la pena pagar un poco más por un colchón de alta calidad, ya que pasarás un tercio de tu vida durmiendo en él"},
  {en: "Keep this multi-tool in your kitchen drawer because it's very handy for opening jars or fixing small things around the house without calling a professional.", es: "Guarda esta multiherramienta en el cajón de la cocina porque es muy práctica para abrir botes o arreglar cosas pequeñas en casa sin llamar a un profesional"},
  {en: "The renovation of the kitchen will take roughly three weeks to finish, provided that the workers arrive on time every morning and we have all the materials.", es: "La reforma de la cocina tardará aproximadamente tres semanas en terminarse, siempre que los trabajadores lleguen a tiempo cada mañana y tengamos todos los materiales"},
  {en: "I can hardly hear what you're saying because the volume of the television is too high, so please turn it down for a moment.", es: "Apenas puedo oír lo que estás diciendo porque el volumen de la televisión está demasiado alto, así que por favor bájalo un momento"},
  {en: "Make sure you set your alarm clock tonight, otherwise you'll oversleep and miss the most important meeting of the month.", es: "Asegúrate de poner el despertador esta noche, de lo contrario se te pegarán las sábanas y te perderás la reunión más importante del mes"},
  {en: "Be careful when you lift the lid off the pot, because the steam is very hot; then, use the strainer to drain the pasta before it gets too soft.", es: "Ten cuidado cuando levantes la tapa de la olla, porque el vapor está muy caliente; luego, usa el colador para escurrir la pasta antes de que se ablande demasiado"},
  {en: "Don't leave the frying pan on the heat without any oil, otherwise the non-stick surface will be ruined and everything you cook will start to stick.", es: "No dejes la sartén al fuego sin nada de aceite, de lo contrario la superficie antiadherente se arruinará y todo lo que cocines se empezará a pegar"},
  {en: "If you want to heat up the leftovers in the microwave, make sure you use a proper lid so the food doesn't splash and mess up the whole interior.", es: "Si quieres calentar las sobras en el microondas, asegúrate de usar una tapa adecuada para que la comida no salpique y ensucie todo el interior"},
  {en: "I need a bigger ladle to serve the soup, because this one is too small and I'll end up spilling everything on the clean tablecloth.", es: "Necesito un cucharón más grande para servir la sopa, porque este es demasiado pequeño y acabaré derramándolo todo sobre el mantel limpio"},
  {en: "I can't find the can opener anywhere, and I really need it to open this tin of crushed tomatoes if I want to finish the sauce on time.", es: "No encuentro el abrelatas por ninguna parte, y realmente lo necesito para abrir esta lata de tomate triturado si quiero terminar la salsa a tiempo"},
  {en: "We should buy a new corkscrew soon, since the old one is getting rusty and I'm afraid the cork will break inside the bottle next time.", es: "Deberíamos comprar un sacacorchos nuevo pronto, ya que el viejo se está oxidando y me temo que el corcho se romperá dentro de la botella la próxima vez"},
  {en: "Wrap the rest of the roast chicken in aluminum foil before putting it in the oven to keep it warm, but make sure you don't put it in the microwave by mistake.", es: "Envuelve el resto del pollo asado en papel de aluminio antes de meterlo en el horno para que se mantenga caliente, pero asegúrate de no meterlo en el microondas por error"},
  {en: "You'd better cover the salad bowl with plastic wrap so the lettuce stays fresh and crunchy, otherwise it will wilt because of the air in the fridge.", es: "Será mejor que cubras el bol de la ensalada con papel film para que la lechuga se mantenga fresca y crujiente, de lo contrario se marchitará por el aire de la nevera"},
  {en: "Watch your fingers while you're using the cheese grater, because it's extremely sharp and you could easily cut yourself if you're not paying attention.", es: "Cuidado con los dedos mientras usas el rallador de queso, porque está extremadamente afilado y podrías cortarte fácilmente si no estás prestando atención"},
  {en: "Don't leave the dirty dishes in the sink overnight; use the scrubber to clean them now so the grease doesn't dry up and become impossible to remove.", es: "No dejes los platos sucios en el fregadero toda la noche; usa el estropajo para limpiarlos ahora para que la grasa no se seque y se vuelva imposible de quitar"}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

function getFolderName() {
    return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "neural_b1";
}

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_currentBlock");
  
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);

  const blockToLoad = (savedBlock !== null) ? (savedBlock === 'T' ? 'T' : parseInt(savedBlock)) : 0;
  loadBlock(blockToLoad);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  if (b === 'T') {
    temp = data.map((item, i) => ({...item, realIdx: i+1}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) temp.push({...data[i], realIdx: i+1});
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloque Completado! 🎉";
    document.getElementById("answer").innerHTML = "";
    return;
  }
  progressBar.value = 0;
  const item = currentBlockData[pos];
  const w = document.getElementById("word");
  const ans = document.getElementById("answer");

  if (mode === "EN") {
    w.innerHTML = ``; 
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div style='font-size:22px;' class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span style="font-size:24px;">${item.en}</span>`;
  }
  ans.style.display = "none";
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos];
    if (mode === "EN") document.getElementById("word").innerHTML = `<span style="color:#333;">${item.en}</span>`;
    document.getElementById("answer").style.display = "block";
    if (mode === "ES") playAudio(1.0); 
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function playAudio(speed) {
  if (currentBlockData.length === 0) return;
  const num = currentBlockData[pos].realIdx;
  const fileName = "frase" + num + ".mp3";
  if (!a.src.includes(fileName)) { a.src = fileName; progressBar.value = 0; }
  a.playbackRate = speed;
  const btn = document.querySelector('.audio-btn');
  btn.classList.remove('vibrate'); void btn.offsetWidth; btn.classList.add('vibrate');
  a.play().catch(() => {});
}

function toggleList() {
  const l = document.getElementById("list");
  if (l.style.display === "block") { l.style.display = "none"; return; }
  l.innerHTML = "<b>Llista del bloc:</b><br><br>";
  let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
  let end = currentBlockID === 'T' ? data.length : Math.min(start + 10, data.length);
  data.slice(start, end).forEach((item) => {
    l.innerHTML += `<div style="margin-bottom:8px"><b>${item.en}</b> - <span class="txt-es">${item.es}</span></div>`;
  });
  l.style.display = "block";
}

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓"; element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { markAsDone(this); };
card.appendChild(box);

initBlocks();
</script>
</body>
</html>
