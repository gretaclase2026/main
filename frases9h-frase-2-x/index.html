 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greta app - 9 Frases</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:4px}
.unit-number{font-size:22px;font-weight:800;color:#2563eb;margin:0 8px;min-width:20px;text-align:center}
.mode-btns button{padding:6px 10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:11px;white-space:nowrap;line-height:1.2}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.check-box-manual{position:absolute;top:18px;right:22px;width:24px;height:24px;background:#fff;border:1.5px solid #22c55e;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;font-size:14px}
.check-box-manual.marked{background:#22c55e!important;color:white!important}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex:0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb!important;color:#fff!important;transform:scale(1.1)}
.block.all-btn{background:#e2e8f0;color:#475569}
.audio-container{display:flex;justify-content:center;gap:8px;margin:10px 0;align-items:center;flex-wrap:nowrap}
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dcfce7;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s}
.audio-btn.slow{background:#fef08a}
.audio-btn.pause{background:#fee2e2;color:inherit}
.audio-btn.rec{background:#fca5a5;color:white}
.audio-btn.stt{background:#dbeafe;font-size:22px}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.listening{animation:pulse 1.5s infinite;background:#90caf9!important;color:#0f172a!important}
.recording{animation:pulse 1.5s infinite;background:#f48fb1!important;color:white!important}
#speechFeedback{font-size:18px;margin:15px 0;font-weight:bold;min-height:28px;line-height:1.5;padding:0 10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px}
.word-correct{color:#16a34a}
.word-error{color:#dc2626;text-decoration:line-through}
.word-missing{color:#94a3b8;font-style:italic}
.star-btn{background:none;border:none;font-size:32px;cursor:pointer;color:#cbd5e1;transition:0.2s;padding:0 5px 0 0;margin-right:5px}
.star-btn.active{color:#f59e0b!important}
.progress-wrapper{width:100%;padding:0 10px;margin:15px 0 10px;box-sizing:border-box}
input[type="range"]{width:100%;cursor:pointer;height:10px;border-radius:5px;accent-color:#2563eb}
.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}
.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}
.list-controls{display:flex;gap:10px;margin-top:16px}
.list-btn{flex:1;background:#e9d5ff;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.review-btn{background:#fef3c7;color:#92400e}
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item{display:flex;align-items:flex-start;gap:15px;padding:15px 0;border-bottom:1px solid #eee}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:44px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.mini-btn{border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:0.2s}
.btn-audio{background:#dcfce7}
.btn-rec-mini{background:#fbcfe8}
.star-btn-list{background:none;border:none;font-size:26px;cursor:pointer;color:#cbd5e1;padding:0;line-height:1}
.star-btn-list.active{color:#f59e0b!important}
.blur{filter:blur(5px);transition:filter 0.2s;cursor:pointer;user-select:none}
.blur.revealed{filter:blur(0)}
#estrella-animada{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:100px;z-index:10000;pointer-events:none;opacity:0;display:none}
#btn-rescat{display:none;margin:10px auto;padding:6px 12px;background:#f8fafc;border:1.5px solid #22c55e;border-radius:12px;font-size:11px;color:#16a34a;cursor:pointer;font-weight:800;text-transform:uppercase}
.stats-header{position:fixed;top:45px;right:15px;display:flex;gap:8px;z-index:9999}
.stat-pill{background:#fef3c7;color:#92400e;padding:6px 14px;border-radius:25px;font-weight:900;border:2px solid #f59e0b;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1);display:flex;align-items:center;gap:6px}
#timer-pill{background:#dbeafe;color:#1e40af;border-color:#3b82f6;cursor:pointer}
.area-notas { 
    width: 100%;
    height: 100px; 
    border-radius: 12px; 
    border: 1.5px solid #2563eb; /* Azul igual que los números del reloj */
    padding: 12px; 
    font-family: inherit; 
    resize: none; 
    margin-top: 8px; 
    box-sizing: border-box;
    background: #ffffff;
    color: #0f172a;
    font-size: 14px;
}

.titulo-notas {
    font-size: 11px; 
    font-weight: 800; 
    color: #2563eb; /* Azul igual que los números del reloj */
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 20px;
    display: block;
}
</style>
</head>
<body>
<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">Anglès → Own</button></div>
 <div class="unit-number">9</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">Own → Anglès</button></div>
</header>
<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <div id="langLabel" class="lang" style="margin-top: 10px;">ANGLÈS</div>
 <div id="blockContainer" class="blocks"></div>
 <div class="audio-container">
  <button class="star-btn" id="starBtn" onclick="toggleStar()">★</button>
  <button class="audio-btn slow" onclick="playCurrent(0.75)">🐢</button>
  <button class="audio-btn" onclick="playCurrent(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord('recBtn')">🎤</button>
  <button class="audio-btn stt" id="sttBtn" onclick="toggleMic()">🎤</button>
 </div>
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100" step="0.1"></div>
 <button id="btn-rescat" onclick="rescueAction()">IT IS OKAY ⭐</button>
 <div id="es" class="es hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
<div class="list-controls">
  <button class="list-btn" onclick="toggleList('all')">Tota la llista</button>
  <button class="list-btn review-btn" onclick="toggleList('stars')">Repàs (★)</button>
 </div>

 <div style="width: 100%; text-align: left;">
  <label class="titulo-notas">Anotacions d'aquesta unitat:</label>
  <textarea id="blocNotas" class="area-notas" placeholder="Escriu aquí les teves notes..."></textarea>
 </div>
 <div id="endMsg" class="hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>
<div class="stats-header">
 <div id="timer-pill" class="stat-pill" onclick="resetTimer()">⏱️ <span id="val-timer">00:00</span></div>
 <div id="puntos-pill" class="stat-pill">⭐ <span id="val-puntos">0</span></div>
</div>
<div id="estrella-animada">⭐</div>
<script>
const items = [
{audio:"frase1.mp3",en:"Don't forget to check the pressure on the boiler before winter starts, because if it's too low, the heating won't turn on when you need it most.", es: "No olvides revisar la presión de la caldera antes de que empiece el invierno, porque si está muy baja, la calefacción no se encenderá cuando más la necesites"},
{audio:"frase2.mp3",en:"You should back up all your photos to the cloud tonight, since your phone's storage is almost full and you might lose them if the system crashes.", es: "Deberías hacer una copia de seguridad de todas tus fotos en la nube esta noche, ya que el almacenamiento de tu móvil está casi lleno y podrías perderlas si el sistema falla"},
{audio:"frase3.mp3",en:"Make sure you stretch your back for at least 5 minutes after sitting at the computer all day, otherwise you'll wake up with a terrible ache tomorrow morning.", es: "Asegúrate de estirar la espalda al menos cinco minutos después de estar sentado al ordenador todo el día; de lo contrario, te despertarás con un dolor terrible mañana por la mañana"},
{audio:"frase4.mp3",en:"I'd rather go to the supermarket early on Tuesday morning to avoid the crowds, even though I have to wake up an hour earlier than usual.", es: "Preferiría ir al supermercado temprano el martes por la mañana para evitar las aglomeraciones, aunque tenga que despertarme una hora antes de lo habitual"},
{audio:"frase5.mp3",en:"Be careful not to leave the pan unattended while you're frying the onions, as they can burn in a matter of seconds if the heat is too high.", es: "Ten cuidado de no dejar la sartén desatendida mientras fríes las cebollas, ya que pueden quemarse en cuestión de segundos si el fuego está demasiado alto"},
{audio:"frase6.mp3",en:"Check the tire pressure before we leave for our road trip, since the car might handle differently if they're not properly inflated.", es: "Revisa la presión de los neumáticos antes de que nos vayamos de viaje, ya que el coche podría responder de forma distinta si no están bien infados"},
{audio:"frase7.mp3",en:"You should water the plants late in the evening instead of at noon, because the sun is too strong and the water will evaporate before it reaches the roots.", es: "Deberías regar las plantas a última hora de la tarde en lugar de a mediodía, porque el sol es demasiado fuerte y el agua se evaporará antes de llegar a las raíces"},
{audio:"frase8.mp3",en:"Make sure you turn off the main water valve before you try to fix that leaky faucet, otherwise you'll end up flooding the entire kitchen floor.", es: "Asegúrate de cerrar la llave de paso del agua antes de intentar arreglar ese grifo que gotea; de lo contrario, acabás inundando todo el suelo de la cocina"},
{audio:"frase9.mp3",en:"Don't put that hot soup directly into the fridge, as it will raise the temperature inside and could spoil the rest of the food.", es: "No metas esa sopa caliente directamente en la nevera, ya que subirá la temperatura interior y podría estropear el resto de la comida"},
{audio:"frase10.mp3",en:"I need to go to the post office before they close at five, since I've been waiting for this package all week and I don't want to wait until Monday.", es: "Tengo que ir a la oficina de correos antes de que cierren a las cinco, ya que he estado esperando este paquete toda la semana y no quiero esperar hasta el lunes"},
{audio:"frase11.mp3",en:"Try to keep the windows closed while the air conditioning is on, because if the cold air escapes, the electricity bill will be much higher this month.", es: "Intenta mantener las ventanas cerradas mientras el aire acondicionado esté encendido, porque si el aire frío se escapa, la factura de la luz será mucho más alta este mes"},
{audio:"frase12.mp3",en:"Separate the dark clothes from the white ones before you start the laundry, as the black shirt might bleed and ruin your favorite white t-shirts.", es: "Separa la ropa oscura de la blanca antes de poner la lavadora, ya que la camisa negra podría desteñir y arruinar tus camisetas blancas favoritas"},
{audio:"frase13.mp3",en:"Your phone battery is draining quite fast lately, so you might want to check which apps are running in the background all the time.", es: "La batería de tu móvil se está agotando bastante rápido últimamente, así que quizás quieras revisar qué aplicaciones se están ejecutando en segundo plano todo el tiempo"},
{audio:"frase14.mp3",en:"Preheat the oven for at least ten minutes before putting the roast inside, so that the meat cooks evenly and doesn't stay raw in the middle.", es: "Precalienta el horno al menos diez minutos antes de meter el asado, para que la carne se cocine de forma uniforme y no se quede cruda por el medio"},
{audio:"frase15.mp3",en:"I'd better call the doctor's office to confirm my appointment for tomorrow morning, just in case they've changed the time without telling me.", es: "Será mejor que llame a la consulta del médico para confirmar mi cita de mañana por la mañana, por si acaso han cambiado la hora sin decírmelo"},
{audio:"frase16.mp3",en:"Don't clean the windows while the sun is shining directly on them, because the glass will dry too fast and leave ugly streaks everywhere.", es: "No limpies los cristales mientras el sol les dé directamente, porque el vidrio se secará demasiado rápido y dejará marcas feas por todas partes"},
{audio:"frase17.mp3",en:"Be careful when you use the power drill, as it can jump back if it hits a metal pipe inside the wall that you didn't know was there.", es: "Ten cuidado al usar el taladro eléctrico, ya que puede dar un salto hacia atrás si golpea una tubería de metal dentro de la pared que no sabías que estaba ahí"},
{audio:"frase18.mp3",en:"I think I'll wear my heavy coat today since the weather forecast says the temperature will drop significantly in the afternoon.", es: "Creo que me pondré el abrigo grueso hoy, ya que el pronóstico del tiempo dice que la temperatura bajará significativamente por la tarde"},
{audio:"frase19.mp3",en:"Remember to descale the coffee machine once a month, otherwise the lime will build up and it'll stop working properly sooner than you think.", es: "Recuerda descalcificar la cafetera una vez al mes; de lo contrario, la cal se acumulará y dejará de funcionar correctamente antes de lo que crees"},
{audio:"frase20.mp3",en:"You shouldn't use the same password for every website you visit, because if one account gets hacked, all your personal information will be at risk.", es: "No deberías usar la misma contraseña para cada sitio web que visites, porque si hackean una cuenta, toda tu información personal estará en riesgo"},
{audio:"frase21.mp3",en:"I'll set 2 different alarms on my phone just to be safe, because I'm so tired that I might sleep through the first one.", es: "Pondré dos alarmas diferentes en mi móvil solo por seguridad, porque estoy tan cansado que podría no enterarme de la primera"},
{audio:"frase22.mp3",en:"Check the expiration date on the milk before you buy it, since sometimes the bottles at the front of the shelf are about to expire.", es: "Revisa la fecha de caducidad de la leche antes de comprarla, ya que a veces las botellas de la parte delantera del estante están a punto de caducar"},
{audio:"frase23.mp3",en:"We should leave at least 20minutes earlier than usual to avoid the heavy traffic that builds up near the city center during rush hour.", es: "Deberíamos salir al menos veinte minutos antes de lo habitual para evitar el tráfico intenso que se forma cerca del centro de la ciudad en hora punta"},
{audio:"frase24.mp3",en:"Don't overload the dishwasher with too many plates, because the water won't be able to reach everything and you'll have to wash them by hand later.", es: "No sobrecargues el lavavajillas con demasiados platos, porque el agua no podrá llegar a todo y tendrás que lavarlos a mano después"},
{audio:"frase25.mp3",en:"I always keep a spare set of keys at my neighbor's house in case I accidentally lock myself out while I'm taking out the trash.", es: "Siempre guardo un juego de llaves de repuesto en casa de mi vecino por si accidentalmente me quedo fuera mientras saco la basura"},
{audio:"frase26.mp3",en:"Make sure you heat up the leftovers until they're steaming hot, as eating cold chicken that's been in the fridge for 3 days might be dangerous.", es: "Asegúrate de calentar las sobras hasta que estén humeantes, ya que comer pollo frío que ha estado en la nevera tres días podría ser peligroso"},
{audio:"frase27.mp3",en:"You'd better wear your waterproof boots if you're going for a walk in the forest, because it rained last night and the ground will be very muddy.", es: "Será mejor que lleves tus botas impermeables si vas a dar un paseo por el bosque, porque llovió anoche y el suelo estará muy embarrado"},
{audio:"frase28.mp3",en:"We should tell the neighbors that we're having a small party on Saturday, so they don't get annoyed if there's a bit of noise until midnight.", es: "Deberíamos decirles a los vecinos que vamos a dar una pequeña fiesta el sábado, para que no se molesten si hay un poco de ruido hasta medianoche"},
{audio:"frase29.mp3",en:"Don't push yourself too hard during your first workout after the holidays, or you'll end up with sore muscles that will last for a week.", es: "No te esfuerces demasiado en tu primer entrenamiento después de las vacaciones, o acabarás con agujetas que te durarán una semana"},
{audio:"frase30.mp3",en:"Watch your step while you're going down the stairs because the light bulb on the second floor has burnt out and it's completely dark.", es: "Ten cuidado por dónde pisas mientras bajas las escaleras porque la bombilla del segundo piso se ha fundido y está completamente a oscuras"},
{audio:"frase31.mp3", en: "You can borrow my car to go to the supermarket as long as you promise to drive carefully and refill the tank before you bring it back tonight.", es: "Puedes tomar prestado mi coche para ir al supermercado siempre y cuando prometas conducir con cuidado y rellenar el depósito antes de traerlo esta noche"},
{audio:"frase32.mp3", en: "We had to call off the outdoor barbecue because the weather forecast predicted a heavy storm, so we decided to order some pizzas instead.", es: "Tuvimos que suspender la barbacoa al aire libre porque el pronóstico del tiempo predecía una fuerte tormenta, así que decidimos pedir unas pizzas en su lugar"},
{audio:"frase33.mp3", en: "It was a really tough decision to sell the old house where I grew up, but I knew it was the right thing to do to start a new life in the city.", es: "Fue una decisión realmente difícil vender la vieja casa donde crecí, pero sabía que era lo correcto para empezar una nueva vida en la ciudad"},
{audio:"frase34.mp3", en: "Assembling this new bookshelf is quite tricky because the instructions are not very clear, so we should take our time to avoid making any mistakes.", es: "Montar esta nueva estantería es bastante complicado porque las instrucciones no son muy claras, así que deberíamos tomarnos nuestro tiempo para evitar cometer errores"},
{audio:"frase35.mp3", en: "There was an awkward silence during dinner when nobody knew what to say after John mentioned the problem with the neighbors.", es: "Hubo un silencio incómodo durante la cena cuando nadie sabía qué decir después de que John mencionara el problema con los vecinos"},
{audio:"frase36.mp3", en: "It's definitely worth paying a little bit more for a high-quality mattress, since you'll be spending a third of your life sleeping on it.", es: "Definitivamente vale la pena pagar un poco más por un colchón de alta calidad, ya que pasarás un tercio de tu vida durmiendo en él"},
{audio:"frase37.mp3", en: "Keep this multi-tool in your kitchen drawer because it's very handy for opening jars or fixing small things around the house without calling a professional.", es: "Guarda esta multiherramienta en el cajón de la cocina porque es muy práctica para abrir botes o arreglar cosas pequeñas en casa sin llamar a un profesional"},
{audio:"frase38.mp3", en: "The renovation of the kitchen will take roughly three weeks to finish, provided that the workers arrive on time every morning and we have all the materials.", es: "La reforma de la cocina tardará aproximadamente tres semanas en terminarse, siempre que los trabajadores lleguen a tiempo cada mañana y tengamos todos los materiales"},
{audio:"frase39.mp3", en: "I can hardly hear what you're saying because the volume of the television is too high, so please turn it down for a moment.", es: "Apenas puedo oír lo que estás diciendo porque el volumen de la televisión está demasiado alto, así que por favor bájalo un momento"},
{audio:"frase40.mp3", en: "Make sure you set your alarm clock tonight, otherwise you'll oversleep and miss the most important meeting of the month.", es: "Asegúrate de poner el despertador esta noche, de lo contrario se te pegarán las sábanas y te perderás la reunión más importante del mes"},
{audio:"frase41.mp3", en: "Be careful when you lift the lid off the pot, because the steam is very hot; then, use the strainer to drain the pasta before it gets too soft.", es: "Ten cuidado cuando levantes la tapa de la olla, porque el vapor está muy caliente; luego, usa el colador para escurrir la pasta antes de que se ablande demasiado"},
{audio:"frase42.mp3", en: "Don't leave the frying pan on the heat without any oil, otherwise the non-stick surface will be ruined and everything you cook will start to stick.", es: "No dejes la sartén al fuego sin nada de aceite, de lo contrario la superficie antiadherente se arruinará y todo lo que cocines se empezará a pegar"},
{audio:"frase43.mp3", en: "If you want to heat up the leftovers in the microwave, make sure you use a proper lid so the food doesn't splash and mess up the whole interior.", es: "Si quieres calentar las sobras en el microondas, asegúrate de usar una tapa adecuada para que la comida no salpique y ensucie todo el interior"},
{audio:"frase44.mp3", en: "I need a bigger ladle to serve the soup, because this one is too small and I'll end up spilling everything on the clean tablecloth.", es: "Necesito un cucharón más grande para servir la sopa, porque este es demasiado pequeño y acabaré derramándolo todo sobre el mantel limpio"},
{audio:"frase45.mp3", en: "I can't find the can opener anywhere, and I really need it to open this tin of crushed tomatoes if I want to finish the sauce on time.", es: "No encuentro el abrelatas por ninguna parte, y realmente lo necesito para abrir esta lata de tomate triturado si quiero terminar la salsa a tiempo"},
{audio:"frase46.mp3", en: "We should buy a new corkscrew soon, since the old one is getting rusty and I'm afraid the cork will break inside the bottle next time.", es: "Deberíamos comprar un sacacorchos nuevo pronto, ya que el viejo se está oxidando y me temo que el corcho se romperá dentro de la botella la próxima vez"},
{audio:"frase47.mp3", en: "Wrap the rest of the roast chicken in aluminum foil before putting it in the oven to keep it warm, but make sure you don't put it in the microwave by mistake.", es: "Envuelve el resto del pollo asado en papel de aluminio antes de meterlo en el horno para que se mantenga caliente, pero asegúrate de no meterlo en el microondas por error"},
{audio:"frase48.mp3", en: "You'd better cover the salad bowl with plastic wrap so the lettuce stays fresh and crunchy, otherwise it will wilt because of the air in the fridge.", es: "Será mejor que cubras el bol de la ensalada con papel film para que la lechuga se mantenga fresca y crujiente, de lo contrario se marchitará por el aire de la nevera"},
{audio:"frase49.mp3", en: "Watch your fingers while you're using the cheese grater, because it's extremely sharp and you could easily cut yourself if you're not paying attention.", es: "Cuidado con los dedos mientras usas el rallador de queso, porque está extremadamente afilado y podrías cortarte fácilmente si no estás prestando atención"},
{audio:"frase50.mp3", en: "Don't leave the dirty dishes in the sink overnight; use the scrubber to clean them now so the grease doesn't dry up and become impossible to remove.", es: "No dejes los platos sucios en el fregadero toda la noche; usa el estropajo para limpiarlos ahora para que la grasa no se seque y se vuelva imposible de quitar"},
];
let totalMinutes = parseInt(localStorage.getItem('tiempo_total_estudio')) || 0;
let timerInterval;
function startGlobalTimer() {
    updateTimerDisplay(); 
    timerInterval = setInterval(() => {
        totalMinutes++;
        localStorage.setItem('tiempo_total_estudio', totalMinutes);
        updateTimerDisplay();

function normalizeText(text) {
    if (!text) return "";
    
    let cleanText = text.toLowerCase()
               .replace(/[.,!?;:]/g, "")
               .trim();

    return cleanText.split(/\s+/).map(word => {
        return normalizationMap[word] || word;
    }).join(" ");
}
function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const normOriginal = normalizeText(original);
    const normSpoken = normalizeText(spoken);
    const normOriginalWords = normOriginal.split(/\s+/).filter(w => w.length > 0);
    const normSpokenWords = normSpoken.split(/\s+/).filter(w => w.length > 0);
    const origWordsRaw = original.split(/\s+/).filter(w => w.length > 0);
    const spokenWordsRaw = spoken.split(/\s+/).filter(w => w.length > 0);
    
    let resultHTML = "";
    let oIdx = 0; 
    let sIdx = 0; 
    let correctCount = 0;

     while (sIdx < normSpokenWords.length) {
        const spokenWord = normSpokenWords[sIdx];
        const rawSpoken = spokenWordsRaw[sIdx];
        if (oIdx < normOriginalWords.length && spokenWord === normOriginalWords[oIdx]) {
            resultHTML += `<span class="word-correct">${origWordsRaw[oIdx]}</span> `;
            oIdx++;
            sIdx++;
            correctCount++;
        } else if (oIdx < normOriginalWords.length && normSpokenWords.slice(sIdx + 1, sIdx + 4).includes(normOriginalWords[oIdx])) {
            if (rawSpoken !== "undefined") {
                resultHTML += `<span class="word-error">${rawSpoken}</span> `;
            }
            sIdx++;
        } else if (oIdx < normOriginalWords.length) {
            resultHTML += `<span class="word-missing">${origWordsRaw[oIdx]}</span> `;
            oIdx++;
        } else {
            if (rawSpoken !== "undefined") {
                resultHTML += `<span class="word-error">${rawSpoken}</span> `;
            }
            sIdx++;
        }
    }

    while (oIdx < origWordsRaw.length) {
        resultHTML += `<span class="word-missing">${origWordsRaw[oIdx]}</span> `;
        oIdx++;
    }

    feedbackDiv.innerHTML = resultHTML.trim();

    let score = (normOriginalWords.length > 0) ? (correctCount / normOriginalWords.length) : 0;
    
    if (score >= 0.99) {
        fallos = 0;
        document.getElementById('btn-rescat').style.display = 'none';

        if (window.executarAciertoFinal) {
            window.executarAciertoFinal();
        }

        setTimeout(() => {
            document.getElementById("speechFeedback").innerHTML = "";
            know();
        }, 3000);

    } else {
        fallos++;
        if (fallos >= 3) {
            document.getElementById('btn-rescat').style.display = 'block';
        }
    }
}

function toggleMic() {
    if (!recognition) { alert("Navegador no suportat."); return; }
    if (isListening) {
        recognition.stop();
    } else {
        if (isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            document.querySelectorAll('.recording').forEach(b => b.classList.remove('recording'));
        }
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start();
    }
}
async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            if (isListening) recognition.stop();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
        } catch (err) { alert("Error al accedir al micròfon."); }
    } else {
        mediaRecorder.stop(); 
        isRecording = false;
        btn.classList.remove("recording");
    }
}
