 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noves Frases d'Estudi</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:15px 0 20px}
.block{width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}
.audio-container { display: flex; justify-content: center; gap: 15px; margin: 10px 0 10px; align-items: center; }
.audio-btn{width:75px;height:75px;border-radius:50%;border:none;background:#dbeafe;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a; font-size:22px;}
.fail-btn { width:50px; height:50px; border-radius:50%; border:none; background:#fee2e2; color:#dc2626; font-size:22px; cursor:pointer; }
.star-btn { background: none; border: none; font-size: 32px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 10px; }
.star-btn.active { color: #f59e0b !important; }
.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }
.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}
.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}
.list-controls { display: flex; gap: 10px; margin-top: 16px; }
.list-btn{ flex:1; background:#e9d5ff; border:none; border-radius:16px; padding:14px; font-weight:800; cursor:pointer }
.review-btn { background: #fef3c7; color: #92400e; }
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid #eee; }
.list-audio-btn { background: #dbeafe; border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; flex-shrink: 0; }
.list-action-btn { background: #f1f5f9; border: none; border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer; font-weight: 700; }
.delete-btn { background: #fee2e2; color: #dc2626; }
.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>
<body>

<header>
 <div class="mode-btns">
  <button class="mode-en" onclick="setMode('EN')">Mode anglès → català</button>
  <button class="mode-es" onclick="setMode('CA')">Mode català → anglès</button>
 </div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <div id="langLabel" class="lang">ANGLÈS</div>
 <div id="blockContainer" class="blocks"></div>
 <div class="audio-container">
  <button class="fail-btn" onclick="addToReview()" title="Afegir a repàs">⚠️</button>
  <button class="audio-btn" onclick="playCurrent(1.0)">🔊</button>
  <button class="audio-btn slow" onclick="playCurrent(0.75)">🐢</button>
  <button class="star-btn" id="starBtn" onclick="toggleStar()">★</button>
 </div>
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" step="0.1"></div>
 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
 <div class="list-controls">
    <button class="list-btn" onclick="toggleFullList()">Tota la llista</button>
    <button class="list-btn review-btn" onclick="toggleReviewList()">Repàs (⚠️/★)</button>
 </div>
 <div id="endMsg" class="end hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>

    {audio:"f078.mp3",en:"We went to the bank yesterday morning <b>to open a savings account</b>, but it was closed <b>because it was a holiday</b>.",es:"Vam anar al banc ahir al matí <b>per obrir un compte d'estalvis</b>, però estava tancat <b>perquè era festiu</b>."},
    {audio:"f079.mp3",en:"My boss asked me <b>if I could finish</b> the report <b>by the end of the day</b>, but I told him it was impossible.",es:"El meu cap em va preguntar <b>si podia acabar</b> l'informe <b>abans que acabés el dia</b>, però li vaig dir que era impossible."},
    {audio:"f080.mp3",en:"I <b>was watching TV</b> last night when <b>suddenly I heard</b> a strange noise <b>coming from upstairs</b>.",es:"<b>Estava mirant la televisió</b> ahir a la nit quan <b>de cop vaig sentir</b> un soroll estrany que <b>venia de la planta de dalt</b>."},
    {audio:"f081.mp3",en:"The train was <b>ten minutes late</b>, so we <b>had to hurry up</b> to <b>avoid missing</b> the connection.",es:"El tren va sortir amb <b>deu minuts de retard</b>, així que vam <b>haver de córrer</b> per <b>no perdre</b> la connexió."},
    {audio:"f082.mp3",en:"My father told me <b>he'd help me</b> fix the garage door this weekend, but he <b>ended up not coming</b>.",es:"El meu pare em va dir que <b>m'ajudaria a</b> arreglar la porta del garatge aquest cap de setmana, però al final <b>no va poder venir</b>."},
    {audio:"f083.mp3",en:"I didn't know <b>you'd lost</b> your house keys, so I <b>waited for you</b> at the door until you arrived.",es:"No sabia que <b>havies perdut</b> les claus de casa, així que et vaig <b>esperar</b> a la porta fins que vas arribar."}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const audioObj = new Audio();

function getFolderName() { 
    return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "leccion_actual"; 
}

let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];
let reviewIds = JSON.parse(localStorage.getItem('review_' + getFolderName())) || [];

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_puntoLibro");
  
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  
  const blockToLoad = (savedBlock !== null) ? parseInt(savedBlock) : 0;
  loadBlock(blockToLoad);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_puntoLibro", b);
  let temp = [];
  let start = b * 10;
  let end = Math.min(start + 10, items.length);
  for (let i = start; i < end; i++) temp.push({...items[i], realIdx: i+1});
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn, idx) => { btn.classList.toggle("active", idx === b); });
  pos = 0; learnedCount = 0;
  document.getElementById("endMsg").classList.add("hidden");
  document.getElementById("listBox").classList.add("hidden");
  update(true);
}

function update(fromAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("en").classList.add("hidden");
    document.getElementById("es").classList.add("hidden");
    document.getElementById("endMsg").classList.remove("hidden");
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");
  
  const isStarred = starredIds.includes(item.audio);
  document.getElementById("starBtn").classList.toggle("active", isStarred);
  
  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    if (fromAction) play(item.audio, 1.0);
  } else {
    document.getElementById("langLabel").textContent = "CATALÀ";
    document.getElementById("es").innerHTML = item.es;
    document.getElementById("es").classList.remove("hidden");
  }
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

function toggleStar() {
  const item = currentBlockData[pos];
  if (starredIds.includes(item.audio)) { starredIds = starredIds.filter(id => id !== item.audio); } 
  else { starredIds.push(item.audio); }
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  update();
}

function addToReview() {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  if (!reviewIds.includes(item.audio)) {
    reviewIds.push(item.audio);
    localStorage.setItem('review_' + getFolderName(), JSON.stringify(reviewIds));
    alert("Afegida a la llista de repàs ⚠️");
  } else {
    alert("Aquesta ja és a la llista.");
  }
}

function play(src, speed) {
  audioObj.src = src;
  audioObj.playbackRate = speed;
  audioObj.play().catch(() => {});
}

function playCurrent(speed) {
  if (currentBlockData.length > 0) play(currentBlockData[pos].audio, speed);
}

function reveal() {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  document.getElementById("es").innerHTML = item.es;
  document.getElementById("en").innerHTML = item.en;
  document.getElementById("es").classList.remove("hidden");
  document.getElementById("en").classList.remove("hidden");
  if (mode === "CA") play(item.audio, 1.0);
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) { mode = m; update(true); }

// LISTAS
function toggleFullList() {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden") && box.dataset.type === 'full') { box.classList.add("hidden"); return; }
  
  box.dataset.type = 'full';
  box.innerHTML = "<h3>Frases del bloc actual:</h3>";
  const start = currentBlockID * 10, end = Math.min(start + 10, items.length);
  const listToRender = items.slice(start, end);

  listToRender.forEach((i) => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    itemDiv.innerHTML = `
      <button class="list-audio-btn" onclick="play('${i.audio}', 1.0)">🔊</button>
      <div>
        <div style="font-weight:800; color:#0f172a;">${i.en}</div>
        <div style="font-weight:700; color:#2563eb; font-size: 0.9em;">${i.es}</div>
      </div>
    `;
    box.appendChild(itemDiv);
  });
  box.classList.remove("hidden");
}

function toggleReviewList() {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden") && box.dataset.type === 'review') { box.classList.add("hidden"); return; }
  box.dataset.type = 'review';
  renderReviewList();
  box.classList.remove("hidden");
}

function renderReviewList() {
  const box = document.getElementById("listBox");
  box.innerHTML = "<h3>Frases per repassar (⚠️ i ★):</h3>";
  
  // Combinamos IDs de estrellas y fallos (sin duplicados)
  const combinedIds = [...new Set([...reviewIds, ...starredIds])];
  const listToRender = items.filter(i => combinedIds.includes(i.audio));

  if (listToRender.length === 0) {
    box.innerHTML += "<p style='padding:10px;'>No tens frases per repassar.</p>";
    return;
  }

  listToRender.forEach((i) => {
    const idClean = i.audio.replace('.','-');
    const isStarred = starredIds.includes(i.audio);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    itemDiv.innerHTML = `
      <button class="list-audio-btn" onclick="play('${i.audio}', 1.0)">🔊</button>
      <div style="flex-grow:1">
        <div style="font-weight:700; color:#2563eb;">${i.es}</div>
        <div id="hint-${idClean}" style="font-weight:800; color:#0f172a;" class="hidden">${i.en}</div>
      </div>
      <button class="list-action-btn" onclick="document.getElementById('hint-${idClean}').classList.toggle('hidden')">👁️</button>
      <button class="list-action-btn delete-btn" onclick="removeFromReview('${i.audio}')">OK</button>
    `;
    box.appendChild(itemDiv);
  });
}

function removeFromReview(id) {
  reviewIds = reviewIds.filter(rid => rid !== id);
  starredIds = starredIds.filter(sid => sid !== id); // También quitamos la estrella al dar por sabida
  localStorage.setItem('review_' + getFolderName(), JSON.stringify(reviewIds));
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  renderReviewList();
}

function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó completada ✅");
}

if (localStorage.getItem(getFolderName())) { 
    const mc = document.getElementById("mainCheck");
    if(mc) { mc.innerHTML = "✓"; mc.classList.add('marked'); }
}

initBlocks();
</script>
