    {"id":"0901","key":"boiler","en":"Don't forget to check the pressure on the boiler before winter starts, because if it's too low, the heating won't turn on when you need it most.","ca":"No oblidis revisar la pressió de la caldera abans que comenci l'hivern, perquè si està molt baixa, la calefacció no s'encendrà quan més la necessitis"},

    {"id":"0906","key":"tire pressure","en":"Check the tire pressure before we leave for our road trip, since the car might handle differently if they're not properly inflated.","ca":"Revisa la pressió dels pneumàtics abans que ens anem de viatge, ja que el cotxe podria respondre de forma diferent si no estan ben inflats"},
    {"id":"0907","key":"water the plants","en":"You should water the plants late in the evening instead of at noon, because the sun is too strong and the water will evaporate before it reaches the roots.","ca":"Hauries de regar les plantes a última hora de la tarda en lloc de migdia, perquè el sol és massa fort i l'aigua s'evaporarà abans d'arribar a les arrels"},
    {"id":"0908","key":"valve","en":"Make sure you turn off the main water valve before you try to fix that leaky faucet, otherwise you'll end up flooding the entire kitchen floor.","ca":"Assegura't de tancar la clau de pas de l'aigua abans d'intentar arreglar aquella aixeta que goteja; de lo contrari, acabaràs inundant tot el terra de la cuina"},

    {"id":"0929","key":"sore muscles","en":"Don't push yourself too hard during your first workout after the holidays, or you'll end up with sore muscles that will last for a week.","ca":"No t'esforcis massa en el teu primer entrenament després de les vacances, o acabaràs amb agulletes que et duraran una setmana"},
    {"id":"0930","key":"burnt out","en":"Watch your step while you're going down the stairs because the light bulb on the second floor has burnt out and it's completely dark.","ca":"Tingues cura per on trepitges mentre baixes les escales perquè la bombeta del segon pis s'ha fos i està completament a les fosques"},
    {"id":"0931","key":"as long as","en":"You can borrow my car to go to the supermarket as long as you promise to drive carefully and refill the tank before you bring it back tonight.","ca":"Pots demanar prestat el meu cotxe per anar al supermercat sempre que prometis conduir amb cura i reomplir el dipòsit abans de portar-lo aquesta nit"},
    {"id":"0932","key":"call off","en":"We had to call off the outdoor barbecue because the weather forecast predicted a heavy storm, so we decided to order some pizzas instead.","ca":"Vam haver de suspendre la barbacoa a l'aire lliure perquè el pronòstic del temps preveia una forta tempesta, així que vam decidir demanar unes pizzes en lloc d'això"},
    {"id":"0933","key":"tough","en":"It was a really tough decision to sell the old house where I grew up, but I knew it was the right thing to do to start a new life in the city.","ca":"Va ser una decisió realment difícil vendre la vella casa on vaig créixer, però sabia que era el correcte per començar una nova vida a la ciutat"},
    {"id":"0934","key":"tricky","en":"Assembling this new bookshelf is quite tricky because the instructions are not very clear, so we should take our time to avoid making any mistakes.","ca":"Muntar aquesta nova prestatgeria és bastant complicat perquè les instruccions no són molt clares, així que hauríem de prendre'ns el nostre temps per evitar cometre errors"},

    {"id":"0936","key":"worth","en":"It's definitely worth paying a little bit more for a high-quality mattress, since you'll be spending a third of your life sleeping on it.","ca":"Definitivament val la pena pagar un poc més per un matalàs d'alta qualitat, ja que passaràs un terç de la teva vida dormint-hi"},
    {"id":"0937","key":"handy","en":"Keep this multi-tool in your kitchen drawer because it's very handy for opening jars or fixing small things around the house without calling a professional.","ca":"Guarda aquesta multieina al calaix de la cuina perquè és molt pràctica per obrir bots o arreglar coses petites a casa sense trucar a un professional"},
    {"id":"0938","key":"provided that","en":"The renovation of the kitchen will take roughly three weeks to finish, provided that the workers arrive on time every morning and we have all the materials.","ca":"La reforma de la cuina trigarà aproximadament tres setmanes a acabar-se, sempre que els treballadors arribin a temps cada matí i tinguem tots els materials"},
    {"id":"0939","key":"hardly","en":"I can hardly hear what you're saying because the volume of the television is too high, so please turn it down for a moment.","ca":"Amb prou feines puc sentir el que dius perquè el volum de la televisió està massa alt, així que si us plau abaixa'l un moment"},
    {"id":"0940","key":"oversleep","en":"Make sure you set your alarm clock tonight, otherwise you'll oversleep and miss the most important meeting of the month.","ca":"Assegura't de posar el despertador aquesta nit, de lo contrari se't enganxaran els llençols i et perdràs la reunió més important del mes"},
    {"id":"0941","key":"lid / strainer","en":"Be careful when you lift the lid off the pot, because the steam is very hot; then, use the strainer to drain the pasta before it gets too soft.","ca":"Tingues cura quan aixequis la tapa de l'olla, perquè el vapor està molt calent; després, usa el colador per escórrer la pasta abans que s'estovi massa"},
    {"id":"0942","key":"non-stick","en":"Don't leave the frying pan on the heat without any oil, otherwise the non-stick surface will be ruined and everything you cook will start to stick.","ca":"No deixis la paella al foc sense gens d'oli, de lo contrari la superfície antiadherent s'arruïnarà i tot el que cuinis se't començarà a enganxar"},

    {"id":"0947","key":"aluminum foil","en":"Wrap the rest of the roast chicken in aluminum foil before putting it in the oven to keep it warm, but make sure you don't put it in the microwave by mistake.","ca":"Embolica la resta del pollastre rostit en paper d'alumini abans de ficar-lo al forn perquè es mantingui calent, perquè no ficar-lo al microones per error"},
    {"id":"0948","key":"plastic wrap","en":"You'd better cover the salad bowl with plastic wrap so the lettuce stays fresh and crunchy, otherwise it will wilt because of the air in the fridge.","ca":"Serà millor que cobreixis el bol de l'amanida amb paper film perquè l'enciam es mantingui fresc i cruixent, de lo contrari es poarà per l'aire de la nevera"},
    {"id":"0949","key":"grater","en":"Watch your fingers while you're using the cheese grater, because it's extremely sharp and you could easily cut yourself if you're not paying attention.","ca":"Alerta amb els dits mentre uses el ratllador de formatge, perquè està extremadament afilat i podries tallar-te fàcilment si no estàs parant atenció"},
    {"id":"0950","key":"scrubber","en":"Don't leave the dirty dishes in the sink overnight; use the scrubber to clean them now so the grease doesn't dry up and become impossible to remove.","ca":"No deixis els plats bruts a l'aigüera tota la nit; usa l'estropall per netejar-los ara perquè el greix no s'assequi i es torni impossible de treure"}
];

let remaining=[...items], current=null, currentIndex=0, mode="EN", known=0, studyStarsOnly=false;
let mediaRecorder, audioChunks = [], isRecording = false;

function speak(rate = 1.0, text = null) {
    window.speechSynthesis.cancel();
    const toSpeak = text || (current ? current.en : "");
    if (!toSpeak) return;
    const utterance = new SpeechSynthesisUtterance(toSpeak);
    utterance.lang = 'en-US';
    utterance.rate = rate;
    window.speechSynthesis.speak(utterance);
}
function stopSpeak() { window.speechSynthesis.cancel(); }

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onstart = () => { isListening=true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening=false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (e) => { compareSentences(current.en, e.results[0][0].transcript); };
}
function toggleMic() { 
    if(!recognition) return; 
    if(isListening) recognition.stop(); else recognition.start(); 
}

function compareSentences(orig, spoken) {
    const feedback = document.getElementById("speechFeedback");
    const clean = (t) => t.toLowerCase().replace(/[.,?!]/g, "").trim();
    const origWords = orig.split(" "), spokenWords = clean(spoken).split(" ");
    let html = "";
    origWords.forEach((w, i) => {
        const isMatch = spokenWords.includes(clean(w));
        html += `<span class="${isMatch ? 'word-correct' : 'word-missing'}">${w} </span>`;
    });
    feedback.innerHTML = html;
}

async function toggleRecord(btnId) {
    const btn = document.getElementById(btnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(blob)).play();
            };
            mediaRecorder.start();
            isRecording = true; btn.classList.add("recording");
        } catch (err) { alert("Error mic"); }
    } else {
        mediaRecorder.stop(); isRecording = false; btn.classList.remove("recording");
    }
}

function load(){
    let pool = studyStarsOnly ? remaining.filter(i => localStorage.getItem('star_' + i.id) === 'true') : remaining;
    if(pool.length===0){ current = null; updateCounter(); return; }
    if (currentIndex >= pool.length) currentIndex = 0;
    current = pool[currentIndex]; 
    document.getElementById("ca").classList.add("hidden");
    document.getElementById("en").classList.add("hidden");
    document.getElementById("key").classList.add("hidden");
    document.getElementById("speechFeedback").innerHTML = ""; 
    document.getElementById("starMain").classList.toggle('active', localStorage.getItem('star_' + current.id) === 'true');
    if(mode==="EN"){
        document.getElementById("langLabel").textContent="ANGLÈS";
        speak(1.0);
    } else {
        document.getElementById("langLabel").textContent="CATALÀ";
        document.getElementById("ca").textContent=current.ca;
        document.getElementById("ca").classList.remove("hidden");
    }
    updateCounter();
}

function reveal(){
    if(!current)return;
    const caDiv = document.getElementById("ca"), enDiv = document.getElementById("en"), keyDiv = document.getElementById("key");
    caDiv.textContent = current.ca; enDiv.textContent = current.en; keyDiv.textContent = "Key: " + current.key;
    caDiv.classList.toggle("hidden"); enDiv.classList.toggle("hidden"); keyDiv.classList.toggle("hidden");
}

function know(){ if(current){ remaining=remaining.filter(i=>i.id!==current.id); known++; load(); } }
function nextOne(){ currentIndex++; load(); }
function setMode(m){ mode=m; load(); }
function updateCounter(){ 
    const total = studyStarsOnly ? items.filter(i => localStorage.getItem('star_' + i.id) === 'true').length : items.length;
    document.getElementById("counter").textContent = known + " / " + total; 
}
function toggleStarCurrent() {
    const active = document.getElementById("starMain").classList.toggle('active');
    localStorage.setItem('star_' + current.id, active);
}
function toggleStudyStars() {
    studyStarsOnly = !studyStarsOnly; known = 0; currentIndex = 0; remaining = [...items]; load();
}

// Llista amb estrella i micro rosa
function toggleList(){
    const lb = document.getElementById("listBox");
    if (!lb.classList.contains("hidden")) { lb.classList.add("hidden"); return; }
    lb.innerHTML = items.map((i, idx) => {
        const isStarred = localStorage.getItem('star_' + i.id) === 'true';
        return `
        <div class="list-item">
            <div class="list-controls-side">
                <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.id}', this)">★</button>
                <button class="mini-icon-btn btn-play-mini" onclick="speak(1.0, '${i.en.replace(/'/g, "\\'")}')">🔊</button>
                <button class="mini-icon-btn btn-rec-mini" id="rec-list-${idx}" onclick="toggleRecord('rec-list-${idx}')">🎤</button>
            </div>
            <div class="list-texts">
                <div class="list-ca">${i.ca}</div>
                <div class="list-en" onclick="this.classList.toggle('revealed')">${i.en}</div>
            </div>
        </div>`;
    }).join("");
    lb.classList.remove("hidden");
}

function toggleStar(id, btn) {
    const active = btn.classList.toggle('active');
    localStorage.setItem('star_' + id, active);
    if(current && current.id === id) document.getElementById("starMain").classList.toggle('active', active);
}

function markAsDone(el) { el.innerHTML = "✓"; el.classList.add('marked'); alert("Fet!"); }

load();
</script>
</body>
