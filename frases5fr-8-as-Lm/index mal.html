<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:4px}

</style>
</head>

const normalizationMap = { "dont": "do not", "doesn't": "does not", "doesnt": "does not", "didnt": "did not", "didn't": "did not", "isnt": "is not", "isn't": "is not", "arent": "are not", "aren't": "are not", "wasnt": "was not", "wasn't": "was not", "werent": "were not", "weren't": "were not", "havent": "have not", "haven't": "have not", "hasnt": "has not", "hasn't": "has not", "hadnt": "had not", "hadn't": "had not", "wont": "will not", "won't": "will not", "wouldnt": "would not", "wouldn't": "would not", "cant": "can not", "can't": "can not", "couldnt": "could not", "couldn't": "could not", "im": "i am", "i'm": "i am", "youre": "you are", "you're": "you are", "hes": "he is", "he's": "he is", "shes": "she is", "she's": "she is", "its": "it is", "it's": "it is", "were": "we are", "we're": "we are", "theyre": "they are", "they're": "they are", "ive": "i have", "i've": "i have", "youve": "you have", "you've": "you have", "weve": "we have", "we've": "we have", "theyve": "they have", "they've": "they have", "id": "i would", "i'd": "i would", "youd": "you would", "you'd": "you would", "hed": "he would", "he'd": "he would", "shed": "she would", "she'd": "she would", "wed": "we would", "we'd": "we would", "theyd": "they would", "they'd": "they would", "ill": "i will", "i'll": "i will", "youll": "you will", "you'll": "you will", "hell": "he will", "he'll": "he will", "shell": "she will", "she'll": "she will", "well": "we will", "we'll": "we will", "theyll": "they will", "they'll": "they will" };

let currentList = [...items].sort(() => Math.random() - 0.5), pos = 0, mode = "EN", learnedCount = 0;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

let starredIds = JSON.parse(localStorage.getItem('stars_u5')) || [];
let mediaRecorder, audioChunks = [], isRecording = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) fullTranscript += event.results[i][0].transcript + " ";
        compareSentences(currentList[pos].en, fullTranscript.trim());
    };
}

function normalizeText(text) {
    if (!text) return "";
    let clean = text.toLowerCase().replace(/[.,?!"]/g, "").trim();
    let words = clean.split(/\s+/);
    return words.map(word => normalizationMap[word] || normalizationMap[word.replace("'", "")] || word).join(" ");
}

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const normOriginalWords = normalizeText(original).split(/\s+/);
    const normSpokenWords = normalizeText(spoken).split(/\s+/);
    const origWordsRaw = original.split(/\s+/);
    let resultHTML = "", sIdx = 0;
    normOriginalWords.forEach((normWord, index) => {
        const originalWordRaw = origWordsRaw[index];
        let matched = false;
        if (sIdx < normSpokenWords.length && normSpokenWords[sIdx] === normWord) {
            resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
            sIdx++; matched = true;
        } else {
            for (let j = sIdx + 1; j < sIdx + 5 && j < normSpokenWords.length; j++) {
                if (normSpokenWords[j] === normWord) {
                    for (let k = sIdx; k < j; k++) resultHTML += `<span class="word-error">${normSpokenWords[k]}</span>`;
                    resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
                    sIdx = j + 1; matched = true; break;
                }
            }
        }
        if (!matched) resultHTML += `<span class="word-missing">${originalWordRaw}</span>`;
    });
    feedbackDiv.innerHTML = resultHTML;
}

function toggleMic() {
    if (!recognition) return alert("Navegador no suportat.");
    isListening ? recognition.stop() : (document.getElementById("speechFeedback").innerHTML = "", recognition.start());
}

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
            };
            mediaRecorder.start(); isRecording = true; btn.classList.add("recording");
        } catch (err) { alert("Error al accedir al micròfon."); }
    } else { mediaRecorder.stop(); isRecording = false; btn.classList.remove("recording"); }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function updateCard() {
    if (currentList.length === 0) {
        document.getElementById("en").textContent = "Bloc completat!";
        document.getElementById("es").textContent = "";
        return;
    }
    const item = currentList[pos];
    document.getElementById("counter").textContent = `${learnedCount} / ${items.length}`;
    document.getElementById("starBtn").classList.toggle("active", starredIds.includes(item.audio));
    document.getElementById("speechFeedback").innerHTML = "";
    if (mode === "EN") {
        document.getElementById("langLabel").textContent = "ANGLÈS";
        document.getElementById("en").textContent = item.en;
        document.getElementById("en").classList.remove("hidden");
        document.getElementById("es").classList.add("hidden");
    } else {
        document.getElementById("langLabel").textContent = "CASTELLÀ";
        document.getElementById("es").textContent = item.es;
        document.getElementById("es").classList.remove("hidden");
        document.getElementById("en").classList.add("hidden");
    }
}

function playAudio(src, speed = 1.0) { audioObj.src = src; audioObj.playbackRate = speed; audioObj.play().catch(() => {}); }
function playCurrent(speed) { if (currentList.length > 0) playAudio(currentList[pos].audio, speed); }
function reveal() { document.getElementById("es").classList.remove("hidden"); document.getElementById("en").classList.remove("hidden"); }
function nextOne() { if (currentList.length > 0) { pos = (pos + 1) % currentList.length; updateCard(); } }
function know() { if (currentList.length > 0) { currentList.splice(pos, 1); learnedCount++; if (pos >= currentList.length) pos = 0; updateCard(); } }
function setMode(m) { mode = m; updateCard(); }

function toggleStar(forcedId = null) {
    const audio = forcedId || currentList[pos].audio;
    starredIds.includes(audio) ? starredIds = starredIds.filter(id => id !== audio) : starredIds.push(audio);
    localStorage.setItem('stars_u5', JSON.stringify(starredIds));
    updateCard();
}

function toggleList(type) {
    const box = document.getElementById("listBox");
    if (!box.classList.contains("hidden") && box.dataset.activeType === type) { box.classList.add("hidden"); return; }
    box.dataset.activeType = type;
    box.innerHTML = "";
    // CAMBIO AQUÍ: Solo pone título si es el modo de estrellas
    box.innerHTML = type === 'stars' ? `<h3 style="margin:10px 0">Repàs ★</h3>` : "";
    const list = type === 'stars' ? items.filter(i => starredIds.includes(i.audio)) : items;
    list.forEach((i, index) => {
        const isStarred = starredIds.includes(i.audio);
        const itemDiv = document.createElement("div");
        itemDiv.className = "list-item";
        itemDiv.innerHTML = `
            <div class="list-controls-side">
                <button class="star-btn-list ${isStarred?'active':''}" onclick="toggleStar('${i.audio}'); toggleListRefresh('${type}')">★</button>
                <button class="mini-btn btn-audio" onclick="playAudio('${i.audio}')">🔊</button>
                <button class="mini-btn btn-rec-mini" id="rec-list-${index}" onclick="toggleRecord('rec-list-${index}')">🎤</button>
            </div>
            <div style="flex:1">
                <div style="color:#2563eb; font-weight:700">${i.es}</div>
                <div class="blur" onclick="this.classList.toggle('revealed')">${i.en}</div>
            </div>`;
        box.appendChild(itemDiv);
    });
    box.classList.remove("hidden");
}

function toggleListRefresh(type) {
    document.getElementById('listBox').classList.add('hidden');
    toggleList(type);
    updateCard();
}

function markAsDone(el) {
    localStorage.setItem('done_u5', new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
}

window.addEventListener('load', () => {
    const mc = document.getElementById("mainCheck");
    if (localStorage.getItem('done_u5')) { mc.innerHTML = "✓"; mc.classList.add('marked'); }
    updateCard();
});
</script>
</body>
</html>
