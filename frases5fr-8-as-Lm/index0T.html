 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repàs Personalitzat - Unitat 5</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:4px}
.unit-number{font-size:22px;font-weight:800;color:#2563eb;margin:0 8px;min-width:20px;text-align:center}
.mode-btns button{padding:6px 10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:11px;white-space:nowrap;line-height:1.2}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}

/* ESTILO DEL CHECK VERDE */
.check-box-manual { position: absolute; top: 18px; right: 22px; width: 28px; height: 28px; background: #fff; border: 2px solid #22c55e; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 18px; color: transparent; transition: 0.2s; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }

.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex: 0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1)}
.block.all-btn { background: #e2e8f0; color: #475569; }
.audio-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;} 
.audio-btn.rec{background:#fca5a5; color: white;}
.audio-btn.stt{background:#dbeafe;}

#speechFeedback { font-size: 18px; margin: 15px 0; font-weight: bold; min-height: 28px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;}
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.star-btn { background: none; border: none; font-size: 32px; cursor: pointer; color: #cbd5e1; transition: 0.2s; margin-right: 5px; }
.star-btn.active { color: #f59e0b !important; }
.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }
.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}
.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}
.list-controls { display: flex; gap: 10px; margin-top: 16px; }
.list-btn{ flex:1; background:#e9d5ff; border:none; border-radius:16px; padding:14px; font-weight:800; cursor:pointer; font-size:13px }
.review-btn { background: #fef3c7; color: #92400e; }
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item { display: flex; align-items: flex-start; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
.blur { filter: blur(5px); cursor: pointer; }
.blur.revealed { filter: blur(0); }
</style>
</head>
<body>

<header>
 <div class="mode-btns"><button class="mode-en" onclick="location.href='indexsecret.html'">Tornar</button></div>
 <div class="unit-number">5</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">Castellà</button></div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone()">✓</div>

 <div id="langLabel" class="lang" style="margin-top: 10px;">ANGLÈS</div>
 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button class="star-btn" id="starBtn" onclick="toggleStar()">★</button>
  <button class="audio-btn slow" onclick="playCurrent(0.75)">🐢</button>
  <button class="audio-btn" onclick="playCurrent(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
 </div>
 
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100"></div>
 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>
 
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
 <div class="list-controls">
    <button class="list-btn" onclick="toggleList('all')">Tota la llista</button>
 </div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>
// USAMOS LA RUTA EXACTA QUE BUSCA EL INDEXSECRET.HTML
const storageKey = "frases/5"; 

const items = [
  {audio:"f001.mp3", en:"The doctor told me I had to stop smoking and start exercising.", es:"El metge em va dir que havia de deixar de fumar i començar a fer exercici."},
  {audio:"f002.mp3", en:"We went to the bank yesterday morning to open a savings account, but it was closed because it was a holiday.", es:"Vam anar al banc ahir al matí per obrir un compte d'estalvis, però estava tancat perquè era festiu."},
  {audio:"f003.mp3", en:"My boss asked me if I could finish the report by the end of the day, but I told him it was impossible.", es:"El meu cap em va preguntar si podia acabar l'informe abans que acabés el dia, però li vaig dir que era impossible."},
  {audio:"f004.mp3", en:"I was watching TV last night when suddenly I heard a strange noise coming from upstairs.", es:"Estava mirant la televisió ahir a la nit quan de cop vaig sentir un soroll estrany que venia de la planta de dalt."},
  {audio:"f005.mp3", en:"The train was ten minutes late, so we had to hurry up to avoid missing the connection.", es:"El tren va sortir amb deu minuts de retard, així que vam haver de córrer per no perdre la connexió."}
  // Puedes seguir añadiendo frases aquí
];

let currentBlockData = [...items], pos = 0, mode = "EN", learnedCount = 0;
const audioObj = new Audio();

function init() {
    // Comprobar si ya estaba marcado al cargar
    const mc = document.getElementById("mainCheck");
    if (localStorage.getItem(storageKey)) {
        mc.classList.add("marked");
    }
    update();
}

function markAsDone() {
    const mc = document.getElementById("mainCheck");
    if (mc.classList.contains("marked")) {
        mc.classList.remove("marked");
        localStorage.removeItem(storageKey);
    } else {
        mc.classList.add("marked");
        localStorage.setItem(storageKey, "done");
    }
}

function update() {
    if (currentBlockData.length === 0) return;
    const item = currentBlockData[pos];
    document.getElementById("es").classList.add("hidden");
    document.getElementById("en").classList.add("hidden");
    
    if (mode === "EN") {
        document.getElementById("en").innerText = item.en;
        document.getElementById("en").classList.remove("hidden");
    } else {
        document.getElementById("es").innerText = item.es;
        document.getElementById("es").classList.remove("hidden");
    }
    document.getElementById("counter").innerText = `${pos + 1} / ${currentBlockData.length}`;
}

function reveal() {
    document.getElementById("es").classList.remove("hidden");
    document.getElementById("en").classList.remove("hidden");
}

function nextOne() {
    pos = (pos + 1) % currentBlockData.length;
    update();
}

function know() {
    nextOne();
}

function setMode(m) {
    mode = m;
    update();
}

function playCurrent(speed) {
    audioObj.src = currentBlockData[pos].audio;
    audioObj.playbackRate = speed;
    audioObj.play();
}

function pauseAudio() {
    audioObj.pause();
}

window.onload = init;
</script>
</body>
</html>
