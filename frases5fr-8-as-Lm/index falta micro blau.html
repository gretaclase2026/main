<html lang="ca">
<head>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:4px}
.unit-number{font-size:22px;font-weight:800;color:#2563eb;margin:0 8px;min-width:20px;text-align:center}
.mode-btns button{padding:6px 10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:11px;white-space:nowrap;line-height:1.2}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; color: transparent; transition: 0.2s; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex: 0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1)}
.block.all-btn { background: #e2e8f0; color: #475569; }
.audio-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;} 
.audio-btn.rec{background:#fca5a5;}
.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }
.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}
.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}
.list-controls { display: flex; gap: 10px; margin-top: 16px; }
.list-btn{ flex:1; background:#e9d5ff; border:none; border-radius:16px; padding:14px; font-weight:800; cursor:pointer; font-size:13px }
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; }
.list-controls-side { display: flex; flex-direction: column; gap: 8px; }
.mini-btn { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.btn-audio { background: #dbeafe; }
.btn-rec-mini { background: #fca5a5; }
.star-btn-list { background: none; border: none; font-size: 20px; cursor: pointer; color: #cbd5e1; }
.star-btn-list.active { color: #f59e0b; }
.blur { filter: blur(5px); transition: filter 0.2s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }
</style>
</head>
<body>

<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">Anglès → Castellà</button></div>
 <div class="unit-number">5</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">Castellà → Anglès</button></div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>

 <div id="langLabel" class="lang" style="margin-top: 10px;">ANGLÈS</div>
 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button id="starBtn" onclick="toggleStarMain()" style="background:none; border:none; font-size:32px; cursor:pointer; color:#cbd5e1;">★</button>
  <button class="audio-btn slow" onclick="playCurrent(0.75)">🐢</button>
  <button class="audio-btn" onclick="playCurrent(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="mainRec" onclick="toggleRecord('mainRec')">🎤</button>
 </div>
 
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100" step="0.1"></div>
 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button> 
 </div>
 <div class="list-controls">
    <button class="list-btn" onclick="toggleList('all')">Tota la llista</button>
    <button class="list-btn" onclick="toggleList('stars')" style="background:#fef3c7;">Repàs (★)</button>
 </div>
 <div id="endMsg" class="hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

let currentIdx = 0, currentMode = 'EN', currentBlockID = 0;
let audio = new Audio();
let mediaRecorder;
let audioChunks = [];
let starredIds = JSON.parse(localStorage.getItem('stars_unit5') || '[]');

function getFolderName() { 
    return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "unit_5"; 
}

function markAsDone(el) {
    const key = getFolderName();
    if (!el.classList.contains('marked')) {
        localStorage.setItem(key, new Date().toISOString());
        el.innerHTML = "✓"; el.classList.add('marked');
        alert("Lliçó marcada ✅");
    } else {
        localStorage.removeItem(key);
        el.innerHTML = ""; el.classList.remove('marked');
    }
}

function setMode(m){
    currentMode = m;
    document.getElementById('langLabel').innerText = (m==='EN') ? 'ANGLÈS' : 'CASTELLÀ';
    updateCard();
}

function updateCard(){
    const vItems = getVisibleItems();
    const i = vItems[currentIdx];
    if(!i) return;
    document.getElementById('counter').innerText = `${currentIdx+1} / ${vItems.length}`;
    document.getElementById('es').innerText = i.es;
    document.getElementById('en').innerText = i.en;
    document.getElementById('es').className = (currentMode==='ES') ? 'es' : 'es hidden';
    document.getElementById('en').className = (currentMode==='EN') ? 'en' : 'en hidden';
    document.getElementById('starBtn').style.color = starredIds.includes(i.audio) ? '#f59e0b' : '#cbd5e1';
}

function getVisibleItems(){
    return (currentBlockID === -1) ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10);
}

function toggleStarMain(){
    const id = getVisibleItems()[currentIdx].audio;
    toggleStar(id);
    updateCard();
}

function toggleStar(id){
    if(starredIds.includes(id)) starredIds = starredIds.filter(x => x !== id);
    else starredIds.push(id);
    localStorage.setItem('stars_unit5', JSON.stringify(starredIds));
}

function reveal(){
    document.getElementById('es').classList.remove('hidden');
    document.getElementById('en').classList.remove('hidden');
}

function nextOne(){
    const total = getVisibleItems().length;
    if(currentIdx < total - 1){
        currentIdx++;
        updateCard();
    } else {
        document.getElementById('endMsg').classList.remove('hidden');
    }
}

function know(){ nextOne(); }

function playCurrent(rate=1.0){
    const i = getVisibleItems()[currentIdx];
    playAudio(i.audio, rate);
}

function playAudio(src, rate=1.0){
    audio.src = src;
    audio.playbackRate = rate;
    audio.play();
    audio.ontimeupdate = () => {
        if(audio.duration) document.getElementById('progressBar').value = (audio.currentTime / audio.duration) * 100;
    };
}

function pauseAudio(){ audio.pause(); }

async function toggleRecord(btnId) {
    const btn = document.getElementById(btnId);
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            new Audio(url).play();
        };
        mediaRecorder.start();
        btn.style.background = "#ef4444";
    } else {
        mediaRecorder.stop();
        btn.style.background = btnId.includes('main') ? "#fca5a5" : "#fca5a5";
    }
}

function renderBlocks(){
    const container = document.getElementById('blockContainer');
    container.innerHTML = '';
    const numBlocks = Math.ceil(items.length / 10);
    const allBtn = document.createElement('button');
    allBtn.className = 'block all-btn' + (currentBlockID === -1 ? ' active' : '');
    allBtn.innerText = 'T';
    allBtn.onclick = () => { currentBlockID = -1; currentIdx = 0; renderBlocks(); updateCard(); };
    container.appendChild(allBtn);
    for(let i=0; i<numBlocks; i++){
        const b = document.createElement('button');
        b.className = 'block' + (currentBlockID === i ? ' active' : '');
        b.innerText = i+1;
        b.onclick = () => { currentBlockID = i; currentIdx = 0; renderBlocks(); updateCard(); };
        container.appendChild(b);
    }
}

function toggleList(type){
    const box = document.getElementById('listBox');
    if(!box.classList.contains('hidden')) { box.classList.add('hidden'); return; }
    box.classList.remove('hidden');
    box.innerHTML = `<h3 style="margin:10px 0">${type==='stars'?'Repàs ★':'Tota la llista'}</h3>`;
    const list = type === 'stars' ? items.filter(i => starredIds.includes(i.audio)) : items;
    list.forEach((i, index) => {
        const isStarred = starredIds.includes(i.audio);
        const itemDiv = document.createElement("div");
        itemDiv.className = "list-item";
        itemDiv.innerHTML = `
            <div class="list-controls-side">
                <button class="star-btn-list ${isStarred?'active':''}" onclick="toggleStar('${i.audio}'); toggleListRefresh('${type}')">★</button>
                <button class="mini-btn btn-audio" onclick="playAudio('${i.audio}')">🔊</button>
                <button class="mini-btn btn-rec-mini" id="rec-list-${index}" onclick="toggleRecord('rec-list-${index}')">🎤</button>
            </div>
            <div style="flex:1">
                <div style="color:#2563eb; font-weight:700">${i.es}</div>
                <div class="blur" onclick="this.classList.toggle('revealed')">${i.en}</div>
            </div>`;
        box.appendChild(itemDiv);
    });
}

function toggleListRefresh(type) {
    document.getElementById('listBox').classList.add('hidden');
    toggleList(type);
    updateCard();
}

window.addEventListener('load', () => {
    const mc = document.getElementById("mainCheck");
    if (localStorage.getItem(getFolderName())) {
        mc.innerHTML = "✓"; mc.classList.add('marked');
    }
    renderBlocks();
    updateCard();
});
</script>
</body>
</html>
