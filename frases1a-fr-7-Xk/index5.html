 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greta App - Unitat 1</title>
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center}
.unit-number{font-size:24px;font-weight:800;color:#2563eb;margin:0 10px}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-ca{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 12px 30px rgba(0,0,0,0.08);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

.star-main{font-size:32px;cursor:pointer;color:#d1d5db;background:none;border:none;padding:0;transition:0.2s; position: absolute; left: 22px; top: 45px; z-index: 10;}
.star-main.active{color:#facc15}

.audio-container { display: flex; justify-content: center; gap: 10px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }

.audio-btn{width:55px;height:55px;border-radius:50%;border:none;background:#dcfce7;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;}
.audio-btn.rec{background:#fca5a5; color: white;}
.audio-btn.stt{background:#dbeafe; font-size: 22px;}

/* Animación y color lila/violáceo actualizado */
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
.recording, .listening { animation: pulse 1.5s infinite; background: #f4acb7 !important; color: white !important; }

/* Micro de la llista con el nuevo tono lila */
.mini-icon-btn.recording { background: #f06292 !important; color: white !important; }

.audio-btn.stt.listening { background: #3b82f6 !important; }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

.hidden{display:none}
.key-label{font-size:16px;font-weight:900;color:#f06292;margin:10px 0}
.ca{font-size:20px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:20px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

#speechFeedback { font-size: 18px; margin: 15px 0; font-weight: bold; min-height: 28px; line-height: 1.5; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.bottom-nav{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.btn-list{background:#e9d5ff}
.btn-study-stars{background:#fef08a}

.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px}
.list-item{padding:15px 0;border-bottom:1px solid #e5e7eb;display:flex;gap:15px;align-items:flex-start}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:40px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.list-ca{color:#2563eb;font-weight:700;font-size:15px}
.list-en{color:#0f172a;font-weight:800;font-size:15px;filter: blur(5px);transition: filter 0.3s;cursor:pointer}
.list-en.revealed{filter: blur(0)}

.btn-play-mini{background:#dcfce7}
.mini-icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.btn-rec-mini{background:#fce7f3}

.star-btn-list{font-size:24px;cursor:pointer;color:#d1d5db;background:none;border:none}
.star-btn-list.active{color:#facc15}

.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>
<body>
<header>
 <div class="mode-btns">
  <button class="mode-en" onclick="setMode('EN')">Anglès → Català</button>
 </div>
 <div class="unit-number">1</div>
 <div class="mode-btns">
  <button class="mode-ca" onclick="setMode('CA')">Català → Anglés</button>
 </div>
</header>
<main>
<div class="card">
 <div class="counter" id="counter">0 / 10</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <button class="star-main" id="starMain" onclick="toggleStarCurrent()">★</button>

 <div id="langLabel" class="lang" style="margin-top: 10px;">ANGLÈS</div>

 <div class="audio-container">
  <button class="audio-btn slow" onclick="play(0.75)">🐢</button>
  <button class="audio-btn" onclick="play(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord('recBtn')">🎤</button>
  <button class="audio-btn stt" id="sttBtn" onclick="toggleMic()">🎤</button>
 </div>

 <div class="progress-wrapper">
  <input type="range" id="progressBar" value="0" step="0.1">
 </div>

 <div id="key" class="key-label hidden"></div>
 <div id="ca" class="ca hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>
 
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>

 <div class="bottom-nav">
    <button class="nav-btn btn-list" onclick="toggleList()">Veure llista</button>
    <button class="nav-btn btn-study-stars" id="btnStudyStars" onclick="toggleStudyStars()">Estudiar ⭐</button>
 </div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>
const items = [
    {"id":"001","key":"tricky","audio":"f001.mp3","ca":"Crec que trobar un apartament barat al centre de la ciutat és força complicat perquè hi ha molta gent buscant el mateix ara mateix.","en":"I think that finding a cheap apartment in the center of the city is quite tricky because there are many people looking for the same thing right now."},
    {"id":"002","key":"broad","audio":"f002.mp3","ca":"La vista des del cim de la muntanya era molt àmplia i podíem veure tots els pobles petits i el bosc verd a prop del riu.","en":"The view from the top of the mountain was very broad and we could see all the small villages and the green forest near the river."},
    {"id":"003","key":"willing","audio":"f003.mp3","ca":"El meu germà sempre està disposat a portar-me a l’aeroport d’hora al matí encara que hagi de treballar més tard aquell dia.","en":"My brother is always willing to drive me to the airport early in the morning even if he has to work later that day."},
    {"id":"004","key":"call off","audio":"f004.mp3","ca":"El gerent va decidir cancel·lar l’esdeveniment a l’aire lliure perquè la previsió del temps deia que faria molt fred i vent tota la nit.","en":"The manager decided to call off the outdoor event because the weather forecast said it would be very cold and windy all night."},
    {"id":"005","key":"harmless","audio":"f005.mp3","ca":"No cal que tinguis por d’aquell insecte perquè és completament inofensiu i només vol volar a prop de la llum del llum.","en":"You don't need to be afraid of that insect because it is completely harmless and it just wants to fly near the light of the lamp."},
    {"id":"006","key":"as long as","audio":"f006.mp3","ca":"Et deixaré el meu llibre preferit sempre que prometis cuidar-lo i tornar-me’l la setmana vinent.","en":"I will lend you my favorite book as long as you promise to take care of it and give it back to me next week."},
    {"id":"007","key":"worth","audio":"f007.mp3","ca":"Sé que l’entrada al museu és cara, però realment val la pena visitar-lo perquè las pintures de dins són les més famoses del món.","en":"I know the museum ticket is expensive, but it is really worth visiting because the paintings inside are the most famous in the world."},
    {"id":"008","key":"awkward","audio":"f008.mp3","ca":"Va ser molt incòmode quan em vaig trobar el meu antic cap al supermercat i no sabia què dir-li després de tants anys.","en":"It was very awkward when I met my old boss at the supermarket and I didn't know what to say to him after so many years."},
    {"id":"009","key":"provided that","audio":"f009.mp3","ca":"Comprarem el cotxe nou el mes que ve sempre que el banc nos doni els diners que necessitem per al primer pagament.","en":"We are going to buy the new car next month provided that the bank gives us the money we need for the first payment."},
    {"id":"010","key":"tough","audio":"f010.mp3","ca":"L’examen va ser molt difícil i llarg, però em sento contenta perquè vaig estudiar molt i crec que vaig respondre totes les preguntes correctament.","en":"The exam was very tough and long, but I feel happy because I studied a lot and I think I answered all the questions correctly."}
];

let remaining=[...items], current=null, currentIndex=0, mode="EN", known=0, studyStarsOnly=false;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

let mediaRecorder;
let audioChunks = [];
let isRecording = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;

    recognition.onstart = () => {
        isListening = true;
        document.getElementById("sttBtn").classList.add("listening");
        document.getElementById("speechFeedback").innerHTML = "";
    };
    recognition.onend = () => {
        isListening = false;
        document.getElementById("sttBtn").classList.remove("listening");
    };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            fullTranscript += event.results[i][0].transcript + " ";
        }
        compareSentences(current.en, fullTranscript.trim());
    };
}

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().replace(/[.,?!"]/g, "").trim();
}

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const normOriginalWords = normalizeText(original).split(/\s+/);
    const normSpokenWords = normalizeText(spoken).split(/\s+/);
    const origWordsRaw = original.split(/\s+/);
    
    let resultHTML = "";
    let sIdx = 0;

    normOriginalWords.forEach((normWord, index) => {
        const originalWordRaw = origWordsRaw[index];
        let matched = false;

        if (sIdx < normSpokenWords.length && normSpokenWords[sIdx] === normWord) {
            resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
            sIdx++;
            matched = true;
        } else {
            for (let j = sIdx + 1; j < sIdx + 5 && j < normSpokenWords.length; j++) {
                if (normSpokenWords[j] === normWord) {
                    for (let k = sIdx; k < j; k++) {
                        resultHTML += `<span class="word-error">${normSpokenWords[k]}</span>`;
                    }
                    resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
                    sIdx = j + 1;
                    matched = true;
                    break;
                }
            }
        }
        if (!matched) resultHTML += `<span class="word-missing">${originalWordRaw}</span>`;
    });
    feedbackDiv.innerHTML = resultHTML;
}

function toggleMic() {
    if (!recognition) { alert("El teu navegador no suporta reconeixement de veu."); return; }
    if (isListening) recognition.stop();
    else recognition.start();
}

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                new Audio(audioUrl).play();
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
        } catch (err) { alert("Error en accedir al micròfon."); }
    } else {
        mediaRecorder.stop(); 
        isRecording = false;
        btn.classList.remove("recording");
    }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function updateCounter(){ 
    const total = studyStarsOnly ? items.filter(i => localStorage.getItem('star_' + i.id) === 'true').length : items.length;
    document.getElementById("counter").textContent = known + " / " + total; 
}

function play(speed = 1.0, specificAudio = null){ 
    const source = specificAudio || (current ? current.audio : null);
    if(source) {
        if (!audioObj.src.includes(source)) { audioObj.src = source; progressBar.value = 0; }
        audioObj.playbackRate = speed;
        audioObj.play().catch(e => console.log("Error audio"));
    }
}
function pauseAudio() { audioObj.pause(); }

function load(){
 let pool = studyStarsOnly ? remaining.filter(i => localStorage.getItem('star_' + i.id) === 'true') : remaining;
 if(pool.length===0){ current = null; updateCounter(); return; }
 
 if (currentIndex >= pool.length) currentIndex = 0;
 current = pool[currentIndex]; 

 document.getElementById("ca").classList.add("hidden");
 document.getElementById("en").classList.add("hidden");
 document.getElementById("key").classList.add("hidden");
 document.getElementById("speechFeedback").innerHTML = ""; 
 progressBar.value = 0;
 const starMain = document.getElementById("starMain");
 starMain.classList.toggle('active', localStorage.getItem('star_' + current.id) === 'true');

 if(mode==="EN"){
  document.getElementById("langLabel").textContent="ANGLÈS";
  play(1.0);
 } else {
  document.getElementById("langLabel").textContent="CATALÀ";
  document.getElementById("ca").textContent=current.ca;
  document.getElementById("ca").classList.remove("hidden");
 }
 updateCounter();
}

function toggleStarCurrent() {
    if(!current) return;
    const active = document.getElementById("starMain").classList.toggle('active');
    localStorage.setItem('star_' + current.id, active);
}

function toggleStudyStars() {
    studyStarsOnly = !studyStarsOnly;
    const btn = document.getElementById("btnStudyStars");
    btn.classList.toggle('active', studyStarsOnly);
    known = 0; currentIndex = 0; remaining = [...items]; load();
}

function reveal(){
 if(!current)return;
 const caDiv = document.getElementById("ca");
 const enDiv = document.getElementById("en");
 const keyDiv = document.getElementById("key");
 
 caDiv.textContent = current.ca;
 enDiv.textContent = current.en;
 keyDiv.textContent = "Paraula clau: " + current.key;

 if (!enDiv.classList.contains("hidden")) {
    caDiv.classList.add("hidden");
    enDiv.classList.add("hidden");
    keyDiv.classList.add("hidden");
    if(mode==="CA") caDiv.classList.remove("hidden");
 } else {
    caDiv.classList.remove("hidden");
    enDiv.classList.remove("hidden");
    keyDiv.classList.remove("hidden");
 }
}

function know(){
 if(!current)return;
 remaining=remaining.filter(i=>i.id!==current.id);
 known++; 
 load();
}

function nextOne(){ 
    currentIndex++; 
    load(); 
}

function setMode(m){ mode=m; load(); }

function toggleList(){
 const lb = document.getElementById("listBox");
 if (!lb.classList.contains("hidden")) { lb.classList.add("hidden"); return; }
 lb.innerHTML="";
 items.forEach((i, idx)=>{
  const isStarred = localStorage.getItem('star_' + i.id) === 'true';
  const d=document.createElement("div");
  d.className="list-item";
  d.innerHTML=`
    <div class="list-controls-side">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.id}', this)">★</button>
        <button class="mini-icon-btn btn-play-mini" onclick="play(1.0, '${i.audio}')">🔊</button>
        <button class="mini-icon-btn btn-rec-mini" id="rec-list-${idx}" onclick="toggleRecord('rec-list-${idx}')">🎤</button>
    </div>
    <div class="list-texts">
        <div class="list-ca">${i.ca}</div>
        <div class="list-en" id="en-${i.id}" onclick="this.classList.toggle('revealed')">${i.en}</div>
    </div>`;
  lb.appendChild(d);
 });
 lb.classList.remove("hidden");
}

function toggleStar(id, btn) {
    const active = btn.classList.toggle('active');
    localStorage.setItem('star_' + id, active);
    if(current && current.id === id) document.getElementById("starMain").classList.toggle('active', active);
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "unit_1"; }
function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó marcada ✅");
}

load();
</script>
</body>
</html>
