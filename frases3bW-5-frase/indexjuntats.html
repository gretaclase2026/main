 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greta App - Feedback Inteligente</title>
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center}
.unit-number{font-size:24px;font-weight:800;color:#2563eb;margin:0 10px}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 12px 30px rgba(0,0,0,0.08);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

.star-main{font-size:32px;cursor:pointer;color:#d1d5db;background:none;border:none;padding:0;transition:0.2s; position: absolute; left: 22px; top: 45px; z-index: 10;}
.star-main.active{color:#facc15}

.audio-container { display: flex; justify-content: center; gap: 10px; margin: 10px 0; align-items: center; }
.audio-btn{width:55px;height:55px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;}
.audio-btn.rec{background:#fca5a5; color: white;}
.audio-btn.stt{background:#dbeafe; font-size: 22px;}

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
.recording, .listening { animation: pulse 1.5s infinite; background: #ef4444 !important; color: white !important; }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

.hidden{display:none}
.es{font-size:20px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:20px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

#speechFeedback { 
    font-size: 19px; 
    margin: 15px 0; 
    font-weight: bold; 
    min-height: 28px; 
    line-height: 1.5; 
    padding: 0 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 4px;
}
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.bottom-nav{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.btn-list{background:#e9d5ff}
.btn-study-stars{background:#fef08a}

.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px}
.list-item{padding:15px 0;border-bottom:1px solid #e5e7eb;display:flex;gap:15px;align-items:flex-start}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:40px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.list-es{color:#2563eb;font-weight:700;font-size:15px}
.list-en{color:#0f172a;font-weight:800;font-size:15px;filter: blur(5px);transition: filter 0.3s;cursor:pointer}
.list-en.revealed{filter: blur(0)}

.mini-icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.btn-play-mini{background:#dbeafe}
.btn-rec-mini{background:#fce7f3}

.star-btn-list{font-size:24px;cursor:pointer;color:#d1d5db;background:none;border:none}
.star-btn-list.active{color:#facc15}

.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>
<body>
<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">ANGLÈS → CASTELLÀ</button></div>
 <div class="unit-number">3</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">CASTELLÀ → ANGLÈS</button></div>
</header>
<main>
<div class="card">
 <div class="counter" id="counter">0 / 20</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <button class="star-main" id="starMain" onclick="toggleStarCurrent()">★</button>
 <div id="langLabel" class="lang" style="margin-top: 10px;">INGLÉS</div>
 <div class="audio-container">
  <button class="audio-btn slow" onclick="play(0.75)">🐢</button>
  <button class="audio-btn" onclick="play(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord('recBtn')">🎤</button>
  <button class="audio-btn stt" id="sttBtn" onclick="toggleMic()">🎤</button>
 </div>
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" step="0.1"></div>
 <div id="es" class="es hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
 <div class="bottom-nav">
    <button class="nav-btn btn-list" onclick="toggleList()">Veure llista</button>
    <button class="nav-btn btn-study-stars" id="btnStudyStars" onclick="toggleStudyStars()">Estudiar ⭐</button>
 </div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>
const items = [
    {"id": "001", "audio": "f001.mp3", "en": "Even though the weather forecast predicted heavy rain all weekend, we decided to go hiking because we had already packed our gear and didn't want to waste the opportunity.", "es": "Aunque el pronostico del tiempo predecia lluvia intensa todo el fin de semana, decidimos ir de excursion porque ya habiamos empacado nuestro equipo y no queriamos desperdiciar la oportunidad."},
    {"id": "002", "audio": "f002.mp3", "en": "The company that I told you about yesterday is looking for a professional who has extensive experience in digital marketing and who is also willing to travel abroad.", "es": "La empresa de la que te hable ayer esta buscando a un profesional que tenga amplia experiencia en marketing digital y que tambien este dispuesto a viajar al extranjero."},
    {"id": "003", "audio": "f003.mp3", "en": "While I was walking through the park listening to my favorite podcast, I realized that I had forgotten to lock the front door, so I had to run back home as fast as I could.", "es": "Mientras caminaba por el parque escuchando mi podcast favorito, me di cuenta de que habia olvidado cerrar la puerta principal, asi que tuve que volver corriendo a casa lo mas rapido que pude."},
    {"id": "004", "audio": "f004.mp3", "en": "If you had told me that the meeting was going to be postponed until next Monday, I wouldn't have spent the entire night preparing the presentation that you requested.", "es": "Si me hubieras dicho que la reunion se iba a posponer hasta el proximo lunes, no habria pasado la noche entera preparando la presentacion que me pediste."},
    {"id": "005", "audio": "f005.mp3", "en": "I usually try to wake up early to exercise before going to work, but this morning I was so tired that I decided to hit the snooze button and sleep for another thirty minutes.", "es": "Normalmente trato de despertarme temprano para hacer ejercicio antes de ir a trabajar, pero esta mañana estaba tan cansado que decidi posponer la alarma y dormir otros treinta minutos."},
    {"id": "006", "audio": "f006.mp3", "en": "Since the fridge was almost empty, I went to the supermarket to buy some groceries, only to realize when I got to the checkout that I had left my wallet inside my other jacket.", "es": "Como la nevera estaba casi vacia, fui al supermercado a comprar comida, solo para darme cuenta al llegar a la caja de que habia dejado mi cartera dentro de mi otra chaqueta."},
    {"id": "007", "audio": "f007.mp3", "en": "I was planning to spend the afternoon cleaning the house, but I ended up watching a new series on Netflix that was so addictive that I couldn't stop until I finished the whole season.", "es": "Tenia planeado pasar la tarde limpiando la casa, pero termine viendo una serie nueva en Netflix que era tan adictiva que no pude parar hasta que termine la temporada completa."},
    {"id": "008", "audio": "f008.mp3", "en": "While I was waiting for the bus to go downtown, I ran into an old friend from high school whom I hadn't seen in years, so we decided to grab a quick coffee and catch up.", "es": "Mientras esperaba el autobus para ir al centro, me encontre con un viejo amigo de la secundaria a quien no habia visto en años, asi que decidimos tomar un cafe rapido y ponernos al dia."},
    {"id": "009", "audio": "f009.mp3", "en": "I spent the whole morning looking for a specific ingredient for the cake I wanted to bake, only to find out that the small grocery store around the corner had it all along.", "es": "Pase toda la mañana buscando un ingrediente especifico para el pastel que queria hornear, solo para descubrir que la pequeña tienda de comestibles a la vuelta de la esquina lo tuvo todo el tiempo."},
    {"id": "010", "audio": "f010.mp3", "en": "Every time I want to sort out my wardrobe, I end up trying on clothes that I haven't worn in years and looking at myself in the mirror instead of actually organizing anything.", "es": "Cada vez que quiero limpiar mi armario, termino probandome ropa que no me he puesto en años y mirandome en el espejo en lugar de organizar algo realmente."},
    {"id": "011", "audio": "f011.mp3", "en": "My cat has the strange habit of sleeping on top of the television, which is quite annoying because she blocks the screen right when I am watching the most interesting part of a movie.", "es": "Mi gata tiene la extraña costumbre de dormir encima del televisor, lo cual es bastante molesto porque bloquea la pantalla justo cuando estoy viendo la parte mas interesante de una pelicula."},
    {"id": "012", "audio": "f012.mp3", "en": "It was so hot inside the house today that I had to open all the windows to let some fresh air in, but then a lot of mosquitoes entered and I spent the night trying to catch them.", "es": "Hacia tanto calor dentro de casa hoy que tuve que abrir todas las ventanas para dejar entrar un poco de aire fresco, pero luego entraron muchos mosquitos y pase la noche intentando atraparlos."},
    {"id": "013", "audio": "f013.mp3", "en": "I went to the market to buy some fresh fruit and vegetables, but the smell of the bakery next door was so tempting that I ended up buying three chocolate croissants that I didn't need.", "es": "Fui al mercado a comprar algunas frutas y verduras frescas, pero el olor de la panaderia de al lado era tan tentador que termine comprando tres croissants de chocolate que no necesitaba."},
    {"id": "014", "audio": "f014.mp3", "en": "I’ve been trying to learn how to play the guitar by watching videos on the internet, but my fingers hurt so much after ten minutes that I usually give up and go watch TV instead.", "es": "He estado intentando aprender a tocar la guitarra viendo videos en internet, pero me duelen tanto los dedos despues de diez minutos que normalmente me rindo y me voy a ver la tele en su lugar."},
    {"id": "015", "audio": "f015.mp3", "en": "While I was taking a walk around the neighborhood this afternoon, I noticed that they are building a new park where the old parking lot used to be, and I think it will look beautiful.", "es": "Mientras daba un paseo por el barrio esta tarde, note que estan construyendo un parque nuevo donde solia estar el antiguo estacionamiento, y creo que se vera hermoso."},
    {"id": "016", "audio": "f016.mp3", "en": "My old coffee machine broke down this morning, so I had to go to the kitchen and prepare my coffee the traditional way, which took much longer than I expected but tasted much better.", "es": "Mi vieja cafetera se estropeo esta mañana, asi que tuve que ir a la cocina y preparar mi cafe de la manera tradicional, lo que tomo mucho mas tiempo de lo que esperaba pero sabia mucho mejor."},
    {"id": "017", "audio": "f017.mp3", "en": "I was going to take a short nap after lunch to recover some energy, but the neighbor started using a drill to hang some pictures and the noise made it impossible for me to sleep.", "es": "Iba a tomar una siesta corta despues de almorzar para recuperar algo de energia, pero el vecino empezo a usar un taladro para colgar unos cuadros y el ruido hizo que me fuera imposible dormir."},
    {"id": "018", "audio": "f018.mp3", "en": "I forgot to water the plants on the balcony for a whole week because I was too busy reading a book, so now I have to hope that they don't dry out completely before tomorrow.", "es": "Olvide regar las plantas del balcon durante una semana entera porque estaba demasiado ocupado leyendo un libro, asi que ahora tengo que esperar que no se sequen por completo antes de mañana."},
    {"id": "019", "audio": "f019.mp3", "en": "I haven't called my sister in a while, so I'm going to make some tea and sit on the sofa for an hour to have a long conversation with her about everything that has happened lately.", "es": "No he llamado a mi hermana en un tiempo, asi que voy a preparar un poco de te y sentarme en el sofa durante una hora para tener una conversacion larga con ella sobre todo lo que ha pasado ultimamente."},
    {"id": "020", "audio": "f020.mp3", "en": "I finally decided to organize the kitchen drawers where I keep all the plastic containers, but it seems impossible to find the right lid for any of them no matter how hard I look.", "es": "Finalmente decidi organizar los cajones de la cocina donde guardo todos los recipientes de plastico, pero parece imposible encontrar la tapa adecuada para ninguno de ellos sin importar cuanto busque."}
];

// Equivalencias de contracciones del index50.html
const expansions = {
    "dont": ["do", "not"], "didnt": ["did", "not"], "isnt": ["is", "not"], "arent": ["are", "not"],
    "wasnt": ["was", "not"], "werent": ["were", "not"], "havent": ["have", "not"], "hasnt": ["has", "not"],
    "hadnt": ["had", "not"], "wont": ["will", "not"], "wouldnt": ["would", "not"], "cant": ["can", "not"],
    "couldnt": ["could", "not"], "im": ["i", "am"], "youre": ["you", "are"], "hes": ["he", "is"],
    "shes": ["she", "is"], "its": ["it", "is"], "were": ["we", "are"], "theyre": ["they", "are"],
    "ive": ["i", "have"], "youve": ["you", "have"], "weve": ["we", "have"], "theyve": ["they", "have"],
    "id": ["i", "would"], "youd": ["you", "would"], "hed": ["he", "would"], "shed": ["she", "would"],
    "wed": ["we", "would"], "theyd": ["they", "would"], "ill": ["i", "will"], "youll": ["you", "will"],
    "hell": ["he", "will"], "shell": ["she", "will"], "well": ["we", "will"], "theyll": ["they", "will"]
};

let remaining=[...items], current=null, mode="EN", known=0, studyStarsOnly=false;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");
let mediaRecorder, audioChunks = [], isRecording = false;

// Reconocimiento de Voz
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;

    recognition.onstart = () => { 
        isListening = true; 
        document.getElementById("sttBtn").classList.add("listening"); 
    };
    recognition.onend = () => { 
        isListening = false; 
        document.getElementById("sttBtn").classList.remove("listening"); 
    };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            fullTranscript += event.results[i][0].transcript + " ";
        }
        compareSentences(current.en, fullTranscript.trim());
    };
}

// Limpieza simplificada del index50.html
function simpleClean(text) {
    if(!text) return "";
    return text.toLowerCase().replace(/[.,?!'"]/g, "").trim();
}

// Lógica de comparación mejorada del index50.html
function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const origWords = original.split(/\s+/);
    const spokenWords = spoken.split(/\s+/);
    const spokenCleaned = spokenWords.map(w => simpleClean(w));
    
    let resultHTML = "";
    let sIdx = 0;

    origWords.forEach((word) => {
        const cleanO = simpleClean(word);
        if(!cleanO) return;

        let matched = false;

        // 1. Coincidencia exacta
        if (sIdx < spokenCleaned.length && spokenCleaned[sIdx] === cleanO) {
            resultHTML += `<span class="word-correct">${word}</span>`;
            sIdx++;
            matched = true;
        } 
        // 2. Coincidencia de expansión (Si el texto tiene "didn't" y dices "did", "not")
        else if (expansions[cleanO]) {
            const parts = expansions[cleanO];
            if (sIdx + 1 < spokenCleaned.length && 
                spokenCleaned[sIdx] === parts[0] && 
                spokenCleaned[sIdx+1] === parts[1]) {
                resultHTML += `<span class="word-correct">${word}</span>`;
                sIdx += 2;
                matched = true;
            }
        }
        
        // 3. Búsqueda por si se ha saltado palabras (look-ahead)
        if(!matched){
            let foundAhead = false;
            for(let j = sIdx; j < sIdx + 3 && j < spokenCleaned.length; j++) {
                if(spokenCleaned[j] === cleanO) {
                    for(let k = sIdx; k < j; k++) {
                        resultHTML += `<span class="word-error">${spokenWords[k]}</span>`;
                    }
                    resultHTML += `<span class="word-correct">${word}</span>`;
                    sIdx = j + 1;
                    foundAhead = true;
                    matched = true;
                    break;
                }
            }
        }

        if (!matched) {
            resultHTML += `<span class="word-missing">${word}</span>`;
        }
    });

    feedbackDiv.innerHTML = resultHTML;
}

function toggleMic() {
    if (!recognition) return;
    if (isListening) {
        recognition.stop();
    } else {
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start();
    }
}

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
        } catch (err) { alert("Error micro"); }
    } else {
        mediaRecorder.stop(); isRecording = false;
        btn.classList.remove("recording");
    }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function load(){
 let pool = studyStarsOnly ? remaining.filter(i => localStorage.getItem('star_' + i.id) === 'true') : remaining;
 if(pool.length===0){ current = null; updateCounter(); return; }
 current = pool[Math.floor(Math.random()*pool.length)];
 document.getElementById("es").classList.add("hidden");
 document.getElementById("en").classList.add("hidden");
 document.getElementById("speechFeedback").innerHTML = "";
 progressBar.value = 0;
 document.getElementById("starMain").classList.toggle('active', localStorage.getItem('star_' + current.id) === 'true');

 if(mode==="EN"){
  document.getElementById("langLabel").textContent="INGLÉS";
  play(1.0);
 } else {
  document.getElementById("langLabel").textContent="CASTELLANO";
  document.getElementById("es").textContent=current.es;
  document.getElementById("es").classList.remove("hidden");
 }
 updateCounter();
}

function play(speed = 1.0, specificAudio = null){ 
    const source = specificAudio || (current ? current.audio : null);
    if(source) {
        if (!audioObj.src.includes(source)) { audioObj.src = source; }
        audioObj.playbackRate = speed; audioObj.play();
    }
}
function pauseAudio() { audioObj.pause(); }
function reveal(){
    const esDiv = document.getElementById("es");
    const enDiv = document.getElementById("en");
    esDiv.textContent = current.es; enDiv.textContent = current.en;
    if (!esDiv.classList.contains("hidden") && !enDiv.classList.contains("hidden")) {
        esDiv.classList.add("hidden"); enDiv.classList.add("hidden");
        if(mode==="ES") esDiv.classList.remove("hidden");
    } else {
        esDiv.classList.remove("hidden"); enDiv.classList.remove("hidden");
    }
}
function know(){ if(!current)return; remaining=remaining.filter(i=>i.id!==current.id); known++; load(); }
function nextOne(){ load(); }
function setMode(m){ mode=m; load(); }
function updateCounter(){ 
    const total = studyStarsOnly ? items.filter(i => localStorage.getItem('star_' + i.id) === 'true').length : items.length;
    document.getElementById("counter").textContent = known + " / " + total; 
}
function toggleStarCurrent() {
    if(!current) return;
    const active = document.getElementById("starMain").classList.toggle('active');
    localStorage.setItem('star_' + current.id, active);
}
function toggleStudyStars() {
    studyStarsOnly = !studyStarsOnly;
    document.getElementById("btnStudyStars").classList.toggle('active', studyStarsOnly);
    known = 0; remaining = [...items]; load();
}
function toggleList(){
 const lb = document.getElementById("listBox");
 if (!lb.classList.contains("hidden")) { lb.classList.add("hidden"); return; }
 lb.innerHTML="";
 items.forEach((i, idx)=>{
  const isStarred = localStorage.getItem('star_' + i.id) === 'true';
  const d=document.createElement("div");
  d.className="list-item";
  d.innerHTML=`
    <div class="list-controls-side">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.id}', this)">★</button>
        <button class="mini-icon-btn btn-play-mini" onclick="play(1.0, '${i.audio}')">🔊</button>
        <button class="mini-icon-btn btn-rec-mini" id="rec-list-${idx}" onclick="toggleRecord('rec-list-${idx}')">🎤</button>
    </div>
    <div class="list-texts">
        <div class="list-es">${i.es}</div>
        <div class="list-en" id="en-${i.id}" onclick="this.classList.toggle('revealed')">${i.en}</div>
    </div>`;
  lb.appendChild(d);
 });
 lb.classList.remove("hidden");
}
function toggleStar(id, btn) {
    const active = btn.classList.toggle('active');
    localStorage.setItem('star_' + id, active);
}
function markAsDone(el) {
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó marcada ✅");
}
load();
</script>
</body>
</html>
