 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greta App - Unidad 3</title>
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center}
.unit-number{font-size:24px;font-weight:800;color:#2563eb;margin:0 10px}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 12px 30px rgba(0,0,0,0.08);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.star-main{font-size:32px;cursor:pointer;color:#d1d5db;background:none;border:none;padding:0;transition:0.2s; position: absolute; left: 22px; top: 45px; z-index: 10;}
.star-main.active{color:#facc15}
.audio-container { display: flex; justify-content: center; gap: 10px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:55px;height:55px;border-radius:50%;border:none;background:#dcfce7;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;}
.audio-btn.rec, .btn-rec-mini{background:#fce7f3; color: #000;}
.audio-btn.stt{background:#dbeafe; font-size: 22px;}
@keyframes pulse-pink-active { 0% { background-color: #fce7f3; transform: scale(1); } 50% { background-color: #f48fb1; transform: scale(1.1); } 100% { background-color: #fce7f3; transform: scale(1); } }
@keyframes pulse-blue-active { 0% { background-color: #dbeafe; transform: scale(1); } 50% { background-color: #b3e5fc; transform: scale(1.1); } 100% { background-color: #dbeafe; transform: scale(1); } }
.recording { animation: pulse-pink-active 1.2s infinite ease-in-out; background: #f48fb1 !important; }
.listening { animation: pulse-blue-active 1.2s infinite ease-in-out; background: #b3e5fc !important; }
.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }
.hidden{display:none}
.key-label{font-size:16px;font-weight:900;color:#f06292;margin:10px 0}
.es{font-size:20px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:20px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}
#speechFeedback { font-size: 18px; margin: 15px 0; font-weight: bold; min-height: 28px; line-height: 1.5; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }
.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}
.bottom-nav{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.btn-list{background:#e9d5ff}
.btn-study-stars{background:#fef08a}
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px}
.list-item{padding:15px 0;border-bottom:1px solid #e5e7eb;display:flex;gap:15px;align-items:flex-start}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:40px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.list-es{color:#2563eb;font-weight:700;font-size:15px}
.list-en{color:#0f172a;font-weight:800;font-size:15px;filter: blur(5px);transition: filter 0.3s;cursor:pointer}
.list-en.revealed{filter: blur(0)}
.btn-play-mini{background:#dcfce7}
.mini-icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.star-btn-list{font-size:24px;cursor:pointer;color:#d1d5db;background:none;border:none}
.star-btn-list.active{color:#facc15}
.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>
<body>
<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">Anglès → Castellá</button></div>
 <div class="unit-number">3</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">Castellà → Anglès</button></div>
</header>
<main>
<div class="card">
 <div class="counter" id="counter">0 / 20</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <button class="star-main" id="starMain" onclick="toggleStarCurrent()">★</button>
 <div id="langLabel" class="lang" style="margin-top: 10px;">INGLÉS</div>
 <div class="audio-container">
  <button class="audio-btn slow" onclick="play(0.75)">🐢</button>
  <button class="audio-btn" onclick="play(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord('recBtn')">🎤</button>
  <button class="audio-btn stt" id="sttBtn" onclick="toggleMic()">🎤</button>
 </div>
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" step="0.1"></div>
 <div id="key" class="key-label hidden"></div>
 <div id="es" class="es hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Ver</button>
  <button class="action know" onclick="know()">Ya la sé</button>
  <button class="action next" onclick="nextOne()">Siguiente</button>
 </div>
 <div class="bottom-nav">
    <button class="nav-btn btn-list" onclick="toggleList()">Ver lista</button>
    <button class="nav-btn btn-study-stars" id="btnStudyStars" onclick="toggleStudyStars()">Estudiar ⭐</button>
 </div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>
const items = [
    {"id":"301","key":"heavy rain","audio":"f001.mp3","es":"Aunque el pronostico del tiempo predecia lluvia intensa todo el fin de semana, decidimos ir de excursion porque ya habiamos empacado nuestro equipo y no queriamos desperdiciar la oportunidad.","en":"Even though the weather forecast predicted heavy rain all weekend, we decided to go hiking because we had already packed our gear and didn't want to waste the opportunity."},
    {"id":"302","key":"marketing","audio":"f002.mp3","es":"La empresa de la que te hable ayer esta buscando a un profesional que tenga amplia experiencia en marketing digital y que tambien este dispuesto a viajar al extranjero.","en":"The company that I told you about yesterday is looking for a professional who has extensive experience in digital marketing and who is also willing to travel abroad."},
    {"id":"303","key":"lock door","audio":"f003.mp3","es":"Mientras caminaba por el parque escuchando mi podcast favorito, me di cuenta de que habia olvidado cerrar la puerta principal, asi que tuve que volver corriendo a casa lo mas rapido que pude.","en":"While I was walking through the park listening to my favorite podcast, I realized that I had forgotten to lock the front door, so I had to run back home as fast as I could."},
    {"id":"304","key":"postponed","audio":"f004.mp3","es":"Si me hubieras dicho que la reunion se iba a posponer hasta el proximo lunes, no habria pasado la noche entera preparando la presentacion que me pediste.","en":"If you had told me that the meeting was going to be postponed until next Monday, I wouldn't have spent the entire night preparing the presentation that you requested."},
    {"id":"305","key":"snooze","audio":"f005.mp3","es":"Normalmente trato de despertarme temprano para hacer ejercicio antes de ir a trabajar, pero esta mañana estaba tan cansado que decidi posponer la alarma y dormir otros treinta minutos.","en":"I usually try to wake up early to exercise before going to work, but this morning I was so tired that I decided to hit the snooze button and sleep for another thirty minutes."},
    {"id":"306","key":"wallet","audio":"f006.mp3","es":"Como la nevera estaba casi vacia, fui al supermercado a comprar comida, solo para darme cuenta al llegar a la caja de que habia dejado mi cartera dentro de mi otra chaqueta.","en":"Since the fridge was almost empty, I went to the supermarket to buy some groceries, only to realize when I got to the checkout that I had left my wallet inside my other jacket."},
    {"id":"307","key":"addictive","audio":"f007.mp3","es":"Estaba planeando pasar la tarde limpiando la house, pero termine viendo una serie nueva en Netflix que era tan adictiva que no pude parar hasta que termine la temporada completa.","en":"I was planning to spend the afternoon cleaning the house, but I ended up watching a new series on Netflix that was so addictive that I couldn't stop until I finished the whole season."},
    {"id":"308","key":"catch up","audio":"f008.mp3","es":"Mientras esperaba el autobus para ir al centro, me encontre con un viejo amigo de la secundaria a quien no habia visto en años, asi que decidimos tomar un cafe rapido y ponernos al dia.","en":"While I was waiting for the bus to go downtown, I ran into an old friend from high school whom I hadn't seen in years, so we decided to grab a quick coffee and catch up."},
    {"id":"309","key":"ingredient","audio":"f009.mp3","es":"Pase toda la mañana buscando un ingrediente especifico para el pastel que queria hornear, solo para descubrir que la pequeña tienda de comestibles a la vuelta de la esquina lo tuvo todo el tiempo.","en":"I spent the whole morning looking for a specific ingredient for the cake I wanted to bake, only to find out that the small grocery store around the corner had it all along."},
    {"id":"310","key":"wardrobe","audio":"f010.mp3","es":"Cada vez que decido limpiar mi armario, termino probandome ropa que no me he puesto en years y mirandome en el espejo en lugar de organizar algo realmente.","en":"Every time I want to sort out my wardrobe, I end up trying on clothes that I haven't worn in years and looking at myself in the mirror instead of actually organizing anything."},
    {"id":"311","key":"habit","audio":"f011.mp3","es":"Mi gata tiene la extraña costumbre de dormir encima del televisor, lo cual es bastante molesto porque bloquea la pantalla justo cuando estoy viendo la parte mas interesante de una pelicula.","en":"My cat has the strange habit of sleeping on top of the television, which is quite annoying because she blocks the screen right when I am watching the most interesting part of a movie."},
    {"id":"312","key":"mosquitoes","audio":"f012.mp3","es":"Hacia tanto calor dentro de casa hoy que tuve que abrir todas las ventanas para dejar entrar un poco de aire fresco, pero luego entraron muchos mosquitos y pase la noche intentando atraparlos.","en":"It was so hot inside the house today that I had to open all the windows to let some fresh air in, but then a lot of mosquitoes entered and I spent the night trying to catch them."},
    {"id":"313","key":"tempting","audio":"f013.mp3","es":"Fui al mercado a comprar algunas frutas y verduras frescas, pero el olor de la panaderia de al lado era tan tentador que termine comprando tres croissants de chocolate que no necesitaba.","en":"I went to the market to buy some fresh fruit and vegetables, but the smell of the bakery next door was so tempting that I ended up buying three chocolate croissants that I didn't need."},
    {"id":"314","key":"guitar","audio":"f014.mp3","es":"He estado intentando aprender a tocar la guitarra viendo videos en internet, pero me duelen tanto los dedos despues de diez minutos que normalmente me rindo y me voy a ver la tele en su lugar.","en":"I’ve been trying to learn how to play the guitar by watching videos on the internet, but my fingers hurt so much after ten minutes that I usually give up and go watch TV instead."},
    {"id":"315","key":"neighborhood","audio":"f015.mp3","es":"Mientras daba un paseo por el barrio esta tarde, note que estan construyendo un parque nuevo donde solia estar el antiguo estacionamiento, y creo que se vera hermoso.","en":"While I was taking a walk around the neighborhood this afternoon, I noticed that they are building a new park where the old parking lot used to be, and I think it will look beautiful."},
    {"id":"316","key":"coffee machine","audio":"f016.mp3","es":"Mi vieja cafetera se estropeo esta mañana, asi que tuve que ir a la cocina y preparar mi cafe de la manera tradicional, lo que tomo mucho mas tiempo de lo que esperaba pero sabia mucho mejor.","en":"My old coffee machine broke down this morning, so I had to go to the kitchen and prepare my coffee the traditional way, which took much longer than I expected but tasted much better."},
    {"id":"317","key":"drill","audio":"f017.mp3","es":"Iba a tomar una siesta corta despues de almorzar para recuperar algo de energia, pero el vecino empezo a usar un taladro para colgar unos cuadros y el ruido hizo que me fuera imposible dormir.","en":"I was going to take a short nap after lunch to recover some energy, but the neighbor started using a drill to hang some pictures and the noise made it impossible for me to sleep."},
    {"id":"318","key":"water plants","audio":"f018.mp3","es":"Olvide regar las plantas del balcon durante una semana entera porque estaba demasiado ocupado leyendo un libro, asi que ahora tengo que esperar que no se sequen por completo antes de mañana.","en":"I forgot to water the plants on the balcony for a whole week because I was too busy reading a book, so now I have to hope that they don't dry out completely before tomorrow."},
    {"id":"319","key":"sister","audio":"f019.mp3","es":"No he llamado a mi hermana en un tiempo, asi que voy a preparar un poco de te y sentarme en el sofa durante una hora para tener una conversacion larga con ella sobre todo lo que ha pasado ultimamente.","en":"I haven't called my sister in a while, so I'm going to make some tea and sit on the sofa for an hour to have a long conversation with her about everything that has happened lately."},
    {"id":"320","key":"containers","audio":"f020.mp3","es":"Finalmente decidi organizar los cajones de la cocina donde guardo todos los recipientes de plastico, pero parece imposible encontrar la tapa adecuada para ninguno de ellos sin importar cuanto busque.","en":"I finally decided to organize the kitchen drawers where I keep all the plastic containers, but it seems impossible to find the right lid for any of them no matter how hard I look."}
];

let remaining=[...items], current=null, currentIndex=0, mode="EN", known=0, studyStarsOnly=false;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");
let mediaRecorder; let audioChunks = []; let isRecording = false;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition; let isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition(); recognition.lang = 'en-US'; recognition.interimResults = false; recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) { fullTranscript += event.results[i][0].transcript + " "; }
        compareSentences(current.en, fullTranscript.trim());
    };
}

function normalizeText(text) { return text ? text.toLowerCase().replace(/[.,?!"]/g, "").trim() : ""; }

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const normOriginalWords = normalizeText(original).split(/\s+/);
    const normSpokenWords = normalizeText(spoken).split(/\s+/);
    const origWordsRaw = original.split(/\s+/);
    let resultHTML = ""; let sIdx = 0;
    normOriginalWords.forEach((normWord, index) => {
        const originalWordRaw = origWordsRaw[index]; let matched = false;
        if (sIdx < normSpokenWords.length && normSpokenWords[sIdx] === normWord) { resultHTML += `<span class="word-correct">${originalWordRaw} </span>`; sIdx++; matched = true; }
        else {
            for (let j = sIdx + 1; j < sIdx + 5 && j < normSpokenWords.length; j++) {
                if (normSpokenWords[j] === normWord) {
                    for (let k = sIdx; k < j; k++) { resultHTML += `<span class="word-error">${normSpokenWords[k]} </span>`; }
                    resultHTML += `<span class="word-correct">${originalWordRaw} </span>`; sIdx = j + 1; matched = true; break;
                }
            }
        }
        if (!matched) resultHTML += `<span class="word-missing">${originalWordRaw} </span>`;
    });
    feedbackDiv.innerHTML = resultHTML;
}

function toggleMic() { 
    if (!recognition) { alert("Navegador no compatible"); return; } 
    if (isListening) {
        recognition.stop();
    } else {
        document.getElementById("speechFeedback").innerHTML = ""; 
        recognition.start(); 
    }
}

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => { const audioUrl = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/wav' })); new Audio(audioUrl).play(); };
            mediaRecorder.start(); isRecording = true; btn.classList.add("recording");
        } catch (err) { alert("Error micro"); }
    } else { mediaRecorder.stop(); isRecording = false; btn.classList.remove("recording"); }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function updateCounter(){ 
    const total = studyStarsOnly ? items.filter(i => localStorage.getItem('star_' + i.id) === 'true').length : items.length;
    document.getElementById("counter").textContent = known + " / " + total; 
}

function play(speed = 1.0, specificAudio = null){ 
    const source = specificAudio || (current ? current.audio : null);
    if(source) { audioObj.src = source; audioObj.playbackRate = speed; audioObj.play().catch(e => {}); }
}
function pauseAudio() { audioObj.pause(); }

function load(){
 let pool = studyStarsOnly ? remaining.filter(i => localStorage.getItem('star_' + i.id) === 'true') : remaining;
 if(pool.length===0){ current = null; updateCounter(); return; }
 if (currentIndex >= pool.length) currentIndex = 0;
 current = pool[currentIndex]; 
 document.getElementById("es").classList.add("hidden"); document.getElementById("en").classList.add("hidden");
 document.getElementById("key").classList.add("hidden"); document.getElementById("speechFeedback").innerHTML = ""; 
 progressBar.value = 0;
 document.getElementById("starMain").classList.toggle('active', localStorage.getItem('star_' + current.id) === 'true');
 if(mode==="EN"){ document.getElementById("langLabel").textContent="INGLÉS"; play(1.0); }
 else { document.getElementById("langLabel").textContent="CASTELLÀ"; document.getElementById("es").textContent=current.es; document.getElementById("es").classList.remove("hidden"); }
 updateCounter();
}

function toggleStarCurrent() { if(!current) return; const active = document.getElementById("starMain").classList.toggle('active'); localStorage.setItem('star_' + current.id, active); }
function toggleStudyStars() { studyStarsOnly = !studyStarsOnly; known = 0; currentIndex = 0; remaining = [...items]; load(); }

function reveal(){
 if(!current)return;
 const esDiv = document.getElementById("es"), enDiv = document.getElementById("en"), keyDiv = document.getElementById("key");
 esDiv.textContent = current.es; enDiv.textContent = current.en; keyDiv.textContent = "Palabra clave: " + current.key;
 esDiv.classList.remove("hidden"); enDiv.classList.remove("hidden"); keyDiv.classList.remove("hidden");
}

function know(){ if(!current)return; remaining=remaining.filter(i=>i.id!==current.id); known++; load(); }
function nextOne(){ currentIndex++; load(); }
function setMode(m){ mode=m; load(); }

function toggleList(){
 const lb = document.getElementById("listBox");
 if (!lb.classList.contains("hidden")) { lb.classList.add("hidden"); return; }
 lb.innerHTML="";
 items.forEach((i, idx)=>{
  const isStarred = localStorage.getItem('star_' + i.id) === 'true';
  const d=document.createElement("div"); d.className="list-item";
  d.innerHTML=`<div class="list-controls-side">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.id}', this)">★</button>
        <button class="mini-icon-btn btn-play-mini" onclick="play(1.0, '${i.audio}')">🔊</button>
        <button class="mini-icon-btn btn-rec-mini" id="rec-list-${i.id}" onclick="toggleRecord('rec-list-${i.id}')">🎤</button>
    </div>
    <div class="list-texts">
        <div class="list-es">${i.es}</div>
        <div class="list-en" onclick="this.classList.toggle('revealed')">${i.en}</div>
    </div>`;
  lb.appendChild(d);
 });
 lb.classList.remove("hidden");
}

function toggleStar(id, btn) { const active = btn.classList.toggle('active'); localStorage.setItem('star_' + id, active); if(current && current.id === id) document.getElementById("starMain").classList.toggle('active', active); }

// FUNCIÓN CORREGIDA PARA GUARDAR EL PROGRESO
function markAsDone(el) { 
    // Guardamos la fecha actual vinculada a la carpeta de la Unidad 3 de Frases
    const folderName = "frases3bW-5-frase"; 
    const today = new Date().toISOString();
    localStorage.setItem(folderName, today);
    
    // Cambiamos el estilo del botón
    el.innerHTML = "✓"; 
    el.classList.add('marked'); 
    alert("Lección marcada ✅"); 
}

load();
</script>
</body>
</html>
