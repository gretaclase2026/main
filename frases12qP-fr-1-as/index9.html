 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast English - Unit 12</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;gap:10px;margin-bottom:10px;width:100%;align-items:center}
.unit-number{font-weight:bold;font-size:22px;color:#2563eb;padding:0 10px;min-width:30px;text-align:center}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0;justify-content:center;align-items:center}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.star-main { background: none; border: none; font-size: 30px; cursor: pointer; color: #cbd5e1; transition: 0.2s; margin-left: 5px; }
.star-main.active { color: #f59e0b !important; }

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:35px 0 20px 0}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}

.audio-btn{font-size:30px;background:#dcfce7;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.slow{background:#fef08a;font-size:28px}
.audio-btn.pause{background:#fee2e2;font-size:28px}

.rec-btn{font-size:30px;background:#fbcfe8;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s}
.recording-active { background: #f06292 !important; color: white !important; }
.recording-icon { display: inline-block; animation: pulse-pink 1.5s infinite; }

.stt-btn{font-size:30px;background:#dbeafe;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s}
.listening{background:#2563eb !important; color:white; animation: pulse-blue 1.5s infinite; transform: scale(1.1);}

@keyframes pulse-blue { 0% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(37, 99, 235, 0);} 100% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);} }
@keyframes pulse-pink { 0% {box-shadow: 0 0 0 0 rgba(240, 98, 146, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(240, 98, 146, 0);} 100% {box-shadow: 0 0 0 0 rgba(240, 98, 146, 0);} }

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:-35px;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:22px;font-weight:800;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
#answer{font-size:20px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}

#speech-feedback { font-size: 19px; margin-bottom: 10px; min-height: 24px; text-align: center; transition: 0.2s; line-height: 1.5; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px;}
.word-correct { color: #16a34a; font-weight: bold; } 
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

.list-toggle-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-list-main { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e9d5ff; font-weight: bold; cursor: pointer; }
.btn-stars-main { background: #fef3c7; color: #92400e; }

#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:10px}
.list-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: flex-start; gap: 15px; }
.list-btns-col { display: flex; flex-direction: column; gap: 8px; align-items: center; min-width: 45px; }
.list-content { flex: 1; }
.mini-btn { border: none; border-radius: 10px; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.btn-audio-list { background: #dcfce7; }

.list-rec-btn { background: #fbcfe8; border: none; border-radius: 10px; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s;}
.recording-active { background: #f06292 !important; color: white !important; }

.star-list { background: none; border: none; font-size: 24px; color: #cbd5e1; cursor: pointer; padding: 0; }
.star-list.active { color: #f59e0b !important; }

.blur { filter: blur(5px); transition: filter 0.3s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }

.check-box-manual {
    position: absolute; top: 85px; right: 22px; width: 24px; height: 24px;
    background: #fff !important; border: 1.5px solid #22c55e !important;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: all 0.2s; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white; }
</style>
</head>
<body>

<div class="card">
  <div class="modes">
    <div id="modeEN" class="mode en active" onclick="setMode('EN')">ANG → CAT</div>
    <div class="unit-number">12</div>
    <div id="modeES" class="mode es" onclick="setMode('ES')">CAT → ANG</div>
  </div>

  <div class="blocks" id="blocksContainer"></div>

  <div class="main-box-container">
    <div class="counter-side">
      <span id="pos">0</span> / <span id="total">0</span>
    </div>
    
    <div class="audio-controls">
      <button class="audio-btn slow" onclick="playAudio(0.75)">🐢</button>
      <button class="audio-btn" onclick="playAudio(1.0)">🔊</button>
      <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
      <button class="rec-btn" id="recBtn" onclick="toggleRecord(false, 'recBtn')">🎙️</button>
      <button class="stt-btn" id="sttBtn" onclick="toggleSTT()">🎤</button>
    </div>

    <div class="progress-wrapper">
      <input type="range" id="progressBar" value="0" step="0.1">
    </div>
  </div>

  <div id="word"></div>
  <div id="speech-feedback"></div>
  <div id="answer" style="display:none;"></div>

  <div class="actions">
    <button class="btn btn-reveal" onclick="reveal()">veure</button>
    <button class="btn btn-know" onclick="know()">ja la se</button>
    <button class="btn btn-next" onclick="next()">següent</button>
  </div>
  
  <div class="list-toggle-btns">
    <button class="btn-list-main" onclick="toggleList('all')">llista del bloc</button>
    <button class="btn-list-main btn-stars-main" onclick="toggleList('stars')">favorites (★)</button>
  </div>
  <div id="list"></div>
</div>

<audio id="audio"></audio>

<script>
const data = [
  {audio:"f001.mp3",en:"This morning I woke up a bit late because I went to bed very late last night.",es:"Aquest matí m’he despertat una mica tard perquè ahir a la nit vaig anar a dormir molt tard."},
  {audio:"f002.mp3",en:"When I arrive home after work, I usually sit on the sofa for a few minutes.",es:"Quan arribo a casa després de la feina, normalment m’assec al sofà uns minuts."},
  {audio:"f003.mp3",en:"Sometimes I buy too much food because I think I will need it.",es:"A vegades compro massa menjar perquè penso que el necessitaré."},
  {audio:"f004.mp3",en:"When it rains, I prefer to stay at home and watch a movie.",es:"Quan plou, prefereixo quedar-me a casa i mirar una pel·lícula."},
  {audio:"f005.mp3",en:"Yesterday I went to the local market because I wanted fresh fruit.",es:"Ahir vaig anar al mercat del barri perquè volia fruita fresca."},
  {audio:"f006.mp3",en:"I like to look around before deciding if I need something.",es:"M’agrada mirar una mica tot abans de decidir si necessito alguna cosa."},
  {audio:"f007.mp3",en:"Sometimes I stop by a small café because they make very good coffee.",es:"A vegades passo per una cafeteria petita perquè fan un cafè molt bo."},
  {audio:"f008.mp3",en:"On weekends I like to walk without rushing through the park.",es:"Els caps de setmana m’agrada caminar sense pressa pel parc."},
  {audio:"f009.mp3",en:"When I have a free afternoon, I try to read a book.",es:"Quan tinc una tarda lliure, intento llegir un llibre."},
  {audio:"f010.mp3",en:"After work I still try to do some exercise.",es:"Després de la feina encara intento fer una mica d’exercici."},
  {audio:"f011.mp3",en:"When I meet friends, we spend a lot of time talking.",es:"Quan quedo amb amics, passem molta estona parlant."},
  {audio:"f012.mp3",en:"Sometimes it is difficult to start a conversation with someone new.",es:"A vegades és difícil començar una conversa amb algú nou."},
  {audio:"f013.mp3",en:"This morning I left home in a hurry because I was late.",es:"Aquest matí he sortit de casa amb pressa perquè arribava tard."},
  {audio:"f014.mp3",en:"Without a list, I end up buying things I don't need.",es:"Sense una llista, acabo comprant coses que no necessito."},
  {audio:"f015.mp3",en:"Sometimes I start a series and I get hooked very quickly.",es:"A vegades començo una sèrie i m’hi enganxo molt ràpid."},
  {audio:"f016.mp3",en:"I read the recipe carefully before I start cooking.",es:"Llegeixo la recepta amb calma abans de començar a cuinar."},
  {audio:"f017.mp3",en:"On Sundays I like to wake up without an alarm.",es:"Els diumenges m’agrada llevar-me sense alarma."},
  {audio:"f018.mp3",en:"When I forget a word, I explain the idea in another way.",es:"Quan oblido una paraula, explico la idea d’una altra manera."},
  {audio:"f019.mp3",en:"I start many things at once and then I have to finish one.",es:"Començo moltes coses alhora i després n'he d'acabar una."},
  {audio:"f020.mp3",en:"I like to walk without looking at the map.",es:"M’agrada caminar sense mirar el mapa."},
  {audio:"f021.mp3",en:"Before leaving I always check the door is closed.",es:"Abans de sortir siempre miro que la porta estigui tancada."},
  {audio:"f022.mp3",en:"When I buy clothes, I first check the price.",es:"Quan compro roba, primer miro el preu."},
  {audio:"f023.mp3",en:"If I have a lot of work, I take short breaks.",es:"Si tinc molta feina, faig pauses curtes."},
  {audio:"f024.mp3",en:"I start tidying a room and find old things.",es:"Començo a ordenar una habitació i trobo coses antigues."},
  {audio:"f025.mp3",en:"When I cook pasta, I make a little extra for tomorrow.",es:"Quan cuino pasta, en faig una mica més per a demà."},
  {audio:"f026.mp3",en:"In summer, I go for a walk in the evening.",es:"A l’estiu, surto a caminar al vespre."},
  {audio:"f027.mp3",en:"I open the fridge even if there is nothing new.",es:"Obro la nevera encara que no hi hagi res de nou."},
  {audio:"f028.mp3",en:"When I meet someone new, I arrive a few minutes early.",es:"Quan quedo amb algú nou, arribo uns minuts abans."}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

const contractions = {
    "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would", 
    "it'd": "it would", "we'd": "we would", "they'd": "they would",
    "i've": "i have", "you've": "you have", "we've": "we have", "they've": "they have",
    "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
    "don't": "do not", "doesn't": "does not", "didn't": "did not",
    "can't": "cannot", "couldn't": "could not", "won't": "will not", "wouldn't": "would not",
    "it's": "it is", "she's": "she is", "he's": "he is", "there's": "there is",
    "i'm": "i am", "we're": "we are", "they're": "they are", "you're": "you are",
    "hadn't": "had not", "wouldn't've": "would not have", "i'll": "i will"
};
const expanded = {};
for (let k in contractions) expanded[contractions[k]] = k;

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().replace(/[.,?!"]/g, "").trim();
}

function compareSentences(originalText, spokenText) {
    const feedbackDiv = document.getElementById("speech-feedback");
    const origWords = originalText.split(/\s+/);
    const spokenWords = spokenText.split(/\s+/);
    let resultHTML = ""; let sIdx = 0; 
    let allCorrect = true;

    for (let i = 0; i < origWords.length; i++) {
        let matched = false; const oNorm = normalizeText(origWords[i]);
        if (sIdx < spokenWords.length) {
            const sNorm1 = normalizeText(spokenWords[sIdx]);
            const sNorm2 = normalizeText(spokenWords[sIdx + 1]);
            const sTwoWords = sNorm1 + " " + (sNorm2 || "");
            
            if (contractions[oNorm] === sTwoWords) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]} ${spokenWords[sIdx+1]}</span> `;
                sIdx += 2; matched = true;
            } else if (i + 1 < origWords.length && (oNorm + " " + normalizeText(origWords[i+1])) === contractions[sNorm1]) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx += 1; i++; matched = true;
            } else if (oNorm === sNorm1 || contractions[oNorm] === sNorm1 || expanded[oNorm] === sNorm1) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx++; matched = true;
            }
        }
        if (!matched) {
            allCorrect = false;
            let foundAhead = false;
            for (let look = sIdx; look < sIdx + 3 && look < spokenWords.length; look++) {
                if (normalizeText(spokenWords[look]) === oNorm) {
                    for (let skip = sIdx; skip < look; skip++) resultHTML += `<span class="word-error">${spokenWords[skip]}</span> `;
                    resultHTML += `<span class="word-correct">${spokenWords[look]}</span> `;
                    sIdx = look + 1; foundAhead = true; matched = true; break;
                }
            }
            if (!foundAhead) resultHTML += `<span class="word-missing">${origWords[i]}</span> `;
        }
    }
    while (sIdx < spokenWords.length) { 
        resultHTML += `<span class="word-error">${spokenWords[sIdx]}</span> `; 
        sIdx++; 
        allCorrect = false;
    }
    feedbackDiv.innerHTML = resultHTML;
    
    const normalizedOrig = normalizeText(originalText).replace(/'/g, "");
    const normalizedSpoken = normalizeText(spokenText).replace(/'/g, "");
    if (normalizedOrig === normalizedSpoken) setTimeout(know, 1000);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (e) => {
        let transcript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript + " ";
        compareSentences(currentBlockData[pos].en, transcript.trim());
    };
}

function stopAllMicrophones() {
    if (isListening && recognition) { recognition.stop(); isListening = false; }
    if (isRecording && mediaRecorder) { 
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
        isRecording = false; 
    }
    if (window.localStream) {
        window.localStream.getTracks().forEach(track => track.stop());
        window.localStream = null;
    }
    document.getElementById("sttBtn").classList.remove("listening");
    document.querySelectorAll(".recording-active").forEach(b => {
        b.classList.remove("recording-active");
        if(b.id === 'recBtn') b.innerHTML = '🎙️';
        else b.innerHTML = '🎤';
    });
}

function toggleSTT() {
    if (!recognition || currentBlockData.length === 0) return;
    if (isListening) {
        recognition.stop();
    } else {
        stopAllMicrophones();
        document.getElementById("speech-feedback").innerHTML = "";
        recognition.start();
    }
}

let mediaRecorder, audioChunks = [], isRecording = false;

async function toggleRecord(isList = false, targetBtnId) {
    let btn = document.getElementById(targetBtnId);
    if (isRecording) { stopAllMicrophones(); return; }
    stopAllMicrophones();
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        window.localStream = stream;
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            new Audio(URL.createObjectURL(audioBlob)).play();
        };
        mediaRecorder.start();
        isRecording = true;
        btn.classList.add("recording-active");
        if(!isList) btn.innerHTML = '<span class="recording-icon">🎙️</span>';
    } catch (err) { alert("Error al accedir al micròfon."); }
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "fast_english"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_currentBlock");
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  const starMain = document.createElement("button");
  starMain.id = "starMain"; starMain.className = "star-main"; starMain.innerHTML = "★";
  starMain.onclick = () => toggleStar();
  container.appendChild(starMain);
  loadBlock((savedBlock !== null) ? (savedBlock === 'T' ? 'T' : parseInt(savedBlock)) : 0);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  if (b === 'T') { 
    temp = data.map((item, i) => ({...item, realIdx: i})); 
  } else {
    let start = b * 10, end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) temp.push({...data[i], realIdx: i});
  }
  // ELIMINAT EL SORT ALEATORI AQUÍ
  currentBlockData = temp; 
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloc Completat! 🎉";
    document.getElementById("answer").innerHTML = "";
    document.getElementById("pos").textContent = learnedCount;
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));
  const w = document.getElementById("word"), ans = document.getElementById("answer"), feedback = document.getElementById("speech-feedback");
  progressBar.value = 0; ans.style.display = "none"; feedback.textContent = "";

  if (mode === "EN") {
    w.innerHTML = ""; 
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span>${item.en}</span>`;
  }
  document.getElementById("pos").textContent = learnedCount + (currentBlockData.length > 0 ? pos + 1 : 0);
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx !== null ? forcedIdx : (currentBlockData.length > 0 ? currentBlockData[pos].realIdx : null);
  if (idx === null) return;
  if (starredIds.includes(idx)) starredIds = starredIds.filter(id => id !== idx);
  else starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  if (forcedIdx === null) document.getElementById("starMain").classList.toggle("active", starredIds.includes(idx));
}

function playAudio(speed, forcedAudio = null) {
  const audioFile = forcedAudio || (currentBlockData.length > 0 ? currentBlockData[pos].audio : null);
  if (!audioFile) return;
  if (!a.src.includes(audioFile)) { a.src = audioFile; progressBar.value = 0; }
  a.playbackRate = speed; a.play().catch(() => {});
}

function pauseAudio() { a.pause(); }

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos], ans = document.getElementById("answer"), w = document.getElementById("word");
    const feedback = document.getElementById("speech-feedback");
    
    if (ans.style.display === "none") {
        if (mode === "EN") w.innerHTML = `<span>${item.en}</span>`;
        ans.style.display = "block";
    } else {
        if (mode === "EN") w.innerHTML = "";
        ans.style.display = "none";
        feedback.innerHTML = "";
    }
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function toggleList(type) {
  const l = document.getElementById("list");
  if (l.style.display === "block" && l.dataset.type === type) { l.style.display = "none"; return; }
  l.dataset.type = type; renderList(type); l.style.display = "block";
}

function renderList(type) {
  const l = document.getElementById("list");
  l.innerHTML = type === 'stars' ? "<b>Favorites (★):</b><br><br>" : "<b>Llista del bloc:</b><br><br>";
  let listToRender = [];
  if (type === 'stars') { listToRender = data.map((item, index) => ({...item, realIdx: index})).filter(i => starredIds.includes(i.realIdx)); } 
  else {
    let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
    let end = currentBlockID === 'T' ? data.length : Math.min(start + 10, data.length);
    listToRender = data.slice(start, end).map((item, index) => ({...item, realIdx: start + index}));
  }
  if (listToRender.length === 0) { l.innerHTML += "<i>Buit.</i>"; return; }

  listToRender.forEach((item, idx) => {
    const isStarred = starredIds.includes(item.realIdx);
    const itemDiv = document.createElement("div");
    const listRecId = `rec-list-${idx}`;
    itemDiv.className = "list-item";
    itemDiv.innerHTML = `
      <div class="list-btns-col">
        <button class="star-list ${isStarred ? 'active' : ''}" onclick="toggleStar(${item.realIdx}); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio-list" onclick="playAudio(1.0, '${item.audio}')">🔊</button>
        <button class="list-rec-btn" id="${listRecId}" onclick="toggleRecord(true, '${listRecId}')">🎤</button>
      </div>
      <div class="list-content">
        <div class="txt-es" style="font-weight:bold; font-size:14px;">${item.es}</div>
        <div class="blur" style="font-weight:bold; font-size:16px;" onclick="this.classList.toggle('revealed')">${item.en}</div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
}

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓"; element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

initBlocks();
const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { markAsDone(this); };
card.appendChild(box);
</script>
</body>
