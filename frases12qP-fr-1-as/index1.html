 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudi FRASES · Format Blanc</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

/* Bloques de navegación */
.blocks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:15px 0 20px}
.block{width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important}

/* Contenedor Audio */
.audio-container { display: flex; justify-content: center; gap: 15px; margin: 10px 0 20px; }
.audio-btn{width:85px;height:85px;border-radius:50%;border:none;background:#dbeafe;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a; font-size:26px;}
.audio-btn:active{transform:scale(0.9)}

.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.list-btn{margin-top:16px;background:#e9d5ff;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;width:100%}
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}

/* Cuadrito de marcado */
.check-box-manual {
    position: absolute; top: 18px; right: 22px;
    width: 24px; height: 24px;
    background: #fff; border: 1.5px solid #22c55e;
    border-radius: 6px; display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white !important; }

.focus{color:#334155;}

</style>
</head>
<body>

<header>
 <div class="mode-btns">
  <button class="mode-en" onclick="setMode('EN')">Mode anglès → català</button>
  <button class="mode-es" onclick="setMode('ES')">Mode català → anglès</button>
 </div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <div id="langLabel" class="lang">ANGLÈS</div>

 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button class="audio-btn" onclick="play(1.0)">🔊</button>
  <button class="audio-btn slow" onclick="play(0.75)">🐢</button>
 </div>

 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>

 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>

 <button class="list-btn" onclick="toggleList()">Veure tota la llista</button>
</div>
</main>

<div id="listBox" class="list-box hidden"></div>

<script>

const items = [
{audio:"f001.mp3",en:"This morning I <span class='focus'>woke up</span> a bit late because I went to bed very late last night, but I still tried to prepare a calm breakfast before starting work.",es:"Aquest matí <span class='focus'>m’he despertat</span> una mica tard perquè ahir a la nit vaig anar a dormir molt tard, però tot i així he intentat preparar un esmorzar tranquil abans de començar a treballar."},
{audio:"f002.mp3",en:"When I <span class='focus'>arrive home</span> after a long day of work, I usually sit on the sofa for a few minutes and think about what I will cook for dinner.",es:"Quan <span class='focus'>arribo a casa</span> després d’un dia llarg de feina, normalment m’agrada seure al sofà uns minuts i pensar què faré per sopar."},
{audio:"f003.mp3",en:"Sometimes I <span class='focus'>buy too much food</span> at the supermarket because I think I will need it during the week.",es:"A vegades <span class='focus'>compro massa menjar</span> al supermercat perquè penso que el necessitaré durant la setmana."},
{audio:"f004.mp3",en:"When it rains a lot and it is cold, I prefer to <span class='focus'>stay at home</span> and watch a movie.",es:"Quan plou molt i fa fred, prefereixo <span class='focus'>quedar-me a casa</span> i mirar una pel·lícula tranquil·lament."},
{audio:"f005.mp3",en:"Yesterday I went to the <span class='focus'>local market</span> because I wanted to buy fresh fruit.",es:"Ahir vaig anar al <span class='focus'>mercat del barri</span> perquè volia comprar fruita fresca."},
{audio:"f006.mp3",en:"When I enter a new shop, I like to <span class='focus'>look around</span> before deciding if I need something.",es:"Quan entro en una botiga nova, m’agrada <span class='focus'>mirar una mica tot</span> abans de decidir si necessito comprar alguna cosa."},
{audio:"f007.mp3",en:"Sometimes I <span class='focus'>stop by</span> a small café in the center because they make very good coffee.",es:"A vegades <span class='focus'>passo per</span> una cafeteria petita del centre perquè fan un cafè molt bo."},
{audio:"f008.mp3",en:"On weekends I like to <span class='focus'>walk without rushing</span> through the park and watch the people.",es:"Els caps de setmana m’agrada <span class='focus'>caminar sense pressa</span> pel parc."},
{audio:"f009.mp3",en:"When I have a <span class='focus'>free afternoon</span>, I try to read a book or listen to music.",es:"Quan tinc una <span class='focus'>tarda lliure</span>, intento llegir un llibre o escoltar música."},
{audio:"f010.mp3",en:"Sometimes I feel very tired after work, but I still try to <span class='focus'>do some exercise</span>.",es:"A vegades em sento molt cansat després de treballar però intento <span class='focus'>fer una mica d’exercici</span>."},
{audio:"f011.mp3",en:"When I meet friends I haven't seen for a long time, we <span class='focus'>spend a lot of time talking</span>.",es:"Quan quedo amb amics que fa temps que no veig, <span class='focus'>passem molta estona parlant</span>."},
{audio:"f012.mp3",en:"Sometimes it is difficult to <span class='focus'>start a conversation</span> with someone new.",es:"A vegades és difícil <span class='focus'>començar una conversa</span> amb algú nou."},
{audio:"f013.mp3",en:"This morning I <span class='focus'>left home in a hurry</span> because I thought I would arrive late.",es:"Aquest matí <span class='focus'>he sortit de casa amb pressa</span> perquè pensava que arribaria tard."},
{audio:"f014.mp3",en:"When I go to the supermarket without a list, I <span class='focus'>end up buying</span> things I don't need.",es:"Quan vaig al supermercat sense llista, <span class='focus'>acabo comprant</span> coses que no necessito."},
{audio:"f015.mp3",en:"Sometimes I start watching a series and I <span class='focus'>get hooked</span> very quickly.",es:"A vegades començo a mirar una sèrie i <span class='focus'>m’hi enganxo</span> molt ràpid."},
{audio:"f016.mp3",en:"When I cook something new, I <span class='focus'>read the recipe</span> carefully before starting.",es:"Quan cuino alguna cosa nova, <span class='focus'>llegeixo la recepta</span> amb calma abans de començar."},
{audio:"f017.mp3",en:"On Sunday mornings I like to <span class='focus'>wake up without an alarm</span>.",es:"Els diumenges al matí m’agrada <span class='focus'>llevar-me sense alarma</span>."},
{audio:"f018.mp3",en:"When I forget a word, I try to <span class='focus'>explain the idea</span> in another way.",es:"Quan oblido una paraula, intento <span class='focus'>explicar la idea</span> d’una altra manera."},
{audio:"f019.mp3",en:"Sometimes I <span class='focus'>start many things at the same time</span> and then realize it is better to finish one first.",es:"A vegades <span class='focus'>començo moltes coses alhora</span> i després veig que és millor acabar-ne una."},
{audio:"f020.mp3",en:"When I travel to a new city, I like to <span class='focus'>walk without looking at the map</span> too much.",es:"Quan viatjo a una ciutat nova, m’agrada <span class='focus'>caminar sense mirar massa el mapa</span>."},
{audio:"f021.mp3",en:"Before leaving home I always <span class='focus'>check the door</span> to make sure it is closed.",es:"Abans de sortir de casa sempre <span class='focus'>miro la porta</span> per assegurar-me que està ben tancada."},
{audio:"f022.mp3",en:"When I buy clothes, I first <span class='focus'>check the price</span>.",es:"Quan compro roba, primer <span class='focus'>miro el preu</span>."},
{audio:"f023.mp3",en:"If I have a lot of work during the day, I try to <span class='focus'>take short breaks</span>.",es:"Si tinc molta feina durant el dia, intento <span class='focus'>fer pauses curtes</span>."},
{audio:"f024.mp3",en:"Sometimes I start <span class='focus'>tidying a room</span> and find old things from the past.",es:"A vegades començo a <span class='focus'>ordenar una habitació</span> i trobo coses antigues."},
{audio:"f025.mp3",en:"When I cook pasta, I always make <span class='focus'>a little extra</span> for the next day.",es:"Quan cuino pasta, sempre en faig <span class='focus'>una mica més</span> per l’endemà."},
{audio:"f026.mp3",en:"When it is very hot in summer, I prefer to <span class='focus'>go for a walk in the evening</span>.",es:"Quan fa molta calor a l’estiu, prefereixo <span class='focus'>sortir a caminar al vespre</span>."},
{audio:"f027.mp3",en:"Sometimes I <span class='focus'>open the fridge</span> several times even if there is nothing new.",es:"A vegades <span class='focus'>obro la nevera</span> diverses vegades encara que no hi hagi res de nou."},
{audio:"f028.mp3",en:"When I meet someone new, I always <span class='focus'>arrive a few minutes early</span>.",es:"Quan quedo amb algú nou, sempre <span class='focus'>arribo uns minuts abans</span>."}
];


let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const audioObj = new Audio();

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  loadBlock(0);
}

function loadBlock(b) {
  currentBlockID = b;
  let temp = [];
  if (b === 'T') {
    temp = items.map((item, i) => ({...item, realIdx: i+1}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, items.length);
    for (let i = start; i < end; i++) {
      temp.push({...items[i], realIdx: i+1});
    }
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });

  pos = 0; learnedCount = 0;
  update(true);
}

function update(fromAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("en").textContent = "🎉 Bloc completat!";
    document.getElementById("es").textContent = "";
    document.getElementById("en").classList.remove("hidden");
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");

  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    if (fromAction) play(1.0);
  } else {
    document.getElementById("langLabel").textContent = "CATALÀ";
    document.getElementById("es").innerHTML = item.es;
    document.getElementById("es").classList.remove("hidden");
  }
  
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

// FUNCIÓN ACTUALIZADA CON PAUSA
function play(speed) {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  const newSrc = item.audio;

  // Si es la misma frase y está sonando, pausamos
  if (audioObj.src.includes(newSrc) && !audioObj.paused) {
    audioObj.pause();
  } else {
    // Si es otra frase o está pausado, reproducimos
    if (!audioObj.src.includes(newSrc)) {
      audioObj.src = newSrc;
    }
    audioObj.playbackRate = speed;
    audioObj.play().catch(() => {});
  }
}

function reveal() {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  document.getElementById("es").innerHTML = item.es;
  document.getElementById("en").innerHTML = item.en;
  document.getElementById("es").classList.remove("hidden");
  document.getElementById("en").classList.remove("hidden");
  if (mode === "ES") play(1.0);
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleList() {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden")) { box.classList.add("hidden"); return; }
  box.innerHTML = "";
  let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
  let end = currentBlockID === 'T' ? items.length : Math.min(start + 10, items.length);
  items.slice(start, end).forEach(i => {
    const d = document.createElement("div");
    d.style.padding = "10px 0"; d.style.borderBottom = "1px solid #eee";
    d.innerHTML = `<div style="color:#0f172a; font-weight:800;">${i.en}</div><div style="color:#2563eb; font-weight:700;">${i.es}</div>`;
    box.appendChild(d);
  });
  box.classList.remove("hidden");
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "unknown"; }
function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó marcada ✅");
}

const mainCheck = document.getElementById("mainCheck");

initBlocks();
</script>
</body>
</html>
