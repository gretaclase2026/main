 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast English - Estudi de Frases</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;gap:10px;margin-bottom:10px;width:100%}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0;justify-content:center}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:20px 0}
.audio-controls{display:flex;align-items:center;gap:12px;margin-bottom:15px}

.audio-btn{font-size:35px;background:#dcfce7;border:none;cursor:pointer;width:75px;height:75px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.slow{background:#fef08a;width:60px;height:60px;font-size:28px}
.audio-btn.pause{background:#fee2e2;width:60px;height:60px;font-size:28px}

.mic-btn{font-size:30px;background:#fee2e2;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s}
.mic-btn.listening{background:#ef4444; color:white; animation: pulse 1.5s infinite; transform: scale(1.1);}
@keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);} 100% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);} }

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:0;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:22px;font-weight:800;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
#answer{font-size:20px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}

#speech-feedback { font-style: italic; color: #ef4444; font-size: 19px; margin-bottom: 10px; min-height: 24px; text-align: center; transition: 0.2s;}
.speech-success { color: #22c55e !important; font-weight: bold; font-style: normal !important; }

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:15px}
.list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
.blur { filter: blur(5px); transition: filter 0.3s; cursor: pointer; }
.blur.revealed { filter: blur(0); }

.check-box-manual {
    position: absolute; top: 85px; right: 22px; width: 24px; height: 24px;
    background: #fff !important; border: 1.5px solid #22c55e !important;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: all 0.2s; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white; }
.focus{color:#334155; text-decoration: underline;}
</style>
</head>
<body>

<div class="card">
  <div class="modes">
    <div id="modeEN" class="mode en active" onclick="setMode('EN')">ANG → CAT</div>
    <div id="modeES" class="mode es" onclick="setMode('ES')">CAT → ANG</div>
  </div>

  <div class="blocks" id="blocksContainer"></div>

  <div class="main-box-container">
    <div class="counter-side">
      <span id="pos">0</span> / <span id="total">0</span>
    </div>
    
    <div class="audio-controls">
      <button class="audio-btn slow" onclick="playAudio(0.75)">🐢</button>
      <button class="audio-btn" onclick="playAudio(1.0)">🔊</button>
      <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
      <button class="mic-btn" id="micBtn" onclick="startDictation()">🎤</button>
    </div>

    <div class="progress-wrapper">
      <input type="range" id="progressBar" value="0" step="0.1">
    </div>
  </div>

  <div id="word"></div>
  <div id="speech-feedback"></div>
  <div id="answer"></div>

  <div class="actions">
    <button class="btn btn-reveal" onclick="reveal()">veure</button>
    <button class="btn btn-know" onclick="know()">ja la se</button>
    <button class="btn btn-next" onclick="next()">següent</button>
  </div>
  
  <button id="listBtn" onclick="toggleList()" style="width:100%;margin-top:20px;padding:12px;border-radius:12px;border:none;background:#e9d5ff;font-weight:bold;cursor:pointer">mostrar llista del bloc</button>
  <div id="list"></div>
</div>

<audio id="audio"></audio>

<script>
const data = [
  {audio:"f001.mp3",en:"This morning I <span class='focus'>woke up</span> a bit late because I went to bed very late last night.",es:"Aquest matí <span class='focus'>m’he despertat</span> una mica tard perquè ahir a la nit vaig anar a dormir molt tard."},
  {audio:"f002.mp3",en:"When I <span class='focus'>arrive home</span> after work, I usually sit on the sofa for a few minutes.",es:"Quan <span class='focus'>arribo a casa</span> després de la feina, normalment m’assec al sofà uns minuts."},
  {audio:"f003.mp3",en:"Sometimes I <span class='focus'>buy too much food</span> because I think I will need it.",es:"A vegades <span class='focus'>compro massa menjar</span> perquè penso que el necessitaré."},
  {audio:"f004.mp3",en:"When it rains, I prefer to <span class='focus'>stay at home</span> and watch a movie.",es:"Quan plou, prefereixo <span class='focus'>quedar-me a casa</span> i mirar una pel·lícula."},
  {audio:"f005.mp3",en:"Yesterday I went to the <span class='focus'>local market</span> because I wanted fresh fruit.",es:"Ahir vaig anar al <span class='focus'>mercat del barri</span> perquè volia fruita fresca."},
  {audio:"f006.mp3",en:"I like to <span class='focus'>look around</span> before deciding if I need something.",es:"M’agrada <span class='focus'>mirar una mica tot</span> abans de decidir si necessito alguna cosa."},
  {audio:"f007.mp3",en:"Sometimes I <span class='focus'>stop by</span> a small café because they make very good coffee.",es:"A vegades <span class='focus'>passo per</span> una cafeteria petita perquè fan un cafè molt bo."},
  {audio:"f008.mp3",en:"On weekends I like to <span class='focus'>walk without rushing</span> through the park.",es:"Els caps de setmana m’agrada <span class='focus'>caminar sense pressa</span> pel parc."},
  {audio:"f009.mp3",en:"When I have a <span class='focus'>free afternoon</span>, I try to read a book.",es:"Quan tinc una <span class='focus'>tarda lliure</span>, intento llegir un llibre."},
  {audio:"f010.mp3",en:"After work I still try to <span class='focus'>do some exercise</span>.",es:"Després de la feina encara intento <span class='focus'>fer una mica d’exercici</span>."},
  {audio:"f011.mp3",en:"When I meet friends, we <span class='focus'>spend a lot of time talking</span>.",es:"Quan quedo amb amics, <span class='focus'>passem molta estona parlant</span>."},
  {audio:"f012.mp3",en:"Sometimes it is difficult to <span class='focus'>start a conversation</span> with someone new.",es:"A vegades és difícil <span class='focus'>començar una conversa</span> amb algú nou."},
  {audio:"f013.mp3",en:"This morning I <span class='focus'>left home in a hurry</span> because I was late.",es:"Aquest matí <span class='focus'>he sortit de casa amb pressa</span> perquè arribava tard."},
  {audio:"f014.mp3",en:"Without a list, I <span class='focus'>end up buying</span> things I don't need.",es:"Sense una llista, <span class='focus'>acabo comprant</span> coses que no necessito."},
  {audio:"f015.mp3",en:"Sometimes I start a series and I <span class='focus'>get hooked</span> very quickly.",es:"A vegades començo una sèrie i <span class='focus'>m’hi enganxo</span> molt ràpid."},
  {audio:"f016.mp3",en:"I <span class='focus'>read the recipe</span> carefully before I start cooking.",es:"<span class='focus'>Llegeixo la recepta</span> amb calma abans de començar a cuinar."},
  {audio:"f017.mp3",en:"On Sundays I like to <span class='focus'>wake up without an alarm</span>.",es:"Els diumenges m’agrada <span class='focus'>llevar-me sense alarma</span>."},
  {audio:"f018.mp3",en:"When I forget a word, I <span class='focus'>explain the idea</span> in another way.",es:"Quan oblido una paraula, <span class='focus'>explico la idea</span> d’una altra manera."},
  {audio:"f019.mp3",en:"I <span class='focus'>start many things at once</span> and then I have to finish one.",es:"<span class='focus'>Començo moltes coses alhora</span> i després n'he d'acabar una."},
  {audio:"f020.mp3",en:"I like to <span class='focus'>walk without looking at the map</span>.",es:"M’agrada <span class='focus'>caminar sense mirar el mapa</span>."},
  {audio:"f021.mp3",en:"Before leaving I always <span class='focus'>check the door</span> is closed.",es:"Abans de sortir sempre <span class='focus'>miro que la porta</span> estigui tancada."},
  {audio:"f022.mp3",en:"When I buy clothes, I first <span class='focus'>check the price</span>.",es:"Quan compro roba, primer <span class='focus'>miro el preu</span>."},
  {audio:"f023.mp3",en:"If I have a lot of work, I <span class='focus'>take short breaks</span>.",es:"Si tinc molta feina, <span class='focus'>faig pauses curtes</span>."},
  {audio:"f024.mp3",en:"I start <span class='focus'>tidying a room</span> and find old things.",es:"Començo a <span class='focus'>ordenar una habitació</span> i trobo coses antigues."},
  {audio:"f025.mp3",en:"When I cook pasta, I make <span class='focus'>a little extra</span> for tomorrow.",es:"Quan cuino pasta, en faig <span class='focus'>una mica més</span> per a demà."},
  {audio:"f026.mp3",en:"In summer, I <span class='focus'>go for a walk in the evening</span>.",es:"A l’estiu, <span class='focus'>surto a caminar al vespre</span>."},
  {audio:"f027.mp3",en:"I <span class='focus'>open the fridge</span> even if there is nothing new.",es:"<span class='focus'>Obro la nevera</span> encara que no hi hagi res de nou."},
  {audio:"f028.mp3",en:"When I meet someone new, I <span class='focus'>arrive a few minutes early</span>.",es:"Quan quedo amb algú nou, <span class='focus'>arribo uns minuts abans</span>."}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;
if (recognition) { recognition.lang = 'en-US'; recognition.interimResults = false; }

function startDictation() {
    if (!recognition || currentBlockData.length === 0) return;
    const btn = document.getElementById("micBtn");
    const feedback = document.getElementById("speech-feedback");
    btn.classList.add("listening");
    feedback.textContent = "Escoltant...";
    feedback.classList.remove("speech-success");
    recognition.start();

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"").trim();
        const original = currentBlockData[pos].en.replace(/<[^>]*>/g, '').toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"").trim();
        if (transcript === original) {
            feedback.innerHTML = `"${event.results[0][0].transcript}" 🎉`;
            feedback.classList.add("speech-success");
            setTimeout(() => { feedback.textContent = ""; know(); }, 1200);
        } else {
            feedback.textContent = `"${event.results[0][0].transcript}"`;
        }
    };
    recognition.onend = () => btn.classList.remove("listening");
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "fast_english_copia"; }

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_currentBlock");
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  loadBlock((savedBlock !== null) ? (savedBlock === 'T' ? 'T' : parseInt(savedBlock)) : 0);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  if (b === 'T') {
    temp = data.map((item) => ({...item}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) temp.push({...data[i]});
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloc Completat! 🎉";
    document.getElementById("answer").innerHTML = "";
    return;
  }
  const item = currentBlockData[pos];
  const w = document.getElementById("word");
  const ans = document.getElementById("answer");
  const feedback = document.getElementById("speech-feedback");
  progressBar.value = 0;
  ans.style.display = "none";
  feedback.textContent = "";

  if (mode === "EN") {
    w.innerHTML = ``; 
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span>${item.en}</span>`;
  }
  
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function playAudio(speed) {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  if (!a.src.includes(item.audio)) { a.src = item.audio; }
  a.playbackRate = speed;
  a.play().catch(() => {});
}

function pauseAudio() { a.pause(); }

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos];
    const ans = document.getElementById("answer");
    const w = document.getElementById("word");
    if (ans.style.display === "none") {
        if (mode === "EN") w.innerHTML = `<span>${item.en}</span>`;
        ans.style.display = "block";
    } else {
        if (mode === "EN") w.innerHTML = "";
        ans.style.display = "none";
    }
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function toggleList() {
  const l = document.getElementById("list");
  if (l.style.display === "block") { l.style.display = "none"; return; }
  l.innerHTML = "<b>Llista del bloc:</b><br><br>";
  let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
  let end = currentBlockID === 'T' ? data.length : Math.min(start + 10, data.length);
  data.slice(start, end).forEach((item, index) => {
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    itemDiv.innerHTML = `
      <div style="flex:1">
        <div class="txt-es" style="font-weight:bold; font-size:14px;">${item.es}</div>
        <div id="list-rev-${index}" class="blur" style="font-weight:bold; font-size:16px;" onclick="this.classList.add('revealed')">${item.en}</div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
  l.style.display = "block";
}

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓"; element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

initBlocks();

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { markAsDone(this); };
card.appendChild(box);
</script>
</body>
</html>
