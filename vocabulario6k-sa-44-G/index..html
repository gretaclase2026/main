 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; 
            --p-blue-soft: #d4eaf7; 
            --p-blue-strong: #2196F3; 
            --p-red: #d93025;
            --p-orange: #ff9800;
            --p-green-active: #4CAF50;
            --p-green-light: #90ee90;
            --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        .card { background: white; width: 100%; max-width: 600px; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-bottom: 15px; position: relative; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; width: 100%; max-width: 600px; }
        button { border: none; padding: 12px; border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.9em; }
        .btn-menu { background: var(--p-blue-soft); color: #444; }
        .btn-menu:active { transform: scale(0.95); }
        .btn-menu.active { background: var(--p-blue-strong); color: white; }
        .input-res { width: 80%; padding: 12px; border: 3px solid var(--p-pink); border-radius: 15px; font-size: 1.2em; text-align: center; outline: none; margin: 15px 0; }
        .feedback { font-weight: bold; margin: 10px 0; min-height: 1.2em; }
        .btn-main { background: var(--p-blue-strong); color: white; padding: 15px 30px; font-size: 1em; border-radius: 50px; }
        .list-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        .list-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .hidden { display: none; }
        .star-list { cursor: pointer; color: #ccc; font-size: 1.2em; }
        .star-list.active { color: var(--p-orange); }
    </style>
</head>
<body>

    <div class="card" id="game-card">
        <h2 id="categoria-titol">Selecciona un grup</h2>
        <div id="pregunta" style="font-size: 1.5em; margin: 20px 0; font-weight: bold;">---</div>
        <input type="text" id="resposta" class="input-res" placeholder="Escriu aquí..." autocomplete="off">
        <div id="feedback-line1" class="feedback"></div>
        <div id="feedback-line2" style="color: #666; margin-bottom: 15px;"></div>
        <button class="btn-main" onclick="validar()">Comprovar</button>
        <div style="margin-top: 20px;">
            <button onclick="reproduirActual(1.0)">🔊 Normal</button>
            <button onclick="reproduirActual(0.7)">🐢 Lent</button>
            <button style="background:#eee; color:#666;" onclick="anarAlMenu()">Sortir</button>
        </div>
    </div>

    <div id="menu-principal" style="width:100%; max-width:600px;">
        <div class="menu-grid" id="botons-grups"></div>
        <div style="margin-top: 20px; text-align: center;">
            <button class="btn-main" style="background:var(--p-orange);" onclick="iniciarRepas()">★ Repassar marcades</button>
        </div>
        <div id="llista-paraules" class="card" style="margin-top: 20px;">
            <h3 id="titol-llista">Paraules del grup</h3>
            <table class="list-table"><tbody id="cos-llista"></tbody></table>
        </div>
    </div>

<script>
    let totesLesDades = [];
    let dadesJoc = [];
    let index = 0;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repasVocabulari') || '[]'));
    let correctActive = false;
    let errorActive = false;
    let idioma = 'ENG'; // Default a escoltar

    // --- MEJORA EN LA FUNCIÓN DE AUDIO ---
    function reproduir(nom, speed = 1.0) {
        if (!nom) return;
        
        // Pasamos a minúsculas y quitamos espacios al final (limpieza de seguridad)
        const nomNet = nom.toLowerCase().trim();
        
        // Intentamos primero .m4a (que es lo que tienes en las fotos de Naturalesa y Argot)
        let audio = new Audio(`audios/${nomNet}.m4a`);
        audio.playbackRate = speed;
        
        audio.play().catch(() => {
            // Si falla el .m4a, intentamos con .mp3 (que es lo que tienes en Temps)
            let audioMp3 = new Audio(`audios/${nomNet}.mp3`);
            audioMp3.playbackRate = speed;
            audioMp3.play().catch(err => console.log("No se ha trobat l'àudio:", nomNet));
        });
    }

    function reproduirActual(speed) {
        if (dadesJoc[index]) reproduir(dadesJoc[index].eng, speed);
    }

    async function carregarDades() {
        const response = await fetch('vocabulariGrups.csv');
        const text = await response.text();
        const files = text.split('\n').slice(0); 
        
        totesLesDades = files.map((f, i) => {
            const parts = f.split(';');
            if (parts.length < 3) return null;
            return { id: i, grup: parts[0].trim(), eng: parts[1].trim(), esp: parts[2].trim() };
        }).filter(d => d);

        generarMenu();
    }

    function generarMenu() {
        const grups = [...new Set(totesLesDades.map(d => d.grup))];
        const contenidor = document.getElementById('botons-grups');
        contenidor.innerHTML = grups.map(g => {
            // Si el grup es "Expressions", mostrem "Argot" al botó perquè sigui el que busques
            const nomBoto = (g === 'Expressions') ? 'Argot' : g;
            return `<button class="btn-menu" onclick="seleccionarGrup('${g}')">${nomBoto}</button>`;
        }).join('');
        document.getElementById('game-card').classList.add('hidden');
    }

    function seleccionarGrup(grup) {
        dadesJoc = totesLesDades.filter(d => d.grup === grup).sort(() => Math.random() - 0.5);
        document.getElementById('categoria-titol').innerText = (grup === 'Expressions') ? 'Argot' : grup;
        mostrarLlista(grup);
        iniciarJoc();
    }

    function mostrarLlista(grup) {
        const llista = totesLesDades.filter(d => d.grup === grup);
        document.getElementById('titol-llista').innerText = (grup === 'Expressions') ? `Llista: Argot` : `Llista: ${grup}`;
        document.getElementById('cos-llista').innerHTML = llista.map((d, i) => `
            <tr>
                <td style="color:#ccc; font-size:0.8em;">${i+1}</td>
                <td class="star-list ${repasIds.has(d.id.toString())?'active':''}" onclick="toggleEstrellaLlista('${d.id}')">★</td>
                <td><button style="background:none; border:none; cursor:pointer;" onclick="reproduir('${d.eng.replace(/'/g,"\\'")}', 1.0)">🔊</button></td>
                <td style="color:var(--p-blue-strong); font-weight:bold;">${d.eng}</td>
                <td style="color:#888; font-size:0.9em;">${d.esp}</td>
            </tr>
        `).join('');
    }

    function iniciarJoc() {
        index = 0;
        document.getElementById('menu-principal').classList.add('hidden');
        document.getElementById('game-card').classList.remove('hidden');
        prepararPregunta();
    }

    function prepararPregunta() {
        correctActive = false;
        errorActive = false;
        document.getElementById('resposta').value = "";
        document.getElementById('resposta').style.background = "white";
        document.getElementById('feedback-line1').innerText = "";
        document.getElementById('feedback-line2').innerText = "";
        
        // Alternar idioma aleatoriamente
        idioma = Math.random() > 0.5 ? 'ENG' : 'ESP';
        
        if (idioma === 'ENG') {
            document.getElementById('pregunta').innerText = "🎧 Escolta...";
            reproduirActual(1.0);
        } else {
            document.getElementById('pregunta').innerText = dadesJoc[index].esp;
        }
        document.getElementById('resposta').focus();
    }

    function validar() {
        const user = document.getElementById('resposta').value.trim().toLowerCase();
        const correct = dadesJoc[index].eng.toLowerCase().trim();

        if (user === correct) {
            document.getElementById('resposta').style.background = var(--p-green-light);
            document.getElementById('feedback-line1').style.color = "var(--p-green-active)";
            document.getElementById('feedback-line1').innerText = "Excel·lent! ✨";
            document.getElementById('feedback-line2').innerText = dadesJoc[index].eng;
            if (idioma !== 'ENG') reproduirActual(1.0);
            correctActive = true;
        } else {
            document.getElementById('resposta').style.background = "#ffcccc";
            document.getElementById('feedback-line1').style.color = "var(--p-red)";
            document.getElementById('feedback-line1').innerText = "Torna-ho a provar";
            document.getElementById('feedback-line2').innerText = `La resposta era: ${dadesJoc[index].eng}`;
            reproduirActual(0.8);
            errorActive = true;
        }
    }

    function seguent() {
        index++;
        if (index < dadesJoc.length) prepararPregunta();
        else anarAlMenu();
    }

    function anarAlMenu() {
        document.getElementById('menu-principal').classList.remove('hidden');
        document.getElementById('game-card').classList.add('hidden');
    }

    function toggleEstrellaLlista(id) {
        id = id.toString();
        if (repasIds.has(id)) repasIds.delete(id);
        else repasIds.add(id);
        localStorage.setItem('repasVocabulari', JSON.stringify([...repasIds]));
        // Actualizamos visualmente sin recargar todo
        const elements = document.querySelectorAll('.star-list');
        // (Simplificado: recargamos la lista para asegurar)
        const grupActual = document.getElementById('categoria-titol').innerText;
        // Si el título es Argot, recordamos que el grupo real es Expressions
        const grupReal = (grupActual === 'Argot') ? 'Expressions' : grupActual;
        if(grupReal !== "Selecciona un grup") mostrarLlista(grupReal);
    }

    function iniciarRepas() {
        if (repasIds.size === 0) return alert("No tens paraules marcades!");
        dadesJoc = totesLesDades.filter(d => repasIds.has(d.id.toString())).sort(() => Math.random() - 0.5);
        document.getElementById('categoria-titol').innerText = "Repàs ★";
        iniciarJoc();
    }

    // Escuchar teclas (Enter para validar/continuar)
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (correctActive) seguent();
            else if (errorActive) prepararPregunta();
            else validar();
        }
    });

    carregarDades();
</script>
</body>
</html>
