b<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Estudiar Vocabulari</title>
    <style>
        :root { --p-blue: #d4eaf7; --p-green: #b9fbc0; --p-red: #ffcfd2; --p-yellow: #fbf8cc; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', sans-serif; background: #faf9f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-card { background: white; width: 100%; max-width: 450px; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 6px solid var(--p-blue); }
        select, textarea { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--p-blue); margin-bottom: 15px; font-size: 16px; }
        h1 { font-size: 2.8em; margin: 15px 0; color: #5b8fb9; }
        input { width: 80%; padding: 15px; font-size: 1.2em; border-radius: 20px; border: 2px solid #eee; text-align: center; outline: none; margin-bottom: 20px; }
        .btn { padding: 15px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-check { background: var(--p-blue); color: #4a7a96; }
        .btn-next { background: var(--p-green); color: #3e7e44; }
        .btn-speaker { background: var(--p-yellow); font-size: 1.8em; width: 55px; height: 55px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: none; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-top: 30px; width: 100%; max-width: 450px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 15px 15px 0 0; background: #eee; cursor: pointer; }
        .tab.active { background: white; font-weight: bold; border: 2px solid #eee; border-bottom: none; }
        .list-area { background: white; width: 100%; max-width: 450px; border-radius: 0 0 20px 20px; padding: 15px; border: 2px solid #eee; border-top: none; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #f9f9f9; }
        .error-local { background: var(--p-red); padding: 15px; border-radius: 15px; font-size: 0.9em; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="setup-section">
            <select id="selector" onchange="carregarFitxer(this.value)">
                <option value="">Tria un tema (Només GitHub)</option>
            </select>
            
            <div id="manual-input" class="error-local">
                <p><b>Estàs en mode local:</b> El navegador no pot llegir els teus fitxers CSV automàticament. Enganxa el contingut del teu Excel aquí per començar:</p>
                <textarea id="csv-paste" placeholder="Exemple: Poma,apple"></textarea>
                <button class="btn btn-check" onclick="carregarManual()">Carregar Vocabulari</button>
            </div>
        </div>

        <div id="joc" style="display:none;">
            <div id="feedback" style="height:25px; font-weight:bold;"></div>
            <h1 id="pregunta">---</h1>
            <input type="text" id="resposta" placeholder="Escriu en anglès..." autocomplete="off">
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                <button class="btn-speaker" onclick="sonar()">🔊</button>
                <button class="btn btn-check" onclick="validar()">Comprovar</button>
                <button id="next" class="btn btn-next" style="display:none;" onclick="seguent()">Següent →</button>
            </div>
            <br>
            <button onclick="location.reload()" style="background:none; border:none; color:gray; cursor:pointer; font-size:0.8em;">⇠ Canviar de tema</button>
        </div>
    </div>

    <div id="info-extra" style="display:none; width: 100%; max-width: 450px;">
        <div class="tabs">
            <button id="tab-tot" class="tab active" onclick="canviarTab('tot')">Tot el vocabulari</button>
            <button id="tab-rep" class="tab" onclick="canviarTab('rep')">Per repassar (<span id="num-rep">0</span>)</button>
        </div>
        <div class="list-area">
            <table><tbody id="taula"></tbody></table>
        </div>
    </div>

<script>
    let dades = [];
    let repàs = [];
    let i = 0;

    // Intentar cargar temas (solo funcionará en GitHub)
    fetch('temas.txt').then(r => r.text()).then(text => {
        const menu = document.getElementById('selector');
        text.split('\n').filter(t => t.trim()).forEach(t => {
            let o = document.createElement('option');
            o.value = t.trim() + ".csv";
            o.textContent = t.trim().toUpperCase();
            menu.appendChild(o);
        });
        document.getElementById('manual-input').style.display = 'none';
    }).catch(() => {
        console.log("Estàs treballant en local.");
    });

    async function carregarFitxer(f) {
        const res = await fetch(f);
        processarText(await res.text());
    }

    function carregarManual() {
        processarText(document.getElementById('csv-paste').value);
    }

    function processarText(text) {
        dades = text.split('\n').filter(l => l.includes(',')).map(l => {
            const p = l.split(',');
            return { cat: p[0].trim(), eng: p[1].trim() };
        });
        if(dades.length > 0) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('joc').style.display = 'block';
            document.getElementById('info-extra').style.display = 'block';
            canviarTab('tot');
            nouRepte();
        }
    }

    function nouRepte() {
        document.getElementById('pregunta').innerText = dades[i].cat;
        document.getElementById('resposta').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('next').style.display = 'none';
        document.getElementById('resposta').focus();
    }

    function validar() {
        const user = document.getElementById('resposta').value.trim().toLowerCase();
        const correcte = dades[i].eng.toLowerCase();
        const f = document.getElementById('feedback');
        if (user === correcte) {
            f.innerText = "Molt bé! ✨"; f.style.color = "#3e7e44";
            sonar();
            document.getElementById('next').style.display = 'inline-block';
        } else {
            f.innerText = "Error ❌"; f.style.color = "#e74c3c";
            if (!repàs.find(item => item.eng === dades[i].eng)) {
                repàs.push(dades[i]);
                document.getElementById('num-rep').innerText = repàs.length;
            }
        }
    }

    function sonar() { new Audio("audios/" + dades[i].eng.toLowerCase() + ".mp3").play(); }
    function seguent() { i = (i + 1) % dades.length; nouRepte(); }

    function canviarTab(tipus) {
        document.getElementById('tab-tot').classList.toggle('active', tipus === 'tot');
        document.getElementById('tab-rep').classList.toggle('active', tipus === 'rep');
        const llista = (tipus === 'tot') ? dades : repàs;
        document.getElementById('taula').innerHTML = llista.map(item => `<tr><td>${item.cat}</td><td style="color:#4a90e2"><b>${item.eng}</b></td></tr>`).join('');
    }

    document.getElementById('resposta').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('next').style.display === 'none') validar();
            else seguent();
        }
    });
</script>
</body>
</html>
