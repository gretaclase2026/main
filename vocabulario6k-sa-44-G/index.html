 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>El meu Vocabulari - GitHub</title>
    <style>
        :root { --p-pink: #ffcfd2; --p-blue: #d4eaf7; --p-green: #b9fbc0; --p-yellow: #fbf8cc; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 550px; padding: 30px; border-radius: 40px; box-shadow: 0 15px 35px rgba(255,182,193,0.3); text-align: center; border: 8px solid var(--p-pink); }
        .progress-container { width: 100%; height: 18px; background: #ffeef0; border-radius: 10px; margin-bottom: 25px; overflow: hidden; border: 2px solid var(--p-pink); }
        #bar { height: 100%; width: 0%; transition: width 0.1s linear; }
        .bg-estudi { background: #4CAF50; transition: width 0.5s !important; }
        .bg-audio { background: #5b8fb9; }
        h1 { font-size: 2.2em; margin: 15px 0; color: #d88a8a; min-height: 1.2em; }
        input[type="text"] { width: 85%; padding: 18px; font-size: 1.2em; border-radius: 25px; border: 3px solid var(--p-pink); text-align: center; outline: none; margin-bottom: 20px; background: #fffafa; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn-check { background: var(--p-blue); color: #5b8fb9; }
        .btn-skip { background: var(--p-yellow); color: #b08d00; }
        .btn-next { background: var(--p-green); color: #3e7e44; }
        .audio-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btn-speaker { background: var(--p-yellow); font-size: 2em; width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .slow-label { font-size: 1.5em; cursor: pointer; filter: grayscale(1); }
        .slow-label.active { filter: grayscale(0); transform: scale(1.2); }
        .list-area { margin-top: 30px; background: white; width: 100%; max-width: 550px; border-radius: 25px; padding: 20px; border: 3px solid var(--p-pink); box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #fff0f2; }
    </style>
</head>
<body>
    <div class="card">
        <div id="setup-section">
            <h2 style="color:#d88a8a">🌸 Carrega el Vocabulari 🌸</h2>
            <div style="background: var(--p-yellow); padding: 25px; border-radius: 25px; border: 3px dashed #d88a8a; margin: 20px 0;">
                <input type="file" accept=".csv" id="csvFileInput" onchange="carregarFitxer(this)">
            </div>
            <p style="font-size: 0.8em; color: gray;">Tria el teu arxiu .csv</p>
        </div>
        <div id="joc" style="display:none;">
            <div class="progress-container"><div id="bar" class="bg-estudi"></div></div>
            <div id="feedback" style="height:25px; font-weight:bold; margin-bottom: 10px;"></div>
            <h1 id="pregunta">---</h1>
            <input type="text" id="resposta" placeholder="Escriu en anglès..." autocomplete="off">
            <div class="controls">
                <div class="audio-box">
                    <button class="btn-speaker" onclick="sonar()">🔊</button>
                    <span id="tortuga" class="slow-label" onclick="toggleSlow()">🐢</span>
                </div>
                <button id="btn-comprovar" class="btn btn-check" onclick="validar()">Comprovar</button>
                <button id="btn-skip" class="btn btn-skip" onclick="saltar()">No la sé</button>
                <button id="next" class="btn btn-next" style="display:none;" onclick="seguent()">Següent →</button>
            </div>
            <p><a href="#" onclick="location.reload()" style="color:gray; font-size:0.8em; margin-top:20px; display:block;">⇠ Canviar fitxer</a></p>
        </div>
    </div>
    <div id="info-extra" style="display:none;" class="list-area">
        <table><tbody id="taula"></tbody></table>
    </div>
<script>
    let dades = [], i = 0, isSlow = false;
    let audioObject = null;

    function carregarFitxer(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.readAsText(input.files[0], "UTF-8");
        reader.onload = (e) => {
            const lines = e.target.result.split(/\r?\n/);
            dades = lines.map(line => {
                const parts = line.split(/[;,]/);
                if (parts.length >= 2) return { cat: parts[0].trim(), eng: parts[1].trim() };
                return null;
            }).filter(item => item && item.cat && item.eng);
            if (dades.length > 0) {
                document.getElementById('setup-section').style.display = 'none';
                document.getElementById('joc').style.display = 'block';
                document.getElementById('info-extra').style.display = 'block';
                nouRepte();
                actualitzarLlista();
            }
        };
    }

    function nouRepte() {
        document.getElementById('pregunta').innerText = dades[i].cat;
        document.getElementById('resposta').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('next').style.display = 'none';
        document.getElementById('btn-comprovar').style.display = 'inline-block';
        document.getElementById('btn-skip').style.display = 'inline-block';
        const bar = document.getElementById('bar');
        bar.className = 'bg-estudi';
        bar.style.width = ((i / dades.length) * 100) + "%";
        document.getElementById('resposta').focus();
    }

    function sonar() {
        if (audioObject) { audioObject.pause(); audioObject.currentTime = 0; }
        let nomAudio = dades[i].eng.toLowerCase().trim();
        audioObject = new Audio("audios/" + nomAudio + ".mp3");
        audioObject.playbackRate = isSlow ? 0.5 : 1.0;
        const bar = document.getElementById('bar');
        audioObject.onplay = () => { bar.className = 'bg-audio'; bar.style.width = "0%"; };
        audioObject.ontimeupdate = () => {
            if (audioObject.duration) bar.style.width = (audioObject.currentTime / audioObject.duration) * 100 + "%";
        };
        audioObject.onended = () => { setTimeout(nouRepte, 300); };
        audioObject.play().catch(() => { bar.className = 'bg-estudi'; });
    }

    function validar() {
        if (document.getElementById('resposta').value.trim().toLowerCase() === dades[i].eng.toLowerCase()) {
            document.getElementById('feedback').innerText = "Molt bé! ✨";
            document.getElementById('feedback').style.color = "#3e7e44";
            sonar();
            mostrarSeguent();
        } else {
            document.getElementById('feedback').innerText = "❌ Revisa-ho";
            document.getElementById('feedback').style.color = "#e74c3c";
        }
    }

    function saltar() {
        document.getElementById('feedback').innerText = "Era: " + dades[i].eng;
        document.getElementById('feedback').style.color = "#d88a8a";
        sonar();
        mostrarSeguent();
    }

    function mostrarSeguent() {
        document.getElementById('next').style.display = 'inline-block';
        document.getElementById('btn-comprovar').style.display = 'none';
        document.getElementById('btn-skip').style.display = 'none';
    }

    function toggleSlow() { isSlow = !isSlow; document.getElementById('tortuga').classList.toggle('active', isSlow); }

    function seguent() { i = (i + 1) % dades.length; nouRepte(); }

    function actualitzarLlista() {
        document.getElementById('taula').innerHTML = dades.map(item => `<tr><td>${item.cat}</td><td style="color:#d88a8a"><b>${item.eng}</b></td></tr>`).join('');
    }

    document.getElementById('resposta').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('next').style.display === 'none') validar();
            else seguent();
        }
    });
</script>
</body>
</html>
