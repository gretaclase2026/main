 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Estudiar Vocabulari</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        select, input { padding: 12px; width: 80%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; margin: 5px; }
        button:hover { background: #218838; }
        .audio-btn { background: #17a2b8; }
        .feedback { margin-top: 15px; font-size: 1.2em; font-weight: bold; }
        .hidden { display: none; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; background: white; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h3>Selecciona un tema per estudiar:</h3>
    <select id="menu-temas" onchange="cargarCSV(this.value)">
        <option value="">-- Carregant temes... --</option>
    </select>

    <div id="zona-juego" class="hidden">
        <hr>
        <p>Tradueix a l'anglès:</p>
        <h1 id="palabra-actual"></h1>
        <input type="text" id="entrada-usuario" placeholder="Escriu aquí..." autocomplete="off">
        <br>
        <button onclick="comprovar()">Comprovar</button>
        <button class="audio-btn" onclick="reproducir()">Escultar</button>
        <p id="mensaje" class="feedback"></p>
        <button id="btn-seguent" class="hidden" onclick="siguiente()" style="background:#007bff">Següent paraula</button>
    </div>
</div>

<div id="lista-completa" class="hidden">
    <table><tbody id="tabla-cuerpo"></tbody></table>
</div>

<script>
    let vocabulario = [];
    let indice = 0;

    // 1. Cargar la lista maestra al abrir la web
    async function cargarListaMaestra() {
        try {
            const respuesta = await fetch('temas.txt');
            const texto = await respuesta.text();
            const lineas = texto.split('\n').filter(l => l.trim() !== "");
            const menu = document.getElementById('menu-temas');
            menu.innerHTML = '<option value="">-- Tria un tema --</option>';
            lineas.forEach(tema => {
                let opt = document.createElement('option');
                opt.value = tema.trim() + ".csv";
                opt.innerText = tema.trim().toUpperCase();
                menu.appendChild(opt);
            });
        } catch (e) {
            alert("Error cargando temas.txt. Asegúrate de que el archivo existe.");
        }
    }

    // 2. Cargar el archivo CSV seleccionado
    async function cargarCSV(archivo) {
        if (!archivo) return;
        const respuesta = await fetch(archivo);
        const texto = await respuesta.text();
        const lineas = texto.split('\n').filter(l => l.includes(','));
        
        vocabulario = lineas.map(l => {
            const partes = l.split(',');
            return { cat: partes[0].trim(), eng: partes[1].trim() };
        });

        document.getElementById('zona-juego').classList.remove('hidden');
        document.getElementById('lista-completa').classList.remove('hidden');
        mostrarLista();
        indice = 0;
        mostrarPalabra();
    }

    function mostrarPalabra() {
        document.getElementById('palabra-actual').innerText = vocabulario[indice].cat;
        document.getElementById('entrada-usuario').value = "";
        document.getElementById('mensaje').innerText = "";
        document.getElementById('btn-seguent').classList.add('hidden');
        document.getElementById('entrada-usuario').focus();
    }

    function comprovar() {
        const user = document.getElementById('entrada-usuario').value.trim().toLowerCase();
        const correct = vocabulario[indice].eng.toLowerCase();
        const msj = document.getElementById('mensaje');
        
        if (user === correct) {
            msj.innerText = "Correcte! ✨";
            msj.style.color = "green";
            reproducir();
            document.getElementById('btn-seguent').classList.remove('hidden');
        } else {
            msj.innerText = "Torna-ho a intentar ❌";
            msj.style.color = "red";
        }
    }

    function reproducir() {
        const audio = new Audio("audios/" + vocabulario[indice].eng.toLowerCase() + ".mp3");
        audio.play().catch(() => console.log("Audio no trobat"));
    }

    function siguiente() {
        indice = (indice + 1) % vocabulario.length;
        mostrarPalabra();
    }

    function mostrarLista() {
        const cuerpo = document.getElementById('tabla-cuerpo');
        cuerpo.innerHTML = vocabulario.map(i => `<tr><td>${i.cat}</td><td><b>${i.eng}</b></td></tr>`).join('');
    }

    // Detectar tecla Enter
    document.getElementById('entrada-usuario').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('btn-seguent').classList.contains('hidden')) comprovar();
            else siguiente();
        }
    });

    // Iniciar
    cargarListaMaestra();
</script>
</body>
</html>
