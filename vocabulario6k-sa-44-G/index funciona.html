 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App Vocabulari</title>
    <style>
        :root { --p-pink: #ffcfd2; --p-blue: #2196F3; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .card { background: white; width: 95%; max-width: 500px; padding: 20px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-top: 20px; }
        
        /* Disseny del Menú Inicial */
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 20px; margin: 10px 0; border-radius: 20px; width: 100%; font-size: 1.4em; font-weight: bold; color: var(--p-blue); cursor: pointer; display: block; }
        .menu-btn:active { background: var(--p-pink); color: white; }

        .config-bar { display: flex; justify-content: space-around; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 15px; }
        #pregunta { font-size: 2.2em; color: var(--p-blue); margin: 20px 0; min-height: 1.2em; }
        #resposta { width: 100%; padding: 15px; font-size: 1.5em; border-radius: 15px; border: 3px solid var(--p-pink); text-align: center; box-sizing: border-box; }
        
        .btn-audio { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 2em; margin: 10px; cursor: pointer; }
        .accent-selector { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .flag-btn { font-size: 2.5em; cursor: pointer; filter: grayscale(1); transition: 0.3s; background: none; border: none; }
        .flag-btn.active { filter: grayscale(0); transform: scale(1.2); }
        
        .btn-check { background: var(--p-blue); color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.2em; margin-top: 15px; width: 100%; }
        .btn-next { background: #4caf50; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.2em; width: 100%; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h2 style="color: var(--p-pink)">Tria el que vols practicar:</h2>
        <button class="menu-btn" onclick="carregarLlista('vocabulariA.csv')">Lletra A</button>
        <button class="menu-btn" onclick="carregarLlista('vocabularijk.csv')">Lletres J i K</button>
        <p style="font-size: 0.8em; color: #999;">Clica per començar sense buscar fitxers</p>
    </div>

    <div class="card" id="joc" style="display:none;">
        <div class="config-bar">
            <span id="labelMode" style="font-weight:bold; font-size: 0.9em;">CAT → ENG</span>
            <label><input type="checkbox" id="checkRepas" onchange="filtrar()"> ⭐</label>
            <button onclick="location.reload()" style="border:none; background:none; color:var(--p-blue); font-size:0.8em;">Canviar Llista</button>
        </div>

        <div id="feedback" style="height:30px; font-weight:bold; font-size: 1.2em;"></div>
        <h1 id="pregunta">---</h1>

        <input type="text" id="resposta" autocomplete="off" spellcheck="false">

        <div class="accent-selector">
            <button id="accUS" class="flag-btn active" onclick="setAccent('us')">🇺🇸</button>
            <button id="accUK" class="flag-btn" onclick="setAccent('uk')">🇬🇧</button>
        </div>

        <div class="controls">
            <button class="btn-audio" style="background:#d4eaf7" onclick="reproduir(1.0)">🔊</button>
            <button class="btn-audio" style="background:#f0faff" onclick="reproduir(0.5)">🐢</button>
            <br>
            <button id="btn-comprovar" class="btn-check" onclick="validar()">Comprovar</button>
            <button id="btn-next" class="btn-next" style="display:none;" onclick="seguent()">Següent →</button>
        </div>
    </div>

<script>
    let dadesTotals = [], dadesFiltrades = [], i = 0, repasIds = new Set();
    let accentActual = 'us';

    async function carregarLlista(nomFitxer) {
        try {
            // Això busca el fitxer que està a la mateixa carpeta de GitHub que l'index
            const response = await fetch(nomFitxer);
            if (!response.ok) throw new Error();
            const text = await response.text();
            
            const lines = text.split(/\r?\n/);
            dadesTotals = lines.map((l, idx) => {
                const p = l.split(';');
                return (p[0] && p[1]) ? { id: idx + 1, cat: p[0].trim(), eng: p[1].trim() } : null;
            }).filter(item => item);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('joc').style.display = 'block';
            filtrar();
        } catch (e) {
            alert("Error: El fitxer " + nomFitxer + " no s'ha trobat a GitHub.");
        }
    }

    function setAccent(acc) {
        accentActual = acc;
        document.getElementById('accUS').classList.toggle('active', acc === 'us');
        document.getElementById('accUK').classList.toggle('active', acc === 'uk');
    }

    function filtrar() {
        const nomesRepas = document.getElementById('checkRepas').checked;
        dadesFiltrades = dadesTotals.filter(d => nomesRepas ? repasIds.has(d.id) : true);
        dadesFiltrades.sort(() => Math.random() - 0.5);
        i = 0;
        nouRepte();
    }

    function nouRepte() {
        if (dadesFiltrades.length === 0) return;
        const p = dadesFiltrades[i];
        document.getElementById('pregunta').innerText = p.cat;
        document.getElementById('resposta').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('btn-comprovar').style.display = "block";
        document.getElementById('resposta').focus();
    }

    function validar() {
        const p = dadesFiltrades[i];
        const userText = document.getElementById('resposta').value.trim().toLowerCase();
        if (userText === p.eng.toLowerCase()) {
            document.getElementById('feedback').innerText = "Molt bé! ✨";
            document.getElementById('feedback').style.color = "green";
            reproduir(1.0);
            setTimeout(seguent, 1000);
        } else {
            document.getElementById('feedback').innerText = "Era: " + p.eng.toUpperCase();
            document.getElementById('feedback').style.color = "red";
            document.getElementById('btn-comprovar').style.display = "none";
            document.getElementById('btn-next').style.display = "block";
            reproduir(1.0);
        }
    }

    function seguent() {
        i = (i + 1) % dadesFiltrades.length;
        nouRepte();
    }

    function reproduir(vel) {
        const p = dadesFiltrades[i];
        const nomBase = p.eng.toLowerCase().trim();
        const fitxer = accentActual === 'uk' ? `${nomBase}_uk.mp3` : `${nomBase}.mp3`;
        const audio = new Audio("audios/" + fitxer);
        audio.playbackRate = vel;
        audio.play().catch(e => console.log("Error àudio"));
    }
</script>
</body>
</html>
