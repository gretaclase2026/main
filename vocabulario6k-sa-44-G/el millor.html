 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari - Control Total</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; 
            --p-blue-soft: #d4eaf7; 
            --p-blue-strong: #2196F3; 
            --p-turquesa-claret: #e0f7f9; 
            --p-turquesa-fort: #40c4ff; 
            --p-yellow: #FFF176; 
            --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        .card { background: white; width: 100%; max-width: 650px; padding: 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 8px solid var(--p-pink); text-align: center; box-sizing: border-box; }
        
        /* Contenedor para botones en dos columnas */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 15px 10px; border-radius: 20px; width: 100%; font-size: 1.1em; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; box-sizing: border-box; }
        .menu-btn:active { background: var(--p-pink); color: white; }

        .config-bar { background: #fff; padding: 12px 18px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--p-pink); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .idioma-group { display: flex; flex-direction: column; gap: 4px; }
        .btn-lang { background: var(--p-turquesa-claret); color: #00838f; border: none; padding: 5px 15px; border-radius: 15px; font-size: 0.75em; font-weight: bold; cursor: pointer; min-width: 120px; text-align: center; }
        .btn-lang.active { background: var(--p-turquesa-fort); color: white; }
        .input-rango { width: 50px; padding: 5px; font-size: 1em; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-weight: bold; }
        .netejar-btn { margin-left: auto; color: #ff5252; background: none; border: none; cursor: pointer; font-size: 0.85em; font-weight: bold; }
        
        #pregunta { font-size: 2.5em; color: var(--p-blue-strong); margin: 15px 0; display: inline-block; vertical-align: middle; min-height: 1.2em; }
        .star-main { font-size: 2.5em; cursor: pointer; color: #ccc; vertical-align: middle; margin-left: 10px; }
        .star-main.active { color: #FFD700; }
        
        #resposta { width: 90%; padding: 15px; font-size: 1.8em; border-radius: 20px; border: 3px solid var(--p-pink); text-align: center; outline: none; margin-bottom: 20px; background: #fffafa; font-weight: bold; box-sizing: border-box; }
        
        .btn-audio { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 2em; display: inline-flex; align-items: center; justify-content: center; margin: 5px; }
        .btn-speaker { background: var(--p-blue-soft); color: #5b8fb9; }
        .btn-tortuga { background: #f0faff; color: #888; border: 1px solid #d4eaf7; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-check { background: var(--p-blue-soft); color: #5b8fb9; }
        .btn-skip { background: var(--p-yellow); color: #856404; }
        .btn-next { background: #b9fbc0; color: #3e7e44; }
        
        .list-area { width: 100%; max-width: 650px; background: white; margin-top: 25px; border-radius: 25px; padding: 10px 15px; border: 3px solid var(--p-pink); box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 1.25em; }
        td { padding: 8px; border-bottom: 1px solid #f9f9f9; text-align: left; }
        .star-list { color: #FFD700; font-size: 1.5em; font-weight: bold; }

        /* Estilo para el altavoz de la lista */
        .btn-mini-audio { background: none; border: none; cursor: pointer; font-size: 1em; padding: 0 5px; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h2 style="color: var(--p-blue-strong)">Tria la lliçó:</h2>
        <div class="grid-menu">
            <button class="menu-btn" onclick="carregarLlista('vocabulariA.csv')">Lletra A</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariB.csv')">Lletra B</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariC.csv')">Lletra C</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariD.csv')">Lletra D</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariE.csv')">Lletra E</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariF.csv')">Lletra F</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariGHI.csv')">Lletra G H i I</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariH.csv')">Lletra H</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariI.csv')">Lletra I</button>
            <button class="menu-btn" onclick="carregarLlista('vocabularijk.csv')">Lletres J i K</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariL.csv')">Lletra L</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariM.csv')">Lletra M</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariN.csv')">Lletra N</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariO.csv')">Lletra O</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariP.csv')">Lletra P</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariQ.csv')">Lletra Q</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariR.csv')">Lletra R</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariS.csv')">Lletra S</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariT.csv')">Lletra T</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariU.csv')">Lletra U</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariVideoWolfs.csv')">QUEEN WOLF</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariSalut.csv')">SALUT</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariTemps.csv')">TEMPS</button>
            <button class="menu-btn" onclick="carregarLlista('vocabulariViatge.csv')">VIATGE</button>
        </div>
    </div>

    <div id="joc" style="display:none; width: 100%; max-width: 650px; flex-direction: column; align-items: center;">
        <div class="card">
            <div class="config-bar">
                <div class="idioma-group">
                    <button id="btnCat" class="btn-lang active" onclick="setMode('cat-eng')">CAT → ENG</button>
                    <button id="btnEng" class="btn-lang" onclick="setMode('eng-cat')">ENG → CAT</button>
                </div>
                <span>De: <input type="number" id="rangoInici" class="input-rango" value="1" onchange="filtrar()"></span>
                <span>A: <input type="number" id="rangoFi" class="input-rango" value="100" onchange="filtrar()"></span>
                <label style="cursor:pointer; font-weight:bold;"><input type="checkbox" id="checkRepas" onchange="filtrar()"> ⭐</label>
                <button class="netejar-btn" onclick="desmarcarTot()">Netejar ⭐</button>
            </div>

            <div id="feedback" style="height:45px; font-weight:bold; font-size: 1.35em;"></div>
            
            <div>
                <h1 id="pregunta">---</h1>
                <span id="starPregunta" class="star-main" onclick="toggleRepasActual()">★</span>
            </div>

            <input type="text" id="resposta" placeholder="..." autocomplete="off" autofocus autocorrect="off" autocapitalize="none" spellcheck="false">

            <div class="controls">
                <button class="btn-audio btn-speaker" onclick="reproduir(1.0)">🔊</button>
                <button class="btn-audio btn-tortuga" onclick="reproduir(0.5)">🐢</button>
                <br>
                <button id="btn-comprovar" class="btn btn-check" onclick="validar()">Comprovar</button>
                <button id="btn-skip" class="btn btn-skip" onclick="saltar()">No la sé</button>
                <button id="btn-next" class="btn btn-next" style="display:none;" onclick="seguent()">Següent →</button>
            </div>
            <button onclick="location.reload()" style="margin-top:25px; border:none; background:none; color:var(--p-blue-strong); cursor:pointer; font-size: 1.4em; font-weight: bold;">🔙 Menú</button>
        </div>

        <div id="llista-container" class="list-area">
            <table><tbody id="taula-cos"></tbody></table>
        </div>
    </div>

<script>
    let dadesTotals = [], dadesFiltrades = [], i = 0, repasIds = new Set();
    let estatError = false, modeJoc = 'cat-eng', revelat = false;

    async function carregarLlista(nomFitxer) {
        try {
            const response = await fetch(nomFitxer);
            const text = await response.text();
            const lines = text.split(/\r?\n/);
            dadesTotals = lines.map((l, idx) => {
                const p = l.split(';');
                return (p[0] && p[1]) ? { id: idx + 1, cat: p[0].trim(), eng: p[1].trim() } : null;
            }).filter(item => item);
            
            document.getElementById('rangoFi').value = dadesTotals.length;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('joc').style.display = 'flex';
            filtrar();
        } catch (e) { alert("Error carregant el fitxer de GitHub"); }
    }

    function setMode(m) {
        modeJoc = m;
        document.getElementById('btnCat').classList.toggle('active', modeJoc === 'cat-eng');
        document.getElementById('btnEng').classList.toggle('active', modeJoc === 'eng-cat');
        filtrar();
    }

    function filtrar() {
        const inici = parseInt(document.getElementById('rangoInici').value) || 1;
        const fi = parseInt(document.getElementById('rangoFi').value) || dadesTotals.length;
        const nomesRepas = document.getElementById('checkRepas').checked;
        dadesFiltrades = dadesTotals.filter(d => (d.id >= inici && d.id <= fi) && (nomesRepas ? repasIds.has(d.id) : true));
        dadesFiltrades.sort(() => Math.random() - 0.5);
        i = 0;
        if (dadesFiltrades.length > 0) nouRepte();
        actualitzarTaula();
    }

    function nouRepte() {
        const p = dadesFiltrades[i];
        if (!p) return;
        estatError = false; revelat = false;
        if (modeJoc === 'cat-eng') {
            document.getElementById('pregunta').innerText = p.cat;
        } else {
            document.getElementById('pregunta').innerText = "???";
            reproduir(1.0);
        }
        document.getElementById('resposta').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('btn-comprovar').style.display = "inline-block";
        document.getElementById('btn-skip').style.display = "inline-block";
        document.getElementById('starPregunta').classList.toggle('active', repasIds.has(p.id));
        document.getElementById('resposta').focus();
    }

    function toggleRepasActual() {
        const p = dadesFiltrades[i];
        if (repasIds.has(p.id)) repasIds.delete(p.id);
        else repasIds.add(p.id);
        document.getElementById('starPregunta').classList.toggle('active', repasIds.has(p.id));
        actualitzarTaula();
    }

    function validar() {
        const p = dadesFiltrades[i];
        const correcte = (modeJoc === 'cat-eng') ? p.eng : p.cat;
        const textUser = document.getElementById('resposta').value.trim();
        if (modeJoc === 'eng-cat' && !revelat && textUser === "") {
            document.getElementById('pregunta').innerText = p.eng;
            revelat = true; return;
        }
        if (textUser === "") { saltar(); return; }
        if (textUser.toLowerCase() === correcte.toLowerCase()) {
            document.getElementById('feedback').innerText = "Molt bé! ✨";
            document.getElementById('feedback').style.color = "green";
            if (modeJoc === 'cat-eng') reproduir(1.0);
            setTimeout(seguent, 800);
        } else {
            document.getElementById('feedback').innerText = "Era: " + correcte.toUpperCase();
            document.getElementById('feedback').style.color = "red";
            estatError = true;
            if (modeJoc === 'eng-cat') document.getElementById('pregunta').innerText = p.eng;
        }
    }

    function saltar() {
        const p = dadesFiltrades[i];
        const correcte = (modeJoc === 'cat-eng') ? p.eng : p.cat;
        document.getElementById('feedback').innerText = correcte.toUpperCase();
        document.getElementById('feedback').style.color = "var(--p-blue-strong)";
        document.getElementById('btn-comprovar').style.display = "none";
        document.getElementById('btn-skip').style.display = "none";
        document.getElementById('btn-next').style.display = "inline-block";
        if (modeJoc === 'cat-eng') reproduir(1.0);
        if (modeJoc === 'eng-cat') document.getElementById('pregunta').innerText = p.eng;
    }

    function seguent() { i = (i + 1) % dadesFiltrades.length; nouRepte(); }

    function reproduir(vel, paraulaEspecifica = null) {
        const paraula = paraulaEspecifica || dadesFiltrades[i].eng.trim();
        let audio = new Audio("audios/" + paraula + ".mp3");
        
        audio.onerror = () => {
            let audioMin = new Audio("audios/" + paraula.toLowerCase() + ".mp3");
            audioMin.playbackRate = vel;
            audioMin.play().catch(() => {
                console.log("No s'ha trobat l'àudio: " + paraula);
            });
        };

        audio.playbackRate = vel;
        audio.play().catch(() => {});
    }

    function desmarcarTot() { if(confirm("Netejar estrelles?")) { repasIds.clear(); filtrar(); } }

    function actualitzarTaula() {
        document.getElementById('taula-cos').innerHTML = dadesTotals.map(d => `
            <tr>
                <td style="color:#ccc; width:35px; font-size:0.75em;">${d.id}</td>
                <td style="width:30px; text-align:center;">${repasIds.has(d.id) ? '<span class="star-list">★</span>' : ''}</td>
                <td style="color:var(--p-blue-strong); font-weight:bold;">
                    <button class="btn-mini-audio" onclick="reproduir(1.0, '${d.eng.replace(/'/g, "\\'")}')">🔊</button>
                    ${d.eng}
                </td>
                <td style="color:#666;">${d.cat}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('btn-next').style.display === 'inline-block') { seguent(); return; }
            if (estatError) { document.getElementById('resposta').value = ""; document.getElementById('feedback').innerText = ""; estatError = false; return; }
            validar();
        }
    });
</script>
</body>
</html>
