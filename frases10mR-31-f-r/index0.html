 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulari Social C1 - Pràctica Completa</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;gap:10px;margin-bottom:10px;width:100%}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:20px 0}
.audio-controls{display:flex;align-items:center;gap:12px;margin-bottom:15px}

.audio-btn{font-size:35px;background:#dcfce7;border:none;cursor:pointer;width:75px;height:75px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.slow{background:#fef08a;width:60px;height:60px;font-size:28px}
.audio-btn.pause{background:#fee2e2;width:60px;height:60px;font-size:28px}
.star-main { background: none; border: none; font-size: 35px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 5px; }
.star-main.active { color: #f59e0b !important; }

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:0;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:24px;font-weight:800;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
#answer{font-size:20px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

.list-toggle-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-list-main { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e9d5ff; font-weight: bold; cursor: pointer; }
.btn-stars-main { background: #fef3c7; color: #92400e; }

/* Estils Llista amb botons verticals */
#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:10px}
.list-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; }
.list-btns-col { display: flex; flex-direction: column; gap: 8px; align-items: center; min-width: 45px; }
.list-texts { flex-grow: 1; display: flex; flex-direction: column; line-height: 1.3; }
.mini-btn { border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.btn-audio-list { background: #dcfce7; }
.btn-eye-list { background: #fee2e2; }
.star-list { background: none; border: none; font-size: 22px; color: #cbd5e1; cursor: pointer; padding: 0; }
.star-list.active { color: #f59e0b !important; }
.blur { filter: blur(5px); transition: filter 0.3s; cursor: pointer; }
.blur.revealed { filter: blur(0); }

.check-box-manual {
    position: absolute; top: 85px; right: 22px; width: 24px; height: 24px;
    background: #fff !important; border: 1.5px solid #22c55e !important;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: all 0.2s; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white; }
</style>
</head>
<body>

<div class="card">
  <div class="modes">
    <div id="modeEN" class="mode en active" onclick="setMode('EN')">ENG → ESP</div>
    <div id="modeES" class="mode es" onclick="setMode('ES')">ESP → ENG</div>
  </div>

  <div class="blocks" id="blocksContainer"></div>

  <div class="main-box-container">
    <div class="counter-side">
      <span id="pos">0</span> / <span id="total">0</span>
    </div>
    
    <div class="audio-controls">
      <button class="star-main" id="starMain" onclick="toggleStar()">★</button>
      <button class="audio-btn slow" onclick="playAudio(0.75)">🐢</button>
      <button class="audio-btn" onclick="playAudio(1.0)">🔊</button>
      <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
    </div>

    <div class="progress-wrapper">
      <input type="range" id="progressBar" value="0" step="0.1">
    </div>
  </div>

  <div id="word"></div>
  <div id="answer"></div>

  <div class="actions">
    <button class="btn btn-reveal" onclick="reveal()">veure</button>
    <button class="btn btn-know" onclick="know()">ja la se</button>
    <button class="btn btn-next" onclick="next()">següent</button>
  </div>
  
  <div class="list-toggle-btns">
    <button class="btn-list-main" onclick="toggleList('all')">llista del bloc</button>
    <button class="btn-list-main btn-stars-main" onclick="toggleList('stars')">favorites (★)</button>
  </div>
  <div id="list"></div>
</div>

<audio id="audio"></audio>

<script>
const data = [

  {en: "I felt the weather was perfect, so we sat outside all night.", es: "Sentí que el tiempo era perfecto, así que nos quedamos fuera toda la noche"},
  {en: "You ought to try this wine, it's the best I've had in a long time.", es: "Deberías probar este vino, es lo mejor que he probado en mucho tiempo"},
  {en: "Could you give me some further details about what you did yesterday?", es: "¿Podrías darme más detalles sobre lo que hicisteis ayer?"},
  {en: "We should be at the restaurant within fifteen minutes if there's no traffic.", es: "Deberías estar en el restaurante en quince minutos si no hay tráfico"},
  {en: "I've just tidied up the living room so everything looks spotless for the guests.", es: "Acabo de ordenar el salón para que todo se vea impecable para los invitados"},
  {en: "They told me they got along with the neighbors right from the start.", es: "Me dijeron que se llevaron bien con los vecinos desde el principio"},
  {en: "By the way, I brought some wine so you wouldn't have to walk back and forth to the store.", es: "Por cierto, traje un poco de vino para que no tuvieras que ir y venir a la tienda"},
  {en: "To be honest, I thought we would be there within ten minutes, but we got lost.", es: "Para ser sincera, pensé que estaríamos allí en diez minutos, pero nos perdimos"},
  {en: "Actually, we saw each other yesterday and ate at that new place which is spotless.", es: "De hecho, nos vimos ayer y comimos en ese sitio nuevo que está impecable"},
  {en: "If you ask me, you should receive an answer from them within three days.", es: "Si me preguntas a mí, deberías recibir una respuesta por su parte en tres días"},
  {en: "By the way, my sister and I have got along really well since we were kids.", es: "Por cierto, mi hermana y yo nos llevamos muy bien desde que somos pequeñas"},
  {en: "Truth be told, I knew it was the right way back as soon as I saw the park.", es: "A decir verdad, supe que era el camino de vuelta en cuanto vi el parque"},
  {en: "By the way, I bought these flowers to thank you for giving us further details.", es: "Por cierto, compré estas flores para agradecerte que nos dieras más detalles"},
  {en: "To be honest, I understood I ought to have embraced the challenge when I spoke to them.", es: "Para ser sincera, entendí que debía aceptar el reto cuando hablé con ellos"},
  {en: "As I was saying, the weather was perfect, so we sat outside all night.", es: "Como decía, el tiempo fue perfecto, así que nos quedamos fuera toda la noche"},
  {en: "By the way, you don't have to walk back and forth; I'll bring the plates.", es: "Por cierto, no hace falta que vayas y vuelvas; yo traeré los platos"},
  {en: "Truth be told, you ought to try this wine, it's the best I've had in years.", es: "A decir verdad, deberías probar este vino, es lo mejor que he tomado en años"},
  {en: "Actually, I got lost and I couldn't find my way back without the GPS.", es: "De hecho, me perdí y no pude encontrar el camino de vuelta sin el GPS"},
  {en: "By the way, could you give me some further details about what you did yesterday?", es: "Por cierto, ¿podrías darme más detalles sobre lo que hicisteis ayer?"},
  {en: "To be honest, the restaurant is very close, we'll be there within ten minutes.", es: "Para ser sincera, el restaurante está muy cerca, estaremos allí en diez minutos"},
  {en: "Actually, I've tidied up the terrace and it's spotless for the dinner.", es: "De hecho, he limpiado la terraza y ha quedado impecable para la cena"},
  {en: "By the way, I hope the weather is perfect tomorrow, knock on wood.", es: "Por cierto, espero que el tiempo sea perfecto mañana, toquemos madera"},
  {en: "As I was saying, we get along really well because we have very similar tastes.", es: "Como decía, nos llevamos muy bien porque tenemos gustos muy parecidos"},
  {en: "If you ask me, you ought to embrace new challenges to improve your fluency.", es: "Si me preguntas a mí, deberías aceptar nuevos retos para mejorar tu fluidez"},
  {en: "By the way, did you bring the dessert we bought at that spotless bakery?", es: "Por cierto, ¿trajiste el postre que compramos en esa pastelería tan limpia?"},
  {en: "Truth be told, I'm glad you didn't have to walk back and forth so much.", es: "A decir verdad, me alegra que no tuvieras que caminar tanto de un lado a otro"},

  {en: "I'm in two minds about going out tonight; part of me just wants to stay in.", es: "Estoy indecisa sobre si salir esta noche; una parte de mí solo quiere quedarse en casa"},
  {en: "Better safe than sorry, so I'll bring a jacket just in case it gets chilly.", es: "Más vale prevenir que curar, así que llevaré una chaqueta por si refresca"},
  {en: "I can't quite put my finger on it, but something feels different in this room.", es: "No sabría decir exactamente qué es, pero algo se siente diferente en esta habitación"},
  {en: "We ended up staying at that café for hours because the coffee was so good.", es: "Acabamos quedándonos en esa cafetería durante horas porque el café estaba muy bueno"},
  {en: "It's not really my cup of tea, but I'm willing to give it a try if you like it.", es: "No es mucho de mi agrado, pero estoy dispuesta a probarlo si a ti te gusta"},
  {en: "I need to figure out how to set up this new app before the meeting starts.", es: "Necesito averiguar cómo configurar esta nueva aplicación antes de que empiece la reunión"},
  {en: "Long story short, we missed the train and had to take a very expensive taxi.", es: "Resumiendo, perdimos el tren y tuvimos que coger un taxi carísimo"},
  {en: "As far as I'm concerned, this is the best restaurant in the whole city.", es: "Por lo que a mí respecta, este es el mejor restaurante de toda la ciudad"},
  {en: "I'm really looking forward to seeing everyone at the dinner next weekend.", es: "Tengo muchísimas ganas de ver a todo el mundo en la cena del próximo fin de semana"},
  {en: "Don't worry, it's not the end of the world if we don't finish everything today.", es: "No te preocupes, no es el fin del mundo si no lo terminamos todo hoy"},
  {en: "I've been feeling a bit under the weather lately, so I've been resting a lot.", es: "Me he estado sintiendo un poco pachucha últimamente, así que he estado descansando mucho"},
  {en: "You've hit the nail on the head; that's exactly what I was trying to say.", es: "Has dado en el clavo; eso es exactamente lo que estaba intentando decir"},
  {en: "I'll keep my fingers crossed that you get the job, you really deserve it.", es: "Cruzaré los dedos para que consigas el trabajo, realmente te lo mereces"},
  {en: "It's on the tip of my tongue, but I just can't remember the name of that place.", es: "Lo tengo en la punta de la lengua, pero no consigo recordar el nombre de ese sitio"},
  {en: "I'm swamped with work this week, so I won't be able to join you for lunch.", es: "Estoy inundada de trabajo esta semana, así que no podré ir contigo a comer"},
  {en: "It's up to you; I don't mind which movie we watch as long as there's popcorn.", es: "Tú decides; no me importa qué película veamos mientras haya palomitas"},
  {en: "I'll get round to fixing that leaky faucet as soon as I have a spare moment.", es: "Sacaré tiempo para arreglar ese grifo que gotea en cuanto tenga un momento libre"}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "social_c1"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_currentBlock");
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);

  const blockToLoad = (savedBlock !== null) ? (savedBlock === 'T' ? 'T' : parseInt(savedBlock)) : 0;
  loadBlock(blockToLoad);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  if (b === 'T') {
    temp = data.map((item, i) => ({...item, realIdx: i+1}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) temp.push({...data[i], realIdx: i+1});
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloque Completado! 🎉";
    document.getElementById("answer").innerHTML = "";
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));
  const w = document.getElementById("word");
  const ans = document.getElementById("answer");
  progressBar.value = 0;

  if (mode === "EN") {
    w.innerHTML = ``; 
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div style='font-size:22px;' class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span style="font-size:24px;">${item.en}</span>`;
  }
  ans.style.display = "none";
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx || (currentBlockData.length > 0 ? currentBlockData[pos].realIdx : null);
  if (!idx) return;
  if (starredIds.includes(idx)) starredIds = starredIds.filter(id => id !== idx);
  else starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  if (!forcedIdx) update();
}

function playAudio(speed, forcedIdx = null) {
  const num = forcedIdx || (currentBlockData.length > 0 ? currentBlockData[pos].realIdx : null);
  if (!num) return;
  const fileName = "frase" + num + ".mp3";
  if (!a.src.includes(fileName)) { a.src = fileName; }
  a.playbackRate = speed;
  a.play().catch(() => {});
}

function pauseAudio() { a.pause(); }

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos];
    if (mode === "EN") document.getElementById("word").innerHTML = `<span style="color:#333;">${item.en}</span>`;
    document.getElementById("answer").style.display = "block";
    if (mode === "ES") playAudio(1.0); 
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function toggleList(type) {
  const l = document.getElementById("list");
  if (l.style.display === "block" && l.dataset.type === type) { l.style.display = "none"; return; }
  l.dataset.type = type;
  renderList(type);
  l.style.display = "block";
}

function renderList(type) {
  const l = document.getElementById("list");
  l.innerHTML = type === 'stars' ? "<b>Favorites (★):</b><br><br>" : "<b>Llista del bloc:</b><br><br>";
  
  let listToRender = [];
  if (type === 'stars') {
    listToRender = data.map((item, index) => ({...item, realIdx: index+1})).filter(i => starredIds.includes(i.realIdx));
  } else {
    let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
    let end = currentBlockID === 'T' ? data.length : Math.min(start + 10, data.length);
    listToRender = data.slice(start, end).map((item, index) => ({...item, realIdx: start + index + 1}));
  }

  if (listToRender.length === 0) { l.innerHTML += "<i>Buit.</i>"; return; }

  listToRender.forEach((item, index) => {
    const isStarred = starredIds.includes(item.realIdx);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    itemDiv.innerHTML = `
      <div class="list-btns-col">
        <button class="star-list ${isStarred ? 'active' : ''}" onclick="toggleStar(${item.realIdx}); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio-list" onclick="playAudio(1.0, ${item.realIdx})">🔊</button>
        <button class="mini-btn btn-eye-list" onclick="document.getElementById('list-rev-${index}').classList.add('revealed')">👁️</button>
      </div>
      <div class="list-texts">
        <div class="txt-es" style="font-weight:bold; font-size:14px;">${item.es}</div>
        <div id="list-rev-${index}" class="blur" style="font-weight:bold; font-size:16px;" onclick="this.classList.add('revealed')">${item.en}</div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
}

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓"; element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

initBlocks();

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { markAsDone(this); };
card.appendChild(box);
</script>
</body>
</html>
