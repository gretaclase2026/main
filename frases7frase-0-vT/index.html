.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex: 0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1)}
.block.all-btn { background: #e2e8f0; color: #475569; }
.audio-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2; color: inherit;} 
.audio-btn.rec{background:#fca5a5; color: white;}
.audio-btn.stt{background:#dbeafe; font-size: 22px;}

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
.listening { animation: pulse 1.5s infinite; background: #90caf9 !important; color: #0f172a !important; }
.recording { animation: pulse 1.5s infinite; background: #f48fb1 !important; color: white !important; }

.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }
.hidden{display:none}

.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

.know{background:#dcfce7}

</style>
</head>

<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">Anglès → Català</button></div>
 <div class="unit-number">7</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">Català → Anglès</button></div>
</header>

<main>

  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>

 </div>
 
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100" step="0.1"></div>

 <div id="es" class="es hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>
 
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
 <div class="list-controls">
    <button class="list-btn" onclick="toggleList('all')">Tota la llista</button>
    <button class="list-btn review-btn" onclick="toggleList('stars')">Repàs (★)</button>
 </div>
 <div id="endMsg" class="hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>
<div id="puntos-header">⭐ <span id="val-puntos">0</span></div>

let recognition, isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;

    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            fullTranscript += event.results[i][0].transcript + " ";
        }
        compareSentences(currentBlockData[pos].en, fullTranscript.trim());
    };
}

function normalizeText(text) {
    if (!text) return "";
    let clean = text.toLowerCase().replace(/[’‘]/g, "'");
    clean = clean.replace(/[.,?!"]/g, "").trim();
    let words = clean.split(/\s+/);
    return words.map(word => {
        let key = word.replace("'", ""); 
        return normalizationMap[word] || normalizationMap[key] || word;
    }).join(" ");
}

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const normOriginal = normalizeText(original);
    const normSpoken = normalizeText(spoken);
    const normOriginalWords = normOriginal.split(/\s+/);
    const normSpokenWords = normSpoken.split(/\s+/);
    const origWordsRaw = original.split(/\s+/);
    
    let resultHTML = "";
    let sIdx = 0;
    let correctCount = 0;

    normOriginalWords.forEach((normWord, index) => {
        const originalWordRaw = origWordsRaw[index];
        let matched = false;
        if (sIdx < normSpokenWords.length && normSpokenWords[sIdx] === normWord) {
            resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
            sIdx++;
            matched = true;
            correctCount++;
        } else {
            for (let j = sIdx + 1; j < sIdx + 5 && j < normSpokenWords.length; j++) {
                if (normSpokenWords[j] === normWord) {
                    for (let k = sIdx; k < j; k++) {
                        resultHTML += `<span class="word-error">${normSpokenWords[k]}</span>`;
                    }
                    resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
                    sIdx = j + 1;
                    matched = true;
                    correctCount++;
                    break;
                }
            }
        }
        if (!matched) resultHTML += `<span class="word-missing">${originalWordRaw}</span>`;
    });
    feedbackDiv.innerHTML = resultHTML;

    let score = correctCount / normOriginalWords.length;
    if (score >= 0.95) {
        fallos = 0;
        document.getElementById('btn-rescat').style.display = 'none';
        if (window.executarAciertoFinal) window.executarAciertoFinal();
        setTimeout(() => { know(); }, 3000);
    } else {
        fallos++;
        if (fallos >= 3) {
            document.getElementById('btn-rescat').style.display = 'block';
        }
    }
}

function rescueAction() {
    if (!starredIds.includes(currentBlockData[pos].audio)) {
        toggleStar();
    }
    document.getElementById('btn-rescat').style.display = 'none';
    fallos = 0;
    if (window.executarAciertoFinal) window.executarAciertoFinal();
}

function toggleMic() {
    if (!recognition) { alert("Navegador no suportat."); return; }
    if (isListening) {
        recognition.stop();
    } else {
        if (isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            document.querySelectorAll('.recording').forEach(b => b.classList.remove('recording'));
        }
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start();
    }
}

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            if (isListening) recognition.stop();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
        } catch (err) { alert("Error al accedir al micròfon."); }
    } else {
        mediaRecorder.stop(); 
        isRecording = false;
        btn.classList.remove("recording");
    }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_puntoLibro");
  container.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "block all-btn";
  allBtn.textContent = "T";
  allBtn.onclick = () => loadAll();
  container.appendChild(allBtn);
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  if (savedBlock === "all") loadAll();
  else loadBlock((savedBlock !== null) ? parseInt(savedBlock) : 0);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_puntoLibro", b);
  let temp = [];
  let start = b * 10;
  let end = Math.min(start + 10, items.length);
  for (let i = start; i < end; i++) temp.push({...items[i]});
  currentBlockData = temp;
  document.querySelectorAll(".block").forEach((btn, idx) => { btn.classList.toggle("active", idx === (b + 1)); });
  pos = 0; learnedCount = 0; fallos = 0;
  document.getElementById("endMsg").classList.add("hidden");
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}

function loadAll() {
  currentBlockID = -1;
  localStorage.setItem(getFolderName() + "_puntoLibro", "all");
  currentBlockData = items.map(i => ({...i}));
  document.querySelectorAll(".block").forEach((btn, idx) => { btn.classList.toggle("active", idx === 0); });
  pos = 0; learnedCount = 0; fallos = 0;
  document.getElementById("endMsg").classList.add("hidden");
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}

let autoMicTimer;

function startTimer() {
    clearTimeout(autoMicTimer);
    let timeLeft = 10;
    const feedback = document.getElementById("speechFeedback");
    
    autoMicTimer = setInterval(() => {
        timeLeft--;
        feedback.innerHTML = `<span style="color:#64748b; font-size:14px;">Micro automàtic en ${timeLeft}s...</span>`;
        if (timeLeft <= 0) {
            clearInterval(autoMicTimer);
            feedback.innerHTML = "";
            if (!isListening) toggleMic();
        }
    }, 1000);
}

function update(fromAction = false) {
  clearTimeout(autoMicTimer);
  if (currentBlockData.length === 0) {
    document.getElementById("en").classList.add("hidden");
    document.getElementById("es").classList.add("hidden");
    document.getElementById("speechFeedback").innerHTML = "";
    document.getElementById("endMsg").classList.remove("hidden");
    document.getElementById('btn-rescat').style.display = 'none';
    return;
  }
  progressBar.value = 0;
  const item = currentBlockData[pos];
  
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");
  document.getElementById("speechFeedback").innerHTML = "";
  document.getElementById("starBtn").classList.toggle("active", starredIds.includes(item.audio));

  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    document.getElementById("en").innerHTML = item.en;
    document.getElementById("es").innerHTML = item.es;
    if (fromAction) playAudio(item.audio, 1.0);
  } else {
    document.getElementById("langLabel").textContent = "CASTELLÀ";
    document.getElementById("es").innerHTML = item.es;
    document.getElementById("en").innerHTML = item.en;
    document.getElementById("es").classList.remove("hidden");
    if (fromAction) startTimer();
  }
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

function playAudio(audioFile, speed) {
  audioObj.src = audioFile; 
  audioObj.playbackRate = speed;
  audioObj.onended = () => {
    if (mode === "EN") {
        setTimeout(() => {
          if (!isListening) toggleMic();
        }, 1000); 
    }
  };
  audioObj.play().catch(err => console.log("Error con audio:", audioFile));
}

function playCurrent(speed) { if (currentBlockData.length > 0) playAudio(currentBlockData[pos].audio, speed); }
function pauseAudio() { audioObj.pause(); }

function reveal() {
  if (currentBlockData.length === 0) return;
  const esEl = document.getElementById("es");
  const enEl = document.getElementById("en");
  
  if (mode === "EN") {
    if (enEl.classList.contains("hidden")) {
        enEl.classList.remove("hidden");
        esEl.classList.remove("hidden");
    } else {
        playCurrent(1.0);
    }
  } else {
    enEl.classList.toggle("hidden");
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++; 
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  fallos = 0;
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  fallos = 0;
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleStar(forcedId = null) {
  const audio = forcedId || currentBlockData[pos].audio;
  if (starredIds.includes(audio)) starredIds = starredIds.filter(id => id !== audio);
  else starredIds.push(audio);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  const starBtn = document.getElementById("starBtn");
  if(starBtn) starBtn.classList.toggle("active", starredIds.includes(currentBlockData[pos].audio));
}

function clearAllStars() {
  if (confirm("Vols eliminar totes les estrelles de la llista?")) {
    starredIds = [];
    localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
    
    const starBtn = document.getElementById("starBtn");
    if(starBtn) starBtn.classList.remove("active");
    
    const box = document.getElementById("listBox");
    if (!box.classList.contains("hidden")) {
      renderList(box.dataset.activeType);
    }
  }
}

function toggleList(type) {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden") && box.dataset.activeType === type) { box.classList.add("hidden"); return; }
  box.dataset.activeType = type;
  renderList(type);
  box.classList.remove("hidden");
}

function renderList(type) {
  const box = document.getElementById("listBox");
  if (type === 'stars') {
    box.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 style="margin:0;">Frases destacades (★):</h3>
        <button onclick="clearAllStars()" style="background:#fee2e2; color:#dc2626; border:none; padding:4px 8px; border-radius:8px; font-size:10px; font-weight:800; cursor:pointer;">NETEJAR TOT 🗑️</button>
      </div>`;
  } else {
    box.innerHTML = "";
  }

  let listToRender = [];
  if (type === 'stars') listToRender = items.filter(i => starredIds.includes(i.audio));
  else listToRender = (currentBlockID === -1) ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10);
  
  if (listToRender.length === 0) { 
    box.innerHTML += "<p style='padding:10px;'>Buit.</p>"; 
    return; 
  }

  listToRender.forEach((i, index) => {
    const isStarred = starredIds.includes(i.audio);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    const recId = `rec-list-${index}`;
    itemDiv.innerHTML = `
      <div class="list-controls-side">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.audio}'); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio" onclick="playAudio('${i.audio}', 1.0)">🔊</button>
        <button class="mini-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button>
      </div>
      <div class="list-texts">
        <div style="color:#2563eb; font-weight:700;">${i.es}</div>
        <div id="rev-${index}" class="blur" style="font-weight:800;" onclick="this.classList.toggle('revealed')">${i.en}</div>
      </div>
    `;
    box.appendChild(itemDiv);
  });
}

function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
}

if (localStorage.getItem(getFolderName())) { 
    const mc = document.getElementById("mainCheck");
    if(mc) { mc.innerHTML = "✓"; mc.classList.add('marked'); }
}

(function() {
    let xp = parseInt(localStorage.getItem('global_xp')) || 0;
    const marcador = document.getElementById('val-puntos');
    if(marcador) marcador.textContent = xp;

    window.executarAciertoFinal = function() {
        xp += 10;
        localStorage.setItem('global_xp', xp);
        if(marcador) marcador.textContent = xp;

        const est = document.getElementById('estrella-animada');
        est.style.display = "block";
        est.style.transition = "none";
        est.style.opacity = "0";
        est.style.transform = "translate(-50%, -50%) scale(0)";
        void est.offsetWidth; 
        
        est.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        est.style.opacity = "1";
        est.style.transform = "translate(-50%, -50%) scale(1.4)";
        
        setTimeout(() => {
            est.style.opacity = "0";
            est.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { est.style.display = "none"; }, 500);
        }, 1000);
    };
})();

initBlocks();
</script>
