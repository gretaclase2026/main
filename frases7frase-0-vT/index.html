 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nevertheless - Pràctica con Puntos</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
.unit-badge { color: #2563eb; padding: 0 10px; font-weight: bold; font-size: 24px; }

.modes{display:flex;gap:10px;width:100%}\n.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;justify-content:center}
.block{background:#eee;padding:8px 14px;border-radius:12px;cursor:pointer;font-weight:bold;border:none;font-size:14px}
.block.active{background:#2563eb;color:#fff}

.counter{text-align:center;font-size:14px;margin-bottom:10px;color:#666;font-weight:bold}
.word-box{text-align:center;margin:15px 0;min-height:70px;display:flex;flex-direction:column;justify-content:center;align-items:center}
#word{font-size:22px;font-weight:bold;color:#1a1a1a;margin-bottom:10px;line-height:1.3}
#answer{font-size:20px;color:#2563eb;font-weight:bold;display:none;margin-top:5px}

.audio-section{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px}
.progress-container{width:100%;max-width:300px;display:flex;align-items:center;gap:10px}
#progressBar{flex:1;cursor:pointer}

.actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
button.act{border:none;padding:14px 22px;border-radius:18px;font-weight:bold;cursor:pointer;font-size:15px;transition:0.2s;display:flex;align-items:center;gap:8px}
.btn-play{background:#dcfce7;color:#166534}
.btn-slow{background:#fef9c3;color:#854d0e}
.btn-reveal{background:#dbeafe;color:#1e40af}
.btn-next{background:#2563eb;color:#fff}
.btn-mic{background:#f1f5f9;color:#475569;border:2px solid #cbd5e1}
.btn-mic.listening{background:#fee2e2;border-color:#ef4444;color:#b91c1c;animation:pulse 1.5s infinite}

@keyframes pulse{0%{opacity:1}50%{opacity:0.6}100%{opacity:1}}

#speech-feedback{margin-top:15px;text-align:center;min-height:30px;font-size:18px;line-height:1.5}
.word-correct{color:#16a34a;font-weight:bold}
.word-error{color:#dc2626;text-decoration:line-through;opacity:0.6}
.word-missing{color:#ca8a04;font-style:italic}

/* Estilos de la lista */
#list{margin-top:20px;border-top:1px solid #eee;padding-top:15px;display:none}
.list-item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid #f1f1f1}
.list-item:last-child{border:0}
.blur{filter:blur(4px);cursor:pointer;transition:0.2s;font-size:14px;color:#2563eb}
.blur.revealed{filter:blur(0)}
.mini-btn-list{border:none;width:34px;height:34px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.mini-btn-list.rec.active{background:#ef4444;color:#fff}

.star-main{background:none;border:none;font-size:28px;cursor:pointer;color:#ccc;transition:0.2s}
.star-main.active{color:#f59e0b}

/* Botón OK de Rescate */
#btn-rescat {
    display: none;
    margin: 15px auto;
    padding: 12px 25px;
    background: #22c55e;
    color: white;
    border: none;
    border-radius: 50px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3);
}

.check-box-manual{position:absolute;top:20px;right:20px;width:32px;height:32px;border:2px solid #ddd;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;color:transparent;transition:0.2s}
.check-box-manual.marked{background:#22c55e;border-color:#22c55e;color:white}
</style>
</head>
<body>

<div class="card">
  <div class="header-row">
    <div class="unit-badge">11</div>
    <div class="modes">
      <div id="modeEN" class="mode en active" onclick="setMode('EN')">ESPAÑOL -> INGLÉS</div>
      <div id="modeES" class="mode es" onclick="setMode('ES')">INGLÉS -> ESPAÑOL</div>
    </div>
  </div>

  <div id="blocksContainer" class="blocks"></div>

  <div class="counter"><span id="pos">0</span> / <span id="total">0</span></div>

  <div class="word-box">
    <div id="word"></div>
    <div id="answer"></div>
  </div>

  <div class="audio-section">
    <div class="progress-container">
      <button class="star-main" id="starMain" onclick="toggleStar()">★</button>
      <input type="range" id="progressBar" value="0" step="0.1">
    </div>
    <div class="actions">
      <button class="act btn-play" onclick="playAudio(1.0)"><span>🔊</span></button>
      <button class="act btn-slow" onclick="playAudio(0.6)"><span>🐌</span></button>
      <button id="speechBtn" class="act btn-mic" onclick="toggleDictation()"><span>🎤</span></button>
      <button id="recBtn" class="act btn-mic" onclick="toggleRecording('recBtn')"><span>🔴</span></button>
      <button class="act btn-reveal" onclick="toggleReveal()">👁️</button>
      <button class="act btn-next" onclick="know()">✓</button>
    </div>
    <button id="btn-rescat" onclick="window.executarAciertoFinal()">IT IS OK</button>
  </div>

  <div id="speech-feedback"></div>

  <div style="display:flex;gap:10px;margin-top:10px">
    <button class="block" style="flex:1" onclick="toggleList('current')">Lista Bloque</button>
    <button class="block" style="flex:1" onclick="toggleList('stars')">Favoritos ★</button>

  <div id="list"></div>
</div>

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
let xp = parseInt(localStorage.getItem('global_xp')) || 0;
let fallos = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

/* --- SISTEMA VISUAL DE PUNTOS --- */
function crearElementosPuntos() {
    if (!document.getElementById('puntos-header')) {
        const header = document.createElement('div');
        header.id = 'puntos-header';
        header.style = "position: fixed; top: 15px; left: 15px; background: #fef3c7; color: #92400e; padding: 6px 16px; border-radius: 25px; font-weight: 900; border: 2px solid #f59e0b; z-index: 9999; display: flex; align-items: center; gap: 6px; font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);";
        header.innerHTML = `⭐ <span id="val-puntos">${xp}</span>`;
        document.body.appendChild(header);
    }
    if (!document.getElementById('estrella-animada')) {
        const estrella = document.createElement('div');
        estrella.id = 'estrella-animada';
        estrella.style = "position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; z-index: 10000; pointer-events: none; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);";
        estrella.textContent = "⭐";
        document.body.appendChild(estrella);
    }
}

window.executarAciertoFinal = function() {
    xp += 10;
    localStorage.setItem('global_xp', xp);
    document.getElementById('val-puntos').textContent = xp;

    const est = document.getElementById('estrella-animada');
    est.style.opacity = "1";
    est.style.transform = "translate(-50%, -50%) scale(1.4)";
    setTimeout(() => {
        est.style.opacity = "0";
        est.style.transform = "translate(-50%, -50%) scale(0)";
    }, 1000);

    fallos = 0;
    document.getElementById('btn-rescat').style.display = 'none';
    know();
};

/* --- VOZ --- */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onstart = () => { isListening = true; document.getElementById("speechBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("speechBtn").classList.remove("listening"); };
    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        compareSentences(currentBlockData[pos].en, text);
    };
}

function normalize(t) { return t.toLowerCase().replace(/[.,?!"]/g, "").trim(); }

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speech-feedback");
    const normOriginal = normalize(original);
    const normSpoken = normalize(spoken);
    
    const origWords = original.split(/\s+/);
    const spokenWords = normSpoken.split(/\s+/);
    let resultHTML = "";
    let correctCount = 0;

    original.split(/\s+/).forEach((word, i) => {
        const nWord = normalize(word);
        if (spokenWords.includes(nWord)) {
            resultHTML += `<span class="word-correct">${word}</span> `;
            correctCount++;
        } else {
            resultHTML += `<span class="word-missing">${word}</span> `;
        }
    });
    
    feedbackDiv.innerHTML = resultHTML;

    if (correctCount / origWords.length >= 0.8) {
        setTimeout(window.executarAciertoFinal, 600);
    } else {
        fallos++;
        if (fallos >= 3) document.getElementById('btn-rescat').style.display = 'block';
    }
}

function toggleDictation() {
    if (!recognition) return alert("Navegador no compatible");
    isListening ? recognition.stop() : recognition.start();
}

/* --- GRABACIÓN --- */
let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let currentRecordingBtnId = null;

async function toggleRecording(btnId) {
  const btn = document.getElementById(btnId);
  if (isRecording) { stopRecordingProcess(btn); return; }
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];
  mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
  mediaRecorder.onstop = () => {
    const url = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/mpeg' }));
    new Audio(url).play();
  };
  mediaRecorder.start();
  isRecording = true;
  currentRecordingBtnId = btnId;
  btn.classList.add("active");
}

function stopRecordingProcess(btn) {
    if (mediaRecorder) mediaRecorder.stop();
    isRecording = false;
    if (btn) btn.classList.remove("active");
}

/* --- LOGICA GENERAL --- */
function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "u11"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  loadBlock(0);
  crearElementosPuntos();
}

function loadBlock(b) {
  currentBlockID = b;
  let start = b * 10, end = Math.min(start + 10, data.length);
  currentBlockData = data.slice(start, end).map((item, i) => ({...item, realIdx: start + i + 1})).sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === b));
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true);
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloque Completado! 🎉";
    document.getElementById("answer").innerHTML = "";
    return;
  }
  fallos = 0;
  document.getElementById('btn-rescat').style.display = 'none';
  document.getElementById("speech-feedback").innerHTML = "";
  
  const item = currentBlockData[pos];
  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));
  
  if (mode === "EN") {
    document.getElementById("word").innerHTML = "";
    document.getElementById("answer").innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    document.getElementById("word").innerHTML = `<div class="txt-es">${item.es}</div>`;
    document.getElementById("answer").innerHTML = `<span class="txt-en">${item.en}</span>`;
  }
  document.getElementById("answer").style.display = "none";
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx || currentBlockData[pos].realIdx;
  starredIds.includes(idx) ? starredIds = starredIds.filter(id => id !== idx) : starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  update();
}

function playAudio(speed, forcedIdx = null) {
  const num = forcedIdx || currentBlockData[pos].realIdx;
  a.src = "frase" + num + ".mp3";
  a.playbackRate = speed;
  a.play().catch(() => {});
}

function toggleReveal() {
  const ans = document.getElementById("answer");
  const wrd = document.getElementById("word");
  if (ans.style.display === "none") {
    if (mode === "EN") wrd.innerHTML = `<span class="txt-en">${currentBlockData[pos].en}</span>`;
    ans.style.display = "block";
  } else {
    if (mode === "EN") wrd.innerHTML = "";
    ans.style.display = "none";
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function toggleList(type) {
  const l = document.getElementById("list");
  l.style.display = (l.style.display === "block") ? "none" : "block";
  if (l.style.display === "block") renderList(type);
}

function renderList(type) {
  const l = document.getElementById("list");
  l.innerHTML = "";
  let items = (type === 'stars') ? data.map((it, i) => ({...it, realIdx: i+1})).filter(it => starredIds.includes(it.realIdx)) : data.slice(currentBlockID*10, currentBlockID*10+10).map((it, i) => ({...it, realIdx: currentBlockID*10+i+1}));
  
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.innerHTML = `
      <button class="star-main ${starredIds.includes(item.realIdx)?'active':''}" onclick="toggleStar(${item.realIdx}); renderList('${type}')">★</button>
      <button class="mini-btn-list" style="background:#dcfce7" onclick="playAudio(1.0, ${item.realIdx})">🔊</button>
      <div style="flex:1">
        <div style="font-weight:bold">${item.es}</div>
        <div class="blur" onclick="this.classList.toggle('revealed')">${item.en}</div>
      </div>
    `;
    l.appendChild(div);
  });
}

function markAsDone(el) {
  localStorage.setItem(getFolderName() + "_done", "true");
  el.classList.add("marked");
}

initBlocks();

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName() + "_done")) box.classList.add("marked");
box.onclick = function() { markAsDone(this); };
card.appendChild(box);
</script>
