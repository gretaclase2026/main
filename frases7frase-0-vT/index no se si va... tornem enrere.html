 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">

<title>Nevertheless - Pràctica</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
.unit-badge { color: #2563eb; padding: 0 10px; font-weight: bold; font-size: 24px; }

.modes{display:flex;gap:10px;width:100%}
.mode{flex:none;width:100px;text-align:center;padding:3px;border-radius:8px;font-weight:bold;font-size:11px;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

/* ESTILO ACTUALIZADO DEL MARCADOR */
#puntos-header { 
    background: #fef3c7; 
    color: #92400e; 
    padding: 4px 10px; 
    border-radius: 12px; 
    font-weight: 900; 
    border: 2px solid #f59e0b; 
    display: flex; 
    align-items: center; 
    gap: 4px; 
    font-size: 13px;
    cursor: default;
    margin-left: auto; /* Empuja el marcador a la derecha del todo en la fila */
}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#fff4cc;cursor:pointer;transition:0.2s;color:#333}
.block.active{background:#2563eb !important; color: white !important; transform: scale(1.1); box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3)}

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:10px 0}
.audio-controls{display:flex;align-items:center;gap:12px;margin-bottom:15px}

.audio-btn, .mic-btn{font-size:24px; border:none; cursor:pointer; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition: 0.2s}
.audio-btn{background:#dcfce7}
.audio-btn.slow{background:#fef08a}
.audio-btn.pause{background:#fee2e2}

.mic-btn.speech{background:#dbeafe; color: #1e40af;}
.mic-btn.listening{background:#2563eb !important; color:white; animation: pulse-blue 1.5s infinite;}

.mic-btn.rec{background:#fbcfe8; color: #9d174d;}
.mic-btn.rec.active, .mini-btn-list.rec.active {background:#ec4899 !important; color:white !important; animation: pulse-pink 1.5s infinite;}

@keyframes pulse-blue { 
  0% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7);} 
  70% {box-shadow: 0 0 0 10px rgba(37, 99, 235, 0);} 
  100% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);} 
}

@keyframes pulse-pink { 
  0% {box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7);} 
  70% {box-shadow: 0 0 0 10px rgba(236, 72, 153, 0);} 
  100% {box-shadow: 0 0 0 0 rgba(236, 72, 153, 0);} 
}

.star-main { background: none; border: none; font-size: 15px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 5px; }
.star-main.active { color: #f59e0b !important; }

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:-25px;font-weight:bold;color:#2563eb;font-size:20px}

#word{font-size:20px;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
.txt-en{color:#0f172a; font-weight:700; font-size:20px;}

#answer{font-size:20px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}

#speech-feedback { font-size: 19px; margin-bottom: 10px; min-height: 28px; text-align: center; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; transition: 0.2s;}
.word-correct { color: #22c55e; font-weight: bold; }
.word-error { color: #ef4444; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

.list-toggle-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-list-main { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e9d5ff; font-weight: bold; cursor: pointer; }
#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:10px}

.list-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee; }
.list-item-controls { display: flex; align-items: center; gap: 8px; }
.mini-btn-list { border: none; border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s;}
.mini-btn-list.rec { background: #f8bbd0; color: #9d174d; }
.blur { font-weight: 800; font-size: 15px; color: #0f172a; filter: blur(5px); transition: filter 0.2s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;

    recognition.onstart = () => {
        isListening = true;
        document.getElementById("speechBtn").classList.add("listening");
        document.getElementById("speech-feedback").innerHTML = "";
    };
    recognition.onend = () => {
        isListening = false;
        document.getElementById("speechBtn").classList.remove("listening");
    };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            fullTranscript += event.results[i][0].transcript + " ";
        }
        compareSentences(currentBlockData[pos].en, fullTranscript.trim());
    };
}

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().replace(/[.,?!"]/g, "").trim();
}

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speech-feedback");
    const normOriginalWords = normalizeText(original).split(/\s+/);
    const normSpokenWords = normalizeText(spoken).split(/\s+/);
    const origWordsRaw = original.split(/\s+/);
    
    let resultHTML = "";
    let sIdx = 0;
    let correctCount = 0;

    normOriginalWords.forEach((normWord, index) => {
        const originalWordRaw = origWordsRaw[index];
        let matched = false;

        if (sIdx < normSpokenWords.length && normSpokenWords[sIdx] === normWord) {
            resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
            sIdx++;
            matched = true;
            correctCount++;
        } else {
            for (let j = sIdx + 1; j < sIdx + 5 && j < normSpokenWords.length; j++) {
                if (normSpokenWords[j] === normWord) {
                    for (let k = sIdx; k < j; k++) {
                        resultHTML += `<span class="word-error">${normSpokenWords[k]}</span>`;
                    }
                    resultHTML += `<span class="word-correct">${originalWordRaw}</span>`;
                    sIdx = j + 1;
                    matched = true;
                    correctCount++;
                    break;
                }
            }
        }
        if (!matched) resultHTML += `<span class="word-missing">${originalWordRaw}</span>`;
    });
    
    feedbackDiv.innerHTML = resultHTML;

    if (correctCount / normOriginalWords.length > 0.9) {
        if(window.executarAciertoFinal) window.executarAciertoFinal();
        setTimeout(() => { know(); }, 1500);
    } else {
        window.registrarFallo();
    }
}

function toggleDictation() {
    if (!recognition) { alert("Navegador no compatible."); return; }
    if (isListening) recognition.stop();
    else recognition.start();
}

let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let currentRecordingBtnId = null;

async function toggleRecording(btnId = "recBtn") {
  const btn = document.getElementById(btnId);
  if (isRecording) {
      if (currentRecordingBtnId === btnId) { stopRecordingProcess(btn); return; } 
      else {
          stopRecordingProcess(document.getElementById(currentRecordingBtnId));
          await new Promise(r => setTimeout(r, 150));
      }
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const audioUrl = URL.createObjectURL(new Blob(audioChunks, { type: 'audio/mpeg' }));
      new Audio(audioUrl).play();
    };
    mediaRecorder.start();
    isRecording = true;
    currentRecordingBtnId = btnId;
    btn.classList.add("active");
  } catch (err) { isRecording = false; }
}

function stopRecordingProcess(btn) {
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    isRecording = false;
    currentRecordingBtnId = null;
    if (btn) btn.classList.remove("active");
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "unknown"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_currentBlock");
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  loadBlock((savedBlock !== null) ? parseInt(savedBlock) : 0);
}

  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  let start = b * 10, end = Math.min(start + 10, data.length);
  for (let i = start; i < end; i++) temp.push({...data[i], realIdx: i+1});
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === b));
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  if (isRecording) stopRecordingProcess(document.getElementById(currentRecordingBtnId));
  update(true); 
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloque Completado! 🎉";
    document.getElementById("answer").innerHTML = "";
    document.getElementById("speech-feedback").innerHTML = "";
    return;
  }
  document.getElementById("speech-feedback").innerHTML = "";
  const item = currentBlockData[pos];
  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));
  
  const w = document.getElementById("word");
  const aElement = document.getElementById("answer");
  progressBar.value = 0;

  if (mode === "EN") {
    w.innerHTML = ``; 
    aElement.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div class="txt-es" style="font-weight:700;">${item.es}</div>`;
    aElement.innerHTML = `<span class="txt-en">${item.en}</span>`;
  }
  aElement.style.display = "none";
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx || currentBlockData[pos].realIdx;
  if (starredIds.includes(idx)) starredIds = starredIds.filter(id => id !== idx);
  else starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  update();
}

function playAudio(speed, forcedIdx = null) {
  const num = forcedIdx || currentBlockData[pos].realIdx;
  a.src = "frase" + num + ".mp3";
  a.playbackRate = speed;
  a.play().catch(() => {});
}

function pauseAudio() { a.pause(); }

function toggleReveal() {
  const aElement = document.getElementById("answer");
  const wElement = document.getElementById("word");
  const item = currentBlockData[pos];
  if (aElement.style.display === "none") {
    if (mode === "EN") wElement.innerHTML = `<span class="txt-en">${item.en}</span>`;
    aElement.style.display = "block";
  } else {
    if (mode === "EN") wElement.innerHTML = "";
    aElement.style.display = "none";
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  if (isRecording) stopRecordingProcess(document.getElementById(currentRecordingBtnId));
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  if (isRecording) stopRecordingProcess(document.getElementById(currentRecordingBtnId));
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function toggleList(type) {
  const l = document.getElementById("list");
  if (l.style.display === "block" && l.dataset.type === type) { l.style.display = "none"; return; }
  l.dataset.type = type;
  renderList(type);
  l.style.display = "block";
}

function renderList(type) {
  const l = document.getElementById("list");
  l.innerHTML = `<b>${type === 'stars' ? 'Favorites (★)' : 'Llista del bloc'}:</b><br><br>`;
  let listToRender = [];
  if (type === 'stars') {
    listToRender = data.map((item, index) => ({...item, realIdx: index+1})).filter(i => starredIds.includes(i.realIdx));
  } else {
    let start = currentBlockID * 10, end = Math.min(start + 10, data.length);
    listToRender = data.slice(start, end).map((item, index) => ({...item, realIdx: start + index + 1}));
  }
  
  listToRender.forEach((item, index) => {
    const isStarred = starredIds.includes(item.realIdx);
    const itemDiv = document.createElement("div");
    const listRecBtnId = `recBtnList_${item.realIdx}`;
    itemDiv.className = "list-item";
    const isActive = (isRecording && currentRecordingBtnId === listRecBtnId) ? "active" : "";

    itemDiv.innerHTML = `
      <div class="list-item-controls">
        <button class="star-main ${isStarred ? 'active' : ''}" style="font-size:22px; width:30px;" onclick="toggleStar(${item.realIdx}); renderList('${type}')">★</button>
        <button class="mini-btn-list" style="background:#dcfce7" onclick="playAudio(1.0, ${item.realIdx})">🔊</button>
        <button id="${listRecBtnId}" class="mini-btn-list rec ${isActive}" onclick="toggleRecording('${listRecBtnId}')">🎙️</button>
      </div>
      <div style="flex:1;">
        <div class="txt-es" style="font-weight:bold; font-size:14px;">${item.es}</div>
        <div class="blur" onclick="this.classList.toggle('revealed')">${item.en}</div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
}

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓"; element.classList.add('marked');
}

initBlocks();

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { markAsDone(this); };
card.appendChild(box);

// SCRIPT PUNTOS Y BOTÓN RESCATE
(function() {
    let xp = parseInt(localStorage.getItem('global_xp')) || 0;
    let fallos = 0;
    
    const actualizarMarcador = () => {
        const el = document.getElementById('val-puntos');
        if(el) el.textContent = xp;
    };

    window.executarAciertoFinal = function() {
        xp += 10;
        localStorage.setItem('global_xp', xp);
        actualizarMarcador();

        const est = document.getElementById('estrella-animada');
        est.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        est.style.opacity = "1";
        est.style.transform = "translate(-50%, -50%) scale(1.4)";
        
        setTimeout(() => {
            est.style.opacity = "0";
            est.style.transform = "translate(-50%, -50%) scale(0)";
        }, 1000);

        fallos = 0;
        const b = document.getElementById('btn-rescat');
        if(b) b.style.display = 'none';
    };

    window.registrarFallo = function() {
        fallos++;
        if (fallos >= 3) {
            const b = document.getElementById('btn-rescat');
            if(b) b.style.display = 'block';
        }
    };

    setInterval(() => {
        const contenedor = document.querySelector('.audio-controls');
        if (contenedor && !document.getElementById('btn-rescat')) {
            const b = document.createElement('button');
            b.id = 'btn-rescat';
            b.textContent = 'IT IS OK';
            b.onclick = window.executarAciertoFinal;
            contenedor.after(b);
            actualizarMarcador();
        }
    }, 1000);
    
    actualizarMarcador();
})();
</script>
