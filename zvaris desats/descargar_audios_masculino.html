<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Text-to-Speech Downloader</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            max-width: 600px;
            margin: 40px auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <h1>Descarga de Audios (Google TTS Studio Masculina)</h1>
    
    <div class="form-group">
        <label for="apiKey">Introduce tu API Key de Google Cloud:</label>
        <input type="text" id="apiKey" placeholder="AIzaSy...">
    </div>

    <button id="btnDownload" onclick="startDownload()">Descargar Audios (f011.mp3 y f021.mp3)</button>

    <div id="status"></div>

    <script>
        const phrases = [
            { text: "I've tidied up every room.", filename: "f011.mp3" },
            { text: "The hearse led the procession.", filename: "f021.mp3" }
        ];

        async function startDownload() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnDownload');

            if (!apiKey) {
                showStatus("Por favor, introduce una API Key válida.", "error");
                return;
            }

            btn.disabled = true;
            showStatus("Procesando descargas...", "success");

            try {
                for (const phrase of phrases) {
                    await downloadAudio(apiKey, phrase.text, phrase.filename);
                }
                showStatus("¡Descargas completadas con éxito!", "success");
            } catch (error) {
                showStatus("Error: " + error.message, "error");
            } finally {
                btn.disabled = false;
            }
        }

        async function downloadAudio(apiKey, text, filename) {
            const url = `https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`;
            
            const payload = {
                input: { text: text },
                voice: {
                    languageCode: "en-US",
                    name: "en-US-Studio-Q" // Modificado a 'en-US-Studio-Q' que corresponde a la voz de hombre en Studio.
                },
                audioConfig: {
                    audioEncoding: "MP3"
                }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || "Error en la API de Google Cloud");
            }

            const data = await response.json();
            const audioContent = data.audioContent;

            const linkSource = `data:audio/mp3;base64,${audioContent}`;
            const downloadLink = document.createElement("a");
            downloadLink.href = linkSource;
            downloadLink.download = filename;
            downloadLink.click();
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = message;
            statusDiv.className = type;
            statusDiv.style.display = 'block';
        }
    </script>

</body>
</html>
