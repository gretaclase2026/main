 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; 
            --p-blue-soft: #d4eaf7; 
            --p-blue-strong: #2196F3; 
            --p-red: #d93025;
            --p-orange: #ff9800;
            --p-green-active: #4CAF50;
            --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        .card { background: white; width: 100%; max-width: 600px; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-bottom: 15px; position: relative; }
        
        .btn-inicio { width: 100%; padding: 15px; background: var(--p-blue-soft); border: none; border-radius: 20px; color: var(--p-blue-strong); font-weight: bold; font-size: 18px; cursor: pointer; margin-bottom: 20px; }
        
        .grid-lliçons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 600px; margin-bottom: 20px; }
        .lliço-btn { background: white; border: 2px solid var(--p-pink); padding: 15px 5px; border-radius: 15px; font-weight: bold; cursor: pointer; color: var(--text); }
        .lliço-btn.active { background: var(--p-blue-strong); color: white; border-color: var(--p-blue-strong); }

        .top-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin-bottom: 10px; }
        .btn-toggle { background: white; border: 2px solid var(--p-pink); padding: 8px 15px; border-radius: 15px; cursor: pointer; font-weight: bold; color: var(--text); }
        .btn-toggle.on { background: var(--p-orange); color: white; border-color: var(--p-orange); }

        .star-main { position: absolute; top: 15px; right: 15px; font-size: 28px; cursor: pointer; filter: grayscale(1); transition: 0.2s; }
        .star-main.active { filter: grayscale(0); }

        .audio-group { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
        .btn-audio { background: var(--p-blue-soft); border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        #word-main { font-size: 32px; font-weight: 800; color: var(--p-blue-strong); margin-bottom: 5px; }
        #word-sub { font-size: 20px; color: #888; font-weight: bold; min-height: 24px; cursor: pointer; }
        #word-sub.hidden { background: #f0f0f0; color: transparent; border-radius: 8px; display: inline-block; padding: 0 20px; }

        .btn-next { width: 100%; max-width: 600px; background: var(--p-pink); color: #d93025; padding: 18px; border-radius: 20px; border: none; font-size: 20px; font-weight: 800; cursor: pointer; margin-bottom: 20px; }

        .list-section { width: 100%; max-width: 600px; background: white; border-radius: 20px; padding: 10px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 8px; border-bottom: 1px solid #eee; }
        .star-list { cursor: pointer; font-size: 20px; color: #ccc; }
        .star-list.active { color: var(--p-orange); }
    </style>
</head>
<body>

    <button class="btn-inicio" onclick="location.reload()">🏠 INICI</button>

    <div class="grid-lliçons" id="grid-lliçons"></div>

    <div class="top-row">
        <div class="btn-toggle" onclick="canviarIdioma()">🌍 <span id="txt-idioma">CAT</span></div>
        <div id="btn-repas" class="btn-toggle" onclick="toggleRepas()">⭐ OFF</div>
        <select id="select-rang" onchange="actualitzarRang()" style="padding:8px; border-radius:12px; border:2px solid var(--p-pink); font-weight:bold;"></select>
    </div>

    <div class="card">
        <div id="star-main" class="star-main" onclick="toggleEstrellaPrincipal()">⭐</div>
        <div class="audio-group">
            <button class="btn-audio" onclick="reproduirActual(1.0)">🔊</button>
            <button class="btn-audio" onclick="reproduirActual(0.6)">🐢</button>
        </div>
        <div id="word-main">Tria una lliçó</div>
        <div id="word-sub" class="hidden" onclick="this.classList.remove('hidden')"></div>
    </div>

    <button class="btn-next" onclick="següent()">SEGÜENT PARAULA ➔</button>

    <div class="list-section">
        <table><tbody id="taula-joc"></tbody></table>
    </div>

    <audio id="player"></audio>

<script>
    let dadesTotals = [];
    let dadesFiltrades = [];
    let dadesActuals = [];
    let indexActual = 0;
    let idioma = 'CAT';
    let modoRepas = false;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repas_ids') || '[]'));

    fetch('vocabulariGrups.csv')
        .then(r => r.text())
        .then(t => {
            const lines = t.split('\n').filter(l => l.trim());
            dadesTotals = lines.map((l, i) => {
                const p = l.split(';');
                return { 
                    id: (i + 1).toString().padStart(3, '0'), 
                    grup: p[0].trim(), 
                    eng: p[1].trim(), 
                    esp: p[2].trim() 
                };
            });
            generarLliçons();
        });

    function generarLliçons() {
        const grups = [...new Set(dadesTotals.map(d => d.grup))].slice(0, 16);
        const grid = document.getElementById('grid-lliçons');
        grid.innerHTML = "";
        grups.forEach((g, i) => {
            const btn = document.createElement('button');
            btn.className = 'lliço-btn';
            btn.innerText = (i + 1);
            btn.onclick = () => {
                document.querySelectorAll('.lliço-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                carregarLliço(g);
            };
            grid.appendChild(btn);
        });
    }

    function carregarLliço(grup) {
        dadesFiltrades = dadesTotals.filter(d => d.grup === grup);
        const sel = document.getElementById('select-rang');
        sel.innerHTML = '<option value="tots">Totes</option>';
        for(let i=0; i<dadesFiltrades.length; i+=10) {
            let fi = Math.min(i+10, dadesFiltrades.length);
            sel.innerHTML += `<option value="${i}-${fi}">${i+1}-${fi}</option>`;
        }
        actualitzarRang();
    }

    function actualitzarRang() {
        const rang = document.getElementById('select-rang').value;
        let llista = [...dadesFiltrades];
        if (rang !== 'tots') {
            const [inici, fi] = rang.split('-').map(Number);
            llista = llista.slice(inici, fi);
        }
        if (modoRepas) {
            llista = llista.filter(d => repasIds.has(d.id));
        }
        dadesActuals = llista.sort(() => Math.random() - 0.5);
        indexActual = 0;
        actualitzarTaula(llista);
        nouRepte();
    }

    function nouRepte() {
        if (dadesActuals.length === 0) {
            document.getElementById('word-main').innerText = "Tria lliçó";
            document.getElementById('word-sub').innerText = "";
            return;
        }
        const d = dadesActuals[indexActual];
        document.getElementById('word-main').innerText = (idioma === 'CAT') ? d.esp : d.eng;
        document.getElementById('word-sub').innerText = (idioma === 'CAT') ? d.eng : d.esp;
        document.getElementById('word-sub').classList.add('hidden');
        document.getElementById('star-main').classList.toggle('active', repasIds.has(d.id));
        reproduirActual(1.0);
    }

    function següent() {
        if (dadesActuals.length > 0) {
            indexActual = (indexActual + 1) % dadesActuals.length;
            nouRepte();
        }
    }

    function reproduirActual(velocitat) {
        if (dadesActuals.length > 0) {
            const d = dadesActuals[indexActual];
            const p = document.getElementById('player');
            p.src = `audios/f${d.id}.mp3`;
            p.playbackRate = velocitat;
            p.play().catch(() => {});
        }
    }

    function toggleEstrellaPrincipal() {
        const id = dadesActuals[indexActual].id;
        repasIds.has(id) ? repasIds.delete(id) : repasIds.add(id);
        localStorage.setItem('repas_ids', JSON.stringify([...repasIds]));
        actualitzarRang();
    }

    function toggleEstrellaLlista(id) {
        repasIds.has(id) ? repasIds.delete(id) : repasIds.add(id);
        localStorage.setItem('repas_ids', JSON.stringify([...repasIds]));
        actualitzarRang();
    }

    function canviarIdioma() { 
        idioma = (idioma === 'CAT') ? 'ENG' : 'CAT'; 
        document.getElementById('txt-idioma').innerText = idioma; 
        nouRepte(); 
    }

    function toggleRepas() { 
        modoRepas = !modoRepas; 
        document.getElementById('btn-repas').innerText = modoRepas ? "⭐ ON" : "⭐ OFF";
        document.getElementById('btn-repas').classList.toggle('on', modoRepas);
        actualitzarRang(); 
    }

    function actualitzarTaula(llista) {
        document.getElementById('taula-joc').innerHTML = llista.map((d, i) => `
            <tr>
                <td style="color:#ccc; font-size:0.8em;">${i+1}</td>
                <td class="star-list ${repasIds.has(d.id)?'active':''}" onclick="toggleEstrellaLlista('${d.id}')">★</td>
                <td><button style="background:none; border:none; cursor:pointer;" onclick="reproduirLlista('${d.id}')">🔊</button></td>
                <td style="color:var(--p-blue-strong); font-weight:bold;">${d.eng}</td>
                <td style="color:#888; font-size:0.9em;">${d.esp}</td>
            </tr>
        `).join('');
    }

    function reproduirLlista(id) {
        const p = document.getElementById('player');
        p.src = `audios/f${id}.mp3`;
        p.playbackRate = 1.0;
        p.play().catch(() => {});
    }
</script>
</body>
</html>
