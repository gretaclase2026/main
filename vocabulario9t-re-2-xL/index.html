 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudi de Vocabulari</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 8px 16px;
            background: #e2e8f0;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
            transition: 0.3s;
        }
        .tab.active {
            background: var(--primary);
            color: white;
        }
        .card {
            background: var(--card);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }
        .word-main { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        .word-sub { font-size: 1.2rem; color: #64748b; visibility: hidden; }
        .card.flipped .word-sub { visibility: visible; }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        button {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-next { background: #dcfce7; color: #166534; grid-column: span 2; }
        .audio-icon {
            font-size: 40px;
            margin-bottom: 20px;
            background: #f1f5f9;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs" id="tabs"></div>

    <div class="card" id="card" onclick="this.classList.toggle('flipped')">
        <div class="audio-icon" onclick="event.stopPropagation(); playCurrentAudio()">🔊</div>
        <div class="word-main" id="voc-en">Carregant...</div>
        <div class="word-sub" id="voc-ca">...</div>
    </div>

    <div class="controls">
        <button class="btn-next" onclick="nextWord()">Següent paraula</button>
    </div>
</div>

<audio id="audioPlayer"></audio>

<script>
    let vocabulary = [];
    let currentFiltered = [];
    let currentIndex = 0;

    // Carregar el CSV
    fetch('vocabulariGrups.csv')
        .then(response => response.text())
        .then(data => {
            const lines = data.split('\n');
            vocabulary = lines.filter(line => line.trim() !== '').map((line, index) => {
                const [grup, en, ca] = line.split(';');
                return { 
                    grup: grup.trim(), 
                    en: en.trim(), 
                    ca: ca.trim(),
                    audioId: (index + 1).toString().padStart(3, '0') // Genera 001, 002... segons la fila
                };
            });
            renderTabs();
            filterByGroup(vocabulary[0].grup);
        });

    function renderTabs() {
        const grups = [...new Set(vocabulary.map(v => v.grup))];
        const tabsContainer = document.getElementById('tabs');
        grups.forEach((grup, i) => {
            const btn = document.createElement('div');
            btn.className = `tab ${i === 0 ? 'active' : ''}`;
            btn.textContent = grup;
            btn.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                filterByGroup(grup);
            };
            tabsContainer.appendChild(btn);
        });
    }

    function filterByGroup(grup) {
        currentFiltered = vocabulary.filter(v => v.grup === grup);
        currentIndex = 0;
        showWord();
    }

    function showWord() {
        const item = currentFiltered[currentIndex];
        document.getElementById('voc-en').textContent = item.en;
        document.getElementById('voc-ca').textContent = item.ca;
        document.getElementById('card').classList.remove('flipped');
        playCurrentAudio();
    }

    function nextWord() {
        currentIndex = (currentIndex + 1) % currentFiltered.length;
        showWord();
    }

    function playCurrentAudio() {
        const item = currentFiltered[currentIndex];
        const audio = document.getElementById('audioPlayer');
        // Busca a la carpeta /audios/ el fitxer f001.mp3, f002.mp3...
        audio.src = `audios/f${item.audioId}.mp3`;
        audio.play().catch(e => console.log("Audio no trobat"));
    }
</script>

</body>
</html>
