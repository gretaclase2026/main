 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudio FRASES · Collocations Informales (60)</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;align-items:center;gap:10px;margin-bottom:10px;width:100%}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.unit-number{font-weight:bold;font-size:18px;color:#2563eb;padding:0 5px}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0;justify-content:center;align-items:center}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:30px 0 20px 0}
.audio-controls{display:flex;align-items:center;gap:12px;margin-bottom:15px}

.audio-btn, .mic-btn{font-size:28px;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s; -webkit-tap-highlight-color: transparent;}
.audio-btn{background:#dcfce7}
.audio-btn.slow{background:#fef08a}
.audio-btn.pause{background:#fee2e2}

.mic-btn.rec-mode { background: #fee2e2; color: #333; }
.mic-btn.rec-mode.recording { background: #ef4444 !important; color: white !important; animation: pulse 1.5s infinite; }

.mic-btn.dict-mode { background: #d6e6f5; color: #2563eb; }
.mic-btn.dict-mode.listening{ background: #3b82f6 !important; color:white !important; animation: pulse 1.5s infinite; }

@keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);} 100% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);} }

.star-main { background: none; border: none; font-size: 35px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 5px; }
.star-main.active { color: #f59e0b !important; }

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:-25px;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:24px;font-weight:800;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
#answer{font-size:20px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}

#speech-feedback { font-size: 19px; margin-bottom: 10px; min-height: 28px; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; text-align: center;}
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

.list-toggle-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-list-main { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e9d5ff; font-weight: bold; cursor: pointer; }
.btn-stars-main { background: #fef3c7; color: #92400e; }

#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:15px}
.list-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
.list-content { flex: 1; order: 2; overflow: hidden; } 
.list-actions-side { display: flex; align-items: center; gap: 8px; order: 1; margin-right: 12px; flex-shrink: 0; } 

.mini-btn { border: none; border-radius: 8px; width: 35px; height: 35px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.btn-audio-list { background: #dcfce7; }
.star-list { background: none; border: none; font-size: 24px; color: #cbd5e1; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; width: 30px; height: 35px; }
.star-list.active { color: #f59e0b !important; }

.blur { filter: blur(5px); transition: filter 0.2s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }

.check-box-manual {
    position: absolute; top: 110px; right: 22px; width: 24px; height: 24px;
    background: #fff; border: 1.5px solid #22c55e;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: all 0.2s; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white !important; }

/* ESTILOS DEL SISTEMA DE PUNTOS */
#puntos-header { 
    position: fixed; top: 15px; right: 15px; 
    background: #fef3c7; color: #92400e; padding: 6px 16px; 
    border-radius: 25px; font-weight: 900; border: 2px solid #f59e0b; 
    z-index: 9999; display: flex; align-items: center; gap: 6px; 
    font-size: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#estrella-animada { 
    position: fixed; top: 50%; left: 50%;

    font-size: 100px; z-index: 10000; pointer-events: none; opacity: 0; 
}
#btn-rescat { 
    display: none; margin: 15px auto; padding: 8px 20px; 
    width: fit-content; background: #f8fafc; border: 1px solid #cbd5e1;

    cursor: pointer; font-weight: bold; text-transform: uppercase;
}
</style>
</head>

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

// Diccionario de contracciones
const contractions = {
    "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would", 
    "it'd": "it would", "we'd": "we would", "they'd": "they would",
    "i've": "i have", "you've": "you have", "we've": "we have", "they've": "they have",
    "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
    "don't": "do not", "doesn't": "does not", "didn't": "did not",
    "can't": "cannot", "couldn't": "could not", "won't": "will not", "wouldn't": "would not",
    "it's": "it is", "she's": "she is", "he's": "he is", "there's": "there is",
    "i'm": "i am", "we're": "we are", "they're": "they are", "you're": "you are",
    "hadn't": "had not", "wouldn't've": "would not have", "i'll": "i will"
};
const expanded = {};
for (let k in contractions) expanded[contractions[k]] = k;

function normalizeText(text) {
    if (!text) return "";
    return text.toLowerCase().replace(/[.,?!"]/g, "").trim();
}

function stopAllMicrophones() {
    if (isListening && recognition) { recognition.stop(); isListening = false; }
    if (isRecording && mediaRecorder) { 
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
        isRecording = false; 
    }
    if (window.localStream) {
        window.localStream.getTracks().forEach(track => track.stop());
        window.localStream = null;
    }
    document.getElementById("micBtn").classList.remove("listening");
    document.getElementById("recBtn").classList.remove("recording");
}

let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording(btnId = "recBtn") {
    const btn = document.getElementById(btnId);
    if (isRecording) { stopAllMicrophones(); return; }
    stopAllMicrophones();
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        window.localStream = stream;
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const playRec = new Audio(audioUrl);
            playRec.play();
        };
        mediaRecorder.start();
        isRecording = true;
        btn.classList.add("recording");
        if(btnId === "recBtn") a.pause();
    } catch (err) { 
        isRecording = false;
    }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;
let isListening = false;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = true;

    recognition.onstart = () => {
        isListening = true;
        document.getElementById("micBtn").classList.add("listening");
    };
    recognition.onend = () => {
        isListening = false;
        document.getElementById("micBtn").classList.remove("listening");
    };
    recognition.onresult = (event) => {
        let fullTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
            fullTranscript += event.results[i][0].transcript + " ";
        }
        compareSentences(currentBlockData[pos].en, fullTranscript.trim());
    };
}

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speech-feedback");
    const origWords = original.split(/\s+/);
    const spokenWords = spoken.split(/\s+/);
    let resultHTML = ""; 
    let sIdx = 0; 
    let correctCount = 0;

    for (let i = 0; i < origWords.length; i++) {
        let matched = false; 
        const oNorm = normalizeText(origWords[i]);
        
        if (sIdx < spokenWords.length) {
            const sNorm1 = normalizeText(spokenWords[sIdx]);
            const sNorm2 = normalizeText(spokenWords[sIdx + 1]);
            const sTwoWords = sNorm1 + " " + (sNorm2 || "");

            if (contractions[oNorm] === sTwoWords) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]} ${spokenWords[sIdx+1]}</span> `;
                sIdx += 2; matched = true; correctCount++;
            } else if (i + 1 < origWords.length && (oNorm + " " + normalizeText(origWords[i+1])) === contractions[sNorm1]) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx += 1; i++; matched = true; correctCount++;
            } else if (oNorm === sNorm1 || contractions[oNorm] === sNorm1 || expanded[oNorm] === sNorm1) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx++; matched = true; correctCount++;
            }
        }
        if (!matched) {
            let foundAhead = false;
            for (let look = sIdx; look < sIdx + 3 && look < spokenWords.length; look++) {
                if (normalizeText(spokenWords[look]) === oNorm) {
                    for (let skip = sIdx; skip < look; skip++) resultHTML += `<span class="word-error">${spokenWords[skip]}</span> `;
                    resultHTML += `<span class="word-correct">${spokenWords[look]}</span> `;
                    sIdx = look + 1; foundAhead = true; matched = true; correctCount++; break;
                }
            }
            if (!foundAhead) resultHTML += `<span class="word-missing">${origWords[i]}</span> `;
        }
    }
    feedbackDiv.innerHTML = resultHTML;

    // SISTEMA DE PUNTOS INTEGRADO AL ACERTAR
    if (correctCount >= origWords.length * 0.9) {
        if(window.executarAciertoFinal) window.executarAciertoFinal();
        setTimeout(() => { feedbackDiv.textContent = ""; know(); }, 1500);
    }
}

function toggleMic() {
    if (!recognition || currentBlockData.length === 0) return;
    if (isListening) {
        recognition.stop();
    } else {
        stopAllMicrophones();
        document.getElementById("speech-feedback").innerHTML = ""; 
        recognition.start();
    }
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "collocations_60"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

  const btnT = document.createElement("button");

  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  
  const starMain = document.createElement("button");

  starMain.id = "starMain";
  starMain.innerHTML = "★";
  starMain.onclick = () => toggleStar();
  container.appendChild(starMain);

  loadBlock((savedBlock !== null) ? (savedBlock === 'T' ? 'T' : parseInt(savedBlock)) : 0);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  if (b === 'T') {
    temp = data.map((item, i) => ({...item, realIdx: i}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) temp.push({...data[i], realIdx: i});
  }
  currentBlockData = temp;
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloque Completado! 🎉";
    document.getElementById("answer").innerHTML = "";
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));
  const w = document.getElementById("word");
  const ans = document.getElementById("answer");
  document.getElementById("speech-feedback").innerHTML = "";
  progressBar.value = 0;
  ans.style.display = "none";

  if (mode === "EN") {
    w.innerHTML = ``; 
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div style='font-size:22px;' class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span style="font-size:24px;">${item.en}</span>`;
  }
  
  document.getElementById("pos").textContent = learnedCount + (currentBlockData.length > 0 ? pos + 1 : 0);
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx !== null ? forcedIdx : (currentBlockData.length > 0 ? currentBlockData[pos].realIdx : null);
  if (idx === null) return;
  if (starredIds.includes(idx)) starredIds = starredIds.filter(id => id !== idx);
  else starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  if (currentBlockData.length > 0) document.getElementById("starMain").classList.toggle("active", starredIds.includes(currentBlockData[pos].realIdx));
}

function playAudio(speed, forcedAudio = null) {
  const audioFile = forcedAudio || (currentBlockData.length > 0 ? currentBlockData[pos].audio : null);
  if (!audioFile) return;
  if (!a.src.includes(audioFile)) { a.src = audioFile; }
  a.playbackRate = speed;
  a.play().catch(() => {});
}

function pauseAudio() { a.pause(); }

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos];
    const ans = document.getElementById("answer");
    const w = document.getElementById("word");
    const fb = document.getElementById("speech-feedback");
    
    if (ans.style.display === "none") {
        if (mode === "EN") w.innerHTML = `<span style="color:#333;">${item.en}</span>`;
        ans.style.display = "block";
    } else {
        if (mode === "EN") w.innerHTML = "";
        ans.style.display = "none";
        fb.innerHTML = "";
    }
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function toggleList(type) {
  const l = document.getElementById("list");
  if (l.style.display === "block" && l.dataset.type === type) { l.style.display = "none"; return; }
  l.dataset.type = type;
  renderList(type);
  l.style.display = "block";
}

function toggleBlur(element) { element.classList.toggle('revealed'); }

function renderList(type) {
  const l = document.getElementById("list");
  l.innerHTML = type === 'stars' ? "<b>Favoritos (★):</b><br><br>" : "<b>Lista del bloque:</b><br><br>";
  let listToRender = [];
  if (type === 'stars') {
    listToRender = data.map((item, index) => ({...item, realIdx: index})).filter(i => starredIds.includes(i.realIdx));
  } else {
    let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
    let end = currentBlockID === 'T' ? data.length : Math.min(start + 10, data.length);
    listToRender = data.slice(start, end).map((item, index) => ({...item, realIdx: start + index}));
  }

  if (listToRender.length === 0) { l.innerHTML += "<i>Vacío.</i>"; return; }
  listToRender.forEach((item) => {
    const isStarred = starredIds.includes(item.realIdx);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    const listRecBtnId = `recBtnList_${item.realIdx}`;
    itemDiv.innerHTML = `
      <div class="list-actions-side">
        <button class="star-list ${isStarred ? 'active' : ''}" onclick="event.stopPropagation(); toggleStar(${item.realIdx}); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio-list" onclick="event.stopPropagation(); playAudio(1.0, '${item.audio}')">🔊</button>
        <button id="${listRecBtnId}" class="mini-btn mic-btn rec-mode" style="width:35px; height:35px; font-size:16px;" onclick="event.stopPropagation(); toggleRecording('${listRecBtnId}')">🎤</button>
      </div>
      <div class="list-content">
        <div class="list-texts">
          <div class="txt-es" style="font-weight:bold; font-size:14px;">${item.es}</div>
          <div class="blur" style="font-weight:bold; font-size:16px;" onclick="toggleBlur(this)">${item.en}</div>
        </div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
}

function markAsDone(element) {
    const folderName = getFolderName();
    localStorage.setItem(folderName, new Date().toISOString());
    element.innerHTML = "✓"; 
    element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

initBlocks();

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
box.id = "mainCheck";

if (localStorage.getItem(getFolderName())) { 
    box.innerHTML = "✓"; 
    box.classList.add('marked'); 
}

box.onclick = function() { markAsDone(this); };
card.appendChild(box);

// SCRIPT PUNTOS Y BOTÓN RESCATE (REUTILIZABLE)
(function() {
    let xp = parseInt(localStorage.getItem('global_xp')) || 0;
    let fallos = 0;
    
    const actualizarMarcador = () => {
        const el = document.getElementById('val-puntos');
        if(el) el.textContent = xp;
    };

    window.executarAciertoFinal = function() {
        xp += 10;
        localStorage.setItem('global_xp', xp);
        actualizarMarcador();

        const est = document.getElementById('estrella-animada');
        est.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        est.style.opacity = "1";
        est.style.transform = "translate(-50%, -50%) scale(1.4)";
        
        setTimeout(() => {
            est.style.opacity = "0";
            est.style.transform = "translate(-50%, -50%) scale(0)";
        }, 1000);

        fallos = 0;
        const b = document.getElementById('btn-rescat');
        if(b) b.style.display = 'none';
    };

    setInterval(() => {
        const contenedor = document.querySelector('.audio-controls');
        if (contenedor && !document.getElementById('btn-rescat')) {
            const b = document.createElement('button');
            b.id = 'btn-rescat';
            b.textContent = 'IT IS OK';
            b.onclick = window.executarAciertoFinal;
            contenedor.after(b);
            actualizarMarcador();
        }
        
        if (typeof recognition !== 'undefined' && !recognition._puntosVinculados) {
            recognition._puntosVinculados = true;
            recognition.addEventListener('result', (event) => {
                const transcripcio = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
                const fraseCorrecta = currentBlockData[pos].en.toLowerCase().trim();

                const n1 = transcripcio.replace(/[^\w\s]/gi, '');
                const n2 = fraseCorrecta.replace(/[^\w\s]/gi, '');

                if (n1 === n2) {
                    // window.executarAciertoFinal() ya se llama desde compareSentences si el % es alto
                } else {
                    fallos++;
                    if (fallos >= 3) {
                        const b = document.getElementById('btn-rescat');
                        if(b) b.style.display = 'block';
                    }
                }
            });
        }
    }, 1000);
})();
</script>
