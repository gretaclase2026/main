 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estudi FRASES · Format Blanc</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

/* Bloques */
.blocks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:15px 0 20px}
.block{width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important}

/* Audio, Estrella y Progreso */
.audio-container { display: flex; justify-content: center; gap: 15px; margin: 10px 0 10px; align-items: center; }
.audio-btn{width:75px;height:75px;border-radius:50%;border:none;background:#dbeafe;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a; font-size:22px;}
.star-btn { background: none; border: none; font-size: 32px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 10px; }
.star-btn.active { color: #f59e0b; }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

/* Listas y Repaso */
.list-controls { display: flex; gap: 10px; margin-top: 16px; }
.list-btn{ flex:1; background:#e9d5ff; border:none; border-radius:16px; padding:14px; font-weight:800; cursor:pointer }
.review-btn { background: #fef3c7; color: #92400e; }
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}

.check-box-manual {
    position: absolute; top: 18px; right: 22px;
    width: 24px; height: 24px;
    background: #fff; border: 1.5px solid #22c55e;
    border-radius: 6px; display: flex;
    align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>
<body>

<header>
 <div class="mode-btns">
  <button class="mode-en" onclick="setMode('EN')">Mode anglès → català</button>
  <button class="mode-es" onclick="setMode('CA')">Mode català → anglès</button>
 </div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <div id="langLabel" class="lang">ANGLÈS</div>

 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button class="star-btn" id="starBtn" onclick="toggleStar()">★</button>
  <button class="audio-btn" onclick="play(1.0)">🔊</button>
  <button class="audio-btn slow" onclick="play(0.75)">🐢</button>
 </div>

 <div class="progress-wrapper">
  <input type="range" id="progressBar" value="0" step="0.1">
 </div>

 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>

 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>

 <div class="list-controls">
    <button class="list-btn" onclick="toggleList('all')">Tota la llista</button>
    <button class="list-btn review-btn" onclick="toggleList('stars')">Repàs (★)</button>
 </div>
 <div id="endMsg" class="end hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>

<div id="listBox" class="list-box hidden"></div>

<script>
const items = [
    {audio:"f001.mp3",en:"I was going to call you, but I <b>ended up</b> sending you a message because I didn't want to wake you up.",es:"T'anava a trucar, però al final <b>vaig acabar</b> enviant-te un missatge perquè no volia despertar-te."},
    {audio:"f002.mp3",en:"The meeting was very long, so <b>halfway through</b> I decided to go out for a coffee <b>to wake up a bit</b>.",es:"La reunió va ser molt llarga, així que <b>a la meitat</b> vaig decidir sortir a prendre un cafè <b>per despertar-me una mica</b>."},
    {audio:"f003.mp3",en:"If I <b>had known</b> you were in the neighborhood, I <b>would have</b> invited you to dinner at home.",es:"Si <b>hagués sabut</b> que eres pel barri, t'<b>hauria</b> convidat a sopar a casa."},
    {audio:"f004.mp3",en:"The train <b>was about to leave</b> when I realized I <b>had forgotten</b> my bag on the platform.",es:"El tren <b>estava a punt de sortir</b> quan em vaig adonar que <b>m'havia deixat</b> la bossa a l'andana."},
    {audio:"f005.mp3",en:"My boss told me that <b>unless</b> I finish the project today, I <b>won't be able to</b> go on vacation next week.",es:"El meu cap em va dir que <b>a menys que</b> acabi el projecte avui, <b>no podré</b> anar-me'n de vacances la setmana que ve."},
    {audio:"f006.mp3",en:"We <b>used to go</b> to the mountains every summer, but now we <b>prefer</b> to stay in the city and relax.",es:"<b>Solíem anar</b> a la muntanya cada estiu, però ara <b>preferim</b> quedar-nos a la ciutat i descansar."},
    {audio:"f007.mp3",en:"It's <b>the first time</b> I've seen such a beautiful sunset <b>since</b> I moved to this city.",es:"És <b>la primera vegada</b> que veig una posta de sol tan bonica <b>des que</b> em vaig mudar a aquesta ciutat."},
    {audio:"f008.mp3",en:"I'm <b>not used to</b> waking up so early, so I'm <b>a bit sleepy</b> during the first few hours of work.",es:"<b>No estic acostumat a</b> despertar-me tan d'hora, així que estic <b>una mica adormit</b> durant les primeres hores de feina."},
    {audio:"f009.mp3",en:"The doctor told me I should <b>take it easy</b> and <b>avoid</b> stressful situations for a while.",es:"El metge em va dir que m'ho hauria de <b>prendre amb calma</b> i <b>evitar</b> situacions d'estrès durant un temps."},
    {audio:"f010.mp3",en:"<b>As soon as</b> I get home, I'm going to take off my shoes and <b>lie down</b> on the sofa to watch a movie.",es:"<b>Tan bon punt</b> arribi a casa, em trauré les sabates i em <b>peratallaré</b> al sofà per veure una pel·lícula."}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");
let starredIds = JSON.parse(localStorage.getItem('greta_stars')) || [];

audioObj.ontimeupdate = () => {
  if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100;
};

progressBar.oninput = () => {
  if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration;
};

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  loadBlock(0);
}

function loadBlock(b) {
  currentBlockID = b;
  let temp = [];
  if (b === 'T') {
    temp = items.map((item, i) => ({...item, realIdx: i+1}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, items.length);
    for (let i = start; i < end; i++) temp.push({...items[i], realIdx: i+1});
  }
  
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });

  pos = 0; learnedCount = 0;
  document.getElementById("endMsg").classList.add("hidden");
  update(true);
}

function update(fromAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("en").classList.add("hidden");
    document.getElementById("es").classList.add("hidden");
    document.getElementById("endMsg").classList.remove("hidden");
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");
  progressBar.value = 0;

  // Actualizar estrella
  const isStarred = starredIds.includes(item.audio);
  document.getElementById("starBtn").classList.toggle("active", isStarred);

  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    if (fromAction) play(1.0);
  } else {
    document.getElementById("langLabel").textContent = "CATALÀ";
    document.getElementById("es").innerHTML = item.es;
    document.getElementById("es").classList.remove("hidden");
  }
  
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

function toggleStar() {
  const item = currentBlockData[pos];
  if (starredIds.includes(item.audio)) {
    starredIds = starredIds.filter(id => id !== item.audio);
  } else {
    starredIds.push(item.audio);
  }
  localStorage.setItem('greta_stars', JSON.stringify(starredIds));
  update();
}

function play(speed) {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  if (!audioObj.src.includes(item.audio)) {
    audioObj.src = item.audio;
    progressBar.value = 0;
  }
  audioObj.playbackRate = speed;
  audioObj.play().catch(() => {});
}

function reveal() {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  document.getElementById("es").innerHTML = item.es;
  document.getElementById("en").innerHTML = item.en;
  document.getElementById("es").classList.remove("hidden");
  document.getElementById("en").classList.remove("hidden");
  if (mode === "ES") play(1.0);
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleList(type) {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden")) { box.classList.add("hidden"); return; }
  box.innerHTML = type === 'stars' ? "<h3>Frases destacades (★):</h3>" : "";
  
  const listToRender = type === 'stars' 
    ? items.filter(i => starredIds.includes(i.audio))
    : (currentBlockID === 'T' ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10));

  if (listToRender.length === 0 && type === 'stars') {
    box.innerHTML = "<p style='padding:10px;'>Encara no has marcat cap frase.</p>";
  }

  listToRender.forEach((i) => {
    const d = document.createElement("div");
    d.style.padding = "10px 0"; d.style.borderBottom = "1px solid #eee";
    d.innerHTML = `<div style="color:#0f172a; font-weight:800;">${i.en}</div><div style="color:#2563eb; font-weight:700;">${i.es}</div>`;
    box.appendChild(d);
  });
  box.classList.remove("hidden");
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "index4"; }
function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó marcada ✅");
}

if (localStorage.getItem(getFolderName())) { 
    const mc = document.getElementById("mainCheck");
    mc.innerHTML = "✓"; mc.classList.add('marked'); 
}

initBlocks();
</script>
</body>
</html>
