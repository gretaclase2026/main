 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repàs Personalitzat - 76 Frases</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center}
.unit-number{font-size:24px;font-weight:800;color:#2563eb;margin:0 15px}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

/* Bloques con un poco más de margen izquierdo para que no se corten */
.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex: 0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1)}
.block.all-btn { background: #e2e8f0; color: #475569; }

.audio-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2; color: inherit;} 
.audio-btn.rec{background:#fca5a5; color: white;}
.audio-btn.rec.recording { animation: pulse 1.5s infinite; background: #ef4444; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

/* Estrella a la izquierda de la tortuga, misma fila */
.star-btn { background: none; border: none; font-size: 32px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 5px 0 0; margin-right: 5px; }
.star-btn.active { color: #f59e0b !important; }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.list-controls { display: flex; gap: 10px; margin-top: 16px; }
.list-btn{ flex:1; background:#e9d5ff; border:none; border-radius:16px; padding:14px; font-weight:800; cursor:pointer; font-size:13px }
.review-btn { background: #fef3c7; color: #92400e; }

.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item { display: flex; align-items: flex-start; gap: 15px; padding: 15px 0; border-bottom: 1px solid #eee; }
.list-controls-side { display: flex; flex-direction: column; gap: 8px; min-width: 44px; align-items: center; }
.list-texts { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }

.mini-btn { border: none; border-radius: 10px; width: 38px; height: 38px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.btn-audio { background: #dbeafe; }
.btn-rec-mini { background: #fbcfe8; }
.star-btn-list { background: none; border: none; font-size: 26px; cursor: pointer; color: #cbd5e1; padding: 0; line-height: 1; }
.star-btn-list.active { color: #f59e0b !important; }

.blur { filter: blur(5px); transition: filter 0.2s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }
</style>
</head>
<body>

<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">Mode anglès → castellà</button></div>
 <div class="unit-number">4</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('ES')">Mode castellà → anglès</button></div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>

 <div id="langLabel" class="lang" style="margin-top: 10px;">ANGLÈS</div>
 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button class="star-btn" id="starBtn" onclick="toggleStar()">★</button>
  <button class="audio-btn slow" onclick="playCurrent(0.75)">🐢</button>
  <button class="audio-btn" onclick="playCurrent(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord()">🎤</button>
 </div>
 
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100" step="0.1"></div>
 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>
 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
 <div class="list-controls">
    <button class="list-btn" onclick="toggleList('all')">Tota la llista</button>
    <button class="list-btn review-btn" onclick="toggleList('stars')">Repàs (★)</button>
 </div>
 <div id="endMsg" class="hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>
// El resto del script permanece igual que en tu index4.html original
// (He mantenido toda la lógica de items, audio, grabación y manejo de bloques intacta)

const items = [
    {audio:"f001.mp3",en:"It was so dark in the hallway that I had a lot of trouble finding the keyhole with my keys, and I spent several minutes trying to open the door.",es:"Estaba tan oscuro en el pasillo que tuve muchos problemas para encontrar la cerradura con las llaves y pasé varios minutos intentando abrir la puerta."},
    {audio:"f002.mp3",en:"I was walking through the living room in the middle of the night and I couldn't find the light switch, so I accidentally tripped over the dog's bed.",es:"Estaba caminando por el salón en mitad de la noche y no encontraba el interruptor de la luz, así que tropecé accidentalmente con la cama del perro."},
    {audio:"f003.mp3",en:"The plug of the toaster is a bit loose, so sometimes I have to move it around several times until the machine finally starts working correctly.",es:"El enchufe de la tostadora está un poco flojo, así que a veces tengo que moverlo varias veces hasta que la máquina empieza a funcionar correctamente."},
    {audio:"f004.mp3",en:"There isn't a single socket near my bed to charge my phone at night, so I have to leave it on the desk across the room.",es:"No hay ni un solo enchufe cerca de mi cama para cargar el móvil por la noche, así que tengo que dejarlo en el escritorio al otro lado de la habitación."},
    {audio:"f005.mp3",en:"I really need to organize all the electronics behind the television because there is a mess of cable everywhere and it is very difficult to clean the dust.",es:"Realmente necesito organizar todos los aparatos electrónicos detrás del televisor porque hay un lío de cables por todas partes y es muy difícil limpiar el polvo."},
    {audio:"f006.mp3",en:"Since the lamp is too far from the wall, I had to use an extension lead so I could have enough light to read comfortably on the sofa.",es:"Como la lámpara está demasiado lejos de la pared, tuve que usar un alargador para poder tener suficiente luz y leer cómodamente en el sofá."},
    {audio:"f007.mp3",en:"All the lights in the kitchen suddenly went out because a fuse blew while I was using the microwave and the electric oven at the same time.",es:"Todas las luces de la cocina se apagaron de repente porque saltó un fusible mientras estaba usando el microondas y el horno eléctrico al mismo tiempo."},
    {audio:"f008.mp3",en:"I realized that I had a bit of tomato sauce on my face, so I looked for a napkin on the table to clean myself before our guests arrived.",es:"Me di cuenta de que tenía un poco de salsa de tomate en la cara, así que busqué una servilleta en la mesa para limpiarme antes de que llegaran nuestros invitados."},
    {audio:"f009.mp3",en:"We only use the white tablecloth when we have a special dinner at home because it is very difficult to remove the stains if someone spills wine.",es:"Solo usamos el mantel blanco cuando tenemos una cena especial en casa porque es muy difícil quitar las manchas si alguien derrama vino."},
    {audio:"f010.mp3",en:"She carried all the coffee cups and the sugar on a large tray so she wouldn't have to walk back and forth from the kitchen several times.",es:"Llevó todas las tazas de café y el azúcar en una bandeja grande para no tener que ir y venir de la cocina varias veces."},
    {audio:"f011.mp3",en:"I was trying to serve the soup into the bowls, but the ladle was at the bottom of the drawer and I had to move everything to find it.",es:"Estaba intentando servir la sopa en los cuencos, pero el cucharón estaba en el fondo del cajón y tuve que moverlo todo para encontrarlo."},
    {audio:"f012.mp3",en:"You should use a silicone spatula to flip the eggs so you don't scratch the bottom of the pan while you are cooking breakfast.",es:"Deberías usar una espátula de silicona para dar la vuelta a los huevos y no rayar el fondo de la sartén mientras preparas el desayuno."},
    {audio:"f013.mp3",en:"I had to use the manual whisk to mix the cream and the sugar because the electric mixer was broken and I really wanted to make a cake.",es:"Tuve que usar las varillas manuales para mezclar la nata y el azúcar porque la batidora eléctrica estaba rota y tenía muchas ganas de hacer un pastel."},
    {audio:"f014.mp3",en:"Make sure you put enough oil in the frying pan before you start cooking the potatoes, otherwise they will stick to the bottom and burn.",es:"Asegúrate de poner suficiente aceite en la sartén antes de empezar a cocinar las patatas, porque si no se pegarán al fondo y se quemarán."},
    {audio:"f015.mp3",en:"I put some milk in a small saucepan to heat it up for my chocolate, but I got distracted talking on the phone and the milk boiled over.",es:"Puse un poco de leche en un cazo pequeño para calentarla para el chocolate, pero me distraje hablando por teléfono y la leche se derramó."},
    {audio:"f016.mp3",en:"We need a much larger pot if we want to cook enough pasta for all the people who are coming to eat at our house this Sunday.",es:"Necesitamos una olla mucho más grande si queremos cocinar suficiente pasta para toda la gente que viene a comer a nuestra casa este domingo."},
    {audio:"f017.mp3",en:"I always use a wooden chopping board to cut the vegetables because it is much better for the knives and it is easier to clean after preparing dinner.",es:"Siempre uso una tabla de cortar de madera para cortar las verduras porque es mucho mejor para los cuchillos y es más fácil de limpiar después de preparar la cena."},
    {audio:"f018.mp3",en:"After the pasta was ready, I looked for the strainer in the sink to remove the hot water, but I realized that it was still inside the dishwasher.",es:"Cuando la pasta estuvo lista, busqué el colador en el fregadero para quitar el agua caliente, pero me di cuenta de que todavía estaba dentro del lavavajillas."},
    {audio:"f019.mp3",en:"My mother always says that you should use a sieve for the flour when you make a sponge cake so that the texture is much lighter and without any lumps.",es:"Mi madre siempre dice que hay que usar un tamiz para la harina cuando haces un bizcocho para que la textura sea mucho más ligera y sin grumos."},
    {audio:"f020.mp3",en:"I found a tin can of tomato soup in the back of the cupboard that had been there for months, so I decided to heat it up for a quick lunch.",es:"Encontré una lata de sopa de tomate al fondo del armario que llevaba allí meses, así que decidí calentarla para un almuerzo rápido."},
    {audio:"f021.mp3",en:"It is very difficult for me to open this jar of jam because the lid is stuck, so I might need to put it under some hot water for a few seconds.",es:"Me resulta muy difícil abrir este tarro de mermelada porque la tapa está atascada, así que puede que tenga que ponerlo bajo agua caliente unos segundos."},
    {audio:"f022.mp3",en:"We were ready to drink some cold sodas on the terrace, but we had to go back to the kitchen because nobody could find the bottle opener.",es:"Estábamos listos para beber unos refrescos fríos en la terraza, pero tuvimos que volver a la cocina porque nadie encontraba el abrebotellas."},
    {audio:"f023.mp3",en:"Since we are having a nice dinner tonight, I need to find the corkscrew to open the bottle of wine that my friends brought as a gift.",es:"Como esta noche tenemos una cena agradable, necesito encontrar el sacacorchos para abrir la botella de vino que trajeron mis amigos como regalo."},
    {audio:"f024.mp3",en:"I need to find the broom to sweep the kitchen floor because I accidentally dropped a glass and there are small pieces everywhere.",es:"Necesito encontrar la escoba para barrer el suelo de la cocina porque se me cayó un vaso accidentalmente y hay pequeños trozos por todas partes."},
    {audio:"f025.mp3",en:"After I finished sweeping the living room, I used the mop with some floor cleaner to make sure everything was smelling fresh and looking shiny.",es:"Después de terminar de barrer el salón, usé la fregona con un poco de limpiador para asegurarme de que todo oliera fresco y quedara brillante."},
    {audio:"f026.mp3",en:"I filled the plastic bucket with warm water and a bit of soap so I could clean the terrace before the guests arrived for the barbecue.",es:"Llené el cubo de plástico con agua templada y un poco de jabón para poder limpiar la terraza antes de que llegaran los invitados a la barbacoa."},
    {audio:"f027.mp3",en:"There is so much dust on top of the bookshelf that I can't even see the color of the books, so I really need to clean it this afternoon.",es:"Hay tanto polvo encima de la estantería que ni siquiera puedo ver el color de los libros, así que realmente necesito limpiarla esta tarde."},
    {audio:"f028.mp3",en:"The kids were playing in the garden all day and they brought a lot of dirt into the house with their shoes, so now I have to clean the carpet.",es:"Los niños estuvieron jugando en el jardín todo el día y trajeron mucha suciedad a la casa con los zapatos, así que ahora tengo que limpiar la alfombra."},
    {audio:"f029.mp3",en:"I used an old rag to dry the water that spilled on the wooden table so that the moisture wouldn't ruin the surface.",es:"Usé un trapo viejo para secar el agua que se derramó sobre la mesa de madera para que la humedad no estropeara la superficie."},
    {audio:"f030.mp3",en:"I had to use a very soft sponge to clean the windows because I was afraid that a rougher material might leave some permanent scratches on the glass.",es:"Tuve que usar una esponja muy suave para limpiar las ventanas porque tenía miedo de que un material más áspero dejara arañazos permanentes en el cristal."},
    {audio:"f031.mp3",en:"I bought a new brand of liquid detergent that smells like lavender because the one I was using before didn't remove the stains from my clothes very well.",es:"Compré una nueva marca de detergente líquido que huele a lavanda porque el que usaba antes no quitaba muy bien las manchas de la ropa."},
    {audio:"f032.mp3",en:"You should be very careful when you use bleach to clean the bathroom floor because if a single drop falls on your clothes, it will leave a white stain forever.",es:"Deberías tener mucho cuidado cuando uses lejía para limpiar el suelo del baño porque si una sola gota cae sobre la ropa, dejará una mancha blanca para siempre."},
    {audio:"f033.mp3",en:"The vacuum cleaner is making a very strange noise today, so I think the bag might be completely full and I need to empty it before I continue.",es:"La aspiradora está haciendo un ruido muy extraño hoy, así que creo que la bolsa puede estar completamente llena y necesito vaciarla antes de continuar."},
    {audio:"f034.mp3",en:"There was so much rubbish inside the house after the party that we spent the whole morning putting everything into large bags to take them outside.",es:"Había tanta basura dentro de la casa después de la fiesta que pasamos toda la mañana metiéndolo todo en bolsas grandes para sacarlas fuera."},
    {audio:"f035.mp3",en:"Could you please take the bag out of the kitchen bin and put a new one in, because the smell is starting to be quite unpleasant in the whole room?",es:"¿Podrías por favor sacar la bolsa de la papelera de la cocina y poner una nueva, porque el olor está empezando a ser bastante desagradable en toda la habitación?"},
    {audio:"f036.mp3",en:"I was trying to use the stapler to keep all these important documents together, but I think it is broken because the papers keep falling apart every time I try.",es:"Estaba intentando usar la grapadora para mantener todos estos documentos importantes juntos, pero creo que está rota porque los papeles se separan cada vez que lo intento."},
    {audio:"f037.mp3",en:"I need to find a box of refills because I just used the last staple and I still have a lot of pages that I need to organize before the end of the day.",es:"Necesito encontrar una caja de recambios porque acabo de usar la última grapa y todavía tengo muchas páginas que organizar antes de que el día termine."},
    {audio:"f038.mp3",en:"I used some transparent tape to fix the corner of the map that was starting to tear, so now it looks much better and it won't break any further.",es:"Usé un poco de cinta adhesiva transparente para arreglar la esquina del mapa que empezaba a romperse, así que ahora se ve mucho mejor y no se romperá más."},
    {audio:"f039.mp3",en:"I made a small mistake while I was writing the address on the envelope, but luckily I was using a pencil and I could fix it quickly with an eraser.",es:"Cometí un pequeño error mientras escribía la dirección en el sobre, pero por suerte estaba usando un lápiz y pude arreglarlo rápidamente con una goma."},
    {audio:"f040.mp3",en:"I used a long piece of string to tie the box of old magazines together so they would be easier to carry down to the basement this afternoon.",es:"Usé un trozo largo de cuerda para atar la caja de revistas viejas y que fuera más fácil bajarlas al sótano esta tarde."},
    {audio:"f041.mp3",en:"We had to use a very thick rope to secure the furniture on top of the car because we didn't want anything to move while we were driving on the highway.",es:"Tuvimos que usar una cuerda muy gruesa para asegurar los muebles encima del coche porque no queríamos que nada se moviera mientras conducíamos por la autopista."},
    {audio:"f042.mp3",en:"I tied the plastic bag with a very tight knot so the smell of the rubbish wouldn't come out, but now I can't open it again and I have to use scissors.",es:"Até la bolsa de plástico con un nudo muy apretado para que no saliera el olor de la basura, pero ahora no puedo volver a abrirla y tengo que usar tijeras."},
    {audio:"f043.mp3",en:"I had to stop walking in the middle of the street because a small pebble got inside my shoe and it was very uncomfortable to continue.",es:"Tuve que dejar de caminar en mitad de la calle porque una pequeña piedra se metió dentro de mi zapato y era muy incómodo continuar."},
    {audio:"f044.mp3",en:"I noticed a small crack on the living room wall after the heavy rain, so I think I should call someone to check if there is any water leaking inside.",es:"Noté una pequeña grieta en la pared del salón después de la fuerte lluvia, así que creo que debería llamar a alguien para comprobar si hay alguna filtración de agua."},
    {audio:"f045.mp3",en:"Make sure you put the cap back on the toothpaste after you use it, because if you leave it open, the paste will get hard and it will be difficult to use tomorrow.",es:"Asegúrate de volver a poner el tapón en la pasta de dientes después de usarla, porque si la dejas abierta, la pasta se endurecerá y será difícil usarla mañana."},
    {audio:"f046.mp3",en:"I always remove the tag from my new clothes before I wear them for the first time because the plastic can be very itchy and annoying on my neck.",es:"Siempre quito la etiqueta de la ropa nueva antes de usarla por primera vez porque el plástico puede picar mucho y resultar molesto en el cuello."},
    {audio:"f047.mp3",en:"I found a small screw on the floor under the kitchen table, and now I am worried that one of the chairs might be loose and unsafe to sit on.",es:"Encontré un tornillo pequeño en el suelo debajo de la mesa de la cocina y ahora me preocupa que una de las sillas esté floja y no sea segura para sentarse."},
    {audio:"f048.mp3",en:"I need to find a flat screwdriver to open the back of the TV remote because the batteries are dead and I want to watch the news.",es:"Necesito encontrar un destornillador plano para abrir la parte trasera del mando de la televisión porque las pilas están agotadas y quiero ver las noticias."},
    {audio:"f049.mp3",en:"The wire on the garden fence was bent, so I used some pliers to straighten it out and make sure it wasn't dangerous for the dog.",es:"El alambre de la valla del jardín estaba doblado, así que usé unos alicates para enderezarlo y asegurarme de que no fuera peligroso para el perro."},
    {audio:"f050.mp3",en:"There is a small water leak under the bathroom sink, so I think I need a wrench to tighten the pipe before the whole floor gets wet.",es:"Hay una pequeña fuga de agua debajo del lavabo del baño, así que creo que necesito una llave inglesa para apretar el tubo antes de que se moje todo el suelo."},
    {audio:"f051.mp3",en:"We should use a tape measure to see if the new sofa will fit in the living room, because it looks much larger in the store than it does here.",es:"Deberíamos usar una cinta métrica para ver si el sofá nuevo cabrá en el salón, porque en la tienda parece mucho más grande que aquí."},
    {audio:"f052.mp3",en:"I had to climb up the ladder to change the light bulb in the ceiling because it is so high that I cannot reach it even if I stand on a chair.",es:"Tuve que subir por la escalera para cambiar la bombilla del techo porque está tan alta que no puedo alcanzarla ni siquiera subiéndose a una silla."},
    {audio:"f053.mp3",en:"I put a small plant on the window ledge because I wanted it to get more sunlight, but now I have to be careful when I open the window so it doesn't fall.",es:"Puse una planta pequeña en el alféizar de la ventana porque quería que recibiera más luz solar, pero ahora tengo que tener cuidado al abrir la ventana para que no se caiga."},
    {audio:"f054.mp3",en:"It was so windy last night that the shutter in my bedroom kept hitting the wall, making a loud noise that didn't let me sleep until I went to close it.",es:"Hacía tanto viento anoche que la contraventana de mi dormitorio no dejaba de golpear la pared, haciendo un ruido fuerte que no me dejó dormir hasta que fui a cerrarla."},
    {audio:"f055.mp3",en:"The curtains in the living room are very difficult to move because the rail is a bit rusty, so I think I should put some oil on it to make it slide better.",es:"Las cortinas del salón son muy difíciles de mover porque el riel está un poco oxidado, así que creo que debería ponerle un poco de aceite para que deslice mejor."},
    {audio:"f056.mp3",en:"This old house has a beautiful wooden beam across the ceiling of the kitchen, which gives the whole room a very cozy and traditional feeling.",es:"Esta casa antigua tiene una hermosa viga de madera que cruza el techo de la cocina, lo que le da a toda la estancia un ambiente muy acogedor y tradicional."},
    {audio:"f057.mp3",en:"We decided to change the flooring in the hallway because the old wood was starting to make too much noise every time someone walked on it at night.",es:"Decidimos cambiar el suelo del pasillo porque la madera vieja empezaba a hacer demasiado ruido cada vez que alguien caminaba sobre ella por la noche."},
    {audio:"f058.mp3",en:"I was using the grater to prepare some cheese for the pizza, but I had to be very careful because the edges are very sharp and I didn't want to cut my fingers.",es:"Estaba usando el rallador para preparar queso para la pizza, pero tuvé que tener mucho cuidado porque los bordes son muy afilados y no quería cortarme los dedos."},
    {audio:"f059.mp3",en:"It is much faster to use a peeler than a knife when you have to prepare a lot of potatoes for a big family dinner, and it is also much safer.",es:"Es mucho más rápido usar un pelador que un cuchillo cuando tienes que preparar muchas patatas para una cena familiar grande, y además es mucho más seguro."},
    {audio:"f060.mp3",en:"Please use the metal tongs to take the meat out of the pan so you don't burn yourself with the hot oil while you are cooking.",es:"Por favor, usa las pinzas metálicas para sacar la carne de la sartén y no quemarte con el aceite caliente mientras cocinas."},

];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

function getFolderName() { return "frases-76-hogar"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

let mediaRecorder, audioChunks = [], isRecording = false;

async function toggleRecord(targetBtnId = "recBtn") {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                new Audio(audioUrl).play();
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording"); btn.textContent = "⏹";
        } catch (err) { alert("Error al accedir al micròfon."); }
    } else {
        mediaRecorder.stop(); isRecording = false;
        btn.classList.remove("recording"); btn.textContent = "🎤";
    }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_puntoLibro");
  container.innerHTML = "";
  
  const allBtn = document.createElement("button");
  allBtn.className = "block all-btn";
  allBtn.textContent = "T";
  allBtn.onclick = () => loadAll();
  container.appendChild(allBtn);

  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  
  if (savedBlock === "all") {
    loadAll();
  } else {
    loadBlock((savedBlock !== null) ? parseInt(savedBlock) : 0);
  }
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_puntoLibro", b);
  let temp = [];
  let start = b * 10;
  let end = Math.min(start + 10, items.length);
  for (let i = start; i < end; i++) temp.push({...items[i]});
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn, idx) => {
      btn.classList.toggle("active", idx === (b + 1));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("endMsg").classList.add("hidden");
  update(true);
}

function loadAll() {
  currentBlockID = -1;
  localStorage.setItem(getFolderName() + "_puntoLibro", "all");
  currentBlockData = items.map(i => ({...i})).sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn, idx) => {
      btn.classList.toggle("active", idx === 0);
  });
  pos = 0; learnedCount = 0;
  document.getElementById("endMsg").classList.add("hidden");
  update(true);
}

function update(fromAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("en").classList.add("hidden");
    document.getElementById("es").classList.add("hidden");
    document.getElementById("endMsg").classList.remove("hidden");
    return;
  }
  progressBar.value = 0;
  const item = currentBlockData[pos];
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");
  document.getElementById("starBtn").classList.toggle("active", starredIds.includes(item.audio));
  
  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    document.getElementById("en").innerHTML = item.en;
    document.getElementById("en").classList.remove("hidden");
    if (fromAction) playAudio(item.audio, 1.0);
  } else {
    document.getElementById("langLabel").textContent = "CASTELLÀ";
    document.getElementById("es").innerHTML = item.es;
    document.getElementById("es").classList.remove("hidden");
  }
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

function playAudio(src, speed) { audioObj.src = src; audioObj.playbackRate = speed; audioObj.play().catch(() => {}); }
function playCurrent(speed) { if (currentBlockData.length > 0) playAudio(currentBlockData[pos].audio, speed); }
function pauseAudio() { audioObj.pause(); }

function reveal() {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  const esDiv = document.getElementById("es");
  const enDiv = document.getElementById("en");
  if (!enDiv.classList.contains("hidden") && mode === "EN") {
      esDiv.classList.add("hidden");
  } else if (!enDiv.classList.contains("hidden") && mode === "ES") {
      enDiv.classList.add("hidden");
  } else {
      esDiv.innerHTML = item.es;
      enDiv.innerHTML = item.en;
      esDiv.classList.remove("hidden");
      enDiv.classList.remove("hidden");
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++; 
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleStar(forcedId = null) {
  const audio = forcedId || currentBlockData[pos].audio;
  if (starredIds.includes(audio)) {
    starredIds = starredIds.filter(id => id !== audio);
  } else {
    starredIds.push(audio);
  }
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  update();
}

function toggleList(type) {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden") && box.dataset.activeType === type) { 
    box.classList.add("hidden"); 
    return; 
  }
  box.dataset.activeType = type;
  renderList(type);
  box.classList.remove("hidden");
}

function renderList(type) {
  const box = document.getElementById("listBox");
  box.innerHTML = type === 'stars' ? "<h3>Frases destacades (★):</h3>" : "<h3>Tota la llista:</h3>";
  
  let listToRender = [];
  if (type === 'stars') {
      listToRender = items.filter(i => starredIds.includes(i.audio));
  } else {
      listToRender = (currentBlockID === -1) ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10);
  }

  if (listToRender.length === 0) {
    box.innerHTML += "<p style='padding:10px;'>Buit.</p>";
    return;
  }

  listToRender.forEach((i, index) => {
    const isStarred = starredIds.includes(i.audio);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    const recId = `rec-list-${index}`;
    itemDiv.innerHTML = `
      <div class="list-controls-side">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.audio}'); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio" onclick="playAudio('${i.audio}', 1.0)">🔊</button>
        <button class="mini-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button>
      </div>
      <div class="list-texts">
        <div style="color:#2563eb; font-weight:700;">${i.es}</div>
        <div id="rev-${index}" class="blur" style="font-weight:800;" onclick="this.classList.toggle('revealed')">${i.en}</div>
      </div>
    `;
    box.appendChild(itemDiv);
  });
}

function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó completada ✅");
}

if (localStorage.getItem(getFolderName())) { 
    const mc = document.getElementById("mainCheck");
    if(mc) { mc.innerHTML = "✓"; mc.classList.add('marked'); }
}

initBlocks();
</script>
</body>
</html>
