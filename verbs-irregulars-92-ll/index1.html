body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}

.card{width:100%;max-width:600px;background:#fff;border-radius:28px;padding:30px;text-align:center;box-shadow:0 10px 24px rgba(0,0,0,0.08)}

.counter{font-weight:800;color:#2563eb;margin-bottom:10px}
.en{font-size:22px;font-weight:800;margin-top:10px}
.es{font-size:20px;color:#2563eb;margin-top:10px}

.audio-container{display:flex;justify-content:center;gap:15px;margin:15px 0}

.audio-btn{width:70px;height:70px;border-radius:50%;border:none;font-size:28px;background:#dbeafe;cursor:pointer}
.slow{background:#fef08a}

.star-btn{border:none;background:none;font-size:32px;color:#cbd5e1;cursor:pointer}
.star-btn.active{color:#f59e0b}

.progress-wrapper{margin:10px 0}
input[type=range]{width:100%}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:20px}
button.action{padding:14px;border:none;border-radius:14px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.blocks{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:15px}
.block{width:36px;height:36px;border-radius:50%;border:none;background:#e5e7eb;font-weight:700;cursor:pointer}
.block.active{background:#2563eb;color:white}

.list-box{max-width:600px;margin:20px auto;background:#fff;border-radius:18px;padding:15px;border:1px solid #ddd}
.list-item{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;padding:10px 0}
.mini-btn{width:35px;height:35px;border:none;border-radius:8px;cursor:pointer}
.btn-audio{background:#fef08a}
.btn-eye{background:#e0f2fe}
.btn-ok{background:#dcfce7}
.hidden{display:none}
</style>
</head>

</div>
</main>

let blockSize=10
let block=0
let pos=0
let currentBlock=[]
let audio=new Audio()

let stars=JSON.parse(localStorage.getItem("stars"))||[]

const progress=document.getElementById("progressBar")

audio.ontimeupdate=()=>{
 if(audio.duration){
  progress.value=(audio.currentTime/audio.duration)*100
 }
}

progress.oninput=()=>{
 if(audio.duration){
  audio.currentTime=(progress.value/100)*audio.duration
 }
}

function initBlocks(){
 const b=document.getElementById("blocks")
 let total=Math.ceil(items.length/blockSize)
 for(let i=0;i<total;i++){
  const btn=document.createElement("button")
  btn.className="block"
  btn.textContent=i+1
  btn.onclick=()=>loadBlock(i)
  b.appendChild(btn)
 }
 loadBlock(0)
}

function loadBlock(i){
 block=i
 localStorage.setItem("block",i)
 currentBlock=items.slice(i*blockSize,(i+1)*blockSize)
 pos=0

 document.querySelectorAll(".block").forEach((b,n)=>{
  b.classList.toggle("active",n===i)
 })

 update()
}

function update(){
 const item=currentBlock[pos]

 document.getElementById("en").textContent=item.en
 document.getElementById("es").textContent=item.es
 document.getElementById("es").classList.add("hidden")

 document.getElementById("counter").textContent=(pos+1)+" / "+currentBlock.length

 document.getElementById("starBtn").classList.toggle("active",stars.includes(item.audio))
}

function reveal(){
 document.getElementById("es").classList.remove("hidden")
}

function playCurrent(speed){
 const item=currentBlock[pos]
 audio.src=item.audio
 audio.playbackRate=speed
 audio.play().catch(()=>{})
}

function nextOne(){
 pos=(pos+1)%currentBlock.length
 update()
}

function know(){
 nextOne()
}

function toggleStar(){
 const id=currentBlock[pos].audio
 if(stars.includes(id)){
  stars=stars.filter(i=>i!==id)
 }else{
  stars.push(id)
 }
 localStorage.setItem("stars",JSON.stringify(stars))
 update()
}

function toggleReview(){
 const box=document.getElementById("reviewBox")
 box.innerHTML=""
 box.classList.toggle("hidden")

 stars.forEach(id=>{
  const item=items.find(i=>i.audio===id)
  if(!item) return

  const row=document.createElement("div")
  row.className="list-item"

  const txt=document.createElement("div")
  txt.innerHTML="<b>"+item.en+"</b><br>"+item.es

  const actions=document.createElement("div")

  const a=document.createElement("button")
  a.className="mini-btn btn-audio"
  a.textContent="🔊"
  a.onclick=()=>{audio.src=item.audio;audio.play()}

  const e=document.createElement("button")
  e.className="mini-btn btn-eye"
  e.textContent="👁"
  e.onclick=()=>alert(item.es)

  const ok=document.createElement("button")
  ok.className="mini-btn btn-ok"
  ok.textContent="✔"
  ok.onclick=()=>{
    stars=stars.filter(s=>s!==id)
    localStorage.setItem("stars",JSON.stringify(stars))
    toggleReview()
    toggleReview()
  }

  actions.appendChild(a)
  actions.appendChild(e)
  actions.appendChild(ok)

  row.appendChild(txt)
  row.appendChild(actions)

  box.appendChild(row)
 })

}

initBlocks()
