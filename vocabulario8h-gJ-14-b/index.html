 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO</title>
    <style>
        :root { --p-pink: #ffcfd2; --p-blue-soft: #d4eaf7; --p-blue-strong: #2196F3; --telegram-blue: #24A1DE; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        .card { background: white; width: 100%; max-width: 650px; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-bottom: 10px; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 12px; border-radius: 15px; font-size: 1em; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; }
        .config-bar { background: #fff; padding: 8px; border-radius: 15px; margin-bottom: 10px; border: 2px solid var(--p-pink); display: flex; align-items: center; gap: 5px; justify-content: center; font-size: 0.9em; }
        .config-bar input { width: 40px; padding: 4px; border-radius: 5px; border: 1px solid var(--p-pink); text-align: center; font-weight: bold; }
        #pregunta { font-size: 2.2em; color: var(--p-blue-strong); margin: 5px 0; font-weight: bold; }
        #resposta { width: 95%; padding: 12px; font-size: 1.5em; border-radius: 15px; border: 3px solid var(--p-pink); text-align: center; outline: none; }
        .btn { padding: 10px 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 3px; }
        .star-btn { font-size: 2.2em; cursor: pointer; color: #ccc; background:none; border:none; line-height:1; }
        .star-btn.active { color: #ffb703; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 8px 2px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.85em; }
        .col-tools { display: flex; align-items: center; gap: 5px; min-width: 70px; }
        .num-word { color: #bbb; font-weight: bold; width: 20px; font-size: 0.8em; }
        .star-list { color: #ffb703; width: 15px; text-align: center; }
        .btn-audio { background:none; border:none; cursor:pointer; font-size: 1.4em; padding:5px; }
        .hidden { display: none !important; }
        #solucio-text { font-size: 1.5em; font-weight: bold; margin: 10px 0; min-height: 1.6em; }
    </style>
</head>
<body>

    <div class="card" id="p-fitxer">
        <h1 style="color:var(--telegram-blue)">VOCABULARI</h1>
        <div class="grid-menu">
            <button class="menu-btn" onclick="carregarCSV('vocabulariGrups.csv')">GRUPS</button>
            <button class="menu-btn" onclick="carregarCSV('vocabulariTemes.csv')">TEMES</button>
        </div>
    </div>

    <div class="card hidden" id="p-grups">
        <h2 style="color: var(--p-blue-strong)">Tria categoria:</h2>
        <div id="grid-selector" class="grid-menu"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">🔙 Tornar</button>
    </div>

    <div id="p-estudi" class="hidden" style="width: 100%; max-width: 650px;">
        <div class="card">
            <h2 id="titol-estudi" style="color:var(--p-blue-strong); margin:0 0 10px 0; font-size:1.2em;"></h2>
            
            <div class="config-bar">
                <button class="btn" style="background:var(--p-blue-soft); padding:5px 10px;" onclick="canviarIdioma()"><b id="txt-idioma">CAS</b></button>
                <button class="btn" id="btn-repas" style="background:#eee; padding:5px 10px;" onclick="toggleRepas()">⭐ Repàs: OFF</button>
                <span>D: <input type="number" id="row-desde" value="1" onchange="actualitzarRang()"></span>
                <span>F: <input type="number" id="row-fins" value="100" onchange="actualitzarRang()"></span>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="star-main" class="star-btn" onclick="toggleEstrellaActual()">★</button>
                <div id="feedback" style="font-weight:bold; font-size:1.2em;"></div>
                <div></div> </div>

            <h1 id="pregunta">---</h1>
            <div id="solucio-text"></div>

            <div style="margin-bottom: 10px;">
                <button class="btn-audio" onclick="reproduirActual(1.0)">🔊</button>
                <button class="btn-audio" onclick="reproduirActual(0.5)">🐢</button>
            </div>

            <input type="text" id="resposta" placeholder="Escriu..." autocomplete="off">
            
            <div style="margin-top:10px;">
                <button class="btn" style="background:var(--p-blue-soft)" onclick="validar()">Comprovar (Intro)</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:#bbb; margin-top:10px; font-size:0.8em;">🔙 Menú Principal</button>
        </div>

        <div class="card" style="padding:10px;">
            <div style="max-height: 350px; overflow-y: auto;">
                <table id="taula-joc"></table>
            </div>
        </div>
    </div>

<script>
    let dadesTotals = [], dadesCat = [], dadesJoc = [], index = 0;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repasIds') || '[]'));
    let idioma = 'CAS', modoRepas = false, errorActive = false, correctActive = false;

    async function carregarCSV(nom) {
        const r = await fetch(nom);
        const t = await r.text();
        dadesTotals = t.split(/\r?\n/).filter(l => l.trim() !== '').map((l, i) => {
            const p = l.split(';');
            return { id: i + nom, cat: p[0]?.trim(), eng: p[1]?.trim(), esp: p[2]?.trim() };
        }).filter(d => {
            if (!d.eng || !d.cat) return false;
            const c = d.cat.toLowerCase();
            return c !== 'category' && !c.includes('análisis');
        });

        const cats = [...new Set(dadesTotals.map(d => d.cat))];
        const grid = document.getElementById('grid-selector');
        grid.innerHTML = '';
        cats.forEach(c => {
            const b = document.createElement('button');
            b.className = 'menu-btn'; b.innerText = c;
            b.onclick = () => carregarCategoria(c);
            grid.appendChild(b);
        });
        document.getElementById('p-fitxer').classList.add('hidden');
        document.getElementById('p-grups').classList.remove('hidden');
    }

    function carregarCategoria(c) {
        dadesCat = dadesTotals.filter(d => d.cat === c);
        document.getElementById('titol-estudi').innerText = c;
        document.getElementById('row-fins').value = dadesCat.length;
        document.getElementById('p-grups').classList.add('hidden');
        document.getElementById('p-estudi').classList.remove('hidden');
        actualitzarRang();
    }

    function actualitzarRang() {
        const d = parseInt(document.getElementById('row-desde').value) - 1;
        const f = parseInt(document.getElementById('row-fins').value);
        let base = dadesCat.slice(d, f);
        if (modoRepas) base = base.filter(item => repasIds.has(item.id));
        dadesJoc = base.sort(() => Math.random() - 0.5);
        index = 0;
        nouRepte();
        actualitzarTaula(base);
    }

    function nouRepte() {
        if (dadesJoc.length === 0) return;
        if (index >= dadesJoc.length) { dadesJoc.sort(() => Math.random() - 0.5); index = 0; }
        errorActive = false;
        correctActive = false;
        const p = dadesJoc[index];
        document.getElementById('pregunta').innerText = (idioma === 'CAS') ? p.esp : p.eng;
        const r = document.getElementById('resposta');
        r.value = ""; r.style.color = "var(--text)";
        r.disabled = false;
        document.getElementById('feedback').innerText = "";
        document.getElementById('solucio-text').innerText = "";
        document.getElementById('star-main').classList.toggle('active', repasIds.has(p.id));
        r.focus();
    }

    function validar() {
        if (dadesJoc.length === 0 || errorActive || correctActive) return;
        const p = dadesJoc[index];
        const user = document.getElementById('resposta').value.trim().toLowerCase();
        const ok = (idioma === 'CAS') ? p.eng.toLowerCase() : p.esp.toLowerCase();
        const solucioMostrada = (idioma === 'CAS') ? p.eng : p.esp;
        
        reproduir(p.eng, 1.0);
        document.getElementById('solucio-text').innerText = solucioMostrada.toUpperCase();
        document.getElementById('solucio-text').style.color = "var(--telegram-blue)";

        if (user === ok) {
            document.getElementById('feedback').innerText = "MOLT BÉ ✨";
            document.getElementById('feedback').style.color = "green";
            correctActive = true;
            setTimeout(seguent, 1000);
        } else {
            document.getElementById('feedback').innerText = "ERROR ❌";
            document.getElementById('feedback').style.color = "red";
            document.getElementById('resposta').style.color = "red";
            errorActive = true;
        }
    }

    function seguent() { index++; nouRepte(); }

    function reproduirActual(vel) {
        if (dadesJoc[index]) {
            reproduir(dadesJoc[index].eng, vel);
            document.getElementById('resposta').focus();
        }
    }

    function reproduir(t, vel) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t); 
        m.lang = 'en-US'; m.rate = vel;
        window.speechSynthesis.speak(m);
    }

    function toggleEstrellaActual() {
        const id = dadesJoc[index].id;
        repasIds.has(id) ? repasIds.delete(id) : repasIds.add(id);
        localStorage.setItem('repasIds', JSON.stringify([...repasIds]));
        document.getElementById('star-main').classList.toggle('active', repasIds.has(id));
        actualitzarTaula(dadesJoc);
    }

    function canviarIdioma() { 
        idioma = (idioma === 'CAS') ? 'ENG' : 'CAS'; 
        document.getElementById('txt-idioma').innerText = idioma; 
        nouRepte(); 
    }
    
    function toggleRepas() { 
        modoRepas = !modoRepas; 
        document.getElementById('btn-repas').innerText = "⭐ Repàs: " + (modoRepas ? "ON" : "OFF"); 
        document.getElementById('btn-repas').style.background = modoRepas ? "#FFF176" : "#eee";
        actualitzarRang();
    }

    function actualitzarTaula(llista) {
        document.getElementById('taula-joc').innerHTML = llista.map((d, i) => `
            <tr>
                <td class="col-tools">
                    <span class="num-word">${i+1}</span>
                    <span class="star-list">${repasIds.has(d.id)?'★':''}</span>
                    <button class="btn-audio" style="font-size:1.1em;" onclick="reproducir('${d.eng.replace(/'/g,"\\'")}', 1.0)">🔊</button>
                </td>
                <td style="color:var(--p-blue-strong); font-weight:bold;">${d.eng}</td>
                <td style="color:#666;">${d.esp}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        // Si és ESPAI o INTRO quan hi ha un error/encert:
        if (e.key === 'Enter' || e.key === ' ') {
            if (errorActive) {
                e.preventDefault();
                const r = document.getElementById('resposta');
                r.value = ""; 
                r.style.color = "var(--text)";
                document.getElementById('feedback').innerText = "";
                document.getElementById('solucio-text').innerText = "";
                errorActive = false;
            } else if (correctActive) {
                e.preventDefault();
                seguent();
            } else if (e.key === 'Enter') {
                validar();
            }
        }
    });
</script>
</body>
</html>
