 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO</title>
    <style>
        :root { --p-pink: #ffcfd2; --p-blue-soft: #d4eaf7; --p-blue-strong: #2196F3; --telegram-blue: #24A1DE; --text: #4a4a4a; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        .card { background: white; width: 100%; max-width: 650px; padding: 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-top: 10px; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 12px; border-radius: 15px; font-size: 1em; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; }
        .config-bar { background: #fff; padding: 10px; border-radius: 20px; margin-bottom: 10px; border: 2px solid var(--p-pink); display: flex; align-items: center; gap: 8px; justify-content: center; }
        .config-bar input { width: 45px; padding: 5px; border-radius: 8px; border: 2px solid var(--p-pink); text-align: center; }
        #pregunta { font-size: 2.2em; color: var(--p-blue-strong); margin: 10px 0; font-weight: bold; }
        #resposta { width: 95%; padding: 12px; font-size: 1.5em; border-radius: 15px; border: 3px solid var(--p-pink); text-align: center; outline: none; }
        .btn { padding: 10px 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 4px; }
        .star-btn { font-size: 2.2em; cursor: pointer; color: #ccc; background:none; border:none; line-height:1; }
        .star-btn.active { color: #ffb703; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 8px 2px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.85em; }
        .col-tools { display: flex; align-items: center; gap: 5px; min-width: 80px; }
        .num-word { color: #bbb; font-weight: bold; width: 20px; }
        .star-list { color: #ffb703; width: 15px; }
        .btn-mini-audio { background:none; border:none; cursor:pointer; font-size: 1.2em; padding:0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="p-fitxer">
        <h1 style="color:var(--telegram-blue)">VOCABULARI</h1>
        <div class="grid-menu">
            <button class="menu-btn" onclick="carregarCSV('vocabulariGrups.csv')">GRUPS</button>
            <button class="menu-btn" onclick="carregarCSV('vocabulariTemes.csv')">TEMES</button>
        </div>
    </div>

    <div class="card hidden" id="p-grups">
        <h2 style="color: var(--p-blue-strong)">Tria categoria:</h2>
        <div id="grid-selector" class="grid-menu"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:15px; cursor:pointer;">🔙 Tornar</button>
    </div>

    <div class="card hidden" id="p-config">
        <h2 id="titol-cat" style="color: var(--p-blue-strong); margin:5px 0;"></h2>
        <div class="config-bar">
            <span>Des de: <input type="number" id="row-desde" value="1"></span>
            <span>Fins a: <input type="number" id="row-fins" value="100"></span>
        </div>
        <button class="menu-btn" style="background: var(--p-blue-strong); color:white; width:100%;" onclick="prepararJoc()">COMENÇAR A PRACTICAR</button>
        <div style="margin-top:15px; max-height: 250px; overflow-y: auto;">
            <table><tbody id="taula-previa"></tbody></table>
        </div>
    </div>

    <div id="p-joc" class="hidden" style="width: 100%; max-width: 650px; flex-direction: column; align-items: center;">
        <div class="card">
            <div class="config-bar">
                <button class="btn" style="background:var(--p-blue-soft)" onclick="canviarIdioma()">Pregunta: <b id="txt-idioma">ESP</b></button>
                <button class="btn" id="btn-repas" style="background:#eee" onclick="toggleRepas()">⭐ Repàs: OFF</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="star-main" class="star-btn" onclick="toggleEstrellaActual()">★</button>
                <div style="font-size:0.9em;">OK: <b id="count-ok" style="color:green">0</b></div>
            </div>
            <div id="feedback" style="height:35px; font-weight:bold; font-size:1.2em;"></div>
            <h1 id="pregunta">---</h1>
            <input type="text" id="resposta" placeholder="..." autocomplete="off">
            <div style="margin-top:10px;">
                <button class="btn" style="background:var(--p-blue-soft)" onclick="validar()">Comprovar</button>
                <button class="btn" style="background:#ffe5d9" onclick="noLaSe()">No la sé</button>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:#999; margin-top:10px; cursor:pointer;">🔙 Menú</button>
        </div>
        <div class="card" style="margin-top:10px; padding:10px;"><table id="taula-joc"></table></div>
    </div>

<script>
    let dadesTotals = [], dadesCat = [], dadesJoc = [], index = 0, acertos = 0;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repasIds') || '[]'));
    let idioma = 'ESP', modoRepas = false, errorActive = false;

    async function carregarCSV(nom) {
        const r = await fetch(nom);
        const t = await r.text();
        dadesTotals = t.split(/\r?\n/).filter(l => l.trim() !== '').map((l, i) => {
            const p = l.split(';');
            return { id: i + nom, cat: p[0], eng: p[1]?.trim(), esp: p[2]?.trim() };
        }).filter(d => d.eng && d.cat.toLowerCase() !== 'category' && d.cat.toLowerCase() !== 'análisis de datos');

        const cats = [...new Set(dadesTotals.map(d => d.cat))];
        const grid = document.getElementById('grid-selector');
        grid.innerHTML = '';
        cats.forEach(c => {
            const b = document.createElement('button');
            b.className = 'menu-btn'; b.innerText = c;
            b.onclick = () => {
                dadesCat = dadesTotals.filter(d => d.cat === c);
                document.getElementById('titol-cat').innerText = c;
                document.getElementById('row-fins').value = dadesCat.length;
                actualitzarLlistaConfig();
                document.getElementById('p-grups').classList.add('hidden');
                document.getElementById('p-config').classList.remove('hidden');
            };
            grid.appendChild(b);
        });
        document.getElementById('p-fitxer').classList.add('hidden');
        document.getElementById('p-grups').classList.remove('hidden');
    }

    function actualitzarLlistaConfig() {
        document.getElementById('taula-previa').innerHTML = dadesCat.map((d, i) => `
            <tr><td class="num-word">${i+1}</td><td style="color:var(--p-blue-strong)">${d.eng}</td><td>${d.esp}</td></tr>
        `).join('');
    }

    function prepararJoc() {
        const d = parseInt(document.getElementById('row-desde').value) - 1;
        const f = parseInt(document.getElementById('row-fins').value);
        let base = dadesCat.slice(d, f);
        if (modoRepas) base = base.filter(item => repasIds.has(item.id));
        if (base.length === 0) return alert("Cap paraula seleccionada");

        dadesJoc = base.sort(() => Math.random() - 0.5);
        index = 0; acertos = 0;
        document.getElementById('p-config').classList.add('hidden');
        document.getElementById('p-joc').classList.remove('hidden');
        nouRepte();
        actualitzarTaulaJoc(base);
    }

    function nouRepte() {
        if (index >= dadesJoc.length) { dadesJoc.sort(() => Math.random() - 0.5); index = 0; }
        errorActive = false;
        const p = dadesJoc[index];
        document.getElementById('pregunta').innerText = (idioma === 'ESP') ? p.esp : p.eng;
        const r = document.getElementById('resposta');
        r.value = ""; r.style.color = "var(--text)";
        document.getElementById('feedback').innerText = "";
        document.getElementById('count-ok').innerText = acertos;
        document.getElementById('star-main').classList.toggle('active', repasIds.has(p.id));
        r.focus();
    }

    function validar() {
        const p = dadesJoc[index];
        const user = document.getElementById('resposta').value.trim().toLowerCase();
        const ok = (idioma === 'ESP') ? p.eng.toLowerCase() : p.esp.toLowerCase();
        if (user === ok) {
            acertos++; reproducir(p.eng);
            document.getElementById('feedback').innerText = "✨ Molt bé!";
            document.getElementById('feedback').style.color = "green";
            setTimeout(seguent, 600);
        } else {
            document.getElementById('feedback').innerText = "ERA: " + ok.toUpperCase();
            document.getElementById('feedback').style.color = "red";
            document.getElementById('resposta').style.color = "red";
            errorActive = true; reproducir(p.eng);
        }
    }

    function noLaSe() {
        const p = dadesJoc[index];
        document.getElementById('resposta').value = (idioma === 'ESP') ? p.eng : p.esp;
        validar();
    }

    function seguent() { index++; nouRepte(); }

    function reproducir(t) {
        const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US';
        window.speechSynthesis.speak(m);
    }

    function toggleEstrellaActual() {
        const id = dadesJoc[index].id;
        repasIds.has(id) ? repasIds.delete(id) : repasIds.add(id);
        localStorage.setItem('repasIds', JSON.stringify([...repasIds]));
        document.getElementById('star-main').classList.toggle('active', repasIds.has(id));
        actualitzarTaulaJoc(dadesJoc);
    }

    function canviarIdioma() { idioma = (idioma === 'ESP') ? 'ENG' : 'ESP'; document.getElementById('txt-idioma').innerText = idioma; nouRepte(); }
    function toggleRepas() { modoRepas = !modoRepas; document.getElementById('btn-repas').innerText = "⭐ Repàs: " + (modoRepas ? "ON" : "OFF"); document.getElementById('btn-repas').style.background = modoRepas ? "#FFF176" : "#eee"; }

    function actualitzarTaulaJoc(llista) {
        document.getElementById('taula-joc').innerHTML = llista.map((d, i) => `
            <tr>
                <td class="col-tools"><span class="num-word">${i+1}</span><span class="star-list">${repasIds.has(d.id)?'★':''}</span><button class="btn-mini-audio" onclick="reproducir('${d.eng.replace(/'/g,"\\'")}')">🔊</button></td>
                <td style="color:var(--telegram-blue); font-weight:bold;">${d.eng}</td><td>${d.esp}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (errorActive) {
                const r = document.getElementById('resposta');
                r.value = ""; r.style.color = "var(--text)";
                document.getElementById('feedback').innerText = "";
                errorActive = false;
            } else { validar(); }
        }
    });
</script>
</body>
</html>
