 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari - Grups i Temes</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; 
            --p-blue-soft: #d4eaf7; 
            --p-blue-strong: #2196F3; 
            --p-turquesa-claret: #e0f7f9; 
            --p-turquesa-fort: #40c4ff; 
            --p-yellow: #FFF176; 
            --telegram-blue: #24A1DE;
            --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        .card { background: white; width: 100%; max-width: 650px; padding: 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 8px solid var(--p-pink); text-align: center; box-sizing: border-box; }
        
        h1.titulo-app { color: var(--telegram-blue); font-size: 2.2em; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }

        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 20px 10px; border-radius: 25px; width: 100%; font-size: 1.3em; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; box-sizing: border-box; transition: 0.2s; }
        .menu-btn:active { background: var(--p-pink); color: white; }

        /* Estilo para los botones de subgrupos */
        .btn-sel { background: #f0f9ff; border: 2px solid var(--p-blue-soft); padding: 12px; border-radius: 15px; font-weight: bold; color: #444; cursor: pointer; }
        .btn-sel:active { background: var(--p-blue-soft); }

        .config-bar { background: #fff; padding: 12px 18px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--p-pink); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        #pregunta { font-size: 2.5em; color: var(--p-blue-strong); margin: 15px 0; min-height: 1.2em; font-weight: bold; }
        #resposta { width: 90%; padding: 15px; font-size: 1.8em; border-radius: 20px; border: 3px solid var(--p-pink); text-align: center; outline: none; margin-bottom: 20px; font-weight: bold; }
        
        .btn-audio { width: 70px; height: 70px; border-radius: 50%; border: none; cursor: pointer; font-size: 2em; display: inline-flex; align-items: center; justify-content: center; margin: 5px; }
        .btn-speaker { background: var(--p-blue-soft); color: #5b8fb9; }
        
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 1em; }
        .btn-check { background: var(--p-blue-soft); color: #5b8fb9; }
        .btn-next { background: #b9fbc0; color: #3e7e44; }
        
        .list-area { width: 100%; max-width: 650px; background: white; margin-top: 25px; border-radius: 25px; padding: 15px; border: 3px solid var(--p-pink); box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 1.1em; }
        td { padding: 10px; border-bottom: 1px solid #f2f2f2; text-align: left; }
        .col-eng { color: var(--telegram-blue); font-weight: bold; }

        .btn-back-menu { margin-top: 20px; border: none; background: transparent; color: #000; cursor: pointer; font-size: 1.5em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1 class="titulo-app">VOCABULARI</h1>
        <div class="grid-menu">
            <button class="menu-btn" onclick="carregarArxiuMaestre('vocabulariGrups.csv')">GRUPS</button>
            <button class="menu-btn" onclick="carregarArxiuMaestre('vocabulariTemes.csv')">TEMES</button>
        </div>
    </div>

    <div class="card" id="selector-container" style="display:none;">
        <h2 style="color: var(--p-blue-strong)">Tria un grup:</h2>
        <div id="grid-selector" class="grid-menu"></div>
        <button onclick="location.reload()" class="btn-back-menu">🔙 Tornar</button>
    </div>

    <div id="joc" style="display:none; width: 100%; max-width: 650px; flex-direction: column; align-items: center;">
        <div class="card">
            <div class="config-bar">
                <span>Correctes: <span id="count-ok" style="color:green; font-weight:bold;">0</span></span>
                <span style="margin-left:20px;">Resten: <span id="count-rest" style="font-weight:bold;">0</span></span>
            </div>

            <div id="feedback" style="height:45px; font-weight:bold; font-size: 1.35em;"></div>
            
            <h1 id="pregunta">---</h1>
            <input type="text" id="resposta" placeholder="..." autocomplete="off" autofocus>

            <div class="controls">
                <button class="btn-audio btn-speaker" onclick="reproduirActual()">🔊</button>
                <br>
                <button id="btn-comprovar" class="btn btn-check" onclick="validar()">Comprovar</button>
                <button id="btn-next" class="btn btn-next" style="display:none;" onclick="seguent()">Següent →</button>
            </div>
            
            <button onclick="location.reload()" class="btn-back-menu">🔙 Menú</button>
        </div>

        <div id="llista-container" class="list-area">
            <table><tbody id="taula-cos"></tbody></table>
        </div>
    </div>

<script>
    let dadesTotals = [], dadesFiltrades = [], index = 0, acertos = 0;

    // 1. CARGAR EL ARCHIVO CSV
    async function carregarArxiuMaestre(nomFitxer) {
        try {
            const response = await fetch(nomFitxer);
            const text = await response.text();
            const lines = text.split(/\r?\n/).filter(l => l.trim() !== '');
            
            // Convertimos el CSV en objetos (Grupo; Cat; Eng)
            dadesTotals = lines.map(l => {
                const p = l.split(';');
                if (p.length >= 3) {
                    return { grup: p[0].trim(), cat: p[1].trim(), eng: p[2].trim() };
                }
                return null;
            }).filter(item => item);

            mostrarSelector();
        } catch (e) { 
            alert("No s'ha pogut trobar el fitxer: " + nomFitxer); 
        }
    }

    // 2. MOSTRAR LOS BOTONES DE LOS GRUPOS (Escuela, Salud, etc.)
    function mostrarSelector() {
        const grupsUnics = [...new Set(dadesTotals.map(d => d.grup))];
        const grid = document.getElementById('grid-selector');
        grid.innerHTML = '';
        
        grupsUnics.forEach(g => {
            const btn = document.createElement('button');
            btn.className = 'menu-btn';
            btn.innerText = g;
            btn.onclick = () => iniciarJoc(g);
            grid.appendChild(btn);
        });

        document.getElementById('setup').style.display = 'none';
        document.getElementById('selector-container').style.display = 'block';
    }

    // 3. FILTRAR POR EL GRUPO ELEGIDO E INICIAR
    function iniciarJoc(grupSeleccionat) {
        dadesFiltrades = dadesTotals.filter(d => d.grup === grupSeleccionat);
        dadesFiltrades.sort(() => Math.random() - 0.5);
        
        index = 0;
        acertos = 0;
        
        document.getElementById('selector-container').style.display = 'none';
        document.getElementById('joc').style.display = 'flex';
        
        nouRepte();
        actualitzarTaula();
    }

    function nouRepte() {
        if (index >= dadesFiltrades.length) {
            document.getElementById('pregunta').innerText = "Fi! 🎉";
            document.getElementById('resposta').style.display = 'none';
            return;
        }
        
        const p = dadesFiltrades[index];
        document.getElementById('pregunta').innerText = p.cat;
        document.getElementById('resposta').value = "";
        document.getElementById('resposta').disabled = false;
        document.getElementById('feedback').innerText = "";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('btn-comprovar').style.display = "inline-block";
        document.getElementById('count-ok').innerText = acertos;
        document.getElementById('count-rest').innerText = dadesFiltrades.length - index;
        document.getElementById('resposta').focus();
    }

    function validar() {
        const p = dadesFiltrades[index];
        const textUser = document.getElementById('resposta').value.trim().toLowerCase();
        
        if (textUser === p.eng.toLowerCase()) {
            document.getElementById('feedback').innerText = "Molt bé! ✨";
            document.getElementById('feedback').style.color = "green";
            acertos++;
            reproduirActual();
            setTimeout(seguent, 800);
        } else {
            document.getElementById('feedback').innerText = "Era: " + p.eng.toUpperCase();
            document.getElementById('feedback').style.color = "red";
            document.getElementById('btn-comprovar').style.display = "none";
            document.getElementById('btn-next').style.display = "inline-block";
            document.getElementById('resposta').disabled = true;
        }
    }

    function seguent() {
        index++;
        nouRepte();
    }

    function reproduirActual() {
        const paraula = dadesFiltrades[index].eng;
        const msg = new SpeechSynthesisUtterance(paraula);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function reproduirParaula(p) {
        const msg = new SpeechSynthesisUtterance(p);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function actualitzarTaula() {
        document.getElementById('taula-cos').innerHTML = dadesFiltrades.map(d => `
            <tr>
                <td class="col-eng">
                    <button style="background:none; border:none; cursor:pointer;" onclick="reproduirParaula('${d.eng}')">🔊</button>
                    ${d.eng}
                </td>
                <td style="color:#666;">${d.cat}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('btn-next').style.display === 'inline-block') {
                seguent();
            } else {
                validar();
            }
        }
    });
</script>
</body>
</html>
