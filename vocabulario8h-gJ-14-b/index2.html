 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; 
            --p-blue-soft: #d4eaf7; 
            --p-blue-strong: #2196F3; 
            --p-red: #d93025;
            --p-green-soft: #e2f3e5; 
            --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        
        .card { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-bottom: 20px; position: relative; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 12px; border-radius: 15px; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; font-size: 0.9em; text-transform: uppercase; }
        
        #feedback-container { font-size: 1.4em; font-weight: bold; min-height: 1.5em; margin-bottom: 5px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        #solucio-text { text-transform: uppercase; }
        
        #pregunta { font-size: 2em; margin: 10px 0; color: var(--p-blue-strong); font-weight: bold; }
        
        #resposta { width: 95%; padding: 12px; font-size: 1.5em; border-radius: 15px; border: 3px solid var(--p-pink); text-align: center; outline: none; box-sizing: border-box; }

        .star-btn { font-size: 2.2em; cursor: pointer; color: #ccc; background: var(--p-green-soft); border: 2px solid #d0e7d4; border-radius: 50%; width: 60px; height: 60px; line-height: 58px; margin-bottom: 10px; }
        .star-btn.active { color: #fbbc04; }

        .audio-controls { margin: 10px 0; display: flex; justify-content: center; gap: 15px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.8em; }

        .btn-main { background: var(--p-blue-soft); color: var(--p-blue-strong); padding: 12px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 80%; font-size: 1.1em; }
        
        .back-btn { background: none; border: none; color: black; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 15px; }

        .list-container { width: 100%; max-width: 600px; background: white; border-radius: 25px; border: 6px solid var(--p-pink); padding: 8px; box-sizing: border-box; margin-bottom: 40px; }
        .list-table { width: 100%; border-collapse: collapse; }
        .list-table td { padding: 6px 4px; border-bottom: 1px solid #fce4e6; text-align: left; font-size: 1.1em; vertical-align: middle; }
        .num { color: #ccc; font-weight: bold; width: 25px; font-size: 0.8em; text-align: center; }
        .txt-eng { color: var(--p-blue-strong); font-weight: bold; }
        .txt-cat { color: #888; font-size: 0.95em; }
        
        .config-bar { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 15px; font-size: 0.9em; font-weight: bold; }
        .config-bar input { width: 45px; padding: 3px; border: 2px solid var(--p-pink); border-radius: 6px; text-align: center; color: var(--p-blue-strong); font-weight: bold; background: white; }
        .lang-toggle { cursor: pointer; color: var(--p-blue-strong); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="p-fitxer">
        <h1 style="color:var(--p-blue-strong); margin-bottom:20px;">VOCABULARI</h1>
        <div class="grid-menu">
            <button class="menu-btn" onclick="carregarCSV('vocabulariGrups.csv')">GRUPS</button>
            <button class="menu-btn" onclick="carregarCSV('vocabulariTemes.csv')">TEMES</button>
        </div>
    </div>

    <div class="card hidden" id="p-grups">
        <h2 style="color: var(--p-blue-strong)">Tria Categoria</h2>
        <div id="grid-selector" class="grid-menu"></div>
        <button class="back-btn" onclick="location.reload()">🔙 Back</button>
    </div>

    <div id="p-estudi" class="hidden" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center;">
        <div class="card">
            <div class="config-bar">
                <span onclick="canviarIdioma()" class="lang-toggle"><b id="txt-idioma">CAT</b></span>
                <span id="btn-repas" onclick="toggleRepas()" style="cursor:pointer; background:#eee; padding:2px 8px; border-radius:5px;">⭐ OFF</span>
                <span style="display: flex; align-items: center; gap: 5px;">
                    <input type="number" id="row-desde" value="1" onchange="actualitzarRang()"> 
                    - 
                    <input type="number" id="row-fins" value="100" onchange="actualitzarRang()">
                </span>
            </div>

            <button id="star-main" class="star-btn" onclick="toggleEstrellaActual()">★</button>
            
            <div id="feedback-container">
                <span id="feedback-label"></span>
                <span id="solucio-text"></span>
            </div>
            
            <div id="pregunta">---</div>

            <div class="audio-controls">
                <button class="icon-btn" onclick="reproduirActual(1.0)">🔊</button>
                <button class="icon-btn" onclick="reproduirActual(0.5)">🐢</button>
            </div>

            <input type="text" id="resposta" placeholder="..." autocomplete="off">
            <div style="margin-top:15px;">
                <button class="btn-main" onclick="validar()">Comprovar</button>
            </div>
            <button class="back-btn" onclick="location.reload()">🔙 Back</button>
        </div>

        <div class="list-container">
            <table class="list-table" id="taula-joc"></table>
        </div>
    </div>

<script>
    let dadesTotals = [], dadesCat = [], dadesJoc = [], index = 0;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repasIds') || '[]'));
    let idioma = 'CAT', modoRepas = false, errorActive = false, correctActive = false;

    async function carregarCSV(nom) {
        try {
            const r = await fetch(nom);
            const t = await r.text();
            const lines = t.replace(/\r/g, "").split("\n");
            dadesTotals = [];
            lines.forEach((l, i) => {
                const p = l.split(';');
                if (p.length >= 3 && p[0].trim() && p[0].toLowerCase() !== 'category') {
                    dadesTotals.push({ id: i + nom, cat: p[0].trim(), eng: p[1].trim(), esp: p[2].trim() });
                }
            });
            const cats = [...new Set(dadesTotals.map(d => d.cat))].sort();
            const grid = document.getElementById('grid-selector');
            grid.innerHTML = '';
            cats.forEach(c => {
                const b = document.createElement('button');
                b.className = 'menu-btn'; b.innerText = c;
                b.onclick = () => carregarCategoria(c);
                grid.appendChild(b);
            });
            document.getElementById('p-fitxer').classList.add('hidden');
            document.getElementById('p-grups').classList.remove('hidden');
        } catch (e) { alert("Error arxiu"); }
    }

    function carregarCategoria(c) {
        dadesCat = dadesTotals.filter(d => d.cat === c);
        document.getElementById('row-fins').value = dadesCat.length;
        document.getElementById('row-desde').value = 1;
        document.getElementById('p-grups').classList.add('hidden');
        document.getElementById('p-estudi').classList.remove('hidden');
        actualitzarRang();
    }

    function actualitzarRang() {
        let d = parseInt(document.getElementById('row-desde').value) - 1;
        let f = parseInt(document.getElementById('row-fins').value);
        let base = dadesCat.slice(d, f);
        dadesJoc = modoRepas ? base.filter(item => repasIds.has(item.id)) : [...base];
        dadesJoc.sort(() => Math.random() - 0.5);
        index = 0;
        nouRepte();
        actualitzarTaula(base);
    }

    function nouRepte() {
        if (dadesJoc.length === 0) { document.getElementById('pregunta').innerText = "(Buit)"; return; }
        if (index >= dadesJoc.length) { dadesJoc.sort(() => Math.random() - 0.5); index = 0; }
        errorActive = false; correctActive = false;
        const p = dadesJoc[index];
        document.getElementById('pregunta').innerText = (idioma === 'CAT') ? p.esp : p.eng;
        document.getElementById('resposta').value = "";
        document.getElementById('resposta').style.color = "var(--text)";
        document.getElementById('feedback-label').innerText = "";
        document.getElementById('solucio-text').innerText = "";
        document.getElementById('star-main').classList.toggle('active', repasIds.has(p.id));
        document.getElementById('resposta').focus();
    }

    function validar() {
        if (dadesJoc.length === 0 || errorActive || correctActive) return;
        const p = dadesJoc[index];
        const user = document.getElementById('resposta').value.trim().toLowerCase();
        const ok = (idioma === 'CAT') ? p.eng.toLowerCase() : p.esp.toLowerCase();
        
        reproduir(p.eng, 1.0);

        if (user === ok) {
            document.getElementById('feedback-label').innerText = "CORRECTE: ";
            document.getElementById('feedback-label').style.color = "green";
            document.getElementById('solucio-text').innerText = (idioma === 'CAT') ? p.eng.toUpperCase() : p.esp.toUpperCase();
            document.getElementById('solucio-text').style.color = "green";
            correctActive = true;
            setTimeout(seguent, 1000);
        } else {
            document.getElementById('feedback-label').innerText = "INCORRECTE: ";
            document.getElementById('feedback-label').style.color = "var(--p-red)";
            document.getElementById('solucio-text').innerText = (idioma === 'CAT') ? p.eng.toUpperCase() : p.esp.toUpperCase();
            document.getElementById('solucio-text').style.color = "var(--p-red)";
            errorActive = true;
        }
    }

    function seguent() { index++; nouRepte(); }
    function reproduirActual(vel) { if (dadesJoc[index]) reproduir(dadesJoc[index].eng, vel); document.getElementById('resposta').focus(); }
    function reproduir(t, vel) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = vel; window.speechSynthesis.speak(m); }

    function toggleEstrellaActual() {
        const id = dadesJoc[index].id;
        repasIds.has(id) ? repasIds.delete(id) : repasIds.add(id);
        localStorage.setItem('repasIds', JSON.stringify([...repasIds]));
        document.getElementById('star-main').classList.toggle('active', repasIds.has(id));
        actualitzarTaula(dadesCat.slice(parseInt(document.getElementById('row-desde').value)-1, parseInt(document.getElementById('row-fins').value)));
    }

    function canviarIdioma() { 
        idioma = (idioma === 'CAT') ? 'ENG' : 'CAT'; 
        document.getElementById('txt-idioma').innerText = idioma; 
        nouRepte(); 
    }
    
    function toggleRepas() { 
        modoRepas = !modoRepas; 
        document.getElementById('btn-repas').innerText = modoRepas ? "⭐ ON" : "⭐ OFF"; 
        actualitzarRang();
    }

    function actualitzarTaula(llista) {
        document.getElementById('taula-joc').innerHTML = llista.map((d, i) => `
            <tr>
                <td class="num">${i+1}</td>
                <td style="color:${repasIds.has(d.id)?'#fbbc04':'#eee'}; font-size:1.4em; width:30px;">★</td>
                <td style="width:40px; text-align:center;">
                    <button style="background:none; border:none; cursor:pointer; font-size:1.2em;" 
                    onclick="reproduir('${d.eng.replace(/'/g,"\\'")}', 1.0)">🔊</button>
                </td>
                <td class="txt-eng">${d.eng}</td>
                <td class="txt-cat">${d.esp}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            if (errorActive || correctActive) { 
                e.preventDefault(); 
                if(correctActive) seguent(); else nouRepte();
            } else if (e.key === 'Enter') { 
                validar(); 
            }
        }
    });
</script>
</body>
</html>
