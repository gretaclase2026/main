 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; --p-blue-soft: #d4eaf7; --p-blue-strong: #2196F3; 
            --telegram-blue: #24A1DE; --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        .card { background: white; width: 100%; max-width: 650px; padding: 25px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 8px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-top: 10px; }
        h1.titulo-app { color: var(--telegram-blue); font-size: 2.2em; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .menu-btn { background: white; border: 3px solid var(--p-pink); padding: 15px; border-radius: 20px; font-size: 1.1em; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; transition: 0.2s; }
        .menu-btn:active { background: var(--p-pink); color: white; }
        .config-bar { background: #fff; padding: 12px; border-radius: 20px; margin-bottom: 20px; border: 2px solid var(--p-pink); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
        #pregunta { font-size: 2.5em; color: var(--p-blue-strong); margin: 15px 0; font-weight: bold; }
        #resposta { width: 90%; padding: 15px; font-size: 1.8em; border-radius: 20px; border: 3px solid var(--p-pink); text-align: center; outline: none; margin-bottom: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-check { background: var(--p-blue-soft); color: #5b8fb9; }
        .btn-next { background: #b9fbc0; color: #3e7e44; }
        .btn-nola { background: #ffe5d9; color: #d90429; }
        .star-btn { font-size: 2.5em; cursor: pointer; color: #ccc; background:none; border:none; padding:0; line-height:1; }
        .star-btn.active { color: #ffb703; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        .btn-mini-audio { background:none; border:none; cursor:pointer; font-size:1.2em; margin-right:5px; }
        .btn-back-menu { margin-top: 20px; border: none; background: transparent; font-weight: bold; cursor: pointer; font-size: 1.5em; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1 class="titulo-app">VOCABULARI</h1>
        <div class="grid-menu">
            <button class="menu-btn" onclick="carregarCSV('vocabulariGrups.csv')">GRUPS</button>
            <button class="menu-btn" onclick="carregarCSV('vocabulariTemes.csv')">TEMES</button>
        </div>
    </div>

    <div class="card" id="selector-container" style="display:none;">
        <h2 style="color: var(--p-blue-strong)">Tria un grup:</h2>
        <div class="config-bar">
            <span>Des de: <input type="number" id="row-desde" value="1" style="width:45px"></span>
            <span>Fins a: <input type="number" id="row-fins" value="1000" style="width:45px"></span>
        </div>
        <div id="grid-selector" class="grid-menu"></div>
        <button onclick="location.reload()" class="btn-back-menu">🔙 Tornar</button>
    </div>

    <div id="joc" style="display:none; width: 100%; max-width: 650px; flex-direction: column; align-items: center;">
        <div class="card">
            <div class="config-bar">
                <button class="btn btn-check" onclick="canviarIdioma()">Pregunta: <b id="txt-idioma">ESP</b></button>
                <button class="btn" id="btn-repas" onclick="toggleRepas()" style="background:#eee">⭐ Repàs: OFF</button>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center;">
                <button id="star-main" class="star-btn" onclick="toggleEstrellaActual()">★</button>
                <div>Correctes: <b id="count-ok" style="color:green">0</b> | Falten: <b id="count-rest">0</b></div>
            </div>

            <div id="feedback" style="height:40px; font-weight:bold; font-size:1.3em; margin-top:10px;"></div>
            <h1 id="pregunta">---</h1>
            <input type="text" id="resposta" placeholder="..." autocomplete="off">

            <div class="controls">
                <button id="btn-comprovar" class="btn btn-check" onclick="validar()">Comprovar</button>
                <button id="btn-nola" class="btn btn-nola" onclick="noLaSe()">No la sé</button>
                <button id="btn-next" class="btn btn-next" style="display:none;" onclick="seguent()">Següent →</button>
            </div>
            <button onclick="location.reload()" class="btn-back-menu">🔙 Menú</button>
        </div>

        <div class="card" style="margin-top:20px; border-radius:20px;">
            <table><tbody id="taula-cos"></tbody></table>
        </div>
    </div>

<script>
    let dadesTotals = [], dadesJoc = [], index = 0, acertos = 0;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repasIds') || '[]'));
    let idioma = 'ESP'; let modoRepas = false;

    async function carregarCSV(nom) {
        try {
            const r = await fetch(nom);
            const t = await r.text();
            const lines = t.split(/\r?\n/).filter(l => l.trim() !== '');
            dadesTotals = lines.map((l, i) => {
                const p = l.split(';');
                return { id: i + nom, grup: p[0], eng: p[1], esp: p[2] };
            }).filter(d => d.esp && d.eng);
            mostrarSelector();
        } catch (e) { alert("Error al carregar l'arxiu"); }
    }

    function mostrarSelector() {
        const grups = [...new Set(dadesTotals.map(d => d.grup))];
        const grid = document.getElementById('grid-selector');
        grid.innerHTML = '';
        grups.forEach(g => {
            const b = document.createElement('button');
            b.className = 'menu-btn';
            b.innerText = g;
            b.onclick = () => iniciar(g);
            grid.appendChild(b);
        });
        document.getElementById('setup').style.display = 'none';
        document.getElementById('selector-container').style.display = 'block';
    }

    function iniciar(g) {
        const d = parseInt(document.getElementById('row-desde').value) - 1;
        const f = parseInt(document.getElementById('row-fins').value);
        let filtrat = dadesTotals.filter(item => item.grup === g).slice(d, f);

        if (modoRepas) filtrat = filtrat.filter(item => repasIds.has(item.id));
        if (filtrat.length === 0) return alert("Cap paraula trobada.");

        dadesJoc = filtrat.sort(() => Math.random() - 0.5);
        index = 0; acertos = 0;
        document.getElementById('selector-container').style.display = 'none';
        document.getElementById('joc').style.display = 'flex';
        nouRepte();
        actualitzarTaula();
    }

    function nouRepte() {
        if (index >= dadesJoc.length) {
            document.getElementById('pregunta').innerText = "Fi! 🎉";
            document.getElementById('resposta').style.display = 'none';
            return;
        }
        const p = dadesJoc[index];
        document.getElementById('pregunta').innerText = (idioma === 'ESP') ? p.esp : p.eng;
        document.getElementById('resposta').value = "";
        document.getElementById('resposta').disabled = false;
        document.getElementById('feedback').innerText = "";
        document.getElementById('btn-next').style.display = "none";
        document.getElementById('btn-comprovar').style.display = "inline-block";
        document.getElementById('btn-nola').style.display = "inline-block";
        document.getElementById('count-ok').innerText = acertos;
        document.getElementById('count-rest').innerText = dadesJoc.length - index;
        document.getElementById('star-main').classList.toggle('active', repasIds.has(p.id));
        document.getElementById('resposta').focus();
    }

    function validar() {
        const p = dadesJoc[index];
        const user = document.getElementById('resposta').value.trim().toLowerCase();
        const correcte = (idioma === 'ESP') ? p.eng.toLowerCase() : p.esp.toLowerCase();
        
        if (user === correcte) {
            document.getElementById('feedback').innerText = "Molt bé! ✨";
            document.getElementById('feedback').style.color = "green";
            acertos++;
            reproducir(p.eng);
            setTimeout(seguent, 800);
        } else {
            document.getElementById('feedback').innerText = "ERA: " + correcte.toUpperCase();
            document.getElementById('feedback').style.color = "red";
            document.getElementById('btn-comprovar').style.display = "none";
            document.getElementById('btn-nola').style.display = "none";
            document.getElementById('btn-next').style.display = "inline-block";
            document.getElementById('resposta').disabled = true;
            reproducir(p.eng);
        }
    }

    function noLaSe() {
        const p = dadesJoc[index];
        document.getElementById('feedback').innerText = "SOLUCIÓ: " + p.eng.toUpperCase();
        document.getElementById('feedback').style.color = "orange";
        document.getElementById('btn-comprovar').style.display = "none";
        document.getElementById('btn-nola').style.display = "none";
        document.getElementById('btn-next').style.display = "inline-block";
        document.getElementById('resposta').disabled = true;
        reproducir(p.eng);
    }

    function seguent() { index++; nouRepte(); }

    function reproducir(txt) {
        const msg = new SpeechSynthesisUtterance(txt);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function toggleEstrellaActual() {
        const id = dadesJoc[index].id;
        if (repasIds.has(id)) repasIds.delete(id); else repasIds.add(id);
        localStorage.setItem('repasIds', JSON.stringify([...repasIds]));
        document.getElementById('star-main').classList.toggle('active', repasIds.has(id));
        actualitzarTaula();
    }

    function canviarIdioma() {
        idioma = (idioma === 'ESP') ? 'ENG' : 'ESP';
        document.getElementById('txt-idioma').innerText = idioma;
    }

    function toggleRepas() {
        modoRepas = !modoRepas;
        document.getElementById('btn-repas').innerText = "⭐ Repàs: " + (modoRepas ? "ON" : "OFF");
        document.getElementById('btn-repas').style.background = modoRepas ? "#FFF176" : "#eee";
    }

    function actualitzarTaula() {
        document.getElementById('taula-cos').innerHTML = dadesJoc.map(d => `
            <tr>
                <td style="width:30px;">${repasIds.has(d.id) ? '<span style="color:#ffb703">★</span>' : ''}</td>
                <td><button class="btn-mini-audio" onclick="reproducir('${d.eng}')">🔊</button> <b style="color:var(--telegram-blue)">${d.eng}</b></td>
                <td style="color:#666;">${d.esp}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (document.getElementById('btn-next').style.display === 'inline-block') {
                seguent();
            } else if (document.getElementById('resposta').disabled) {
                document.getElementById('resposta').disabled = false;
                document.getElementById('resposta').value = "";
                document.getElementById('resposta').focus();
                document.getElementById('btn-next').style.display = "none";
                document.getElementById('btn-comprovar').style.display = "inline-block";
                document.getElementById('btn-nola').style.display = "inline-block";
                document.getElementById('feedback').innerText = "";
            } else {
                validar();
            }
        }
    });
</script>
</body>
</html>
