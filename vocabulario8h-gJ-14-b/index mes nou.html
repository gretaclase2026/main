 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabulari PRO - Àudio Real</title>
    <style>
        :root { 
            --p-pink: #ffcfd2; --p-blue-soft: #d4eaf7; --p-blue-strong: #2196F3; 
            --p-red: #d93025; --p-orange: #ff9800; --p-green-active: #4CAF50; --text: #4a4a4a; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: #fff5f6; color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; margin:0; }
        .card { background: white; width: 100%; max-width: 600px; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 6px solid var(--p-pink); text-align: center; box-sizing: border-box; margin-bottom: 15px; position: relative; }
        .btn-inicio { width: 100%; padding: 20px; margin: 10px 0; border: 3px solid var(--p-pink); border-radius: 15px; background: white; color: var(--p-blue-strong); font-weight: bold; font-size: 1.2em; cursor: pointer; text-transform: uppercase; }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .menu-item { display: flex; background: white; border: 3px solid var(--p-pink); border-radius: 15px; overflow: hidden; align-items: stretch; height: 60px; }
        .menu-btn-text { flex: 1; border: none; background: none; font-weight: bold; color: var(--p-blue-strong); cursor: pointer; text-transform: uppercase; font-size: 0.85em; padding: 0 10px; display: flex; align-items: center; justify-content: space-between; text-align: left; }
        .menu-btn-mark { width: 50px; border: none; border-left: 2px solid var(--p-pink); background: #f9f9f9; cursor: pointer; font-size: 1.2em; color: #ccc; display: flex; align-items: center; justify-content: center; }
        .menu-btn-mark.status-1 { color: white; background: var(--p-orange); } 
        .menu-btn-mark.status-2 { color: white; background: var(--p-green-active); } 
        .config-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; font-size: 0.95em; font-weight: bold; }
        .config-bar input { width: 42px; padding: 4px; border: 2px solid var(--p-pink); border-radius: 6px; text-align: center; }
        .star-main { font-size: 2.5em; cursor: pointer; color: #eee; background: none; border: none; }
        .star-main.active { color: #fbbc04; }
        #pregunta { font-size: 2em; margin: 10px 0; color: var(--p-blue-strong); font-weight: bold; min-height: 1.2em; }
        #resposta { width: 95%; padding: 12px; font-size: 1.5em; border-radius: 15px; border: 3px solid var(--p-pink); text-align: center; outline: none; }
        .btn-main { background: var(--p-blue-soft); color: var(--p-blue-strong); padding: 12px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 80%; font-size: 1.1em; }
        .list-container { width: 100%; max-width: 600px; background: white; border-radius: 25px; border: 6px solid var(--p-pink); padding: 5px; margin-bottom: 40px; }
        .list-table { width: 100%; border-collapse: collapse; }
        .list-table td { padding: 8px 4px; border-bottom: 1px solid #fce4e6; }
        .star-list { font-size: 1.4em; color: #eee; cursor: pointer; }
        .star-list.active { color: #fbbc04; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card" id="p-fitxer">
        <h1 style="color:var(--p-blue-strong); margin-bottom:20px;">VOCABULARI</h1>
        <button class="btn-inicio" onclick="carregarCSV('vocabulariGrups.csv')">GRUPS</button>
        <button class="btn-inicio" onclick="carregarCSV('vocabulariTemes.csv')">TEMES</button>
    </div>

    <div class="card hidden" id="p-grups">
        <h2 style="color: var(--p-blue-strong)">Tria Categoria</h2>
        <div id="grid-selector" class="grid-menu"></div>
        <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; cursor:pointer; font-weight:bold;">🔙 Tornar</button>
    </div>

    <div id="p-estudi" class="hidden" style="width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center;">
        <div class="card">
            <div class="config-bar">
                <span onclick="canviarIdioma()" style="cursor:pointer; color:var(--p-blue-strong);"><b id="txt-idioma">CAT</b></span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span id="btn-repas" onclick="toggleRepas()" style="cursor:pointer; background:#eee; padding:4px 8px; border-radius:8px;">⭐ OFF</span>
                    <input type="number" id="row-desde" value="1" onchange="actualitzarRang()"> - <input type="number" id="row-fins" value="100" onchange="actualitzarRang()">
                </div>
                <button id="star-main" class="star-main" onclick="toggleEstrellaActual()">★</button>
            </div>
            <div id="feedback-container" style="min-height:2.5em; font-weight:bold;">
                <div id="feedback-line1"></div>
                <div id="feedback-line2" style="font-size:0.9em; color:#555;"></div>
            </div>
            <div id="pregunta">---</div>
            <div style="margin: 10px 0; display: flex; justify-content: center; gap: 20px;">
                <button style="background:none; border:none; cursor:pointer; font-size:2em;" onclick="reproduirActual(1.0)">🔊</button>
                <button style="background:none; border:none; cursor:pointer; font-size:2em;" onclick="reproduirActual(0.5)">🐢</button>
            </div>
            <input type="text" id="resposta" placeholder="..." autocomplete="off">
            <div style="margin-top:15px;"><button class="btn-main" onclick="validar()">Comprovar</button></div>
            <button onclick="location.reload()" style="margin-top:15px; background:none; border:none; cursor:pointer; font-weight:bold;">🔙 Tornar</button>
        </div>
        <div class="list-container"><table class="list-table" id="taula-joc"></table></div>
    </div>

<script>
    let dadesTotals = [], dadesCat = [], dadesJoc = [], index = 0;
    let repasIds = new Set(JSON.parse(localStorage.getItem('repasIds') || '[]'));
    let estadosTemas = JSON.parse(localStorage.getItem('estadosTemas') || '{}');
    let idioma = 'CAT', modoRepas = false, errorActive = false, correctActive = false;
    
    // OBJETO PARA AUDIO REAL
    let audioReal = new Audio();

    function normalitzar(t) { return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim(); }

    async function carregarCSV(nom) {
        try {
            const r = await fetch(nom);
            const t = await r.text();
            const lines = t.replace(/\r/g, "").split("\n");
            dadesTotals = [];
            lines.forEach((l, i) => {
                const p = l.split(';');
                if (p.length >= 3 && p[0].trim() && p[0].toLowerCase() !== 'category') {
                    dadesTotals.push({ id: i + nom, cat: p[0].trim(), eng: p[1].trim(), esp: p[2].trim() });
                }
            });
            mostrarMenu();
        } catch (e) { alert("Error"); }
    }

    function mostrarMenu() {
        const cats = [...new Set(dadesTotals.map(d => d.cat))].sort();
        const grid = document.getElementById('grid-selector'); grid.innerHTML = '';
        cats.forEach(c => {
            const container = document.createElement('div'); container.className = 'menu-item';
            const btnText = document.createElement('button'); btnText.className = 'menu-btn-text';
            btnText.innerHTML = `<span>${c}</span>`;
            if (dadesTotals.some(d => d.cat === c && repasIds.has(d.id))) btnText.innerHTML += `<span style="color:#fbbc04">★</span>`;
            btnText.onclick = () => carregarCategoria(c);
            const btnMark = document.createElement('button'); 
            const st = estadosTemas[c] || 0;
            btnMark.className = 'menu-btn-mark' + (st > 0 ? ' status-' + st : '');
            btnMark.innerHTML = st === 0 ? '' : (st === 1 ? '🕒' : '✓');
            btnMark.onclick = () => {
                estadosTemas[c] = (estadosTemas[c] || 0 + 1) % 3;
                localStorage.setItem('estadosTemas', JSON.stringify(estadosTemas));
                mostrarMenu();
            };
            container.appendChild(btnText); container.appendChild(btnMark);
            grid.appendChild(container);
        });
        document.getElementById('p-fitxer').classList.add('hidden');
        document.getElementById('p-grups').classList.remove('hidden');
    }

    function carregarCategoria(c) {
        dadesCat = dadesTotals.filter(d => d.cat === c);
        document.getElementById('row-fins').value = dadesCat.length;
        document.getElementById('p-grups').classList.add('hidden');
        document.getElementById('p-estudi').classList.remove('hidden');
        actualitzarRang();
    }

    function actualitzarRang() {
        let d = parseInt(document.getElementById('row-desde').value) - 1;
        let f = parseInt(document.getElementById('row-fins').value);
        let base = dadesCat.slice(d, f);
        dadesJoc = modoRepas ? base.filter(item => repasIds.has(item.id)) : [...base];
        dadesJoc.sort(() => Math.random() - 0.5);
        index = 0; nouRepte(); actualitzarTaula(base);
    }

    function nouRepte() {
        if (dadesJoc.length === 0) return;
        if (index >= dadesJoc.length) { dadesJoc.sort(() => Math.random() - 0.5); index = 0; }
        errorActive = false; correctActive = false;
        const p = dadesJoc[index];
        document.getElementById('pregunta').innerText = (idioma === 'ENG') ? "🎧 Escolta..." : p.esp;
        if (idioma === 'ENG') reproduir(p.eng, 1.0);
        document.getElementById('resposta').value = "";
        document.getElementById('feedback-line1').innerText = ""; 
        document.getElementById('feedback-line2').innerText = "";
        document.getElementById('star-main').classList.toggle('active', repasIds.has(p.id));
        document.getElementById('resposta').focus();
    }

    function validar() {
        if (dadesJoc.length === 0 || errorActive || correctActive) return;
        const p = dadesJoc[index];
        const user = normalitzar(document.getElementById('resposta').value);
        const ok = normalitzar(p.eng);
        document.getElementById('pregunta').innerText = p.eng;
        reproduir(p.eng, 1.0);
        if (user === ok) {
            document.getElementById('feedback-line1').innerText = "CORRECTE!"; 
            document.getElementById('feedback-line1').style.color = "green";
            correctActive = true; setTimeout(seguent, 1500);
        } else {
            document.getElementById('feedback-line1').innerText = "INCORRECTE!"; 
            document.getElementById('feedback-line1').style.color = "red";
            errorActive = true;
        }
        document.getElementById('feedback-line2').innerHTML = `<b>${p.eng.toUpperCase()}</b> = <i>${p.esp}</i>`;
    }

    function seguent() { index++; nouRepte(); }
    function reproduirActual(vel) { if (dadesJoc[index]) reproduir(dadesJoc[index].eng, vel); }

    function reproduir(t, vel) {
        // REGLA: Primera Majúscula i guions baixos
        let neta = t.trim().toLowerCase().replace(/ /g, "_");
        let fitxer = neta.charAt(0).toUpperCase() + neta.slice(1);
        audioReal.pause();
        audioReal.src = `audios/${fitxer}.mp3`;
        audioReal.playbackRate = vel;
        audioReal.play().catch(() => console.log("Falta: " + fitxer));
    }

    function gestionarEstrella(id) {
        if (repasIds.has(id)) repasIds.delete(id); else repasIds.add(id);
        localStorage.setItem('repasIds', JSON.stringify([...repasIds]));
        actualitzarRang();
    }

    function toggleEstrellaActual() { gestionarEstrella(dadesJoc[index].id); }
    function toggleEstrellaLlista(id) { gestionarEstrella(id); }
    function canviarIdioma() { idioma = (idioma === 'CAT') ? 'ENG' : 'CAT'; document.getElementById('txt-idioma').innerText = idioma; nouRepte(); }
    function toggleRepas() { modoRepas = !modoRepas; document.getElementById('btn-repas').innerText = modoRepas ? "⭐ ON" : "⭐ OFF"; actualitzarRang(); }

    function actualitzarTaula(llista) {
        document.getElementById('taula-joc').innerHTML = llista.map((d, i) => `
            <tr>
                <td style="color:#ccc;">${i+1}</td>
                <td class="star-list ${repasIds.has(d.id)?'active':''}" onclick="toggleEstrellaLlista('${d.id}')">★</td>
                <td><button style="border:none; background:none; cursor:pointer;" onclick="reproduir('${d.eng.replace(/'/g,"\\'")}', 1.0)">🔊</button></td>
                <td style="color:var(--p-blue-strong); font-weight:bold;">${d.eng}</td>
                <td style="color:#888;">${d.esp}</td>
            </tr>
        `).join('');
    }

    document.getElementById('resposta').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            if (correctActive) seguent(); 
            else if (errorActive) { errorActive=false; nouRepte(); }
            else validar();
        }
    });
</script>
</body>
</html>
