body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;gap:10px;margin-bottom:10px;width:100%;align-items:center}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}

.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.unit-badge { font-size: 24px; font-weight: 900; color: #999; padding: 0 5px; min-width: 30px; text-align: center; }

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0;justify-content:center;align-items:center}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:20px 0 10px 0}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}

.audio-btn{font-size:28px;background:#dcfce7;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;}

.mic-btn{font-size:30px;background:#dbeafe;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s}
.mic-btn.listening{background:#2563eb !important; color:white; animation: pulse-blue 1.5s infinite; transform: scale(1.1);}

.rec-btn{font-size:30px;background:#fce4ec;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s; color: #333;}
.rec-btn.recording{background:#f06292 !important; color:white !important; animation: pulse-pink 1.5s infinite; transform: scale(1.1);}

@keyframes pulse-pink { 0% {box-shadow: 0 0 0 0 rgba(240, 98, 146, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(240, 98, 146, 0);} 100% {box-shadow: 0 0 0 0 rgba(240, 98, 146, 0);} }
@keyframes pulse-blue { 0% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(37, 99, 235, 0);} 100% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);} }

.word-correct { color: #16a34a; margin: 0 2px; } 
.word-error { color: #dc2626; text-decoration: line-through; margin: 0 2px; }
.word-missing { color: #94a3b8; font-style: italic; margin: 0 2px; }

.star-main-block { font-size: 32px; background: none; border: none; cursor: pointer; color: #cbd5e1; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.2s; padding: 0; }
.star-main-block.active { color: #f59e0b !important; }

.counter-side{position:absolute;right:10px;top:-30px;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:22px;font-weight:800;margin:10px 0 5px 0;text-align:center;min-height:26px;}
#speech-feedback { font-size: 19px; margin: 10px 0; min-height: 24px; text-align: center; display: flex; flex-wrap: wrap; justify-content: center;}
#answer{font-size:20px;font-weight:bold;margin: 5px 0 20px 0;text-align:center;min-height:30px;color:#666;}

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

.list-toggle-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-list-main { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e9d5ff; font-weight: bold; cursor: pointer; }
.btn-stars-main { background: #fef3c7; color: #92400e; }

#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:15px}
.list-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; align-items: flex-start; gap: 15px; }
.list-actions-side { display: flex; flex-direction: column; gap: 8px; align-items: center; }
.mini-btn { border: none; border-radius: 10px; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.btn-audio-list { background: #dcfce7; }

.btn-rec-list.recording { background: #f06292 !important; color: white !important; animation: pulse-pink 1.5s infinite; }

</style>

/* 1. NORMALIZACIÓN */
const normalizationMap = {
    "dont": "do not", "doesn't": "does not", "doesnt": "does not", "didnt": "did not", "didn't": "did not",
    "isnt": "is not", "isn't": "is not", "arent": "are not", "aren't": "are not", "im": "i am", "i'm": "i am",
    "youre": "you are", "you're": "you are", "hes": "he is", "he's": "he is", "shes": "she is", "she's": "she is",
    "id": "i would", "i'd": "i would", "youd": "you would", "you'd": "you would", "hed": "he would", "he'd": "he would",
    "shed": "she would", "she'd": "she would", "wed": "we would", "we'd": "we would", "theyd": "they would", "they'd": "they would"
};

function normalizeText(text) {
    if (!text) return "";
    let clean = text.toLowerCase().replace(/[.,?!"]/g, "").trim();
    return clean.split(/\s+/).map(word => {
        let key = word.replace(/['’‘`]/g, ""); 
        return normalizationMap[word] || normalizationMap[key] || word;
    }).join(" ");
}

/* 2. RECONOCIMIENTO (AZUL) */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isSTTActive = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.onstart = () => { isSTTActive = true; document.getElementById("micBtn").classList.add("listening"); };
    recognition.onend = () => { isSTTActive = false; document.getElementById("micBtn").classList.remove("listening"); };
    recognition.onresult = (e) => compareSentences(currentBlockData[pos].en, e.results[0][0].transcript);
}

function toggleDictation() { if (recognition) isSTTActive ? recognition.stop() : recognition.start(); }

function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speech-feedback");

    const normSpoken = normalizeText(spoken).split(/\s+/);
    const rawOrig = original.split(/\s+/);
    let html = "", sIdx = 0, correct = 0;

    normOrig.forEach((word, i) => {
        if (sIdx < normSpoken.length && normSpoken[sIdx] === word) {
            html += `<span class="word-correct">${rawOrig[i]}</span>`;
            sIdx++; correct++;
        } else {
            html += `<span class="word-missing">${rawOrig[i]}</span>`;
        }
    });
    feedbackDiv.innerHTML = html;
    if (correct / normOrig.length >= 0.8) setTimeout(know, 1000);
}

/* 3. GRABADORA (ROSA) */
let mediaRecorder, audioChunks = [], isRecording = false, activeRecBtn = null;

async function toggleRecord(btn) {
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            activeRecBtn = btn;
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(blob)).play();
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
        } catch (err) { alert("Micròfon no disponible"); }
    } else {
        mediaRecorder.stop();
        isRecording = false;
        if (activeRecBtn) activeRecBtn.classList.remove("recording");
    }
}

/* 4. LÓGICA DE ESTRELLA (FAVORITOS) */
function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "index_condicionals"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx !== null ? forcedIdx : (currentBlockData.length > 0 ? currentBlockData[pos].realIdx : null);
  if (idx === null) return;
  if (starredIds.includes(idx)) starredIds = starredIds.filter(id => id !== idx);
  else starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  
  if (forcedIdx === null) {
    const starBtn = document.getElementById("starMainBlock");
    if(starBtn) starBtn.classList.toggle("active", starredIds.includes(idx));
  }
}

/* 5. GESTIÓN DE BLOQUES E INTERFAZ */
function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);

  const btnStar = document.createElement("button");
  btnStar.id = "starMainBlock"; btnStar.className = "star-main-block"; btnStar.innerHTML = "★";
  btnStar.onclick = () => toggleStar();
  container.appendChild(btnStar);

  loadBlock(0);
}

function loadBlock(b) {
  currentBlockID = b;
  let temp = [];
  if (b === 'T') { temp = data.map((item, i) => ({...item, realIdx: i})); } 
  else {
    let start = b * 10;
    for (let i = start; i < Math.min(start + 10, data.length); i++) temp.push({...data[i], realIdx: i});
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0; update(true);
}

function update(nextAction) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Completat! 🎉";
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("starMainBlock").classList.toggle("active", starredIds.includes(item.realIdx));
  
  const w = document.getElementById("word");
  const ans = document.getElementById("answer");
  document.getElementById("speech-feedback").innerHTML = "";

  if (mode === "EN") {
    w.innerHTML = nextAction ? "" : `<span>${item.en}</span>`;
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
  } else {
    w.innerHTML = `<div class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span>${item.en}</span>`;
  }
  ans.style.display = nextAction ? "none" : "block";
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function reveal() {
  const item = currentBlockData[pos], ans = document.getElementById("answer"), w = document.getElementById("word");
  if (ans.style.display === "none") {
    if (mode === "EN") w.innerHTML = `<span>${item.en}</span>`;
    ans.style.display = "block";
  } else {
    ans.style.display = "none";
  }
}

function know() { learnedCount++; currentBlockData.splice(pos, 1); if (pos >= currentBlockData.length) pos = 0; update(true); }
function next() { pos = (pos + 1) % currentBlockData.length; update(true); }
function playAudio(s) { a.src = currentBlockData[pos].audio; a.playbackRate = s; a.play(); }
function pauseAudio() { a.pause(); }
function setMode(m) { mode = m; document.getElementById("modeEN").classList.toggle("active", m==="EN"); document.getElementById("modeES").classList.toggle("active", m==="CA"); update(true); }

function toggleList(type) {
    const l = document.getElementById("list");
    l.style.display = (l.style.display === "block" && l.dataset.type === type) ? "none" : "block";
    l.dataset.type = type;
    if (l.style.display === "block") renderList(type);
}

function renderList(type) {
    const l = document.getElementById("list");
    l.innerHTML = "";
    let listArr = [];
    if (type === 'stars') {
        listArr = data.map((it, i) => ({...it, realIdx: i})).filter(it => starredIds.includes(it.realIdx));
    } else {
        let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
        listArr = data.slice(start, currentBlockID === 'T' ? data.length : start + 10).map((it, i) => ({...it, realIdx: start + i}));
    }
    
    listArr.forEach((item, i) => {
        const isStarred = starredIds.includes(item.realIdx);
        const div = document.createElement("div");
        div.className = "list-item";
        div.innerHTML = `
            <div class="list-actions-side">
                <button class="star-list ${isStarred ? 'active' : ''}" onclick="toggleStar(${item.realIdx}); renderList('${type}')">★</button>
                <button class="mini-btn btn-audio-list" onclick="a.src='${item.audio}'; a.play()">🔊</button>
                <button class="mini-btn btn-rec-list" onclick="toggleRecord(this)">🎙️</button>
            </div>
            <div class="list-content">
                <div class="txt-es" style="font-weight:bold">${item.es}</div>
                <div class="blur" onclick="this.classList.toggle('revealed')">${item.en}</div>
            </div>
        `;
        l.appendChild(div);
    });
}

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { 
    localStorage.setItem(getFolderName(), new Date().toISOString());
    this.innerHTML = "✓"; this.classList.add('marked');
};
card.appendChild(box);

initBlocks();
</script>
