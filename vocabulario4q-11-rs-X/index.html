.counter{font-weight:800;color:#2563eb}
.back-btn{background:#f3e8ff;border:none;border-radius:8px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;font-weight:bold;color:#6b21a8;transition:0.2s}
.back-btn:hover{background:#e9d5ff}
.check-box-manual{position:absolute;top:18px;right:22px;width:24px;height:24px;background:#fff;border:1.5px solid #22c55e;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;font-size:14px}
.check-box-manual.marked{background:#22c55e!important;color:white!important}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex:0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb!important;color:#fff!important;transform:scale(1.1)}
.block.all-btn{background:#e2e8f0;color:#475569}
.audio-container{display:flex;justify-content:center;gap:8px;margin:10px 0;align-items:center;flex-wrap:nowrap}
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dcfce7;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s}
.audio-btn.slow{background:#fef08a}
.audio-btn.pause{background:#fee2e2;color:inherit}
.audio-btn.rec{background:#fca5a5;color:white}
.audio-btn.stt{background:#dbeafe;font-size:22px}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.listening{animation:pulse 1.5s infinite;background:#90caf9!important;color:#0f172a!important}
.recording{animation:pulse 1.5s infinite;background:#f48fb1!important;color:white!important}
#speechFeedback{font-size:18px;margin:15px 0;font-weight:bold;min-height:28px;line-height:1.5;padding:0 10px;display:flex;flex-wrap:wrap;justify-content:center;gap:4px}
.word-correct{color:#16a34a}
.word-error{color:#dc2626;text-decoration:line-through}
.word-missing{color:#94a3b8;font-style:italic}
.star-btn{background:none;border:none;font-size:32px;cursor:pointer;color:#cbd5e1;transition:0.2s;padding:0 5px 0 0;margin-right:5px}
.star-btn.active{color:#f59e0b!important}
.progress-wrapper{width:100%;padding:0 10px;margin:15px 0 10px;box-sizing:border-box}
input[type="range"]{width:100%;cursor:pointer;height:10px;border-radius:5px;accent-color:#2563eb}
.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}
.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}
.list-controls{display:flex;gap:10px;margin-top:16px}
.list-btn{flex:1;background:#e9d5ff;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.review-btn{background:#fef3c7;color:#92400e}
.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item{display:flex;align-items:flex-start;gap:15px;padding:15px 0;border-bottom:1px solid #eee}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:44px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.mini-btn{border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:0.2s}
.btn-audio{background:#dcfce7}
.btn-rec-mini{background:#fbcfe8}

.star-btn-list.active{color:#f59e0b!important}
.blur{filter:blur(5px);transition:filter 0.2s;cursor:pointer;user-select:none}
.blur.revealed{filter:blur(0)}
#estrella-animada{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:100px;z-index:10000;pointer-events:none;opacity:0;display:none}
#btn-rescat{display:none;margin:10px auto;padding:6px 12px;background:#f8fafc;border:1.5px solid #22c55e;border-radius:12px;font-size:11px;color:#16a34a;cursor:pointer;font-weight:800;text-transform:uppercase}
.stats-header{position:fixed;top:45px;right:15px;display:flex;gap:8px;z-index:9999}

<main>

  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord('recBtn')">🎤</button>
  <button class="audio-btn stt" id="sttBtn" onclick="toggleMic()">🎤</button>
 </div>
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100" step="0.1"></div>

 <div id="es" class="es hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>

 </div>
<div class="list-controls">

 </div>

    <div class="barra-herramientas-notas">
        <button id="btnBloqueoNotas" class="boton-bloqueo" onclick="toggleBloqueoNotas()">🔓 <span>Desbloquejat</span></button>
    </div>
    <textarea id="blocNotas" class="area-notas" placeholder="Escriu aquí les teves notes..."></textarea>
</div>
 <div id="endMsg" class="hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat!</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>
<div class="stats-header">
 <div id="timer-pill" class="stat-pill" onclick="resetTimer()">⏱️ <span id="val-timer">00:00</span></div>
 <div id="puntos-pill" class="stat-pill">⭐ <span id="val-puntos">0</span></div>
</div>
<div id="estrella-animada">⭐</div>

function normalizeText(text) {
    if (!text) return "";
    let cleanText = text.toLowerCase()
               .replace(/[.,!?;:]/g, "")
               .trim();

    const numToWords = {
        "0": "zero", "1": "one", "2": "two", "3": "three", "4": "four", 
        "5": "five", "6": "six", "7": "seven", "8": "eight", "9": "nine", "10": "ten",
        "11": "eleven", "12": "twelve", "13": "thirteen", "14": "fourteen", "15": "fifteen",
        "16": "sixteen", "17": "seventeen", "18": "eighteen", "19": "nineteen", "20": "twenty",
        "50": "fifty", "80": "eighty"
    };

    return cleanText.split(/\s+/).map(word => {
        let normalWord = normalizationMap[word] || word;
        return numToWords[normalWord] || normalWord;
    }).join(" ");
}
function compareSentences(original, spoken) {
    const feedbackDiv = document.getElementById("speechFeedback"), normOriginal = normalizeText(original), normSpoken = normalizeText(spoken);
    const normOriginalWords = normOriginal.split(/\s+/).filter(w => w.length > 0), normSpokenWords = normSpoken.split(/\s+/).filter(w => w.length > 0);
    const origWordsRaw = original.split(/\s+/).filter(w => w.length > 0), spokenWordsRaw = spoken.split(/\s+/).filter(w => w.length > 0);    
    let resultHTML = "", oIdx = 0, sIdx = 0, correctCount = 0;
    while (sIdx < normSpokenWords.length) {
        const spokenWord = normSpokenWords[sIdx], rawSpoken = spokenWordsRaw[sIdx];
        if (oIdx < normOriginalWords.length && spokenWord === normOriginalWords[oIdx]) { resultHTML += `<span class="word-correct">${origWordsRaw[oIdx]}</span> `; oIdx++; sIdx++; correctCount++; }
        else if (oIdx < normOriginalWords.length && normSpokenWords.slice(sIdx + 1, sIdx + 4).includes(normOriginalWords[oIdx])) { if (rawSpoken !== "undefined") resultHTML += `<span class="word-error">${rawSpoken}</span> `; sIdx++; }
        else if (oIdx < normOriginalWords.length) { resultHTML += `<span class="word-missing">${origWordsRaw[oIdx]}</span> `; oIdx++; }
        else { if (rawSpoken !== "undefined") resultHTML += `<span class="word-error">${rawSpoken}</span> `; sIdx++; }
    }
    while (oIdx < origWordsRaw.length) { resultHTML += `<span class="word-missing">${origWordsRaw[oIdx]}</span> `; oIdx++; }
    feedbackDiv.innerHTML = resultHTML.trim();
    let score = (normOriginalWords.length > 0) ? (correctCount / normOriginalWords.length) : 0;   
    if (score >= 0.99) {
        fallos = 0; document.getElementById('btn-rescat').style.display = 'none';
        if (window.executarAciertoFinal) window.executarAciertoFinal();
        setTimeout(() => { document.getElementById("speechFeedback").innerHTML = ""; know(); }, 3000);
    } else { fallos++; if (fallos >= 3) document.getElementById('btn-rescat').style.display = 'block'; }
}

function toggleMic() {

        recognition.stop();
    } else {
        if (isRecording) {
            mediaRecorder.stop();

            document.querySelectorAll('.recording').forEach(b => b.classList.remove('recording'));

        document.getElementById("speechFeedback").innerHTML = "";

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            if (isListening) recognition.stop();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
        } catch (err) { alert("Error al accedir al micròfon."); }
    } else {
        mediaRecorder.stop(); 
        isRecording = false;
        btn.classList.remove("recording");
    }
}

function reveal() {
  if (currentBlockData.length === 0) return;
  const esEl = document.getElementById("es"), enEl = document.getElementById("en");
  if (mode === "EN") {
    if (enEl.classList.contains("hidden")) {
        enEl.classList.remove("hidden");
        esEl.classList.remove("hidden");
    } else { playCurrent(1.0); }
  } else { enEl.classList.toggle("hidden"); }
}
function know() {
  if (currentBlockData.length === 0) return;
  
  historyLearned.push({
    item: {...currentBlockData[pos]},
    insertAt: pos
  });

  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  fallos = 0;
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}
function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  fallos = 0;
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}
function previousOne() {
  if (historyLearned.length === 0) return;
  
  const lastRescued = historyLearned.pop();
  currentBlockData.splice(lastRescued.insertAt, 0, lastRescued.item);
  
  pos = lastRescued.insertAt;
  learnedCount = Math.max(0, learnedCount - 1);
  fallos = 0;
  
  document.getElementById("endMsg").classList.add("hidden");
  document.getElementById('btn-rescat').style.display = 'none';
  update(true);
}
function setMode(m) { mode = m; update(true); }
function toggleStar(forcedId = null) {
  const audio = forcedId || currentBlockData[pos].audio;
  if (starredIds.includes(audio)) starredIds = starredIds.filter(id => id !== audio);
  else starredIds.push(audio);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  const starBtn = document.getElementById("starBtn");
  if(starBtn) starBtn.classList.toggle("active", starredIds.includes(currentBlockData[pos].audio));
}
function clearAllStars() {
  if (confirm("Vols eliminar totes les estrelles de la llista?")) {
    starredIds = [];
    localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
    const starBtn = document.getElementById("starBtn");
    if(starBtn) starBtn.classList.remove("active");
    const box = document.getElementById("listBox");
    if (!box.classList.contains("hidden")) { renderList(box.dataset.activeType); }
  }
}
function toggleList(type) {
  const box = document.getElementById("listBox");
  const btnToggle = document.getElementById("btn-toggle-blur-all");
  
  if (!box.classList.contains("hidden") && box.dataset.activeType === type) { 
    box.classList.add("hidden"); 
    if(btnToggle) btnToggle.style.display = "none";
    return;
  }
  
  box.dataset.activeType = type;
  renderList(type);
  box.classList.remove("hidden");
  
  if(btnToggle) {
      btnToggle.style.display = "flex";
      btnToggle.querySelector("span").textContent = "Mostrar tot";
  }
}
function renderList(type) {
  const box = document.getElementById("listBox");
  if (type === 'stars') {
    box.innerHTML = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;"><h3 style="margin:0;">Frases destacades (★):</h3><button onclick="clearAllStars()" style="background:#fee2e2; color:#dc2626; border:none; padding:4px 8px; border-radius:8px; font-size:10px; font-weight:800; cursor:pointer;">NETEJAR TOT 🗑️</button></div>`;
  } else { box.innerHTML = ""; }
  let listToRender = [];
  if (type === 'stars') listToRender = items.filter(i => starredIds.includes(i.audio));
  else listToRender = (currentBlockID === -1) ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10);
  if (listToRender.length === 0) { box.innerHTML += "<p style='padding:10px;'>Buit.</p>"; return; }
  listToRender.forEach((i, index) => {
    const isStarred = starredIds.includes(i.audio), itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    const recId = `rec-list-${index}`;
    
    const realNumber = items.findIndex(item => item.audio === i.audio) + 1;

    itemDiv.innerHTML = `<div class="list-controls-side"><button class="star-btn-list ${isStarred?'active':''}" onclick="toggleStar('${i.audio}'); renderList('${type}')">★</button><button class="mini-btn btn-audio" onclick="playAudio('${i.audio}', 1.0)">🔊</button><button class="mini-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button></div><div class="list-texts"><div style="color:#2563eb; font-weight:700;"><span style="color:#64748b; margin-right:5px;">${realNumber}.</span>${i.es}</div><div id="rev-${index}" class="blur" style="font-weight:800;" onclick="this.classList.toggle('revealed')">${i.en}</div></div>`;
    box.appendChild(itemDiv);
  });
}
function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
}
if (localStorage.getItem(getFolderName())) { 
    const mc = document.getElementById("mainCheck");
    if(mc) { mc.innerHTML = "✓"; mc.classList.add('marked'); }
}
(function() {
    let xp = parseInt(localStorage.getItem('global_xp')) || 0;
    const marcador = document.getElementById('val-puntos');
    if(marcador) marcador.textContent = xp;
    window.executarAciertoFinal = function() {
        xp += 10;
        localStorage.setItem('global_xp', xp);
        if(marcador) marcador.textContent = xp;
        const est = document.getElementById('estrella-animada');
        est.style.display = "block"; est.style.transition = "none";
        est.style.opacity = "0"; est.style.transform = "translate(-50%, -50%) scale(0)";
        void est.offsetWidth; 
        est.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        est.style.opacity = "1"; est.style.transform = "translate(-50%, -50%) scale(1.4)";
        setTimeout(() => {
            est.style.opacity = "0"; est.style.transform = "translate(-50%, -50%) scale(0)";
            setTimeout(() => { est.style.display = "none"; }, 500);
        }, 1000);
    };
})();
function checkStatus(folderName) {
    const data = localStorage.getItem(folderName);
    if (!data) return null;
    const intervals = [1, 3, 7, 15, 30, 60, 90];
    const completionDate = new Date(data);
    const today = new Date();
    today.setHours(0,0,0,0); completionDate.setHours(0,0,0,0);
    const diffDays = Math.floor((today - completionDate) / (1000 * 60 * 60 * 24));
    
    let maxIntervalValue = intervals[intervals.length - 1];
    if (diffDays > maxIntervalValue) return 'done';
    
    for (let i = 0; i < intervals.length; i++) {
        if (diffDays >= intervals[i]) {
            if (i === intervals.length - 1 || diffDays < intervals[i + 1]) {
                return 'review';
            }
        }
    }
    return 'done';
}function gestionarluzCampana() {
    const rc = document.getElementById("reviewCheck");
    if (rc && checkStatus(getFolderName()) === 'review') {
        rc.style.display = "flex";
    }
}
function markReviewAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓";
    el.style.background = "#f59e0b";
    el.style.color = "white";
    setTimeout(() => {
        el.style.display = "none";
    }, 1000);
}
gestionarluzCampana();
initBlocks();
</script>

<script>
function resetDiario() {
    if (confirm("¿Reiniciar el tiempo de HOY?")) {
        localStorage.setItem(CLAVE_DIARIO, 0);
        actualizarVisores();
    }
}

actualizarVisores();
let notasBloqueadas = false;

(function() {
    const bloc = document.getElementById('blocNotas');
    const notaKey = 'notas_' + getFolderName();
    const bloqueoKey = 'notas_bloqueadas_' + getFolderName();
    
    if (bloc) {
        bloc.value = localStorage.getItem(notaKey) || "";

        bloc.addEventListener('input', () => {
            localStorage.setItem(notaKey, bloc.value);
        });
        
        const guardadoBloqueado = localStorage.getItem(bloqueoKey) === 'true';
        if (guardadoBloqueado) {
            notasBloqueadas = true;
            bloc.readOnly = true;
            const t = document.getElementById('btnBloqueoNotas');
            if (t) {
                t.classList.add('bloqueado');
                t.innerHTML = '🔒 <span>Bloquejat</span>';
            }
        }
    }
})();

function toggleBlurAllList() {
    const box = document.getElementById("listBox");
    if (!box || box.classList.contains("hidden")) return;    
    const elements = box.querySelectorAll(".blur");
    const btnToggle = document.getElementById("btn-toggle-blur-all");
    if (elements.length === 0) return;
    const isFirstRevealed = elements[0].classList.contains("revealed");
    elements.forEach(el => {
        if (isFirstRevealed) {
            el.classList.remove("revealed");
        } else {
            el.classList.add("revealed");
        }
    });
    if (btnToggle) {
        btnToggle.querySelector("span").textContent = isFirstRevealed ? "Mostrar tot" : "Amagar tot";
    }
}

function toggleBloqueoNotas() {
    const b = document.getElementById('blocNotas');
    const t = document.getElementById('btnBloqueoNotas');
    if (!b || !t) return;    
    
    notasBloqueadas = !notasBloqueadas;
    b.readOnly = notasBloqueadas;
    
    localStorage.setItem('notas_bloqueadas_' + getFolderName(), notasBloqueadas);
    
    if (notasBloqueadas) {
        t.classList.add('bloqueado');
        t.innerHTML = '🔒 <span>Bloquejat</span>';
    } else {
        t.classList.remove('bloqueado');
        t.innerHTML = '🔓 <span>Desbloquejat</span>';
    }
}
</script>
