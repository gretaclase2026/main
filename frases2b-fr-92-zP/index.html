 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greta App - Unitat 2</title>
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center}
.unit-number{font-size:24px;font-weight:800;color:#2563eb;margin:0 10px}
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-ca{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 12px 30px rgba(0,0,0,0.08);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

.star-main{font-size:32px;cursor:pointer;color:#d1d5db;background:none;border:none;padding:0;transition:0.2s; position: absolute; left: 22px; top: 45px; z-index: 10;}
.star-main.active{color:#facc15}

.audio-container { display: flex; justify-content: center; gap: 10px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }

.audio-btn{width:55px;height:55px;border-radius:50%;border:none;background:#dcfce7;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2;}
/* Color Rosa Chicle para estado activo (Micro Rosa) */
.audio-btn.rec{background:#fca5a5; color: white;}
.recording-active { background: #ec4899 !important; color: white !important; }

.audio-btn.stt{background:#dbeafe; font-size: 22px;}

/* Animación y color para estado activo */
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
.recording-icon { display: inline-block; animation: pulse 1s infinite; }
.listening { animation: pulse 1.5s infinite; background: #3b82f6 !important; color: white !important; }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

.hidden{display:none}
.key-label{font-size:16px;font-weight:900;color:#f48fb1;margin:10px 0}
.ca{font-size:20px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:20px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

#speechFeedback { font-size: 18px; margin: 15px 0; font-weight: bold; min-height: 28px; line-height: 1.5; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.bottom-nav{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.btn-list{background:#e9d5ff}
.btn-study-stars{background:#fef08a}

.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px}
.list-item{padding:15px 0;border-bottom:1px solid #e5e7eb;display:flex;gap:15px;align-items:flex-start}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:40px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.list-ca{color:#2563eb;font-weight:700;font-size:15px}
.list-en{color:#0f172a;font-weight:800;font-size:15px;filter: blur(5px);transition: filter 0.3s;cursor:pointer}
.list-en.revealed{filter: blur(0)}

.btn-play-mini{background:#dcfce7}
.mini-icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.btn-rec-mini{background:#fce7f3}

.star-btn-list{font-size:24px;cursor:pointer;color:#d1d5db;background:none;border:none}
.star-btn-list.active{color:#facc15}

.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>

    {"id":"015","key":"Distraction","audio":"f015.mp3","ca":"Cada vegada que intento organitzar el meu escriptori abans de començar a treballar, acabo trobant fotografies i cartes velles que em distreuen durant hores, fent-me adonar de quant trobo a faltar els vells temps quan tot era més senzill.","en":"Every time I try to organize my desk before starting to work, I end up finding old photographs and letters that distract me for hours, making me realize how much I miss the old days when everything was simpler."},

    {"id":"025","key":"Mud","audio":"f025.mp3","ca":"El meu gos sempre s'emociona moltíssim quan plou, corrent pel fang i després entrant a casa abans que pugui netejar-li les potes, el que significa que haig de fregar tot el terra dues vegades al dia.","en":"My dog always gets extremely excited when it rains, running through the mud and then entering the house before I can clean his paws, which means I have to mop the entire floor twice a day."},
    {"id":"026","key":"Fluency","audio":"f026.mp3","ca":"La raó per la qual estic practicant aquestes frases llargues és que vull millorar la meva fluïdesa per poder parlar amb parlants natius sense haver de parar cada dos segons per pensar en la gramàtica.","en":"The reason why I am practicing these long sentences is that I want to improve my fluency so that I can talk to native speakers without having to stop every two seconds to think about grammar."}
];

let remaining=[...items], current=null, currentIndex=0, mode="EN", known=0, studyStarsOnly=false;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

/* --- LÓGICA DE CONTRACCIONES (Mejora 1) --- */
const contractions = {
    "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would", 
    "it'd": "it would", "we'd": "we would", "they'd": "they would",
    "i've": "i have", "you've": "you have", "we've": "we have", "they've": "they have",
    "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
    "don't": "do not", "doesn't": "does not", "didn't": "did not",
    "can't": "cannot", "couldn't": "could not", "won't": "will not", "wouldn't": "would not",
    "it's": "it is", "she's": "she is", "he's": "he is", "there's": "there is",
    "i'm": "i am", "we're": "we are", "they're": "they are", "you're": "you are",
    "hadn't": "had not", "wouldn't've": "would not have", "i'll": "i will"
};
const expanded = {};
for (let k in contractions) expanded[contractions[k]] = k;

function normalize(w) { return w ? w.toLowerCase().replace(/[.,?!"]/g, "").trim() : ""; }

function compareSentences(originalText, spokenText) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const origWords = originalText.split(/\s+/);
    const spokenWords = spokenText.split(/\s+/);
    let resultHTML = ""; let sIdx = 0; 
    
    for (let i = 0; i < origWords.length; i++) {
        let matched = false; const oNorm = normalize(origWords[i]);
        if (sIdx < spokenWords.length) {
            const sNorm1 = normalize(spokenWords[sIdx]);
            const sNorm2 = normalize(spokenWords[sIdx + 1]);
            const sTwoWords = sNorm1 + " " + (sNorm2 || "");

            if (contractions[oNorm] === sTwoWords) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]} ${spokenWords[sIdx+1]}</span> `;
                sIdx += 2; matched = true;
            } else if (i + 1 < origWords.length && (oNorm + " " + normalize(origWords[i+1])) === contractions[sNorm1]) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx += 1; i++; matched = true;
            } else if (oNorm === sNorm1 || contractions[oNorm] === sNorm1 || expanded[oNorm] === sNorm1) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx++; matched = true;
            }
        }
        if (!matched) {
            let foundAhead = false;
            for (let look = sIdx; look < sIdx + 3 && look < spokenWords.length; look++) {
                if (normalize(spokenWords[look]) === oNorm) {
                    for (let skip = sIdx; skip < look; skip++) resultHTML += `<span class="word-error">${spokenWords[skip]}</span> `;
                    resultHTML += `<span class="word-correct">${spokenWords[look]}</span> `;
                    sIdx = look + 1; foundAhead = true; matched = true; break;
                }
            }
            if (!foundAhead) resultHTML += `<span class="word-missing">${origWords[i]}</span> `;
        }
    }
    while (sIdx < spokenWords.length) { resultHTML += `<span class="word-error">${spokenWords[sIdx]}</span> `; sIdx++; }
    feedbackDiv.innerHTML = resultHTML;
}

/* --- CONTROL DE MICRÓFONOS (Mejora 2) --- */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; recognition.interimResults = false; recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (e) => {
        let transcript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript + " ";
        compareSentences(current.en, transcript.trim());
    };
}

function stopAllMicrophones() {
    if (isListening && recognition) { recognition.stop(); isListening = false; }
    if (isRecording && mediaRecorder) { 
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
        isRecording = false; 
    }
    if (window.localStream) {
        window.localStream.getTracks().forEach(track => track.stop());
        window.localStream = null;
    }
    document.getElementById("sttBtn").classList.remove("listening");
    document.getElementById("recBtn").classList.remove("recording-active");
    document.getElementById("recBtn").innerHTML = '🎤';
    // También para botones de lista
    document.querySelectorAll(".mini-icon-btn.recording-active").forEach(b => {
        b.classList.remove("recording-active");
        b.innerHTML = '🎤';
    });
}

async function toggleMic() {
    if (!recognition) { alert("El teu navegador no suporta reconeixement de veu."); return; }
    if (isListening) { 
        recognition.stop(); 
    } else { 
        stopAllMicrophones(); 
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start(); 
    }
}

let mediaRecorder, audioChunks = [], isRecording = false;

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (isRecording) { stopAllMicrophones(); return; }
    stopAllMicrophones(); 
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        window.localStream = stream;
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            if (audioChunks.length > 0) {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
            }
        };
        mediaRecorder.start(); 
        isRecording = true;
        btn.classList.add("recording-active");
        btn.innerHTML = '<span class="recording-icon">🎤</span>';
    } catch (err) { alert("Micròfon no disponible"); }
}

/* --- LÓGICA GENERAL --- */
audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function updateCounter(){ 
    const total = studyStarsOnly ? items.filter(i => localStorage.getItem('star_' + i.id) === 'true').length : items.length;
    document.getElementById("counter").textContent = known + " / " + total; 
}

function play(speed = 1.0, specificAudio = null){ 
    const source = specificAudio || (current ? current.audio : null);
    if(source) {
        if (!audioObj.src.includes(source)) { audioObj.src = source; progressBar.value = 0; }
        audioObj.playbackRate = speed;
        audioObj.play().catch(e => console.log("Error audio"));
    }
}
function pauseAudio() { audioObj.pause(); }

function load(){
 let pool = studyStarsOnly ? remaining.filter(i => localStorage.getItem('star_' + i.id) === 'true') : remaining;
 if(pool.length===0){ current = null; updateCounter(); return; }
 
 if (currentIndex >= pool.length) currentIndex = 0;
 current = pool[currentIndex]; 

 document.getElementById("ca").classList.add("hidden");
 document.getElementById("en").classList.add("hidden");
 document.getElementById("key").classList.add("hidden");
 document.getElementById("speechFeedback").innerHTML = ""; 
 progressBar.value = 0;
 const starMain = document.getElementById("starMain");
 starMain.classList.toggle('active', localStorage.getItem('star_' + current.id) === 'true');

 if(mode==="EN"){
  document.getElementById("langLabel").textContent="ANGLÈS";
  play(1.0);
 } else {
  document.getElementById("langLabel").textContent="CATALÀ";
  document.getElementById("ca").textContent=current.ca;
  document.getElementById("ca").classList.remove("hidden");
 }
 updateCounter();
}

function toggleStarCurrent() {
    if(!current) return;
    const active = document.getElementById("starMain").classList.toggle('active');
    localStorage.setItem('star_' + current.id, active);
}

function toggleStudyStars() {
    studyStarsOnly = !studyStarsOnly;
    const btn = document.getElementById("btnStudyStars");
    btn.classList.toggle('active', studyStarsOnly);
    known = 0; currentIndex = 0; remaining = [...items]; load();
}

/* --- REVEAL TOGGLE (Mejora 3) --- */
function reveal(){
 if(!current)return;
 const caDiv = document.getElementById("ca");
 const enDiv = document.getElementById("en");
 const keyDiv = document.getElementById("key");
 const feedbackEl = document.getElementById("speechFeedback");

 // Si ya se está mostrando el inglés, lo escondemos todo (Toggle)
 if (!enDiv.classList.contains("hidden")) {
    caDiv.classList.add("hidden");
    enDiv.classList.add("hidden");
    keyDiv.classList.add("hidden");
    feedbackEl.innerHTML = "";
    // Si estamos en modo CATALÁN, el catalán debe permanecer visible
    if(mode==="CA") caDiv.classList.remove("hidden");
 } else {
    // Si estaba escondido, lo mostramos
    caDiv.textContent = current.ca;
    enDiv.textContent = current.en;
    keyDiv.textContent = "Paraula clau: " + current.key;
    caDiv.classList.remove("hidden");
    enDiv.classList.remove("hidden");
    keyDiv.classList.remove("hidden");
 }
}

function know(){
 if(!current)return;
 remaining=remaining.filter(i=>i.id!==current.id);
 known++; 
 load();
}

function nextOne(){ 
    currentIndex++; 
    load(); 
}

function setMode(m){ mode=m; load(); }

function toggleList(){
 const lb = document.getElementById("listBox");
 if (!lb.classList.contains("hidden")) { lb.classList.add("hidden"); return; }
 lb.innerHTML="";
 items.forEach((i, idx)=>{
  const isStarred = localStorage.getItem('star_' + i.id) === 'true';
  const d=document.createElement("div");
  d.className="list-item";
  const recId = `rec-list-${idx}`;
  d.innerHTML=`
    <div class="list-controls-side">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.id}', this)">★</button>
        <button class="mini-icon-btn btn-play-mini" onclick="play(1.0, '${i.audio}')">🔊</button>
        <button class="mini-icon-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button>
    </div>
    <div class="list-texts">
        <div class="list-ca">${i.ca}</div>
        <div class="list-en" id="en-${i.id}" onclick="this.classList.toggle('revealed')">${i.en}</div>
    </div>`;
  lb.appendChild(d);
 });
 lb.classList.remove("hidden");
}

function toggleStar(id, btn) {
    const active = btn.classList.toggle('active');
    localStorage.setItem('star_' + id, active);
    if(current && current.id === id) document.getElementById("starMain").classList.toggle('active', active);
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "unit_2"; }
function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó marcada ✅");
}

load();
</script>
</body>
<style>
    #puntos-header { position: fixed; top: 10px; right: 10px; background: #fef3c7; color: #92400e; padding: 8px 15px; border-radius: 20px; font-weight: 900; border: 2px solid #f59e0b; z-index: 9999; display: flex; align-items: center; gap: 8px; font-size: 18px; }
    #estrella-animada { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 120px; z-index: 10000; pointer-events: none; opacity: 0; }
    #btn-rescat { display: none; margin: 20px auto; padding: 12px; width: 95%; background: #f1f5f9; border: 2px dashed #cbd5e1; border-radius: 12px; font-weight: bold; color: #64748b; cursor: pointer; }
</style>

<div id="puntos-header">⭐ <span id="val-puntos">0</span></div>
<div id="estrella-animada">⭐</div>

<script>
(function() {
    let xp = parseInt(localStorage.getItem('global_xp')) || 0;
    let fallos = 0;
    document.getElementById('val-puntos').textContent = xp;

    // ESTA ES LA FUNCIÓN QUE HACE SALTAR LA ESTRELLA
    window.lanzarEstrella = function() {
        xp += 10;
        localStorage.setItem('global_xp', xp);
        document.getElementById('val-puntos').textContent = xp;

        const est = document.getElementById('estrella-animada');
        // Animación manual directa
        est.style.transition = "all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        est.style.opacity = "1";
        est.style.transform = "translate(-50%, -50%) scale(1.5)";
        
        setTimeout(() => {
            est.style.opacity = "0";
            est.style.transform = "translate(-50%, -50%) scale(0)";
        }, 1000);

        fallos = 0;
        document.getElementById('btn-rescat').style.display = 'none';
    };

    setInterval(() => {
        // Poner el botón de rescate si no está
        const cont = document.querySelector('.audio-container');
        if (cont && !document.getElementById('btn-rescat')) {
            const b = document.createElement('button');
            b.id = 'btn-rescat';
            b.textContent = 'Validar manual (Rescat)';
            b.onclick = window.lanzarEstrella;
            cont.after(b);
        }
        
        // "Robar" el resultado del micro para lanzar la estrella
        if (typeof recognition !== 'undefined' && !recognition._detectado) {
            recognition._detectado = true;
            const originalOnResult = recognition.onresult;
            recognition.onresult = (event) => {
                if(originalOnResult) originalOnResult(event);
                
                const dicho = event.results[0][0].transcript.toLowerCase().trim();
                const correcto = current.en.toLowerCase().trim();

                if (dicho.replace(/[^\w\s]/gi, '') === correcto.replace(/[^\w\s]/gi, '')) {
                    window.lanzarEstrella();
                } else {
                    fallos++;
                    if (fallos >= 3) document.getElementById('btn-rescat').style.display = 'block';
                }
            };
        }
    }, 500);
})();
</script>
</html>
