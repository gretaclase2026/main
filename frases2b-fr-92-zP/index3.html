 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greta App - Frases Unificadas</title>
<style>
body{margin:0;font-family:sans-serif;background:#f9fafb;color:#0f172a}
header{padding:12px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:20px}
.unit-number{font-size:28px;font-weight:900;color:#2563eb} /* Solo número azul */
.mode-btns button{margin:0 6px;padding:8px 14px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}
main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#fff;border-radius:28px;padding:32px;box-shadow:0 12px 30px rgba(0,0,0,0.08);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}

/* Estrella a la izquierda, debajo del contador */
.star-main{font-size:32px;cursor:pointer;color:#d1d5db;background:none;border:none;padding:0;transition:0.2s;position:absolute;left:22px;top:45px}
.star-main.active{color:#facc15}

.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}
.blocks{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:15px 0 20px}
.block{width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important}

.audio-container { display: flex; justify-content: center; gap: 10px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:55px;height:55px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;flex-shrink:0}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2; color: inherit;} 
.audio-btn.rec{background:#fca5a5; color: white;}
.audio-btn.rec.recording { animation: pulse 1.5s infinite; background: #ef4444; }

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

.hidden{display:none}
.key{font-size:16px;font-weight:900;color:#9333ea;margin:10px 0}
.es{font-size:20px;color:#2563eb;margin-top:14px;line-height:1.4}
.en{font-size:20px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.bottom-nav{display:flex;gap:10px;margin-top:16px}
.nav-btn{flex:1;border:none;border-radius:16px;padding:14px;font-weight:800;cursor:pointer;font-size:13px}
.btn-list{background:#e9d5ff}
.btn-study-stars{background:#fef08a}

.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item{padding:15px 0;border-bottom:1px solid #e5e7eb;display:flex;gap:15px;align-items:flex-start}
.list-controls-side{display:flex;flex-direction:column;gap:8px;min-width:40px;align-items:center}
.list-texts{flex-grow:1;display:flex;flex-direction:column;gap:6px}
.list-es{color:#2563eb;font-weight:700;font-size:15px}
.list-en{color:#0f172a;font-weight:800;font-size:15px;filter: blur(5px);transition: filter 0.3s;cursor:pointer}
.list-en.revealed{filter: blur(0)}

.mini-icon-btn{width:36px;height:36px;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}
.btn-play-mini{background:#dbeafe}
.btn-rec-mini{background:#fce7f3} /* Rosa pastel para el micro */
.star-btn-list{font-size:24px;cursor:pointer;color:#d1d5db;background:none;border:none}
.star-btn-list.active{color:#facc15}

.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
</style>
</head>
<body>
<header>
 <div class="mode-btns">
  <button class="mode-en" onclick="setMode('EN')">ANGLÈS → CASTELLÀ</button>
 </div>
 <div class="unit-number">2</div>
 <div class="mode-btns">
  <button class="mode-es" onclick="setMode('ES')">CASTELLÀ → ANGLÈS</button>
 </div>
</header>
<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>
 <button class="star-main" id="starMain" onclick="toggleStarCurrent()">★</button>

 <div id="langLabel" class="lang">ANGLÈS</div>

 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button class="audio-btn slow" onclick="play(0.75)">🐢</button>
  <button class="audio-btn" onclick="play(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord()">🎤</button>
 </div>

 <div class="progress-wrapper">
  <input type="range" id="progressBar" value="0" step="0.1">
 </div>

 <div id="key" class="key hidden"></div>
 <div id="es" class="es hidden"></div>
 <div id="en" class="en hidden"></div>

 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>

 <div class="bottom-nav">
    <button class="nav-btn btn-list" onclick="toggleList()">Veure llista</button>
    <button class="nav-btn btn-study-stars" id="btnStudyStars" onclick="toggleStudyStars()">Estudiar ⭐</button>
 </div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>

    {"id": "011", "audio": "f011.mp3", "key": "Roughly", "en": "I think there were roughly eighty students in the museum yesterday, and they were all wearing red jackets and carrying big backpacks with their lunch and water.", "es": "Creo que habia aproximadamente ochenta estudiantes en el museo ayer, y todos llevaban chaquetas rojas y cargaban mochilas grandes con su almuerzo y agua."},

    {"id": "014", "audio": "f014.mp3", "key": "Warn", "en": "I need to warn you that the movie is very long and a bit boring, so you should bring some snacks and a drink if you want to go to the cinema tonight.", "es": "Necesito advertirte que la pelicula es muy larga y un poco aburrida, asi que deberias traer algunos aperitivos y una bebida si quieres ir al cine esta noche."},

    {"id": "022", "audio": "f022.mp3", "key": "Awake", "en": "If I had known that caffeine would keep me awake until three in the morning, I would never have ordered that double espresso after dinner while I was out with my coworkers last night.", "es": "Si hubiera sabido que la cafeina me mantendria despierto hasta las tres de la mañana, nunca habria pedido ese espresso doble despues de cenar mientras estaba fuera con mis compañeros anoche."},
    {"id": "023", "audio": "f023.mp3", "key": "Advice", "en": "I noticed that the plants on my balcony were starting to turn yellow, so I decided to look for some advice online to find out if I was watering them too much or if they needed more sunlight.", "es": "Note que las plantas de mi balcon estaban empezando a ponerse amarillas, asi que decidi buscar algunos consejos en internet para averiguar si las estaba regando demasiado o si necesitaban mas luz solar."},
    {"id": "024", "audio": "f024.mp3", "key": "Mechanic", "en": "We were thinking about going to the beach this weekend, but since the car is making a strange noise, we might have to take it to the mechanic and stay in the city to explore the new museum en su lugar.", "es": "Estabamos pensando en ir a la playa este fin de semana, pero como el coche esta haciendo un ruido extraño, puede que tengamos que llevarlo al mecanico y quedarnos en la ciudad para explorar el nuevo museo en su lugar."},
    {"id": "025", "audio": "f025.mp3", "key": "Mud", "en": "My dog always gets extremely excited when it rains, running through the mud and then entering the house before I can clean his paws, which means I have to mop the entire floor twice a day.", "es": "Mi perro siempre se emociona muchisimo cuando llueve, corriendo por el barro y luego entrando en casa antes de que pueda limpiarle las patas, lo que significa que tengo que fregar todo el suelo dos veces al dia."},
    {"id": "026", "audio": "f026.mp3", "key": "Fluency", "en": "The reason why I am practicing these long sentences is that I want to improve my fluency so that I can talk to native speakers without having to stop every two seconds to think about grammar.", "es": "La razon por la que estoy practicando estas frases largas es que quiero mejorar mi fluidez para poder hablar con hablantes nativos sin tener que parar cada dos segundos para pensar en la gramatica."}
];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0, studyStarsOnly = false;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

let mediaRecorder, audioChunks = [], isRecording = false;

async function toggleRecord(targetBtnId = "recBtn") {
    const btn = document.getElementById(targetBtnId);
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                new Audio(audioUrl).play();
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
            if(targetBtnId === "recBtn") btn.textContent = "⏹";
        } catch (err) { alert("Error al acceder al micrófono."); }
    } else {
        mediaRecorder.stop(); isRecording = false;
        btn.classList.remove("recording");
        if(targetBtnId === "recBtn") btn.textContent = "🎤";
    }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  loadBlock(0);
}

function loadBlock(b) {
  currentBlockID = b;
  let temp = [];
  if (b === 'T') {
    temp = items.map((item, i) => ({...item, realIdx: i+1}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, items.length);
    for (let i = start; i < end; i++) temp.push({...items[i], realIdx: i+1});
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  update(true);
}

function update(fromAction = false) {
  let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;

  if (pool.length === 0) {
    document.getElementById("en").innerHTML = studyStarsOnly ? "No hay favoritos en este bloque" : "🎉 ¡Bloque completado!";
    document.getElementById("es").innerHTML = "";
    document.getElementById("key").classList.add("hidden");
    document.getElementById("en").classList.remove("hidden");
    document.getElementById("counter").textContent = studyStarsOnly ? "0 / 0" : `${learnedCount} / ${learnedCount}`;
    return;
  }
  
  if (pos >= pool.length) pos = 0;
  const item = pool[pos];
  
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");
  document.getElementById("key").classList.add("hidden");
  progressBar.value = 0;

  const starMain = document.getElementById("starMain");
  starMain.classList.toggle('active', localStorage.getItem('star_' + item.id) === 'true');

  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "INGLÉS";
    if (fromAction) play(1.0);
  } else {
    document.getElementById("langLabel").textContent = "CASTELLANO";
    document.getElementById("es").innerHTML = item.es;
    document.getElementById("es").classList.remove("hidden");
  }
  
  document.getElementById("counter").textContent = `${learnedCount} / ${pool.length + learnedCount}`;
}

function play(speed, specificAudio = null) {
  let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;
  const item = pool[pos];
  const source = specificAudio || (item ? item.audio : null);
  if (source) {
    if (!audioObj.src.includes(source)) { audioObj.src = source; progressBar.value = 0; }
    audioObj.playbackRate = speed;
    audioObj.play().catch(() => {});
  }
}
function pauseAudio() { audioObj.pause(); }

function toggleStarCurrent() {
    let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;
    if(!pool[pos]) return;
    const item = pool[pos];
    const active = document.getElementById("starMain").classList.toggle('active');
    localStorage.setItem('star_' + item.id, active);
}

function toggleStudyStars() {
    studyStarsOnly = !studyStarsOnly;
    document.getElementById("btnStudyStars").classList.toggle('active', studyStarsOnly);
    pos = 0; learnedCount = 0; update(true);
}

function reveal() {
  let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;
  if (pool.length === 0) return;
  const item = pool[pos];
  
  const esDiv = document.getElementById("es");
  const enDiv = document.getElementById("en");
  const keyDiv = document.getElementById("key");

  if (!enDiv.classList.contains("hidden")) {
      enDiv.classList.add("hidden");
      keyDiv.classList.add("hidden");
      if(mode==="EN") esDiv.classList.add("hidden");
  } else {
      if(item.key) {
          keyDiv.textContent = "Clave: " + item.key;
          keyDiv.classList.remove("hidden");
      }
      esDiv.innerHTML = item.es; 
      enDiv.innerHTML = item.en;
      esDiv.classList.remove("hidden"); 
      enDiv.classList.remove("hidden");
  }
}

function know() {
  let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;
  if (pool.length === 0) return;
  const item = pool[pos];
  learnedCount++;
  currentBlockData = currentBlockData.filter(i => i.id !== item.id);
  update(true);
}

function nextOne() {
  let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;
  if (pool.length > 0) pos = (pos + 1) % pool.length;
  update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleList() {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden")) { box.classList.add("hidden"); return; }
  box.innerHTML = "";
  
  items.forEach((i, idx) => {
    const isStarred = localStorage.getItem('star_' + i.id) === 'true';
    const d = document.createElement("div");
    d.className = "list-item";
    d.innerHTML = `
        <div class="list-controls-side">
            <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.id}', this)">★</button>
            <button class="mini-icon-btn btn-play-mini" onclick="play(1.0, '${i.audio}')">🔊</button>
            <button class="mini-icon-btn btn-rec-mini" id="rec-list-${idx}" onclick="toggleRecord('rec-list-${idx}')">🎤</button>
        </div>
        <div class="list-texts">
            <div style="color:#64748b; font-size:11px;">#${idx + 1}</div>
            <div class="list-es">${i.es}</div>
            <div class="list-en" id="en-${idx}" onclick="this.classList.toggle('revealed')">${i.en}</div>
        </div>`;
    box.appendChild(d);
  });
  box.classList.remove("hidden");
}

function toggleStar(id, btn) {
    const active = btn.classList.toggle('active');
    localStorage.setItem('star_' + id, active);
    let pool = studyStarsOnly ? currentBlockData.filter(i => localStorage.getItem('star_' + i.id) === 'true') : currentBlockData;
    if(pool[pos] && pool[pos].id === id) document.getElementById("starMain").classList.toggle('active', active);
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "unificado"; }
function markAsDone(el) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    el.innerHTML = "✓"; el.classList.add('marked');
    alert("Lliçó marcada ✅");
}

if (localStorage.getItem(getFolderName())) { 
    const mc = document.getElementById("mainCheck");
    mc.innerHTML = "✓"; mc.classList.add('marked'); 
}

initBlocks();
</script>
</body>
</html>
