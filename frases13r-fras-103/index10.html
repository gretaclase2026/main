 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noves Frases d'Estudi (Català/Anglès)</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;gap:10px;margin-bottom:10px;width:100%;align-items:center}
.unit-number{font-weight:bold;font-size:20px;color:#2563eb;padding:0 10px}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0;justify-content:center;align-items:center}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#f1f5f9;cursor:pointer;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1);box-shadow:0 4px 10px rgba(37,99,235,0.3)}

.star-main { background: none; border: none; font-size: 30px; cursor: pointer; color: #cbd5e1; transition: 0.2s; margin-left: 5px; }
.star-main.active { color: #f59e0b !important; }

.main-box-container{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;margin:35px 0 20px 0}
.audio-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:15px;flex-wrap:wrap}

.audio-btn{font-size:30px;background:#dcfce7;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.slow{background:#fef08a;font-size:28px}
.audio-btn.pause{background:#fee2e2;font-size:28px}

/* --- CANVI DE COLORS AQUÍ --- */

/* Abans blau, ara ROSA */
.rec-btn{font-size:30px;background:#fee2e2;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s}
.rec-btn.recording{background:#ef4444; color:white; animation: pulse-red 1.5s infinite; transform: scale(1.1);}

/* Abans rosa, ara BLAU */
.mic-btn{font-size:30px;background:#dbeafe;border:none;cursor:pointer;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.3s}
.mic-btn.listening{background:#2563eb; color:white; animation: pulse-blue 1.5s infinite; transform: scale(1.1);}

/* --------------------------- */

@keyframes pulse-red { 0% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(239, 68, 68, 0);} 100% {box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);} }
@keyframes pulse-blue { 0% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7);} 70% {box-shadow: 0 0 0 15px rgba(37, 99, 235, 0);} 100% {box-shadow: 0 0 0 0 rgba(37, 99, 235, 0);} }

.progress-wrapper { width: 100%; max-width: 300px; margin: 10px 0; }
input[type="range"] { width: 100%; cursor: pointer; height: 8px; border-radius: 5px; accent-color: #2563eb; }

.counter-side{position:absolute;right:10px;top:-25px;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:20px;font-weight:800;margin:20px 0;line-height:1.4;min-height:120px;text-align:center;display:flex;align-items:center;justify-content:center;padding:0 10px}
.txt-es{color:#2563eb} 
#answer{font-size:18px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px;color:#666}

#speech-feedback { font-style: italic; color: #ef4444; font-size: 19px; margin-bottom: 10px; min-height: 24px; text-align: center; transition: 0.2s;}
.speech-success { color: #22c55e !important; font-weight: bold; font-style: normal !important; }

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

.list-toggle-btns { display: flex; gap: 10px; margin-top: 20px; }
.btn-list-main { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e9d5ff; font-weight: bold; cursor: pointer; }
.btn-stars-main { background: #fef3c7; color: #92400e; }

#list{margin-top:20px;background:#fff;border-radius:15px;display:none;border:1px solid #ddd;padding:10px}
.list-item { padding: 15px 0; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: flex-start; gap: 15px; }
.list-btns-col { display: flex; flex-direction: column; gap: 8px; align-items: center; min-width: 45px; }
.list-content { flex: 1; }
.mini-btn { border: none; border-radius: 10px; width: 38px; height: 38px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.btn-audio-list { background: #dcfce7; }
.star-list { background: none; border: none; font-size: 24px; color: #cbd5e1; cursor: pointer; padding: 0; }
.star-list.active { color: #f59e0b !important; }

.blur { filter: blur(5px); transition: filter 0.3s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }

.check-box-manual {
    position: absolute; top: 85px; right: 22px; width: 24px; height: 24px;
    background: #fff !important; border: 1.5px solid #22c55e !important;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 10; transition: all 0.2s; font-size: 14px;
}
.check-box-manual.marked { background: #22c55e !important; color: white; }
</style>
</head>
<body>

    <div id="modeEN" class="mode en active" onclick="setMode('EN')">ENG → CAT</div>

</div>

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const a = document.getElementById("audio");
const progressBar = document.getElementById("progressBar");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;
if (recognition) { recognition.lang = 'en-US'; recognition.interimResults = false; }

function startDictation() {
    if (!recognition || currentBlockData.length === 0) return;
    const btn = document.getElementById("micBtn");
    const feedback = document.getElementById("speech-feedback");
    btn.classList.add("listening");
    feedback.textContent = "Escoltant...";
    feedback.classList.remove("speech-success");
    recognition.start();
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"").trim();
        const original = currentBlockData[pos].en.toLowerCase().replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"").trim();
        if (transcript === original) {
            feedback.innerHTML = `"${event.results[0][0].transcript}" 🎉`;
            feedback.classList.add("speech-success");
            setTimeout(() => { feedback.textContent = ""; know(); }, 1200);
        } else {
            feedback.textContent = `"${event.results[0][0].transcript}"`;
        }
    };
    recognition.onend = () => btn.classList.remove("listening");
}

let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecord() {
    const btn = document.getElementById("recBtn");
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                const userAudio = new Audio(audioUrl);
                userAudio.play();
            };
            mediaRecorder.start();
            isRecording = true;
            btn.classList.add("recording");
            btn.textContent = "⏹";
        } catch (err) { alert("Error al accedir al micròfon."); }
    } else {
        mediaRecorder.stop();
        isRecording = false;
        btn.classList.remove("recording");
        btn.textContent = "🎙️";
    }
}

function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "noves_frases"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

a.ontimeupdate = () => { if (a.duration) progressBar.value = (a.currentTime / a.duration) * 100; };
progressBar.oninput = () => { if (a.duration) a.currentTime = (progressBar.value / 100) * a.duration; };

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_currentBlock");
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  
  const starMain = document.createElement("button");
  starMain.id = "starMain";
  starMain.className = "star-main";
  starMain.innerHTML = "★";
  starMain.onclick = () => toggleStar();
  container.appendChild(starMain);

  const blockToLoad = (savedBlock !== null) ? (savedBlock === 'T' ? 'T' : parseInt(savedBlock)) : 0;
  loadBlock(blockToLoad);
}

function loadBlock(b) {
  currentBlockID = b;
  localStorage.setItem(getFolderName() + "_currentBlock", b);
  let temp = [];
  if (b === 'T') { temp = data.map((item, i) => ({...item, realIdx: i})); } 
  else {
    let start = b * 10;
    let end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) temp.push({...data[i], realIdx: i});
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });
  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloc Completat! 🎉";
    document.getElementById("answer").innerHTML = "";
    return;
  }
  const item = currentBlockData[pos];
  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));
  const w = document.getElementById("word");
  const ans = document.getElementById("answer");
  const feedback = document.getElementById("speech-feedback");
  progressBar.value = 0;
  ans.style.display = "none";
  feedback.textContent = "";

  if (mode === "EN") {
    w.innerHTML = ``; 
    ans.innerHTML = `<span class="txt-es">${item.es}</span>`;
    if (fromNextAction) playAudio(1.0);
  } else {
    w.innerHTML = `<div class="txt-es">${item.es}</div>`;
    ans.innerHTML = `<span>${item.en}</span>`;
  }
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStar(forcedIdx = null) {
  const idx = forcedIdx !== null ? forcedIdx : (currentBlockData.length > 0 ? currentBlockData[pos].realIdx : null);
  if (idx === null) return;
  if (starredIds.includes(idx)) starredIds = starredIds.filter(id => id !== idx);
  else starredIds.push(idx);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  
  if (forcedIdx === null) {
      document.getElementById("starMain").classList.toggle("active", starredIds.includes(idx));
  }
}

function playAudio(speed, forcedAudio = null) {
  const audioFile = forcedAudio || (currentBlockData.length > 0 ? currentBlockData[pos].audio : null);
  if (!audioFile) return;
  if (!a.src.includes(audioFile)) { a.src = audioFile; progressBar.value = 0; }
  a.playbackRate = speed;
  a.play().catch(() => {});
}

function pauseAudio() { a.pause(); }

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos];
    const ans = document.getElementById("answer");
    const w = document.getElementById("word");
    if (ans.style.display === "none") {
        if (mode === "EN") w.innerHTML = `<span>${item.en}</span>`;
        ans.style.display = "block";
    } else {
        if (mode === "EN") w.innerHTML = "";
        ans.style.display = "none";
    }
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "CA");
  update(true);
}

function toggleList(type) {
  const l = document.getElementById("list");
  if (l.style.display === "block" && l.dataset.type === type) { l.style.display = "none"; return; }
  l.dataset.type = type;
  renderList(type);
  l.style.display = "block";
}

function toggleBlur(el) {
    el.classList.toggle('revealed');
}

function renderList(type) {
  const l = document.getElementById("list");
  l.innerHTML = type === 'stars' ? "<b>Favorites (★):</b><br><br>" : "<b>Llista del bloc:</b><br><br>";
  
  let listToRender = [];
  if (type === 'stars') {
    listToRender = data.map((item, index) => ({...item, realIdx: index})).filter(i => starredIds.includes(i.realIdx));
  } else {
    let start = currentBlockID === 'T' ? 0 : currentBlockID * 10;
    let end = currentBlockID === 'T' ? data.length : Math.min(start + 10, data.length);
    listToRender = data.slice(start, end).map((item, index) => ({...item, realIdx: start + index}));
  }

  if (listToRender.length === 0) { l.innerHTML += "<i>Buit.</i>"; return; }

  listToRender.forEach((item, index) => {
    const isStarred = starredIds.includes(item.realIdx);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    
    itemDiv.innerHTML = `
      <div class="list-btns-col">
        <button class="star-list ${isStarred ? 'active' : ''}" onclick="toggleStar(${item.realIdx}); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio-list" onclick="playAudio(1.0, '${item.audio}')">🔊</button>
      </div>
      <div class="list-content">
        <div class="list-texts">
          <div class="txt-es" style="font-weight:bold; font-size:14px;">${item.es}</div>
          <div class="blur" style="font-weight:bold; font-size:16px;" onclick="toggleBlur(this)">${item.en}</div>
        </div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
}

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓"; element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) { box.innerHTML = "✓"; box.classList.add('marked'); }
box.onclick = function() { markAsDone(this); };
card.appendChild(box);

initBlocks();
</script>
</body>
</html>
