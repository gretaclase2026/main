let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

const contractions = {
    "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would", 
    "it'd": "it would", "we'd": "we would", "they'd": "they would",
    "i've": "i have", "you've": "you have", "we've": "we have", "they've": "they have",
    "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
    "don't": "do not", "doesn't": "does not", "didn't": "did not",
    "can't": "cannot", "couldn't": "could not", "won't": "will not", "wouldn't": "would not",
    "it's": "it is", "she's": "she is", "he's": "he is", "there's": "there is",
    "i'm": "i am", "we're": "we are", "they're": "they are", "you're": "you are",
    "hadn't": "had not", "wouldn't've": "would not have", "i'll": "i will"
};

const expanded = {};
for (let k in contractions) expanded[contractions[k]] = k;

function normalize(w) { return w ? w.toLowerCase().replace(/[.,?!"]/g, "").trim() : ""; }

function compareSentences(originalText, spokenText) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const origWords = originalText.split(/\s+/);
    const spokenWords = spokenText.split(/\s+/);
    let resultHTML = ""; let sIdx = 0; 
    for (let i = 0; i < origWords.length; i++) {
        let matched = false; const oNorm = normalize(origWords[i]);
        if (sIdx < spokenWords.length) {
            const sNorm1 = normalize(spokenWords[sIdx]);
            const sNorm2 = normalize(spokenWords[sIdx + 1]);
            const sTwoWords = sNorm1 + " " + (sNorm2 || "");
            if (contractions[oNorm] === sTwoWords) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]} ${spokenWords[sIdx+1]}</span> `;
                sIdx += 2; matched = true;
            } else if (i + 1 < origWords.length && (oNorm + " " + normalize(origWords[i+1])) === contractions[sNorm1]) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx += 1; i++; matched = true;
            } else if (oNorm === sNorm1 || contractions[oNorm] === sNorm1 || expanded[oNorm] === sNorm1) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx++; matched = true;
            }
        }
        if (!matched) {
            let foundAhead = false;
            for (let look = sIdx; look < sIdx + 3 && look < spokenWords.length; look++) {
                if (normalize(spokenWords[look]) === oNorm) {
                    for (let skip = sIdx; skip < look; skip++) resultHTML += `<span class="word-error">${spokenWords[skip]}</span> `;
                    resultHTML += `<span class="word-correct">${spokenWords[look]}</span> `;
                    sIdx = look + 1; foundAhead = true; matched = true; break;
                }
            }
            if (!foundAhead) resultHTML += `<span class="word-missing">${origWords[i]}</span> `;
        }
    }
    while (sIdx < spokenWords.length) { resultHTML += `<span class="word-error">${spokenWords[sIdx]}</span> `; sIdx++; }
    feedbackDiv.innerHTML = resultHTML;
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; recognition.interimResults = false; recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (e) => {
        let transcript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript + " ";
        compareSentences(currentBlockData[pos].en, transcript.trim());
    };
}

function stopAllMicrophones() {
    if (isListening && recognition) { recognition.stop(); isListening = false; }
    if (isRecording && mediaRecorder) { 
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
        isRecording = false; 
    }
    if (window.localStream) {
        window.localStream.getTracks().forEach(track => track.stop());
        window.localStream = null;
    }
    document.getElementById("sttBtn").classList.remove("listening");
    document.querySelectorAll(".recording-active").forEach(b => {
        b.classList.remove("recording-active");
        b.innerHTML = '🎤';
    });
}

async function toggleMic() {
    if (!recognition) return;
    if (isListening) { 
        recognition.stop(); 
    } else { 
        stopAllMicrophones(); 
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start(); 
    }
}

let mediaRecorder, audioChunks = [], isRecording = false;

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (isRecording) { stopAllMicrophones(); return; }
    stopAllMicrophones(); 
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        window.localStream = stream;
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            if (audioChunks.length > 0) {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
            }
        };
        mediaRecorder.start(); 
        isRecording = true;
        btn.classList.add("recording-active");
        btn.innerHTML = '<span class="recording-icon">🎤</span>';
    } catch (err) { alert("Micròfon no disponible"); }
}

audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_puntoLibro");
  container.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "block all-btn"; allBtn.textContent = "T";
  allBtn.onclick = () => loadAll(); container.appendChild(allBtn);
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i); container.appendChild(btn);
  }
  if (savedBlock === "all") loadAll();
  else loadBlock((savedBlock !== null) ? parseInt(savedBlock) : 0);
}

function loadBlock(b) {
  currentBlockID = b; localStorage.setItem(getFolderName() + "_puntoLibro", b);
  let temp = []; let start = b * 10;
  for (let i = start; i < Math.min(start + 10, items.length); i++) temp.push({...items[i]});
  currentBlockData = temp;
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === (b + 1)));
  pos = 0; learnedCount = 0; document.getElementById("endMsg").classList.add("hidden"); update(true);
}

function loadAll() {
  currentBlockID = -1; localStorage.setItem(getFolderName() + "_puntoLibro", "all");
  currentBlockData = items.map(i => ({...i}));
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === 0));
  pos = 0; learnedCount = 0; document.getElementById("endMsg").classList.add("hidden"); update(true);
}

function update(fromAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("en").classList.add("hidden");
    document.getElementById("es").classList.add("hidden");
    document.getElementById("endMsg").classList.remove("hidden");
    return;
  }
  progressBar.value = 0; const item = currentBlockData[pos];
  document.getElementById("speechFeedback").innerHTML = "";
  document.getElementById("starBtn").classList.toggle("active", starredIds.includes(item.audio));
  
  const elES = document.getElementById("es");
  const elEN = document.getElementById("en");

  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    elEN.innerHTML = item.en; 
    elEN.classList.remove("hidden");
    elES.innerHTML = item.es;
    elES.classList.add("hidden"); // El català comença ocult
    if (fromAction) playAudio(item.audio, 1.0);
  } else {
    document.getElementById("langLabel").textContent = "CATALÀ";
    elES.innerHTML = item.es; 
    elES.classList.remove("hidden");
    elEN.innerHTML = item.en;
    elEN.classList.add("hidden"); // L'anglès comença ocult
  }
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

function playAudio(src, speed) { audioObj.src = src; audioObj.playbackRate = speed; audioObj.play().catch(()=>{}); }
function playCurrent(speed) { if (currentBlockData.length > 0) playAudio(currentBlockData[pos].audio, speed); }
function pauseAudio() { audioObj.pause(); }

function reveal() {
  if (currentBlockData.length === 0) return;
  // Simplement forcem que es vegin els dos idiomes
  document.getElementById("es").classList.remove("hidden");
  document.getElementById("en").classList.remove("hidden");
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++; currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0; update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length; update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleStar(forcedId = null) {
  const audio = forcedId || currentBlockData[pos].audio;
  if (starredIds.includes(audio)) starredIds = starredIds.filter(id => id !== audio);
  else starredIds.push(audio);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  update();
}

function toggleList(type) {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden") && box.dataset.activeType === type) { box.classList.add("hidden"); return; }
  box.dataset.activeType = type; renderList(type); box.classList.remove("hidden");
}

function renderList(type) {
  const box = document.getElementById("listBox"); box.innerHTML = "";
  let listToRender = (type === 'stars') ? items.filter(i => starredIds.includes(i.audio)) : 
                    (currentBlockID === -1 ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10));
  if (listToRender.length === 0) { box.innerHTML += "<p style='padding:10px;'>Buit.</p>"; return; }
  listToRender.forEach((i, index) => {
    const isStarred = starredIds.includes(i.audio);
    const itemDiv = document.createElement("div"); itemDiv.className = "list-item";
    const recId = `rec-list-${index}`;
    itemDiv.innerHTML = `
      <div class="list-controls-row">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.audio}'); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio" onclick="playAudio('${i.audio}', 1.0)">🔊</button>
        <button class="mini-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button>
      </div>
      <div class="list-texts">
        <div style="color:#2563eb; font-weight:700;">${i.es}</div>
        <div class="blur" style="font-weight:800;" onclick="this.classList.toggle('revealed')">${i.en}</div>
      </div>
    `;
    box.appendChild(itemDiv);
  });
}

function markAsDone(el) {
    if (!el.classList.contains('marked')) {
        localStorage.setItem(getFolderName(), new Date().toISOString());
        el.innerHTML = "✓"; el.classList.add('marked');
    } else {
        localStorage.removeItem(getFolderName());
        el.innerHTML = ""; el.classList.remove('marked');
    }
}

window.addEventListener('load', () => {
    if (localStorage.getItem(getFolderName())) {
        const mc = document.getElementById("mainCheck");
        mc.innerHTML = "✓"; mc.classList.add('marked');
    }
    initBlocks();
});
</script>
