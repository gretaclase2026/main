<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador de Pronunciación - 100 Verbos (A-Z)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .verb-row:nth-child(even) { background-color: #f8fafc; }
        .btn-audio span { visibility: hidden; }
        .btn-audio.revealed span { visibility: visible; }
        .btn-audio.revealed { background-color: #eff6ff; border-color: #60a5fa; }
        .btn-audio:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-10">

    <div class="max-w-xl mx-auto bg-white shadow-2xl min-h-screen">
        <div class="bg-blue-800 p-6 text-white sticky top-0 z-10 shadow-md flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-wider">Pronunciación Pro</h1>
                <p class="text-blue-100 text-xs">100 Verbos Ordenados (A-Z)</p>
            </div>
            <button onclick="hideAll()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded-lg text-xs border border-blue-400 transition-all">
                Ocultar todo
            </button>
        </div>

        <div id="container" class="p-2"></div>
    </div>

function playLocalAudio(btn, text) {
    btn.classList.add('revealed');
    const fileName = text.replace("/", "-") + ".mp3";
    const audio = new Audio(fileName);
    audio.play().catch(() => console.log("Archivo no encontrado: " + fileName));
}

function hideAll() {
    document.querySelectorAll('.btn-audio').forEach(btn => {
        btn.classList.remove('revealed');
    });
}

const container = document.getElementById('container');
verbs.forEach(v => {
    const row = document.createElement('div');
    row.className = "verb-row p-4 border-b border-slate-100 flex flex-col gap-2";
    
    const label = document.createElement('div');
    label.className = "text-[10px] font-bold text-slate-400 uppercase tracking-tighter";
    label.textContent = v.esp;

    const grid = document.createElement('div');
    grid.className = "grid grid-cols-3 gap-2";

    [v.v1, v.v2, v.v3].forEach(form => {
        const btn = document.createElement('button');
        btn.className = "btn-audio bg-white border-2 border-slate-200 py-3 rounded-xl text-xs font-black text-slate-700 transition-all shadow-sm";
        const span = document.createElement('span');
        span.textContent = form;
        btn.appendChild(span);
        btn.onclick = () => playLocalAudio(btn, form);
        grid.appendChild(btn);
    });

    row.appendChild(label);
    row.appendChild(grid);
    container.appendChild(row);
});
</script>
</body>
</html>
