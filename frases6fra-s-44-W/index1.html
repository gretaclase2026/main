 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulari Neural B1 - Vibrant</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#ececec;color:#333}
.card{max-width:720px;margin:20px auto;background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 18px rgba(0,0,0,.15);position:relative}

.modes{display:flex;gap:10px;margin-bottom:10px;width:100%}
.mode{flex:1;text-align:center;padding:14px;border-radius:24px;font-weight:bold;cursor:pointer;border:2px solid transparent}
.mode.en{background:#d6e6f5}
.mode.es{background:#f4d6e6}
.mode.active{border-color:#999;box-shadow:0 2px 5px rgba(0,0,0,0.1)}

.blocks{display:flex;flex-wrap:wrap;gap:8px;margin:15px 0}
.block{width:40px;height:40px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-weight:bold;background:#fff4cc;cursor:pointer;transition:0.2s}
.block.active{background:#ffcc00;transform:scale(1.1);box-shadow:inset 0 0 5px rgba(0,0,0,0.2)}

.main-box-container{display:flex;align-items:center;justify-content:center;position:relative;margin:20px 0; gap:20px;}
.main-box{text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center}

.audio-btn{font-size:60px;background:#dcfce7;border:none;cursor:pointer;width:140px;height:140px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:0.2s}
.audio-btn.vibrate{animation:vibrate 0.25s linear 2}
@keyframes vibrate{0%{transform:translate(0)}25%{transform:translate(2px,-2px)}50%{transform:translate(-2px,2px)}75%{transform:translate(2px,2px)}100%{transform:translate(0)}}

.star-main { font-size: 40px; cursor: pointer; color: #ccc; border: none; background: none; transition: 0.2s; }
.star-main.active { color: #f59e0b; transform: scale(1.2); }

.counter-side{position:absolute;right:10px;font-weight:bold;color:#2563eb;font-size:22px}

#word{font-size:32px;font-weight:800;margin:20px 0;line-height:1.2;min-height:80px;text-align:center;display:flex;align-items:center;justify-content:center}
.txt-es{color:#2563eb} 
.txt-cat{color:#666}
#answer{font-size:24px;font-weight:bold;margin-top:-10px;margin-bottom:20px;text-align:center;min-height:30px}

.actions{display:flex;gap:12px}
.btn{flex:1;padding:18px;border-radius:18px;border:none;font-weight:bold;font-size:18px;cursor:pointer}
.btn-reveal{background:#e0f2fe}
.btn-know{background:#dcfce7}
.btn-next{background:#fbcfe8}

#list{margin-top:20px;background:#f9f9f9;padding:15px;border-radius:15px;display:none;border:1px solid #ddd}

.list-item { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid #eee; text-align: left; }
.list-btns { display: flex; flex-direction: row; gap: 6px; min-width: 120px; }
.list-texts { flex: 1; }
.mini-btn { border: none; border-radius: 8px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.2s; }
.btn-star-list { background: #f8fafc; font-size: 20px; color: #ccc; border: 1px solid #e2e8f0; }
.btn-star-list.active { color: #f59e0b; border-color: #f59e0b; background: #fffbeb; }
.btn-audio-list { background: #dcfce7; }
.btn-eye-list { background: #fbcfe8; } /* Fondo rosa pastel */
.blur { filter: blur(5px); transition: filter 0.3s; cursor: pointer; }
.blur.revealed { filter: blur(0); }
</style>
</head>
<body>

<div class="card">
  <div class="modes">
    <div id="modeEN" class="mode en active" onclick="setMode('EN')">ENG → ESP/CAT</div>
    <div id="modeES" class="mode es" onclick="setMode('ES')">ESP/CAT → ENG</div>
  </div>

  <div class="blocks" id="blocksContainer"></div>

  <div class="main-box-container">
    <button class="star-main" id="starMain" onclick="toggleStarMain()">★</button>
    <div class="main-box">
      <button class="audio-btn" onclick="playAudio()">🔊</button>
    </div>
    <div class="counter-side">
      <span id="pos">0</span> / <span id="total">0</span>
    </div>
  </div>

  <div id="word"></div>
  <div id="answer"></div>

  <div class="actions">
    <button class="btn btn-reveal" onclick="reveal()">Veure</button>
    <button class="btn btn-know" onclick="know()">Ja la sé</button>
    <button class="btn btn-next" onclick="next()">Següent</button>
  </div>
  
  <div style="display:flex; gap:10px; margin-top:20px;">
    <button id="listBtn" onclick="toggleList()" style="flex:2; padding:12px; border-radius:12px; border:none; background:#e9d5ff; font-weight:bold; cursor:pointer">Llista del bloc</button>
    <button onclick="loadStars()" style="flex:1; padding:12px; border-radius:12px; border:none; background:#fef3c7; color:#92400e; font-weight:bold; cursor:pointer">Repàs (★)</button>
  </div>
  <div id="list"></div>
</div>

<audio id="audio"></audio>

<script>
const data = [
  {en: "I have a small pebble in my shoe", es: "Tengo una pequeña piedrecita en mi zapato", cat: "Tinc una petita pedreta a la sabata"},
  {en: "Tie the package with a piece of string", es: "Ata el paquete con un trozo de cuerda", cat: "Lliga el paquet amb un tros de corda"},
  {en: "This dress is made of white lace", es: "Este vestido está hecho de encaje blanco", cat: "Aquest vestit està fet d'encaix blanc"},
  {en: "Put the plant on the window ledge", es: "Pon la planta en la repisa de la ventana", cat: "Posa la planta a la repisa de la finestra"},
  {en: "Button the cuff of your shirt", es: "Abotona el puño de tu camisa", cat: "Abotona el puny de la teva camisa"},
  {en: "The officer put the handcuffs on him", es: "El oficial le puso las esposas", cat: "L'oficial li va posar les esposes"},
  {en: "Use the kitchen tongs to turn the meat", es: "Usa las pinzas de cocina para girar la carne", cat: "Utilitza les pinces de cuina per girar la carn"},
  {en: "She uses tweezers for her eyebrows", es: "Ella usa pinzas de depilar para sus cejas", cat: "Ella fa servir pinces de depilar per a les celles"},
  {en: "The sly fox escaped", es: "El zorro astuto escapó", cat: "La guineu astuta va escapar"},
  {en: "He held her gaze for a moment", es: "Él mantuvo su mirada por un momento", cat: "Ell va mantenir la mirada per un moment"},
  {en: "I've tidied up every room", es: "He ordenado cada habitación", cat: "He ordenat cada habitació"},
  {en: "Each one is spotless now", es: "Cada una está impecable ahora", cat: "Cadascuna està impecable ara"},
  {en: "You ought to go now", es: "Deberías irte ahora", cat: "Hauries de marxar ara"},
  {en: "I need a hook for my keys", es: "Necesito un gancho para mis llaves", cat: "Necesito un ganxo per a les meves claus"},
  {en: "Hook it up to the speaker", es: "Conéctalo al altavoz", cat: "Connecta-ho a l'altaveu"},
  {en: "I have a fear of heights", es: "Tengo miedo a las alturas", cat: "Tinc por a les altures"},
  {en: "The judge was very fair in his decision", es: "El juez fue muy justo en su decisión", cat: "El jutge va ser molt just en la seva decisió"},
  {en: "That movie was awesome", es: "Esa película fue genial", cat: "Aquella pel·lícula va ser genial"},
  {en: "Flip the pancake", es: "Dale la vuelta a la tortita", cat: "Dona-li la volta a la truita"},
  {en: "The movie has a complex plot", es: "La película tiene una trama compleja", cat: "La pel·lícula té una trama complexa"},
  {en: "The hearse led the procession", es: "El coche fúnebre encabezaba la procesión", cat: "El cotxe fúnebre encapçalava la processó"}
];

let currentBlockData = [];
let pos = 0;
let mode = "EN";
let learnedCount = 0;
let currentBlockID = 0;

function getFolderName() {
    const path = window.location.pathname;
    return path.split('/').filter(Boolean).slice(-2, -1)[0] || "unknown";
}

let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];

function initBlocks() {
  const container = document.getElementById("blocksContainer");
  const numBlocks = Math.ceil(data.length / 10);
  container.innerHTML = "";
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block";
    btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i);
    container.appendChild(btn);
  }
  const btnT = document.createElement("button");
  btnT.className = "block"; btnT.textContent = "T";
  btnT.onclick = () => loadBlock('T');
  container.appendChild(btnT);
  loadBlock(0);
}

function loadBlock(b) {
  currentBlockID = b;
  let temp = [];
  if (b === 'T') {
    temp = data.map((item, i) => ({...item, realIdx: i+1}));
  } else {
    let start = b * 10;
    let end = Math.min(start + 10, data.length);
    for (let i = start; i < end; i++) {
      temp.push({...data[i], realIdx: i+1});
    }
  }
  currentBlockData = temp.sort(() => Math.random() - 0.5);
  
  document.querySelectorAll(".block").forEach((btn) => {
    btn.classList.toggle("active", (b === 'T' && btn.textContent === 'T') || (parseInt(btn.textContent)-1 === b));
  });

  pos = 0; learnedCount = 0;
  document.getElementById("list").style.display = "none";
  update(true); 
}

function loadStars() {
    const stars = data.map((item, i) => ({...item, realIdx: i+1})).filter(i => starredIds.includes(i.realIdx));
    if (stars.length === 0) { alert("No tens frases preferides encara!"); return; }
    currentBlockData = stars.sort(() => Math.random() - 0.5);
    currentBlockID = 'S';
    document.querySelectorAll(".block").forEach(b => b.classList.remove("active"));
    pos = 0; learnedCount = 0;
    update(true);
}

function setMode(m) {
  mode = m;
  document.getElementById("modeEN").classList.toggle("active", m === "EN");
  document.getElementById("modeES").classList.toggle("active", m === "ES");
  update(true);
}

function update(fromNextAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("word").innerHTML = "¡Bloc Completat! 🎉";
    document.getElementById("answer").innerHTML = "";
    document.getElementById("starMain").style.display = "none";
    return;
  }
  document.getElementById("starMain").style.display = "block";
  const item = currentBlockData[pos];
  const translation = `<span class="txt-es">${item.es}</span><br><span class="txt-cat">${item.cat}</span>`;
  
  const w = document.getElementById("word");
  const a = document.getElementById("answer");

  document.getElementById("starMain").classList.toggle("active", starredIds.includes(item.realIdx));

  if (mode === "EN") {
    w.innerHTML = ``; 
    a.innerHTML = translation;
    if (fromNextAction) playAudio();
  } else {
    w.innerHTML = `<div style='font-size:22px; line-height:1.3'>${translation}</div>`;
    a.innerHTML = `<span style="font-size:28px;">${item.en}</span>`;
  }
  
  a.style.display = "none";
  document.getElementById("pos").textContent = learnedCount;
  document.getElementById("total").textContent = currentBlockData.length + learnedCount;
}

function toggleStarMain() {
    const item = currentBlockData[pos];
    toggleStar(item.realIdx);
    update();
}

function toggleStar(id) {
    if (starredIds.includes(id)) {
        starredIds = starredIds.filter(i => i !== id);
    } else {
        starredIds.push(id);
    }
    localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
}

function reveal() {
  if (currentBlockData.length > 0) {
    const item = currentBlockData[pos];
    if (mode === "EN") {
        document.getElementById("word").innerHTML = `<span style="color:#333;">${item.en}</span>`;
    }
    document.getElementById("answer").style.display = "block";
    if (mode === "ES") playAudio(); 
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++;
  currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0;
  update(true);
}

function next() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length;
  update(true);
}

function playAudio(forcedIdx = null) {
  const idx = forcedIdx || currentBlockData[pos].realIdx;
  const num = idx.toString().padStart(3, "0");
  const a = document.getElementById("audio");
  a.src = "f" + num + ".mp3";
  
  if (!forcedIdx) {
    const btn=document.querySelector('.audio-btn');
    btn.classList.remove('vibrate'); void btn.offsetWidth; btn.classList.add('vibrate');
  }
  
  a.play().catch(() => {});
}

function toggleList() {
  const l = document.getElementById("list");
  if (l.style.display === "block") { l.style.display = "none"; return; }
  
  l.innerHTML = "<b>Llista del bloc:</b><br><br>";
  
  let listToRender = [];
  if (currentBlockID === 'T') listToRender = data.map((item, i) => ({...item, realIdx: i+1}));
  else if (currentBlockID === 'S') listToRender = data.map((item, i) => ({...item, realIdx: i+1})).filter(i => starredIds.includes(i.realIdx));
  else {
      let start = (currentBlockID === 'T' || currentBlockID === 'S') ? 0 : currentBlockID * 10;
      let end = Math.min(start + 10, data.length);
      listToRender = data.slice(start, end).map((item, i) => ({...item, realIdx: (start + i + 1)}));
  }

  listToRender.forEach((item) => {
    const isStarred = starredIds.includes(item.realIdx);
    const itemDiv = document.createElement("div");
    itemDiv.className = "list-item";
    itemDiv.innerHTML = `
      <div class="list-btns">
        <button class="mini-btn btn-star-list ${isStarred ? 'active' : ''}" onclick="toggleStar(${item.realIdx}); this.classList.toggle('active'); update();">★</button>
        <button class="mini-btn btn-audio-list" onclick="playAudio(${item.realIdx})">🔊</button>
        <button class="mini-btn btn-eye-list" onclick="document.getElementById('reveal-li-${item.realIdx}').classList.toggle('revealed')">👁</button>
      </div>
      <div class="list-texts">
        <div class="txt-es" style="font-size:14px;">${item.es}</div>
        <div id="reveal-li-${item.realIdx}" class="blur" style="font-weight:bold; font-size:16px;">${item.en}</div>
      </div>
    `;
    l.appendChild(itemDiv);
  });
  l.style.display = "block";
}

initBlocks();

const style = document.createElement('style');
style.innerHTML = `
    .check-box-manual {
        position: absolute;
        top: 85px; 
        right: 22px;
        width: 24px;
        height: 24px;
        background: #fff !important;
        border: 1.5px solid #22c55e !important;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 10;
        transition: all 0.2s;
        font-size: 14px;
    }
    .check-box-manual.marked { background: #22c55e !important; color: white; }
`;
document.head.appendChild(style);

function markAsDone(element) {
    localStorage.setItem(getFolderName(), new Date().toISOString());
    element.innerHTML = "✓";
    element.classList.add('marked');
    alert("Lliçó marcada ✅");
}

const card = document.querySelector(".card");
const box = document.createElement("div");
box.className = "check-box-manual";
if (localStorage.getItem(getFolderName())) {
    box.innerHTML = "✓";
    box.classList.add('marked');
}
box.onclick = function() { markAsDone(this); };
card.appendChild(box);
</script>
</body>
</html>
