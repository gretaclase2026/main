 <!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noves Frases d'Estudi - Unitat 14</title>
<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;color:#0f172a}
header{padding:8px 4px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;justify-content:center;align-items:center;gap:4px}
.unit-number{font-size:22px;font-weight:800;color:#2563eb;margin:0 8px;min-width:20px;text-align:center}
.mode-btns button{padding:6px 10px;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:11px;white-space:nowrap;line-height:1.2}
.mode-en{background:#dbeafe}
.mode-es{background:#fde68a}

main{display:flex;justify-content:center;padding:24px}
.card{position:relative;width:100%;max-width:560px;background:#ffffff;border-radius:28px;padding:32px;box-shadow:0 10px 24px rgba(0,0,0,0.06);text-align:center}
.counter{position:absolute;top:18px;left:22px;font-weight:800;color:#2563eb}
.check-box-manual { position: absolute; top: 18px; right: 22px; width: 24px; height: 24px; background: #fff; border: 1.5px solid #22c55e; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; color: transparent; transition: 0.2s; }
.check-box-manual.marked { background: #22c55e !important; color: white !important; }
.lang{font-size:14px;font-weight:800;letter-spacing:1px;color:#64748b;margin-bottom:6px}

.blocks{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;margin:15px 0 20px;overflow-x:auto;padding:5px 0 5px 10px}
.block{flex: 0 0 auto;width:32px;height:32px;border-radius:50%;border:none;background:#f1f5f9;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s}
.block.active{background:#2563eb !important;color:#fff !important;transform:scale(1.1)}
.block.all-btn { background: #e2e8f0; color: #475569; }

.audio-container { display: flex; justify-content: center; gap: 8px; margin: 10px 0; align-items: center; flex-wrap: nowrap; }
.audio-btn{width:52px;height:52px;border-radius:50%;border:none;background:#dbeafe;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.1s;}
.audio-btn.slow{background:#fef08a;}
.audio-btn.pause{background:#fee2e2; color: inherit;} 
.audio-btn.rec{background:#fbcfe8; color: #9d174d;}
.audio-btn.stt{background:#dbeafe; font-size: 22px;}

@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
.recording-active { background: #f06292 !important; color: white !important; }
.recording-icon { display: inline-block; animation: pulse 1s infinite; }
.listening { animation: pulse 1.5s infinite; background: #3b82f6 !important; color: white !important; }

.star-btn { background: none; border: none; font-size: 32px; cursor: pointer; color: #cbd5e1; transition: 0.2s; padding: 0 5px 0 0; margin-right: 5px; }
.star-btn.active { color: #f59e0b !important; }

.progress-wrapper { width: 100%; padding: 0 10px; margin: 15px 0 25px; box-sizing: border-box; }
input[type="range"] { width: 100%; cursor: pointer; height: 10px; border-radius: 5px; accent-color: #2563eb; }

#speechFeedback { font-size: 18px; margin: 15px 0; font-weight: bold; min-height: 28px; line-height: 1.5; display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
.word-correct { color: #16a34a; }
.word-error { color: #dc2626; text-decoration: line-through; }
.word-missing { color: #94a3b8; font-style: italic; }

.hidden{display:none}
.es{font-size:19px;color:#2563eb;margin-top:14px;line-height:1.4;font-weight:600}
.en{font-size:19px;color:#0f172a;margin-top:14px;font-weight:700;line-height:1.4}

.buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:22px}
button.action{padding:16px 0;border:none;border-radius:16px;font-weight:800;cursor:pointer}
.reveal{background:#e0f2fe}
.know{background:#dcfce7}
.next{background:#fbcfe8}

.list-controls { display: flex; gap: 10px; margin-top: 16px; }
.list-btn{ flex:1; background:#e9d5ff; border:none; border-radius:16px; padding:14px; font-weight:800; cursor:pointer; font-size:13px }
.review-btn { background: #fef3c7; color: #92400e; }

.list-box{max-width:560px;margin:16px auto;background:#fff;border-radius:20px;border:1px solid #e5e7eb;padding:16px;text-align:left}
.list-item { display: flex; flex-direction: row; gap: 12px; padding: 15px 0; border-bottom: 1px solid #eee; align-items: center; }
.list-controls-row { display: flex; flex-direction: row; gap: 6px; align-items: center; flex-shrink: 0; }
.list-texts { display: flex; flex-direction: column; gap: 4px; flex: 1; }

.mini-btn { border: none; border-radius: 10px; width: 34px; height: 34px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.btn-audio { background: #dbeafe; }
.btn-rec-mini { background: #fbcfe8; color: #9d174d; transition: 0.2s; }
.star-btn-list { background: none; border: none; font-size: 24px; cursor: pointer; color: #cbd5e1; padding: 0; line-height: 1; display: flex; align-items: center; }
.star-btn-list.active { color: #f59e0b !important; }

.blur { filter: blur(5px); transition: filter 0.2s; cursor: pointer; user-select: none; }
.blur.revealed { filter: blur(0); }
</style>
</head>
<body>

<header>
 <div class="mode-btns"><button class="mode-en" onclick="setMode('EN')">ENG → CAT</button></div>
 <div class="unit-number">14</div>
 <div class="mode-btns"><button class="mode-es" onclick="setMode('CA')">CAT → ENG</button></div>
</header>

<main>
<div class="card">
 <div class="counter" id="counter">0 / 0</div>
 <div class="check-box-manual" id="mainCheck" onclick="markAsDone(this)"></div>

 <div id="langLabel" class="lang" style="margin-top: 10px;">ANGLÈS</div>
 <div id="blockContainer" class="blocks"></div>

 <div class="audio-container">
  <button class="star-btn" id="starBtn" onclick="toggleStar()">★</button>
  <button class="audio-btn slow" onclick="playCurrent(0.75)">🐢</button>
  <button class="audio-btn" onclick="playCurrent(1.0)">🔊</button>
  <button class="audio-btn pause" onclick="pauseAudio()">⏸</button>
  <button class="audio-btn rec" id="recBtn" onclick="toggleRecord('recBtn')">🎤</button>
  <button class="audio-btn stt" id="sttBtn" onclick="toggleMic()">🎤</button>
 </div>
 
 <div class="progress-wrapper"><input type="range" id="progressBar" value="0" min="0" max="100" step="0.1"></div>
 
 <div id="es" class="es hidden"></div>
 <div id="speechFeedback"></div>
 <div id="en" class="en hidden"></div>

 <div class="buttons">
  <button class="action reveal" onclick="reveal()">Veure</button>
  <button class="action know" onclick="know()">Ja la sé</button>
  <button class="action next" onclick="nextOne()">Següent</button>
 </div>
 <div class="list-controls">
    <button class="list-btn" onclick="toggleList('all')">Llista del bloc</button>
    <button class="list-btn review-btn" onclick="toggleList('stars')">Favorits (★)</button>
 </div>
 <div id="endMsg" class="hidden" style="margin-top:16px; font-weight:800; color:#16a34a;">✔ Bloc completat! 🎉</div>
</div>
</main>
<div id="listBox" class="list-box hidden"></div>

<script>
const items = [
    {audio:"f001.mp3",en:"If I had more money, I'd buy a new laptop.",es:"Si tingués més diners, compraria un portàtil nou."}
    ];

let currentBlockData = [], pos = 0, mode = "EN", learnedCount = 0, currentBlockID = 0;
const audioObj = new Audio();
const progressBar = document.getElementById("progressBar");

const contractions = {
    "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would", 
    "it'd": "it would", "we'd": "we would", "they'd": "they would",
    "i've": "i have", "you've": "you have", "we've": "we have", "they've": "they have",
    "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
    "don't": "do not", "doesn't": "does not", "didn't": "did not",
    "can't": "cannot", "couldn't": "could not", "won't": "will not", "wouldn't": "would not",
    "it's": "it is", "she's": "she is", "he's": "he is", "there's": "there is",
    "i'm": "i am", "we're": "we are", "they're": "they are", "you're": "you are",
    "hadn't": "had not", "wouldn't've": "would not have", "i'll": "i will"
};

const expanded = {};
for (let k in contractions) expanded[contractions[k]] = k;

function normalize(w) { return w ? w.toLowerCase().replace(/[.,?!"]/g, "").trim() : ""; }

function compareSentences(originalText, spokenText) {
    const feedbackDiv = document.getElementById("speechFeedback");
    const origWords = originalText.split(/\s+/);
    const spokenWords = spokenText.split(/\s+/);
    let resultHTML = ""; let sIdx = 0; 
    for (let i = 0; i < origWords.length; i++) {
        let matched = false; const oNorm = normalize(origWords[i]);
        if (sIdx < spokenWords.length) {
            const sNorm1 = normalize(spokenWords[sIdx]);
            const sNorm2 = normalize(spokenWords[sIdx + 1]);
            const sTwoWords = sNorm1 + " " + (sNorm2 || "");
            if (contractions[oNorm] === sTwoWords) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]} ${spokenWords[sIdx+1]}</span> `;
                sIdx += 2; matched = true;
            } else if (i + 1 < origWords.length && (oNorm + " " + normalize(origWords[i+1])) === contractions[sNorm1]) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx += 1; i++; matched = true;
            } else if (oNorm === sNorm1 || contractions[oNorm] === sNorm1 || expanded[oNorm] === sNorm1) {
                resultHTML += `<span class="word-correct">${spokenWords[sIdx]}</span> `;
                sIdx++; matched = true;
            }
        }
        if (!matched) {
            let foundAhead = false;
            for (let look = sIdx; look < sIdx + 3 && look < spokenWords.length; look++) {
                if (normalize(spokenWords[look]) === oNorm) {
                    for (let skip = sIdx; skip < look; skip++) resultHTML += `<span class="word-error">${spokenWords[skip]}</span> `;
                    resultHTML += `<span class="word-correct">${spokenWords[look]}</span> `;
                    sIdx = look + 1; foundAhead = true; matched = true; break;
                }
            }
            if (!foundAhead) resultHTML += `<span class="word-missing">${origWords[i]}</span> `;
        }
    }
    while (sIdx < spokenWords.length) { resultHTML += `<span class="word-error">${spokenWords[sIdx]}</span> `; sIdx++; }
    feedbackDiv.innerHTML = resultHTML;
}

/* --- CONTROL DE MICRÓFONOS --- */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition, isListening = false;
if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US'; recognition.interimResults = false; recognition.continuous = true;
    recognition.onstart = () => { isListening = true; document.getElementById("sttBtn").classList.add("listening"); };
    recognition.onend = () => { isListening = false; document.getElementById("sttBtn").classList.remove("listening"); };
    recognition.onresult = (e) => {
        let transcript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) transcript += e.results[i][0].transcript + " ";
        compareSentences(currentBlockData[pos].en, transcript.trim());
    };
}

function stopAllMicrophones() {
    if (isListening && recognition) { recognition.stop(); isListening = false; }
    if (isRecording && mediaRecorder) { 
        if (mediaRecorder.state !== 'inactive') mediaRecorder.stop(); 
        isRecording = false; 
    }
    if (window.localStream) {
        window.localStream.getTracks().forEach(track => track.stop());
        window.localStream = null;
    }
    document.getElementById("sttBtn").classList.remove("listening");
    document.querySelectorAll(".recording-active").forEach(b => {
        b.classList.remove("recording-active");
        b.innerHTML = '🎤';
    });
}

async function toggleMic() {
    if (!recognition) return;
    if (isListening) { 
        recognition.stop(); 
    } else { 
        stopAllMicrophones(); 
        // Borrar el feedback anterior antes de empezar a escuchar de nuevo
        document.getElementById("speechFeedback").innerHTML = "";
        recognition.start(); 
    }
}

/* --- GRABADORA (MICRO ROSA) --- */
function getFolderName() { return window.location.pathname.split('/').filter(Boolean).slice(-2, -1)[0] || "index_condicionals"; }
let starredIds = JSON.parse(localStorage.getItem('stars_' + getFolderName())) || [];
let mediaRecorder, audioChunks = [], isRecording = false;

async function toggleRecord(targetBtnId) {
    const btn = document.getElementById(targetBtnId);
    if (isRecording) { stopAllMicrophones(); return; }
    stopAllMicrophones(); 
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        window.localStream = stream;
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            if (audioChunks.length > 0) {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                new Audio(URL.createObjectURL(audioBlob)).play();
            }
        };
        mediaRecorder.start(); 
        isRecording = true;
        btn.classList.add("recording-active");
        btn.innerHTML = '<span class="recording-icon">🎤</span>';
    } catch (err) { alert("Micròfon no disponible"); }
}

/* --- LÓGICA GENERAL --- */
audioObj.ontimeupdate = () => { if (audioObj.duration) progressBar.value = (audioObj.currentTime / audioObj.duration) * 100; };
progressBar.oninput = () => { if (audioObj.duration) audioObj.currentTime = (progressBar.value / 100) * audioObj.duration; };

function initBlocks() {
  const container = document.getElementById("blockContainer");
  const numBlocks = Math.ceil(items.length / 10);
  const savedBlock = localStorage.getItem(getFolderName() + "_puntoLibro");
  container.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "block all-btn"; allBtn.textContent = "T";
  allBtn.onclick = () => loadAll(); container.appendChild(allBtn);
  for (let i = 0; i < numBlocks; i++) {
    const btn = document.createElement("button");
    btn.className = "block"; btn.textContent = i + 1;
    btn.onclick = () => loadBlock(i); container.appendChild(btn);
  }
  if (savedBlock === "all") loadAll();
  else loadBlock((savedBlock !== null) ? parseInt(savedBlock) : 0);
}

function loadBlock(b) {
  currentBlockID = b; localStorage.setItem(getFolderName() + "_puntoLibro", b);
  let temp = []; let start = b * 10;
  for (let i = start; i < Math.min(start + 10, items.length); i++) temp.push({...items[i]});
  currentBlockData = temp;
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === (b + 1)));
  pos = 0; learnedCount = 0; document.getElementById("endMsg").classList.add("hidden"); update(true);
}

function loadAll() {
  currentBlockID = -1; localStorage.setItem(getFolderName() + "_puntoLibro", "all");
  currentBlockData = items.map(i => ({...i}));
  document.querySelectorAll(".block").forEach((btn, idx) => btn.classList.toggle("active", idx === 0));
  pos = 0; learnedCount = 0; document.getElementById("endMsg").classList.add("hidden"); update(true);
}

function update(fromAction = false) {
  if (currentBlockData.length === 0) {
    document.getElementById("en").classList.add("hidden");
    document.getElementById("es").classList.add("hidden");
    document.getElementById("endMsg").classList.remove("hidden");
    return;
  }
  progressBar.value = 0; const item = currentBlockData[pos];
  document.getElementById("es").classList.add("hidden");
  document.getElementById("en").classList.add("hidden");
  document.getElementById("speechFeedback").innerHTML = "";
  document.getElementById("starBtn").classList.toggle("active", starredIds.includes(item.audio));
  if (mode === "EN") {
    document.getElementById("langLabel").textContent = "ANGLÈS";
    document.getElementById("en").innerHTML = item.en; document.getElementById("en").classList.remove("hidden");
    if (fromAction) playAudio(item.audio, 1.0);
  } else {
    document.getElementById("langLabel").textContent = "CATALÀ";
    document.getElementById("es").innerHTML = item.es; document.getElementById("es").classList.remove("hidden");
  }
  document.getElementById("counter").textContent = `${learnedCount} / ${currentBlockData.length + learnedCount}`;
}

function playAudio(src, speed) { audioObj.src = src; audioObj.playbackRate = speed; audioObj.play().catch(()=>{}); }
function playCurrent(speed) { if (currentBlockData.length > 0) playAudio(currentBlockData[pos].audio, speed); }
function pauseAudio() { audioObj.pause(); }

function reveal() {
  if (currentBlockData.length === 0) return;
  const item = currentBlockData[pos];
  const esEl = document.getElementById("es");
  const enEl = document.getElementById("en");
  const feedbackEl = document.getElementById("speechFeedback");

  if (mode === "EN") {
    esEl.innerHTML = item.es;
    esEl.classList.toggle("hidden");
    if(esEl.classList.contains("hidden")) feedbackEl.innerHTML = "";
  } else {
    enEl.innerHTML = item.en;
    enEl.classList.toggle("hidden");
    if(enEl.classList.contains("hidden")) feedbackEl.innerHTML = "";
  }
}

function know() {
  if (currentBlockData.length === 0) return;
  learnedCount++; currentBlockData.splice(pos, 1);
  if (pos >= currentBlockData.length) pos = 0; update(true);
}

function nextOne() {
  if (currentBlockData.length === 0) return;
  pos = (pos + 1) % currentBlockData.length; update(true);
}

function setMode(m) { mode = m; update(true); }

function toggleStar(forcedId = null) {
  const audio = forcedId || currentBlockData[pos].audio;
  if (starredIds.includes(audio)) starredIds = starredIds.filter(id => id !== audio);
  else starredIds.push(audio);
  localStorage.setItem('stars_' + getFolderName(), JSON.stringify(starredIds));
  update();
}

function toggleList(type) {
  const box = document.getElementById("listBox");
  if (!box.classList.contains("hidden") && box.dataset.activeType === type) { box.classList.add("hidden"); return; }
  box.dataset.activeType = type; renderList(type); box.classList.remove("hidden");
}

function renderList(type) {
  const box = document.getElementById("listBox"); box.innerHTML = "";
  let listToRender = (type === 'stars') ? items.filter(i => starredIds.includes(i.audio)) : 
                    (currentBlockID === -1 ? items : items.slice(currentBlockID * 10, (currentBlockID + 1) * 10));
  if (listToRender.length === 0) { box.innerHTML += "<p style='padding:10px;'>Buit.</p>"; return; }
  listToRender.forEach((i, index) => {
    const isStarred = starredIds.includes(i.audio);
    const itemDiv = document.createElement("div"); itemDiv.className = "list-item";
    const recId = `rec-list-${index}`;
    itemDiv.innerHTML = `
      <div class="list-controls-row">
        <button class="star-btn-list ${isStarred ? 'active' : ''}" onclick="toggleStar('${i.audio}'); renderList('${type}')">★</button>
        <button class="mini-btn btn-audio" onclick="playAudio('${i.audio}', 1.0)">🔊</button>
        <button class="mini-btn btn-rec-mini" id="${recId}" onclick="toggleRecord('${recId}')">🎤</button>
      </div>
      <div class="list-texts">
        <div style="color:#2563eb; font-weight:700;">${i.es}</div>
        <div class="blur" style="font-weight:800;" onclick="this.classList.toggle('revealed')">${i.en}</div>
      </div>
    `;
    box.appendChild(itemDiv);
  });
}

function markAsDone(el) {
    if (!el.classList.contains('marked')) {
        localStorage.setItem(getFolderName(), new Date().toISOString());
        el.innerHTML = "✓"; el.classList.add('marked');
    } else {
        localStorage.removeItem(getFolderName());
        el.innerHTML = ""; el.classList.remove('marked');
    }
}

window.addEventListener('load', () => {
    if (localStorage.getItem(getFolderName())) {
        const mc = document.getElementById("mainCheck");
        mc.innerHTML = "✓"; mc.classList.add('marked');
    }
    initBlocks();
});
</script>
</body>
</html>
