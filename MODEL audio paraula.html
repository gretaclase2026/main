 <!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Descarregador de Paraules (Home/Dona)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; }
        input { width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background: #2563eb; color: white; border: none; font-weight: bold; }
        button:disabled { background: #94a3b8; }
        .log { margin-top: 20px; font-size: 14px; max-height: 300px; overflow-y: auto; background: #1e293b; color: #f1f5f9; padding: 15px; border-radius: 8px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
    </style>
</head>
<body>

<div class="container">
    <h2>Generador d'Àudios Google Cloud Studio (160 paraules)</h2>
    <p>Aquest script generarà 160 fitxers MP3 basats en la llista de la imatge.</p>
    
    <label>1. Enganxa la teva Google API Key:</label>
    <input type="password" id="apiKey" placeholder="AIzaSy...">

    <button id="startBtn" onclick="processAudios()">Començar generació d'audios</button>

    <div id="log" class="log">Esperant acció...</div>
</div>

<script>
const rawWords = [
    "Basement", "Attic", "Pantry", "Driveway", "Hallway", "Landing", "Backyard", "Porch", "Utility room", "Roof",
    "Pine", "Oak", "Olive tree", "Palm tree", "Cypress", "Fig tree", "Almond tree", "Lemon tree", "Orange tree", "Poplar",
    "Dog / Puppy", "Cat / Kitten", "Cow / Calf", "Horse / Foal", "Hen / Chick", "Sheep / Lamb", "Pig / Piglet", "Lion / Cub", "Goat / Kid", "Duck / Duckling",
    "Blueberry", "Raspberry", "Blackberry", "Strawberry", "Currant", "Mango", "Papaya", "Avocado", "Pomegranate", "Dragon fruit",
    "Get to the point", "Cut to the chase", "Stop beating around the bush", "Get down to brass tacks", "The bottom line", "Let's stay on track", "Cut the crap", "In a nutshell", "To make a long story short", "Straight away",
    "Acquaintance", "Engagement", "Wedding", "Pregnancy", "Honeymoon", "Childbirth", "Quarrel", "Adultery", "Divorce", "Fling",
    "Syringe", "Patch", "Bandage", "Thermometer", "Pill", "Glucose meter", "Spray", "Eye drops", "Cough syrup", "Ointment",
    "Curly", "Dreadlocks", "Bob", "Wavy", "Pigtails", "Ponytail", "Bun", "Braid", "Shoulder-length", "Bald",
    "Plant trees", "Oil spill", "Landfill", "Separate garbage", "Pollution", "Reusable bag", "Recycle", "Exhaust fumes", "Solar panel", "Wind turbine",
    "Bulletproof vest", "Warrant card", "Handcuffs", "Prison", "Bullhorn", "Gun", "Bullet", "Walkie-talkie", "Magnifying glass", "Police car",
    "Around", "Under", "Through", "Behind", "Among", "Opposite", "Towards", "Across", "Into", "Between",
    "Over", "In front of", "Next to", "Above", "Below", "Out of", "Up", "Down", "Off", "On",
    "Ant", "Bee", "Butterfly", "Caterpillar", "Cockroach", "Dragonfly", "Fly", "Grasshopper", "Ladybug", "Mosquito",
    "Crab", "Lobster", "Shrimp", "Mussels", "Oyster", "Squid", "Octopus", "Salmon", "Tuna", "Cod",
    "Earthquake", "Flood", "Tsunami", "Wildfire", "Drought", "Tornado", "Hurricane", "Volcanic eruption", "Avalanche", "Landslide",
    "Chop", "Peel", "Slice", "Squeeze", "Squish", "Grate", "Simmer", "Season", "Bake", "Stir"
];

// Mapegem per assegurar primera majúscula i netejar el nom del fitxer
const items = rawWords.map(word => {
    let fileName = word.charAt(0).toUpperCase() + word.slice(1);
    // Netegem caràcters no vàlids per a noms de fitxer (com barres o espais)
    let safeName = fileName.replace(/[\/\\?%*:|"<>]/g, '-').trim() + ".mp3";
    return { audio: safeName, text: word };
});

const logDiv = document.getElementById('log');

function updateLog(msg, type = '') {
    const p = document.createElement('p');
    p.className = type;
    p.textContent = msg;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
}

async function processAudios() {
    const key = document.getElementById('apiKey').value;
    if (!key) { alert("Posa la API Key"); return; }
    
    document.getElementById('startBtn').disabled = true;
    logDiv.innerHTML = "";
    updateLog("Iniciant procés de 160 paraules...");

    for (let i = 0; i < items.length; i++) {
        const item = items[i];
        // Intercalem veus: Senars Home (Q), Parells Dona (O)
        const voiceName = (i % 2 === 0) ? "en-US-Studio-Q" : "en-US-Studio-O";
        
        updateLog(`Processant ${i+1}/160: ${item.audio}...`);

        try {
            const response = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({
                    input: { text: item.text }, 
                    voice: { languageCode: "en-US", name: voiceName },
                    audioConfig: { audioEncoding: "MP3" }
                })
            });

            const data = await response.json();

            if (data.audioContent) {
                downloadBlob(data.audioContent, item.audio);
                updateLog(`Èxit: ${item.audio} descarregat.`, 'success');
            } else {
                throw new Error(data.error?.message || "Error desconegut");
            }
        } catch (err) {
            updateLog(`Error a ${item.audio}: ${err.message}`, 'error');
        }
        
        // Esperem 600ms per no bloquejar la quota de l'API
        await new Promise(r => setTimeout(r, 600));
    }
    
    updateLog("Procés finalitzat.");
    document.getElementById('startBtn').disabled = false;
}

function downloadBlob(base64, fileName) {
    const link = document.createElement('a');
    link.href = 'data:audio/mp3;base64,' + base64;
    link.download = fileName;
    link.click();
}
</script>

</body>
</html>
